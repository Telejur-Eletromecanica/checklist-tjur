<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { background: #ffffff; color: #000000; font-family: Arial, sans-serif; padding: 15px; }
    .main-card { max-width: 400px; margin: auto; border: 2px solid #ddd; padding: 20px; border-radius: 15px; }
    h2 { text-align: center; color: #333; font-size: 22px; margin-bottom: 20px; }
    label { font-size: 12px; font-weight: bold; color: #555; display: block; margin-top: 15px; text-transform: uppercase; }
    select, input { width: 100%; padding: 14px; margin-top: 5px; border-radius: 8px; border: 1px solid #999; background: #fff; font-size: 16px; box-sizing: border-box; color: #000; }
    input[readonly] { background: #f0f0f0; border-color: #ccc; font-weight: bold; }
    .grid { display: flex; gap: 10px; }
    .btn { width: 100%; padding: 18px; border-radius: 12px; border: none; font-weight: bold; margin-top: 25px; cursor: pointer; color: white; font-size: 18px; }
    .btn-saida { background: #1a73e8; }
    .btn-chegada { background: #d93025; }
    .info-display { background: #e8f0fe; border: 1px solid #1a73e8; padding: 10px; border-radius: 8px; margin-top: 10px; text-align: center; font-weight: bold; color: #1a73e8; }
  </style>
</head>
<body>
  <div class="main-card">
    <h2>TELEJUR V22</h2>
    <form id="formApp">
      <label>Selecione o Motorista</label>
      <select name="nome" id="nome" onchange="buscarDados()" required>
        <option value="">-- QUEM É VOCÊ? --</option>
        <option value="Adriano Nascimento">Adriano Nascimento</option>
        <option value="Fracivaldo Costa">Fracivaldo Costa</option>
        <option value="Lafaiete Batista">Lafaiete Batista</option>
        <option value="Reginaldo">Reginaldo</option>
        <option value="Walter Gonçalves">Walter Gonçalves</option>
        <option value="Ezequeil Silva">Ezequeil Silva</option>
      </select>

      <div class="grid">
        <div style="flex:1">
          <label>TAG VEÍCULO</label>
          <select name="tag" id="tag" onchange="buscarDados()" required>
            <option value="">--</option>
            <option value="TJUR 04">TJUR 04</option>
            <option value="TJUR 06">TJUR 06</option>
            <option value="TJUR 07">TJUR 07</option>
            <option value="TJUR 08">TJUR 08</option>
            <option value="TJUR 09">TJUR 09</option>
            <option value="TJUR 10">TJUR 10</option>
            <option value="TJUR 13">TJUR 13</option>
          </select>
        </div>
        <div style="flex:1">
          <label>ID DO DIA</label>
          <input type="text" name="condutorID" id="condutorID" readonly>
        </div>
      </div>

      <div id="veiculoInfo" class="info-display">Aguardando seleção...</div>

      <div class="grid">
        <div style="flex:1">
          <label>KM Inicial</label>
          <input type="number" name="kmi" id="kmi" readonly>
        </div>
        <div style="flex:1">
          <label>KM Final (Chegada)</label>
          <input type="number" name="kmf" id="kmf">
        </div>
      </div>

      <label>Observação</label>
      <input type="text" name="obs" placeholder="Alguma avaria ou aviso?">

      <input type="hidden" name="veiculo" id="veiculo">
      <input type="hidden" name="placa" id="placa">
      <input type="hidden" name="proxOleo" id="proxOleo">
      <input type="hidden" name="numT" id="numT">

      <button type="button" onclick="salvar('SAIDA')" class="btn btn-saida">🚀 INICIAR VIAGEM</button>
      <button type="button" onclick="salvar('CHEGADA')" class="btn btn-chegada">🏁 ENCERRAR VIAGEM</button>
    </form>
  </div>

  <script>
    const URL_SCRIPT = "SUA_URL_AQUI"; // COLOQUE SUA URL AQUI

    function buscarDados() {
      const tag = document.getElementById('tag').value;
      const nome = document.getElementById('nome').value;
      if (tag && nome) {
        document.getElementById('veiculoInfo').innerText = "Buscando dados...";
        const script = document.createElement('script');
        script.src = `${URL_SCRIPT}?callback=callbackAuto&acao=buscarDadosVei&tag=${encodeURIComponent(tag)}&nome=${encodeURIComponent(nome)}`;
        document.body.appendChild(script);
      }
    }

    function callbackAuto(r) {
      if(r.erro) {
        alert("Erro: " + r.erro);
        return;
      }
      // PREENCHIMENTO AUTOMÁTICO
      document.getElementById('condutorID').value = r.condutorSugerido || "";
      document.getElementById('kmi').value = r.kmi || "";
      document.getElementById('veiculo').value = r.veiculo || "";
      document.getElementById('placa').value = r.placa || "";
      document.getElementById('proxOleo').value = r.proxOleo || "";
      document.getElementById('numT').value = r.numT || "1";
      
      document.getElementById('veiculoInfo').innerText = (r.veiculo || "NÃO ENCONTRADO") + " | " + (r.placa || "");
    }

    function salvar(tipo) {
      const f = document.getElementById('formApp');
      if(!f.checkValidity()) { alert("Preencha Motorista e Tag!"); return; }
      
      const b = event.target;
      b.disabled = true; b.innerText = "SALVANDO...";

      const dados = Object.fromEntries(new FormData(f));
      dados.tipo = tipo;
      dados.data = new Date().toLocaleDateString('pt-BR');
      const agora = new Date();
      const hora = agora.getHours().toString().padStart(2,'0') + ":" + agora.getMinutes().toString().padStart(2,'0');
      
      if(tipo === "SAIDA") dados.horaInic = hora;
      else {
        dados.horaFim = hora;
        if(!dados.kmf) { alert("Informe o KM Final!"); b.disabled = false; b.innerText = "ENCERRAR VIAGEM"; return; }
      }

      fetch(URL_SCRIPT, { method: 'POST', body: JSON.stringify(dados) })
      .then(() => {
        alert("Sucesso! Registro de " + tipo + " enviado.");
        location.reload();
      }).catch(err => {
        alert("Erro ao salvar!");
        b.disabled = false;
        b.innerText = tipo === "SAIDA" ? "INICIAR VIAGEM" : "ENCERRAR VIAGEM";
      });
    }
  </script>
</body>
</html>
