<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TELEJUR GESTÃO - V29 FINAL</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; margin: 0; padding: 10px; }
        .card { max-width: 450px; margin: auto; background: white; padding: 20px; border-radius: 20px; border-top: 12px solid #1a237e; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .brand { font-size: 24px; font-weight: 900; color: #1a237e; text-align: center; margin-bottom: 15px; }
        .painel-status { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 15px; }
        .status-item { font-size: 11px; font-weight: bold; padding: 10px; border-radius: 8px; text-align: center; border: 1px solid #ddd; transition: 0.3s; }
        .livre { background: #e8f5e9; color: #2e7d32; border-color: #a5d6a7; }
        .em-uso { background: #ffebee; color: #c62828; border-color: #ef9a9a; }
        label { font-weight: bold; font-size: 11px; color: #555; display: block; margin-top: 12px; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 12px; margin-top: 5px; border-radius: 8px; border: 1.5px solid #ccc; font-size: 16px; box-sizing: border-box; outline: none; }
        input:focus { border-color: #1a237e; }
        .readonly-field { background: #f1f3f4 !important; color: #1a237e; font-weight: bold; }
        .btn-azul { width: 100%; padding: 18px; background: #1a237e; border: none; border-radius: 12px; font-size: 16px; color: white; font-weight: bold; cursor: pointer; margin-top: 15px; }
        .btn-verde { width: 100%; padding: 18px; background: #25D366; border: none; border-radius: 12px; font-size: 16px; color: white; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .alerta { background: #fff3cd; color: #856404; padding: 12px; border-radius: 8px; font-size: 12px; font-weight: bold; margin-top: 10px; display: none; border: 1px solid #ffeeba; text-align: center; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="card">
    <p class="brand">TELEJUR GESTÃO</p>
    
    <div id="painelFrota" class="painel-status">Sincronizando frota...</div>

    <div id="telaEspera" class="hidden">
        <div style="background:#e3f2fd; padding:15px; border-radius:10px; border-left:5px solid #1a237e; margin-bottom:15px;">
            <p id="resumoAtivo" style="font-size:14px; margin:0; color:#1a237e;"></p>
        </div>
        <button type="button" onclick="ativarFinalizacao()" class="btn-azul">FINALIZAR TRAJETO ATUAL</button>
    </div>

    <div id="containerForm">
        <form id="formCheck">
            <label>HORÁRIO DO SISTEMA</label>
            <input type="text" id="dataHoraI" class="readonly-field" readonly>

            <label>VEÍCULO (TAG)</label>
            <select id="tag" onchange="validarBloqueio()" required>
                <option value="">SELECIONE</option>
                <option>TJUR 04</option><option>TJUR 06</option><option>TJUR 07</option>
                <option>TJUR 08</option><option>TJUR 09</option><option>TJUR 10</option><option>TJUR 13</option>
            </select>

            <div id="msgErro" class="alerta"></div>

            <label>IDENTIFICAÇÃO (ID)</label>
            <select id="idCond" onchange="validarBloqueio()" required>
                <option value="">SELECIONE</option>
                <option>ID 1</option><option>ID 2</option><option>ID 3</option><option>ID 4</option><option>ID 5</option>
            </select>

            <label>MOTORISTA RESPONSÁVEL</label>
            <select id="nome" required>
                <option value="">SELECIONE</option>
                <option>ADRIANO NASCIMENTO</option><option>FRANCIVALDO COSTA</option><option>FRANCINILDO TEXEIRA</option>
            </select>

            <label>KM INICIAL</label>
            <input type="number" id="kmi" placeholder="Ex: 19660" required>

            <div id="secaoFim" class="hidden">
                <hr style="margin:20px 0; border:0; border-top:1px dashed #ccc;">
                <label style="color:#c62828;">KM FINAL (OBRIGATÓRIO)</label>
                <input type="number" id="kmf" style="border-color:#c62828;">
                <label>OBSERVAÇÕES DO TRAJETO</label>
                <textarea id="obs" rows="2" placeholder="Ex: Limpeza OK, sem avarias..."></textarea>
            </div>

            <button type="button" id="btnAcao" onclick="registrar()" class="btn-azul">INICIAR NOVO TRAJETO</button>
        </form>
    </div>
</div>

<script>
    const URL = "https://script.google.com/macros/s/AKfycbysx-IjZe54SWbmqwl2NYJEx_kiuVtakdtE-GFYE30UxwYYQhcvOuw5DViSwMixS_QIyQ/exec";
    const dataF = new Date().toLocaleDateString('pt-BR');
    
    document.getElementById('dataHoraI').value = `${dataF} às ${new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}`;

    // FUNÇÃO QUE MATA O "ERRO DE CONEXÃO" (JSONP)
    function chamadaSegura(params) {
        return new Promise((resolve) => {
            const cb = "tjur_" + Date.now();
            const s = document.createElement('script');
            window[cb] = (d) => { resolve(d); document.body.removeChild(s); delete window[cb]; };
            s.src = `${URL}?${params}&callback=${cb}&t=${Date.now()}`;
            s.onerror = () => resolve({error:true});
            document.body.appendChild(s);
            setTimeout(() => { if(window[cb]) resolve({error:true}); }, 12000);
        });
    }

    // Sincroniza o painel de status (Vermelho/Verde)
    async function sincronizar() {
        const res = await chamadaSegura(`acao=statusGeral&data=${dataF}`);
        const painel = document.getElementById('painelFrota');
        if (res.error) {
            painel.innerHTML = "<div style='grid-column:span 2; color:#c62828; font-size:10px;'>🔄 Reconectando ao servidor...</div>";
            setTimeout(sincronizar, 5000);
            return;
        }
        const tags = ["TJUR 04", "TJUR 06", "TJUR 07", "TJUR 08", "TJUR 09", "TJUR 10", "TJUR 13"];
        painel.innerHTML = tags.map(t => 
            `<div class="status-item ${res[t] ? 'em-uso' : 'livre'}">${t}<br>${res[t] ? '🔴 '+res[t] : '🟢 LIVRE'}</div>`
        ).join('');
    }

    // Valida se o veículo ou ID já estão em uso
    async function validarBloqueio() {
        const tag = document.getElementById("tag").value;
        const id = document.getElementById("idCond").value;
        const btn = document.getElementById("btnAcao");
        const msg = document.getElementById("msgErro");
        if(!tag || !id || localStorage.getItem("tjur_v29")) return;

        btn.disabled = true; msg.style.display = "block"; msg.innerHTML = "🔍 Verificando disponibilidade...";
        const res = await chamadaSegura(`acao=verificar&tag=${tag}&id=${id}&data=${dataF}`);
        if(res.status && res.status !== "livre") {
            msg.innerHTML = `🚫 BLOQUEIO: ${res.status} já está em trajeto!`;
        } else { msg.style.display = "none"; btn.disabled = false; }
    }

    // Registra o início do trajeto
    async function registrar() {
        const btn = document.getElementById("btnAcao");
        const d = {
            data: dataF, horaI: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}), 
            tag: document.getElementById("tag").value, id: document.getElementById("idCond").value, 
            nome: document.getElementById("nome").value, kmi: document.getElementById("kmi").value
        };
        if(!d.tag || !d.kmi) return alert("Preencha o KM e o Veículo!");
        
        btn.innerText = "GRAVANDO..."; btn.disabled = true;
        
        // Envia os dados (mode no-cors para evitar erros de resposta)
        fetch(`${URL}?acao=registrar&${new URLSearchParams(d)}`, {mode:'no-cors'});
        
        localStorage.setItem("tjur_v29", JSON.stringify(d));
        setTimeout(() => location.reload(), 1500);
    }

    // Ativa os campos para finalizar o trajeto
    function ativarFinalizacao() {
        const s = JSON.parse(localStorage.getItem("tjur_v29"));
        document.getElementById("telaEspera").classList.add("hidden");
        document.getElementById("containerForm").classList.remove("hidden");
        document.getElementById("secaoFim").classList.remove("hidden");

        ["tag", "idCond", "nome", "kmi"].forEach(c => {
            const el = document.getElementById(c); 
            el.value = s[c === "idCond" ? "id" : c]; 
            el.disabled = true; 
            el.classList.add("readonly-field");
        });

        const btn = document.getElementById("btnAcao");
        btn.innerText = "FINALIZAR E ENVIAR RESUMO"; 
        btn.className = "btn-verde"; 
        btn.disabled = false;

        btn.onclick = async function() {
            const kmf = document.getElementById("kmf").value;
            const obs = document.getElementById("obs").value || "Sem observações";
            const hF = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            
            if(!kmf || Number(kmf) <= Number(s.kmi)) return alert("KM Final inválido ou menor que inicial!");
            
            btn.disabled = true; btn.innerText = "SALVANDO...";
            
            await fetch(`${URL}?acao=finalizar&tag=${s.tag}&data=${s.data}&kmf=${kmf}&obs=${encodeURIComponent(obs)}`, {mode:'no-cors'});
            
            // Texto para o WhatsApp
            const msg = `*RESUMO DE TRAJETO - TELEJUR*%0A%0A` +
                        `🚗 *VEÍCULO:* ${s.tag}%0A` +
                        `👤 *MOTORISTA:* ${s.nome}%0A` +
                        `⏱ *HORÁRIO:* ${s.horaI} às ${hF}%0A` +
                        `🛣 *KM:* ${s.kmi} a ${kmf}%0A` +
                        `📝 *OBS:* ${obs}`;
            
            localStorage.removeItem("tjur_v29");
            window.location.href = `https://api.whatsapp.com/send?text=${msg}`;
            setTimeout(() => location.reload(), 3000);
        };
    }

    // Inicialização
    window.onload = () => { 
        sincronizar(); 
        const s = localStorage.getItem("tjur_v29");
        if(s) {
            const d = JSON.parse(s);
            document.getElementById("containerForm").classList.add("hidden");
            document.getElementById("telaEspera").classList.remove("hidden");
            document.getElementById("resumoAtivo").innerHTML = `🚗 <b>EM TRAJETO:</b> ${d.tag}<br>👤 <b>MOTORISTA:</b> ${d.nome}`;
        }
    };
</script>
</body>
</html>
