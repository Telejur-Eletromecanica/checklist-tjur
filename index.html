<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Telejur V22 - Controle de Frota</title>
    <style>
        :root {
            --primary: #1a73e8;
            --danger: #d93025;
            --bg: #f8f9fa;
            --text: #202124;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
        }

        .container {
            background: white;
            width: 100%;
            max-width: 450px;
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            box-sizing: border-box;
        }

        h2 {
            text-align: center;
            color: var(--primary);
            margin-bottom: 25px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        label {
            display: block;
            font-size: 12px;
            font-weight: bold;
            color: #5f6368;
            margin-top: 15px;
            margin-bottom: 5px;
        }

        select, input {
            width: 100%;
            padding: 14px;
            border: 1px solid #dadce0;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
            color: var(--text);
        }

        input[readonly] {
            background-color: #f1f3f4;
            color: #5f6368;
            border-color: #e8eaed;
        }

        .row {
            display: flex;
            gap: 12px;
        }

        .col { flex: 1; }

        .info-panel {
            background: #e8f0fe;
            border: 1px solid #d2e3fc;
            padding: 12px;
            border-radius: 8px;
            margin-top: 15px;
            text-align: center;
            font-weight: 500;
            color: var(--primary);
        }

        .btn {
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 12px;
            color: white;
            transition: filter 0.2s;
        }

        .btn:active { filter: brightness(0.8); }

        .btn-saida { background-color: var(--primary); margin-top: 30px; }
        .btn-chegada { background-color: var(--danger); }

        .loading {
            opacity: 0.6;
            pointer-events: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Telejur V22</h2>

    <form id="fleetForm">
        <label>Motorista Responsável</label>
        <select id="nome" name="nome" onchange="autoBusca()" required>
            <option value="">-- SELECIONE --</option>
            <option value="Adriano Nascimento">Adriano Nascimento</option>
            <option value="Fracivaldo Costa">Fracivaldo Costa</option>
            <option value="Lafaiete Batista">Lafaiete Batista</option>
            <option value="Reginaldo">Reginaldo</option>
            <option value="Walter Gonçalves">Walter Gonçalves</option>
            <option value="Ezequeil Silva">Ezequeil Silva</option>
        </select>

        <div class="row">
            <div class="col">
                <label>TAG</label>
                <select id="tag" name="tag" onchange="autoBusca()" required>
                    <option value="">--</option>
                    <option value="TJUR 04">TJUR 04</option>
                    <option value="TJUR 06">TJUR 06</option>
                    <option value="TJUR 07">TJUR 07</option>
                    <option value="TJUR 08">TJUR 08</option>
                    <option value="TJUR 09">TJUR 09</option>
                    <option value="TJUR 10">TJUR 10</option>
                    <option value="TJUR 13">TJUR 13</option>
                </select>
            </div>
            <div class="col">
                <label>ID Condutor</label>
                <input type="text" id="condutorID" name="condutorID" readonly placeholder="...">
            </div>
        </div>

        <div id="veiculoDisplay" class="info-panel">Aguardando seleção...</div>

        <div class="row">
            <div class="col">
                <label>KM Inicial</label>
                <input type="number" id="kmi" name="kmi" readonly>
            </div>
            <div class="col">
                <label>KM Final</label>
                <input type="number" id="kmf" name="kmf" placeholder="Chegada">
            </div>
        </div>

        <label>Observações</label>
        <input type="text" id="obs" name="obs" placeholder="Ex: Pneu baixo, limpeza...">

        <input type="hidden" id="veiculo" name="veiculo">
        <input type="hidden" id="placa" name="placa">
        <input type="hidden" id="proxOleo" name="proxOleo">
        <input type="hidden" id="numT" name="numT">

        <button type="button" id="btnSaida" onclick="enviar('SAIDA')" class="btn btn-saida">🚀 INICIAR SAÍDA</button>
        <button type="button" id="btnChegada" onclick="enviar('CHEGADA')" class="btn btn-chegada">🏁 FINALIZAR CHEGADA</button>
    </form>
</div>

<script>
    // IMPORTANTE: Insira a URL que o Google Apps Script gerou no "Implantar"
    const WEB_APP_URL = "SUA_URL_DA_IMPLANTACAO_AQUI";

    function autoBusca() {
        const tag = document.getElementById('tag').value;
        const nome = document.getElementById('nome').value;

        if (tag && nome) {
            document.getElementById('veiculoDisplay').innerText = "Carregando dados...";
            const script = document.createElement('script');
            // JSONP para evitar erro de CORS no GitHub Pages
            script.src = `${WEB_APP_URL}?callback=preencherForm&acao=buscarDadosVei&tag=${encodeURIComponent(tag)}&nome=${encodeURIComponent(nome)}`;
            document.body.appendChild(script);
        }
    }

    function preencherForm(res) {
        if (res.erro) {
            alert("Erro: " + res.erro);
            return;
        }
        document.getElementById('condutorID').value = res.condutorSugerido || "";
        document.getElementById('kmi').value = res.kmi || "";
        document.getElementById('veiculo').value = res.veiculo || "";
        document.getElementById('placa').value = res.placa || "";
        document.getElementById('proxOleo').value = res.proxOleo || "";
        document.getElementById('numT').value = "1"; // Valor padrão para numT se não vier do script
        
        document.getElementById('veiculoDisplay').innerText = `${res.veiculo || 'N/A'} - ${res.placa || 'N/A'}`;
    }

    function enviar(tipo) {
        const form = document.getElementById('fleetForm');
        const btn = tipo === 'SAIDA' ? document.getElementById('btnSaida') : document.getElementById('btnChegada');
        
        if (tipo === 'CHEGADA' && !document.getElementById('kmf').value) {
            alert("Por favor, informe o KM Final para encerrar.");
            return;
        }

        if (!document.getElementById('tag').value || !document.getElementById('nome').value) {
            alert("Selecione o motorista e a TAG.");
            return;
        }

        btn.classList.add('loading');
        btn.innerText = "ENVIANDO...";

        const payload = Object.fromEntries(new FormData(form));
        const agora = new Date();
        
        payload.tipo = tipo;
        payload.data = agora.toLocaleDateString('pt-BR');
        const hora = agora.getHours().toString().padStart(2, '0') + ":" + agora.getMinutes().toString().padStart(2, '0');
        
        if (tipo === 'SAIDA') payload.horaInic = hora;
        else payload.horaFim = hora;

        fetch(WEB_APP_URL, {
            method: 'POST',
            body: JSON.stringify(payload)
        })
        .then(r => r.text())
        .then(res => {
            alert("Sucesso! Registro de " + tipo + " gravado.");
            location.reload();
        })
        .catch(err => {
            alert("Erro ao conectar com a planilha.");
            btn.classList.remove('loading');
            btn.innerText = tipo === 'SAIDA' ? "🚀 INICIAR SAÍDA" : "🏁 FINALIZAR CHEGADA";
        });
    }
</script>

</body>
</html>
