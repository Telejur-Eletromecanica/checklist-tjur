<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TELEJUR - SMART FROTA V52</title>
    <style>
        :root { --primary: #1a237e; --success: #25D366; --bg: #f4f7f9; --danger: #d32f2f; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 10px; }
        .card { max-width: 480px; margin: auto; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border-top: 10px solid var(--primary); }
        .brand { font-size: 26px; font-weight: 900; color: var(--primary); text-align: center; margin: 0; }
        .subtitle { font-size: 11px; font-weight: bold; color: #777; text-align: center; letter-spacing: 2px; margin-bottom: 20px; }

        .secao { background: #f8fafc; padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #e2e8f0; }
        .secao-titulo { font-size: 11px; font-weight: 800; color: var(--primary); text-transform: uppercase; margin-bottom: 10px; }

        label { font-weight: 700; font-size: 10px; color: #666; display: block; margin-top: 10px; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 12px; margin-top: 5px; border-radius: 8px; border: 1.5px solid #ddd; font-size: 15px; box-sizing: border-box; }
        .readonly { background: #edf2f7 !important; color: var(--primary); font-weight: bold; pointer-events: none; }
        
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn { width: 100%; padding: 16px; border: none; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; margin-top: 10px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-azul { background: var(--primary); color: white; }
        .btn-verde { background: var(--success); color: white; }
        
        /* Alertas e Avisos */
        .alerta-vinc { background: #ffebee; color: #c62828; padding: 10px; border-radius: 8px; font-size: 12px; font-weight: bold; margin-top: 10px; display: none; text-align: center; border: 1px solid #ffcdd2; }
        .aviso-foto-box { background: #fff8e1; color: #f57f17; padding: 15px; border-radius: 12px; border: 2px dashed #ffb300; margin: 15px 0; text-align: center; font-weight: bold; }
        
        #confirmOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(26,35,126,0.95); z-index: 1000; color: white; flex-direction: column; align-items: center; justify-content: center; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div id="confirmOverlay">
    <div style="font-size: 50px;">📡</div>
    <h2 id="confirmMsg">SINCRONIZANDO...</h2>
</div>

<div class="card">
    <div class="brand">TELEJUR</div>
    <div class="subtitle">LOGÍSTICA OPERACIONAL</div>

    <div id="formContainer">
        <div class="secao">
            <div class="secao-titulo">🚗 Veículo e Operação</div>
            <label>Tag do Carro</label>
            <select id="tag" onchange="setupVeiculo(); validarBloqueio();">
                <option value="">SELECIONE</option>
                <option value="TJUR 13" data-v="HILUX 13" data-p="QVD4I38" data-oil="15W40">TJUR 13</option>
                <option value="TJUR 04" data-v="MUNCK" data-p="QFA1I50" data-oil="15W40">TJUR 04</option>
                <option value="TJUR 06" data-v="SAVEIRO" data-p="QUJ3E02" data-oil="5W30">TJUR 06</option>
                <option value="TJUR 07" data-v="MUNCK 07" data-p="RWR3C75" data-oil="15W40">TJUR 07</option>
            </select>

            <div class="grid-2">
                <div><label>Placa</label><input type="text" id="placa" class="readonly" readonly></div>
                <div><label>Veículo</label><input type="text" id="desc" class="readonly" readonly></div>
            </div>

            <div id="alertaVinc" class="alerta-vinc"></div>

            <div class="grid-2">
                <div>
                    <label>ID (1-9)</label>
                    <select id="idCond" onchange="validarBloqueio()">
                        <option value="CONDUTOR 1">01</option><option value="CONDUTOR 2">02</option>
                        <option value="CONDUTOR 3">03</option><option value="CONDUTOR 4">04</option>
                        <option value="CONDUTOR 5">05</option><option value="CONDUTOR 6">06</option>
                        <option value="CONDUTOR 7">07</option><option value="CONDUTOR 8">08</option>
                        <option value="CONDUTOR 9">09</option>
                    </select>
                </div>
                <div>
                    <label>Condutor</label>
                    <select id="nome" onchange="validarBloqueio()">
                        <option value="">SELECIONE</option>
                        <option>ADRIANO NASCIMENTO</option>
                        <option>FRANCIVALDO COSTA</option>
                        <option>FRANCINILDO TEXEIRA</option>
                        <option>JOELCINEI GUIMARÃES</option>
                        <option>LAFAITE BATISTA</option>
                        <option>REGINALDO</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="secao" id="sessaoLubrificante">
            <div class="secao-titulo">🛢️ Dados de Lubrificantes</div>
            <div class="grid-2">
                <div><label>Óleo Motor</label><input type="text" id="tipoOleo" value="15W40 Ipiranga"></div>
                <div><label>Trocado com (KM)</label><input type="number" id="kmTrocaAtual" oninput="calcProxTroca()"></div>
            </div>
            <div class="grid-2">
                <div><label>Próxima Troca</label><input type="number" id="proxTroca" style="background:#fff9c4"></div>
                <div><label>Filtros</label><select id="filtros"><option>OK</option><option>AVARIADO</option></select></div>
            </div>
        </div>

        <div class="secao">
            <div class="secao-titulo">📋 Checklist de Saída</div>
            <div class="grid-2">
                <div><label>KM Início</label><input type="number" id="kmi"></div>
                <div><label>Cor do Selo</label>
                    <select id="corSelo">
                        <option>VERDE</option><option>AMARELO</option><option selected>AZUL</option><option>VERMELHO</option>
                    </select>
                </div>
            </div>
            <label>Validade do Selo</label>
            <input type="date" id="valSelo">
            <label>Observação Direção/Mecânica</label>
            <textarea id="obs" rows="2"></textarea>
        </div>

        <div id="areaFinal" class="hidden">
            <div class="aviso-foto-box">
                ⚠️ AVISO OBRIGATÓRIO:<br>Bata a foto do CHECKLIST FÍSICO antes de encerrar!
            </div>
            <div class="secao" style="border: 2px solid var(--danger);">
                <label>KM Final (Chegada)</label>
                <input type="number" id="kmf" style="border-color:var(--danger)">
                <button onclick="window.location.href='whatsapp://send?text=📷 ENVIANDO FOTO DO CHECKLIST FISICO'" class="btn" style="background:#075E54; color:white; font-size:12px;">📤 ENVIAR FOTOS NO WHATSAPP</button>
            </div>
        </div>

        <button id="btnAcao" onclick="salvarInicio()" class="btn btn-azul">SALVAR E INICIAR 🟢</button>
    </div>

    <div id="dashboardAtivo" class="hidden">
        <div class="secao" style="text-align:center; border-left: 10px solid var(--success);">
            <h2 style="color:var(--primary); margin:0;">TRAJETO ATIVO</h2>
            <div id="resumoAtivo" style="text-align:left; font-size:14px; margin:15px 0; line-height:1.6;"></div>
            <button onclick="gerarWpp('INICIO')" class="btn btn-verde">NOTIFICAR WHATSAPP</button>
            <button onclick="prepararFim()" class="btn btn-azul" style="background:#333">ENCERRAR TRAJETO</button>
        </div>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbysx-IjZe54SWbmqwl2NYJEx_kiuVtakdtE-GFYE30UxwYYQhcvOuw5DViSwMixS_QIyQ/exec";
    const HOJE = new Date().toLocaleDateString('pt-BR');

    function beep(freq) {
        try {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain); gain.connect(ctx.destination);
            osc.frequency.value = freq; gain.gain.value = 0.1;
            osc.start(); osc.stop(ctx.currentTime + 0.3);
        } catch(e) {}
    }

    function setupVeiculo() {
        const sel = document.getElementById("tag");
        const opt = sel.options[sel.selectedIndex];
        if(!opt.value) return;
        document.getElementById("desc").value = opt.getAttribute("data-v");
        document.getElementById("placa").value = opt.getAttribute("data-p");
        document.getElementById("tipoOleo").value = opt.getAttribute("data-oil") + " Ipiranga";
    }

    function calcProxTroca() {
        const atual = parseInt(document.getElementById("kmTrocaAtual").value);
        if(atual) document.getElementById("proxTroca").value = atual + 5000;
    }

    async function validarBloqueio() {
        const tag = document.getElementById("tag").value;
        const id = document.getElementById("idCond").value;
        const nome = document.getElementById("nome").value;
        const alerta = document.getElementById("alertaVinc");
        const btn = document.getElementById("btnAcao");

        if(!tag || !nome) return;

        try {
            const res = await fetch(`${SCRIPT_URL}?acao=verificar&tag=${tag}&id=${id}&data=${HOJE}`);
            const ocupante = (await res.text()).trim();
            if(ocupante !== "livre" && ocupante !== "" && ocupante !== nome) {
                alerta.style.display = "block";
                alerta.innerHTML = `⚠️ ${id} já está ocupado por ${ocupante} nesta TAG hoje!`;
                btn.disabled = true;
            } else {
                alerta.style.display = "none";
                btn.disabled = false;
            }
        } catch(e) {}
    }

    async function salvarInicio() {
        const d = {
            tag: document.getElementById("tag").value,
            v: document.getElementById("desc").value,
            p: document.getElementById("placa").value,
            id: document.getElementById("idCond").value,
            nome: document.getElementById("nome").value,
            kmi: document.getElementById("kmi").value,
            selo: document.getElementById("corSelo").value,
            val: document.getElementById("valSelo").value,
            oleo: document.getElementById("tipoOleo").value,
            kmT: document.getElementById("kmTrocaAtual").value,
            proxT: document.getElementById("proxTroca").value,
            obs: document.getElementById("obs").value,
            data: HOJE,
            horaI: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})
        };

        if(!d.tag || !d.kmi || !d.nome) return alert("Erro: Tag, Nome e KM Inicial são obrigatórios!");

        document.getElementById("confirmOverlay").style.display = "flex";
        beep(880); 

        await fetch(`${SCRIPT_URL}?acao=registrar&tag=${d.tag}&id=${d.id}&nome=${d.nome}&kmi=${d.kmi}&data=${d.data}&horaI=${d.horaI}`, {mode:'no-cors'});
        
        localStorage.setItem("tjur_v52", JSON.stringify(d));
        location.reload();
    }

    function prepararFim() {
        document.getElementById("dashboardAtivo").classList.add("hidden");
        document.getElementById("formContainer").classList.remove("hidden");
        document.getElementById("areaFinal").classList.remove("hidden");
        document.getElementById("sessaoLubrificante").classList.add("hidden");
        
        const s = JSON.parse(localStorage.getItem("tjur_v52"));
        document.getElementById("tag").value = s.tag;
        setupVeiculo();
        document.getElementById("idCond").value = s.id;
        document.getElementById("nome").value = s.nome;
        document.getElementById("kmi").value = s.kmi;
        
        ["tag", "idCond", "nome", "kmi"].forEach(id => document.getElementById(id).classList.add("readonly"));

        const btn = document.getElementById("btnAcao");
        btn.innerText = "ENCERRAR E ENVIAR ✅";
        btn.className = "btn btn-verde";
        btn.onclick = finalizar;
    }

    async function finalizar() {
        const kmf = document.getElementById("kmf").value;
        if(!kmf) return alert("KM Final Obrigatório!");
        
        const s = JSON.parse(localStorage.getItem("tjur_v52"));
        document.getElementById("confirmMsg").innerText = "FINALIZANDO...";
        document.getElementById("confirmOverlay").style.display = "flex";
        beep(440); 

        await fetch(`${SCRIPT_URL}?acao=finalizar&tag=${s.tag}&id=${s.id}&data=${s.data}&kmf=${kmf}`, {mode:'no-cors'});
        
        gerarWpp('FIM', kmf);
        localStorage.removeItem("tjur_v52");
        setTimeout(() => location.reload(), 2000);
    }

    function gerarWpp(tipo, kmf = "") {
        const s = JSON.parse(localStorage.getItem("tjur_v52"));
        const valF = s.val ? s.val.split('-').reverse().join('/') : "---";
        
        let m = `*CHECK LIST DO VEÍCULO: ${s.v}*\n`;
        m += `*Data:* ${s.data}\n`;
        m += `*Placa:* ${s.p}\n`;
        m += `*Próxima troca de Óleo:* ${s.proxT}\n`;
        m += `*Tipo de óleo:* ${s.oleo}\n`;
        m += `*Condutor:* ${s.nome} (${s.id})\n`;
        m += `--------------------------\n`;
        m += `*Km Início:* ${s.kmi}\n`;
        if(tipo === 'FIM') {
            m += `*Km Final:* ${kmf}\n`;
            m += `*Óleo Motor:* ${s.proxT}\n`;
            m += `*Filtros:* OK\n`;
        }
        m += `*Cor do selo:* ${s.selo}\n`;
        m += `*Validade do selo:* ${valF}\n`;
        m += `*Ob:* ${document.getElementById("obs").value || s.obs || "Nenhuma"}\n`;

        window.location.href = `whatsapp://send?text=${encodeURIComponent(m)}`;
    }

    window.onload = () => {
        const active = localStorage.getItem("tjur_v52");
        if(active) {
            const d = JSON.parse(active);
            document.getElementById("formContainer").classList.add("hidden");
            document.getElementById("dashboardAtivo").classList.remove("hidden");
            document.getElementById("resumoAtivo").innerHTML = `📍 <b>${d.tag}</b> (${d.p})<br>👤 <b>${d.nome}</b><br>🏁 Início: ${d.horaI} | KM: ${d.kmi}`;
        }
    };
</script>
</body>
</html>
