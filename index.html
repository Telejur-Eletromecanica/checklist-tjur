<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TELEJUR - CHECKLIST</title>
    <style>
        body { font-family: sans-serif; background: #e3f2fd; margin: 0; padding: 10px; }
        .card { max-width: 400px; margin: auto; background: white; padding: 20px; border-radius: 15px; border-top: 10px solid #1a237e; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .header-text { text-align: center; margin-bottom: 20px; }
        .brand { font-size: 28px; font-weight: bold; color: #1a237e; letter-spacing: 2px; margin: 0; }
        .subtitle { font-size: 14px; color: #1a237e; font-weight: bold; margin: 0; text-transform: uppercase; }
        h2 { text-align: center; color: #333; font-size: 18px; margin-top: 20px; border-bottom: 2px solid #1a237e; padding-bottom: 10px; }
        label { font-weight: bold; font-size: 12px; color: #555; display: block; margin-top: 15px; }
        input, select, textarea { width: 100%; padding: 12px; margin-top: 5px; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; box-sizing: border-box; }
        input[readonly] { background: #f1f3f4; color: #666; }
        .btn-azul { width: 100%; padding: 16px; background: #1a237e; border: none; border-radius: 10px; font-size: 18px; color: white; font-weight: bold; cursor: pointer; margin-top: 25px; }
        .btn-verde { width: 100%; padding: 16px; background: #25D366; border: none; border-radius: 10px; font-size: 18px; color: white; font-weight: bold; cursor: pointer; margin-top: 25px; }
        .hidden { display: none; }
        .alerta-erro { font-size: 13px; font-weight: bold; margin-top: 10px; text-align: center; color: #d32f2f; background: #ffebee; padding: 10px; border-radius: 8px; border: 1px solid #ef9a9a; display: none; }
        #telaEspera { text-align: center; padding: 20px; display: none; }
        .status-badge { background: #e3f2fd; color: #1a237e; padding: 10px; border-radius: 50px; font-weight: bold; font-size: 12px; text-transform: uppercase; display: inline-block; margin-bottom: 15px; border: 1px solid #1a237e; }
        .info-trajeto { background: #f8f9fa; border-radius: 10px; padding: 15px; margin: 15px 0; border-left: 5px solid #1a237e; text-align: left; font-size: 14px; }
    </style>
</head>
<body>

<div class="card">
    <div class="header-text">
        <p class="brand">TELEJUR</p>
        <p class="subtitle">ELETROMECÂNICA</p>
    </div>

    <div id="containerForm">
        <h2 id="tituloAcao">CHECKLIST DE VEÍCULO</h2>
        <form id="formChecklist">
            <label>TAG DO VEÍCULO</label>
            <select id="tag" onchange="completar()">
                <option value="">SELECIONE A TAG</option>
                <option value="TJUR 04" data-tipo="SKY">TJUR 04 (SKY MUNCK)</option>
                <option value="TJUR 06" data-tipo="CARRO">TJUR 06</option>
                <option value="TJUR 07" data-tipo="SKY">TJUR 07 (SKY MUNCK)</option>
                <option value="TJUR 08" data-tipo="CARRO">TJUR 08</option>
                <option value="TJUR 09" data-tipo="SKY">TJUR 09 (SKY MUNCK)</option>
                <option value="TJUR 10" data-tipo="CARRO">TJUR 10</option>
                <option value="TJUR 13" data-tipo="CARRO">TJUR 13</option>
            </select>

            <div id="msgTrava" class="alerta-erro"></div>

            <label>IDENTIFICAÇÃO</label>
            <select id="numCondutor" onchange="validarBloqueio()">
                <option value="">SELECIONE</option>
                <option>CONDUTOR 1</option><option>CONDUTOR 2</option><option>CONDUTOR 3</option>
                <option>CONDUTOR 4</option><option>CONDUTOR 5</option><option>CONDUTOR 6</option>
                <option>CONDUTOR 7</option><option>CONDUTOR 8</option><option>CONDUTOR 9</option>
            </select>
            
            <label>NOME DO CONDUTOR</label>
            <select id="nomeCondutor" onchange="validarBloqueio()">
                <option value="">SELECIONE</option>
                <option>ADRIANO NASCIMENTO</option><option>FRANCIVALDO COSTA</option>
                <option>JOELCINEI GUIMARÃES</option><option>REGINALDO</option>
                <option>LAFAITE BATISTA</option><option>FRANCINILDO TEXEIRA</option>
                <option>MIRIELLY</option><option>RAIMUNDO WALTER</option>
            </select>

            <label>KM INICIAL</label>
            <input type="text" id="kmi" inputmode="numeric" oninput="mascaraKM(this)">

            <label>COR DO SELO</label>
            <select id="corSelo">
                <option value="">SELECIONE</option>
                <option>VERDE</option><option>AMARELO</option><option>AZUL</option><option>VERMELHO</option>
            </select>

            <label>VALIDADE DO SELO</label>
            <input type="date" id="validadeSelo">

            <div id="campoFim" class="hidden">
                <label>KM FINAL</label>
                <input type="text" id="kmf" inputmode="numeric" oninput="mascaraKM(this)">
            </div>

            <div id="blocoOleo">
                <label id="labelTrocaOleo">PRÓXIMA TROCA DE ÓLEO (KM)</label>
                <input type="text" id="proximaTrocaKM" inputmode="numeric" oninput="mascaraKM(this)" placeholder="0.0">
                <input type="date" id="proximaTrocaData" class="hidden">
            </div>

            <label>OBSERVAÇÃO</label>
            <textarea id="obs" rows="2"></textarea>

            <button type="button" id="btnAcao" onclick="iniciarTrajeto()" class="btn-azul">SALVAR INÍCIO DE TRAJETO</button>
        </form>
    </div>

    <div id="telaEspera">
        <div class="status-badge">● Em Trajeto</div>
        <h3>AGUARDANDO FIM</h3>
        <div id="resumoTrajeto" class="info-trajeto"></div>
        <button type="button" onclick="irParaFinalizar()" class="btn-verde">FINALIZAR TRAJETO</button>
    </div>
</div>

<script>
    function mascaraKM(input) {
        let value = input.value.replace(/\D/g, "");
        if (value.length > 0) {
            value = (parseInt(value) / 10).toFixed(1);
            input.value = value;
        } else { input.value = ""; }
    }

    function getAgora() { return new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}); }
    function getDataHoje() { return new Date().toLocaleDateString('pt-BR'); }

    function completar() {
        const select = document.getElementById("tag");
        const tag = select.value;
        const tipo = select.options[select.selectedIndex].getAttribute("data-tipo");
        
        const labelOleo = document.getElementById("labelTrocaOleo");
        const inputKM = document.getElementById("proximaTrocaKM");
        const inputData = document.getElementById("proximaTrocaData");

        if (tipo === "SKY") {
            labelOleo.innerText = "PRÓXIMA TROCA DE ÓLEO (DATA)";
            inputKM.classList.add("hidden");
            inputData.classList.remove("hidden");
        } else {
            labelOleo.innerText = "PRÓXIMA TROCA DE ÓLEO (KM)";
            inputKM.classList.remove("hidden");
            inputData.classList.add("hidden");
        }

        if(localStorage.getItem("tjur_temp_" + tag)) exibirTelaEspera(tag);
        validarBloqueio();
    }

    function validarBloqueio() {
        const tag = document.getElementById("tag").value;
        const nome = document.getElementById("nomeCondutor").value;
        const numAtual = document.getElementById("numCondutor").value;
        const hoje = getDataHoje();
        const msg = document.getElementById("msgTrava");
        const btn = document.getElementById("btnAcao");

        if (!tag || !nome || !numAtual) return false;
        const chaveDono = `idFixado_${tag}_${hoje}_${nome}`;
        const numRegistrado = localStorage.getItem(chaveDono);

        if (numRegistrado && numRegistrado !== numAtual) {
            msg.innerText = `⚠ Você já é ${numRegistrado} hoje neste veículo!`;
            msg.style.display = "block";
            btn.disabled = true;
            return true;
        }
        msg.style.display = "none";
        btn.disabled = false;
        return false;
    }

    function iniciarTrajeto() {
        if (validarBloqueio()) return;
        const tag = document.getElementById("tag").value;
        const kmi = document.getElementById("kmi").value;
        const selo = document.getElementById("corSelo").value;
        const valSelo = document.getElementById("validadeSelo").value;

        if(!tag || !kmi || !selo || !valSelo) { alert("Preencha TAG, KM, Selo e Validade!"); return; }

        const dados = {
            num: document.getElementById("numCondutor").value,
            nome: document.getElementById("nomeCondutor").value,
            kmi: kmi, selo: selo, 
            valSelo: valSelo.split('-').reverse().join('/'),
            oleoKM: document.getElementById("proximaTrocaKM").value,
            oleoData: document.getElementById("proximaTrocaData").value.split('-').reverse().join('/'),
            obs: document.getElementById("obs").value,
            horaI: getAgora(), data: getDataHoje()
        };
        localStorage.setItem("tjur_temp_" + tag, JSON.stringify(dados));
        exibirTelaEspera(tag);
    }

    function exibirTelaEspera(tag) {
        const salvo = JSON.parse(localStorage.getItem("tjur_temp_" + tag));
        document.getElementById("containerForm").style.display = "none";
        document.getElementById("telaEspera").style.display = "block";
        document.getElementById("resumoTrajeto").innerHTML = `<b>TAG:</b> ${tag}<br><b>CONDUTOR:</b> ${salvo.nome}<br><b>INÍCIO:</b> ${salvo.horaI}`;
        document.getElementById("telaEspera").setAttribute("data-tag", tag);
    }

    function irParaFinalizar() {
        const tag = document.getElementById("telaEspera").getAttribute("data-tag");
        const salvo = JSON
