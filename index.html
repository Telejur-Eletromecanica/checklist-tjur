<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TELEJUR JURUTI v32.0</title>
    <style>
        :root { --primary: #0d47a1; --success: #2e7d32; --danger: #c62828; }
        body { font-family: 'Segoe UI', sans-serif; background: #eaeff1; padding: 10px; margin: 0; }
        .card { max-width: 480px; margin: auto; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .grid-status { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin: 15px 0; }
        .v-box { padding: 8px 4px; border-radius: 8px; text-align: center; font-size: 10px; font-weight: bold; border: 1px solid #ddd; }
        .livre { background: #e8f5e9; color: var(--success); }
        .ocupado { background: #ffebee; color: var(--danger); }
        .bloqueado { background: #f5f5f5; color: #bbb; border-style: dashed; }
        
        label { font-weight: bold; font-size: 11px; color: var(--primary); display: block; margin-top: 12px; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 12px; margin-top: 4px; border-radius: 10px; border: 1.5px solid #ccc; font-size: 16px; box-sizing: border-box; }
        .readonly { background: #f8f9fa !important; font-weight: bold; color: #444; }
        .status-oleo { font-size: 12px; padding: 8px; border-radius: 8px; margin-top: 5px; font-weight: bold; text-align: center; }
        
        .btn { width: 100%; padding: 18px; border: none; border-radius: 12px; font-size: 17px; font-weight: bold; cursor: pointer; margin-top: 15px; color: white; transition: 0.3s; }
        .btn-start { background: var(--primary); box-shadow: 0 4px #08306b; }
        .btn-end { background: var(--danger); box-shadow: 0 4px #8e1a1a; }
        
        #msgSucesso { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 1000; text-align: center; justify-content: center; align-items: center; flex-direction: column; }
    </style>
</head>
<body>

<div id="msgSucesso">
    <h1 style="font-size:100px; margin:0">✅</h1>
    <h2 id="agradecimento" style="color:var(--primary); padding: 0 20px;"></h2>
    <p>Sincronizando e abrindo WhatsApp...</p>
</div>

<div class="card">
    <div style="text-align:center">
        <h1 style="margin:0; color:var(--primary); font-size: 20px;">TELEJUR ELETROMECÂNICA</h1>
        <small style="color:#666; font-weight: bold;">Checklist de Veículos | Unidade Juruti</small>
    </div>

    <div id="painel" class="grid-status"></div>

    <div id="formContainer">
        <label>Condutor</label>
        <select id="condutor" onchange="sync()">
            <option value="">-- SELECIONE --</option>
            <option>ADRIANO NASCIMENTO</option><option>FRANCIVALDO COSTA</option>
            <option>FRANCINILDO TEXEIRA</option><option>JOELCINEI GUIMARAES</option>
            <option>MIRIELLY</option><option>REGINALDO</option>
            <option>WALTER GONÇALVES</option><option>LAFAITE BATISTA</option>
            <option>EZEQUIEL</option>
        </select>

        <label>TAG do Veículo</label>
        <select id="tag" onchange="configurarTag()"></select>

        <div style="display: flex; gap: 8px;">
            <div style="flex:2"><label>Veículo</label><input id="v_nome" class="readonly" readonly></div>
            <div style="flex:1"><label>Placa</label><input id="v_placa" class="readonly" readonly></div>
        </div>

        <div style="display: flex; gap: 8px;">
            <div style="flex:1"><label>ID</label><input id="v_id" class="readonly" readonly></div>
            <div style="flex:1"><label>Nº Trajeto</label><input id="v_trajeto" class="readonly" readonly></div>
        </div>

        <label id="lblKm">KM Inicial</label>
        <input type="number" id="kmi" oninput="calcularOleo()">

        <label id="lblOleo">Próxima Troca Óleo</label>
        <div id="areaOleo"></div>
        <div id="statusOleo" class="status-oleo" style="display:none"></div>

        <div id="secaoExtra">
            <div style="display: flex; gap: 8px;">
                <div style="flex:1"><label>Validade Selo</label><input type="date" id="valSelo"></div>
                <div style="flex:1"><label>Cor do Selo</label>
                    <select id="corSelo">
                        <option>VERDE</option><option>AMARELO</option><option>AZUL</option><option>VERMELHO</option>
                    </select>
                </div>
            </div>
            <label>Tipo de Óleo</label>
            <select id="tipoOleo">
                <option>15W40</option><option>5W30</option><option>10W40</option><option>SAE 90</option>
            </select>
        </div>

        <label>Observação</label>
        <textarea id="obs" rows="2"></textarea>

        <button id="btnAcao" onclick="registrarSaida()" class="btn btn-start">FINALIZAR TRAJETO INICIAL</button>
    </div>

    <div id="telaAtiva" style="display:none">
        <div id="resumoAtivo" style="background:#e3f2fd; padding:15px; border-radius:12px; border-left:5px solid var(--primary); margin:15px 0;"></div>
        <button onclick="prepararFim()" class="btn btn-end">FINALIZAR TRAJETO</button>
    </div>
</div>

<script>
    const URL_GAS = "SUA_URL_DO_GOOGLE_SCRIPT";
    let DB = { ocupados: {}, frota: {}, contagem: {} };

    function emitirBip() {
        try { const ctx = new AudioContext(); const osc = ctx.createOscillator(); osc.connect(ctx.destination); osc.start(); osc.stop(ctx.currentTime + 0.15); } catch(e){}
    }

    async function sync() {
        const motSel = document.getElementById('condutor').value;
        const skyMot = ["REGINALDO", "LAFAITE BATISTA", "WALTER GONÇALVES"];
        const idCb = 'cb' + Date.now();
        
        window[idCb] = (res) => {
            DB = res;
            const selT = document.getElementById('tag');
            const painel = document.getElementById('painel');
            selT.innerHTML = '<option value="">-- SELECIONE --</option>';
            painel.innerHTML = '';

            Object.keys(DB.frota).sort().forEach(t => {
                const info = DB.frota[t];
                const ocupado = DB.ocupados[t];
                const isSky = info.v === "SKY MUNCK";
                const bloqueado = (isSky && !skyMot.includes(motSel));

                const opt = document.createElement('option');
                opt.value = t; opt.text = t + (ocupado ? ' 🔒' : (bloqueado ? ' 🚫' : ''));
                opt.disabled = ocupado ? (ocupado.nome !== motSel) : bloqueado;
                selT.appendChild(opt);

                let classe = ocupado ? 'ocupado' : (bloqueado ? 'bloqueado' : 'livre');
                painel.innerHTML += `<div class="v-box ${classe}">${t}<br>${ocupado ? 'EM USO' : (bloqueado ? 'BLOQ' : 'LIVRE')}</div>`;
            });
        };
        const s = document.createElement('script');
        s.src = `${URL_GAS}?acao=statusGeral&callback=${idCb}`;
        document.body.appendChild(s);
    }

    function configurarTag() {
        const t = document.getElementById('tag').value;
        if(!t) return;
        const info = DB.frota[t];
        const ocupado = DB.ocupados[t];
        const tCount = (DB.contagem[t] || 0) + 1;

        document.getElementById('v_nome').value = info.v;
        document.getElementById('v_placa').value = info.p;
        document.getElementById('v_trajeto').value = tCount + "º Trajeto";
        document.getElementById('v_id').value = "CONDUTOR " + tCount;

        const area = document.getElementById('areaOleo');
        if(info.t === 'data') {
            area.innerHTML = `<input type="date" id="oleo">`;
            document.getElementById('lblKm').innerText = "Horímetro Inicial";
            document.getElementById('lblOleo').innerText = "Vencimento Óleo (DATA)";
        } else {
            area.innerHTML = `<input type="number" id="oleo" oninput="calcularOleo()">`;
            document.getElementById('lblKm').innerText = "KM Inicial";
            document.getElementById('lblOleo').innerText = "Próxima Troca (KM)";
        }
        
        if(ocupado) {
            document.getElementById('btnAcao').style.display = 'none';
        } else {
            document.getElementById('btnAcao').style.display = 'block';
        }
    }

    function calcularOleo() {
        const t = document.getElementById('tag').value;
        if(!t || DB.frota[t].t === 'data') return;
        const kmi = parseInt(document.getElementById('kmi').value) || 0;
        const prox = parseInt(document.getElementById('oleo').value) || 0;
        const status = document.getElementById('statusOleo');
        
        if(prox > 0 && kmi > 0) {
            status.style.display = 'block';
            const falta = prox - kmi;
            if(falta <= 0) {
                status.innerHTML = "🚨 ÓLEO VENCIDO!"; status.style.color = "red";
            } else {
                status.innerHTML = `💡 Faltam ${falta.toLocaleString()} KM para a troca`;
                status.style.color = "green";
            }
        } else { status.style.display = 'none'; }
    }

    function registrarSaida() {
        const d = {
            data: new Date().toLocaleDateString('pt-BR'),
            tag: document.getElementById('tag').value,
            id: document.getElementById('v_id').value,
            nome: document.getElementById('condutor').value,
            kmi: document.getElementById('kmi').value,
            horaI: new Date().toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'}),
            oleo: document.getElementById('oleo').value,
            nTrajeto: document.getElementById('v_trajeto').value,
            placa: document.getElementById('v_placa').value,
            veiculo: document.getElementById('v_nome').value,
            valSelo: document.getElementById('valSelo').value,
            corSelo: document.getElementById('corSelo').value,
            tipoOleo: document.getElementById('tipoOleo').value,
            obs: document.getElementById('obs').value,
            acao: 'registrar'
        };

        if(!d.nome || !d.tag || !d.kmi) return alert("Preencha Motorista, TAG e KM!");

        const idCb = 'cb' + Date.now();
        window[idCb] = () => {
            localStorage.setItem('telejur_ativo', JSON.stringify(d));
            enviarWhats(d, false);
        };
        const s = document.createElement('script');
        s.src = `${URL_GAS}?${new URLSearchParams(d)}&callback=${idCb}`;
        document.body.appendChild(s);
    }

    function prepararFim() {
        const d = JSON.parse(localStorage.getItem('telejur_ativo'));
        document.getElementById('telaAtiva').style.display = 'none';
        document.getElementById('formContainer').style.display = 'block';
        document.getElementById('btnAcao').innerText = "CONCLUIR TRAJETO";
        document.getElementById('btnAcao').className = "btn btn-end";
        document.getElementById('btnAcao').style.display = "block";
        document.getElementById('btnAcao').onclick = finalizarTudo;
        
        document.getElementById('condutor').value = d.nome;
        document.getElementById('tag').innerHTML = `<option value="${d.tag}">${d.tag}</option>`;
        document.getElementById('v_nome').value = d.veiculo;
        document.getElementById('v_placa').value = d.placa;
        document.getElementById('v_id').value = d.id;
        document.getElementById('v_trajeto').value = d.nTrajeto;
        document.getElementById('kmi').value = d.kmi;
        document.getElementById('secaoExtra').style.display = 'none';
        document.getElementById('areaOleo').innerHTML = `<input value="${d.oleo}" readonly class="readonly">`;
    }

    function finalizarTudo() {
        const d = JSON.parse(localStorage.getItem('telejur_ativo'));
        const kf = document.getElementById('kmi').value; // Reaproveitando campo kmi para o final
        const hF = new Date().toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'});
        
        const idCb = 'cb' + Date.now();
        window[idCb] = () => {
            emitirBip();
            document.getElementById('agradecimento').innerText = "OBRIGADO, " + d.nome.split(' ')[0] + "!";
            document.getElementById('msgSucesso').style.display = "flex";
            d.kmf = kf; d.horaF = hF; d.obs = document.getElementById('obs').value;
            setTimeout(() => { enviarWhats(d, true); }, 2000);
        };
        const s = document.createElement('script');
        s.src = `${URL_GAS}?acao=finalizar&tag=${d.tag}&kmf=${kf}&horaF=${hF}&obs=${encodeURIComponent(document.getElementById('obs').value)}&callback=${idCb}`;
        document.body.appendChild(s);
    }

    function enviarWhats(d, isF) {
        const divisor = "---------------------------";
        let m = isF ? `✅ *CHECKLIST CONCLUÍDO*\n` : `✅ *CHECKLIST INICIAL*\n`;
        m += `${divisor}\n👤 *Motorista:* ${d.nome}\n🆔 *ID:* ${d.id}\n🏷️ *Tag:* ${d.tag}\n🚚 *Veículo:* ${d.veiculo} | ${d.placa}\n📅 *Data:* ${d.data}\n📍 *Trajeto:* ${d.nTrajeto}\n${divisor}\n`;
        m += `📏 *KM Inicial:* ${d.kmi}\n⌛ *Troca Óleo:* ${d.oleo}\n🧪 *Tipo Óleo:* ${d.tipoOleo}\n🎨 *Selo:* ${d.corSelo}\n`;
        
        if(isF) {
            m += `🏁 *KM Final:* ${d.kmf}\n🕒 *Hora Fim:* ${d.horaF}\n📝 *Obs:* ${d.obs || "Tudo certo"}\n`;
            localStorage.removeItem('telejur_ativo');
        }
        m += divisor;
        window.location.href = `https://wa.me/?text=${encodeURIComponent(m)}`;
        setTimeout(() => location.reload(), 3000);
    }

    window.onload = () => {
        sync();
        const ativo = localStorage.getItem('telejur_ativo');
        if(ativo) {
            const d = JSON.parse(ativo);
            document.getElementById('formContainer').style.display = 'none';
            document.getElementById('telaAtiva').style.display = 'block';
            document.getElementById('resumoAtivo').innerHTML = `<b>VEÍCULO EM TRAJETO</b><br>🚚 ${d.tag}<br>👤 ${d.nome}`;
        }
    };
</script>
</body>
</html>
