<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TELEJUR v12.4</title>
    <style>
        :root { --primary: #1a237e; --danger: #c62828; --success: #2e7d32; --disabled: #9e9e9e; }
        body { font-family: sans-serif; background: #f0f4f8; padding: 10px; margin: 0; }
        .card { max-width: 450px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .grid-status { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-bottom: 15px; }
        .v-box { padding: 8px 2px; border-radius: 8px; text-align: center; font-size: 9px; font-weight: bold; border: 1px solid #ddd; }
        .livre { background: #e8f5e9; color: var(--success); border-color: var(--success); }
        .ocupado { background: #ffebee; color: var(--danger); border-color: var(--danger); }
        .bloqueado { background: #f5f5f5; color: var(--disabled); border-color: #ccc; border-style: dashed; opacity: 0.6; }
        label { font-weight: bold; font-size: 10px; color: #555; display: block; margin-top: 10px; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 12px; margin-top: 4px; border-radius: 8px; border: 1px solid #ccc; font-size: 15px; box-sizing: border-box; outline: none; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 10px; font-size: 14px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-azul { background: var(--primary); color: white; }
        .btn-whats { background: #128C7E; color: white; }
        .btn-finalizar { background: var(--danger); color: white; }
        .section-box { background: #f9f9f9; padding: 15px; border-radius: 10px; border: 1px solid #eee; margin-top: 15px; }
        .readonly { background: #f1f1f1 !important; color: #444 !important; font-weight: bold; }
        #loader { display:none; text-align:center; font-size:12px; color:var(--primary); font-weight:bold; margin:10px 0; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="text-align:center; color:var(--primary); margin:0; font-size: 18px;">SISTEMA TELEJUR</h2>
    <div id="painel" class="grid-status" style="margin-top:15px"></div>
    <div id="loader">COMUNICANDO COM GOOGLE...</div>

    <div id="formEntrada">
        <label>Motorista</label>
        <select id="nomeMot" onchange="validarAcesso()">
            <option value="">-- SELECIONE --</option>
            <option>ADRIANO NASCIMENTO</option>
            <option>FRANCIVALDO COSTA</option>
            <option>REGINALDO</option>
            <option>WALTER GONÇALVES</option>
            <option>LAFAITE BATISTA</option>
        </select>
        <label>Veículo (TAG)</label>
        <select id="tag" onchange="carregarDadosVei()"></select>
        <input type="text" id="veiculoInfo" class="readonly" readonly placeholder="Dados do Veículo">
        
        <div class="section-box">
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px">
                <div><label>Selo</label><select id="corSelo"><option>VERDE</option><option>AMARELO</option><option>AZUL</option><option>VERMELHO</option></select></div>
                <div><label>Validade</label><input type="date" id="validadeSelo"></div>
            </div>
            <label>KM Inicial</label>
            <input type="number" id="kmi">
            <input type="hidden" id="proxOleo"> <button onclick="salvarSaida()" class="btn btn-azul">💾 SALVAR NA PLANILHA</button>
        </div>
    </div>

    <div id="telaAtiva" style="display:none">
        <div id="infoViagem" style="background:#e3f2fd; padding:15px; border-radius:10px; border-left:5px solid var(--primary); margin-bottom:15px"></div>
        <button onclick="enviarWhatsInicial()" class="btn btn-whats">📲 ENVIAR WHATSAPP</button>
        <div class="section-box" style="border-color:var(--danger); margin-top:25px">
            <label>KM FINAL</label><input type="number" id="kmf">
            <label>Observações</label><textarea id="obs"></textarea>
            <button onclick="finalizarETransmitir()" class="btn btn-finalizar">🏁 FINALIZAR TRAJETO</button>
        </div>
    </div>
</div>

<script>
    const URL = "https://script.google.com/macros/s/AKfycbysx-IjZe54SWbmqwl2NYJEx_kiuVtakdtE-GFYE30UxwYYQhcvOuw5DViSwMixS_QIyQ/exec"; 
    const todasTags = ["TJUR 04", "TJUR 06", "TJUR 07", "TJUR 08", "TJUR 09", "TJUR 10", "TJUR 13"];
    let frota = { ocupados: {} };

    async function call(p) {
        document.getElementById('loader').style.display = 'block';
        return new Promise((resolve, reject) => {
            const n = 'cb_'+Math.round(Math.random()*1e6);
            const timeout = setTimeout(() => reject("O Google demorou demais para responder."), 15000);
            window[n] = (d) => { clearTimeout(timeout); delete window[n]; document.getElementById('loader').style.display='none'; resolve(d); };
            const s = document.createElement('script');
            s.src = `${URL}?${new URLSearchParams(p)}&callback=${n}&_=${Date.now()}`;
            s.onerror = () => reject("Erro ao carregar o script do Google.");
            document.body.appendChild(s);
        });
    }

    async function sync() { try { const res = await call({acao: 'statusGeral'}); if(res) { frota = res; validarAcesso(); } } catch(e) { console.error(e); } }

    function validarAcesso() {
        const mot = document.getElementById('nomeMot').value.toUpperCase();
        const p = document.getElementById('painel'); p.innerHTML = '';
        const sel = document.getElementById('tag'); sel.innerHTML = '<option value="">-- SELECIONE --</option>';
        todasTags.forEach(t => {
            const o = frota.ocupados[t];
            p.innerHTML += `<div class="v-box ${o ? 'ocupado' : 'livre'}">${t}<br>${o ? o.nome.split(' ')[0] : 'LIVRE'}</div>`;
            const opt = document.createElement('option');
            opt.value = t; opt.text = o ? `🚫 ${t}` : t;
            if(o) opt.disabled = true;
            sel.add(opt);
        });
    }

    async function carregarDadosVei() {
        const tag = document.getElementById('tag').value; if(!tag) return;
        const res = await call({acao: 'buscarDadosMotorista', tag: tag});
        if(res){
            document.getElementById('veiculoInfo').value = `${res.veiculo} | ${res.placa}`;
            document.getElementById('kmi').value = res.kmi;
            document.getElementById('proxOleo').value = res.oleo;
            window.v = res.veiculo; window.p = res.placa;
        }
    }

    async function salvarSaida() {
        const mot = document.getElementById('nomeMot').value;
        const tag = document.getElementById('tag').value;
        const selo = document.getElementById('validadeSelo').value;
        if(!tag || !mot || !selo) return alert("⚠️ Preencha Motorista, TAG e Validade!");

        try {
            // BUSCA IDS
            const c = await call({acao: 'gerarDadosContagem', tag: tag, nome: mot});
            
            const d = {
                acao: 'registrar', tag: tag, nome: mot, kmi: document.getElementById('kmi').value,
                oleo: document.getElementById('proxOleo').value, veiculo: window.v, placa: window.p,
                corSelo: document.getElementById('corSelo').value, validadeSelo: selo,
                idCondutor: c.idCondutor, trajetoNum: c.trajetoNum
            };

            const res = await call(d);
            if(res && res.status === "OK") {
                localStorage.setItem("tjur_trip", JSON.stringify(d));
                alert("✅ GRAVADO NA PLANILHA!");
                location.reload();
            } else {
                alert("❌ ERRO GOOGLE: " + (res.error || "Sem resposta da planilha"));
            }
        } catch(e) { alert("❌ ERRO DE CONEXÃO: " + e); }
    }

    function enviarWhatsInicial() {
        const d = JSON.parse(localStorage.getItem("tjur_trip"));
        const agora = new Date();
        const idFull = `CONDUTOR ${d.idCondutor} | ${d.trajetoNum}º TRAJETO`;
        const msg = `🚀 *SAÍDA REGISTRADA*\n--------------------------------\n📅 *Data:* ${agora.toLocaleDateString('pt-BR')}\n🏷️ *Tag:* ${d.tag}\n👤 *Nome:* ${d.nome.toUpperCase()}\n🆔 *ID:* ${idFull}\n--------------------------------\n🛣️ *KM:* ${d.kmi}`;
        window.location.href = `https://api.whatsapp.com/send?text=${encodeURIComponent(msg)}`;
    }

    async function finalizarETransmitir() {
        const t = JSON.parse(localStorage.getItem("tjur_trip"));
        const kf = document.getElementById('kmf').value;
        if(!kf || Number(kf) <= Number(t.kmi)) return alert("KM Final inválido!");
        try {
            await call({ acao: 'finalizar', tag: t.tag, kmf: kf, obs: document.getElementById('obs').value.toUpperCase() });
            localStorage.removeItem("tjur_trip");
            alert("✅ TRAJETO FINALIZADO!");
            location.reload();
        } catch(e) { alert("Erro ao finalizar."); }
    }

    window.onload = () => { 
        sync(); 
        const s = localStorage.getItem("tjur_trip"); 
        if(s) { 
            const d = JSON.parse(s); 
            document.getElementById('formEntrada').style.display = 'none'; 
            document.getElementById('telaAtiva').style.display = 'block'; 
            document.getElementById('infoViagem').innerHTML = `<b>TRAJETO ATIVO</b><br>🚗 ${d.tag}<br>👤 ${d.nome}<br>🆔 CONDUTOR ${d.idCondutor} | ${d.trajetoNum}º TRAJETO`; 
        } 
    };
</script>
</body>
</html>
