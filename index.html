<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Frota Telejur</title>
</head>
<body class="bg-slate-100 pb-10 font-sans">

    <header class="bg-blue-800 p-4 text-white text-center shadow-lg sticky top-0 z-50">
        <h1 class="font-bold text-lg">CONTROLE DE FROTA TELEJUR</h1>
    </header>

    <div class="max-w-md mx-auto p-4 space-y-6">
        
        <section class="bg-white rounded-2xl shadow-sm border p-4">
            <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Selecionar Veículo</label>
            <select id="tag_select" onchange="preencherVeiculoPlaca()" class="w-full border-2 border-blue-100 rounded-xl p-3 font-black text-blue-700 bg-blue-50 outline-none">
                <option value="" disabled selected>ESCOLHA A TAG...</option>
                <option value="tjur04">TJUR 04</option><option value="tjur06">TJUR 06</option><option value="tjur07">TJUR 07</option><option value="tjur08">TJUR 08</option><option value="tjur09">TJUR 09</option><option value="tjur10">TJUR 10</option><option value="tjur13">TJUR 13</option>
            </select>
            <div class="flex gap-2 mt-3">
                <input type="text" id="veiculo_input" readonly placeholder="Veículo" class="w-1/2 bg-slate-50 border p-2 rounded-lg text-xs font-bold text-slate-500 uppercase">
                <input type="text" id="placa_input" readonly placeholder="Placa" class="w-1/2 bg-slate-50 border p-2 rounded-lg text-xs font-bold text-slate-500 uppercase">
            </div>
        </section>

        <section class="bg-white rounded-2xl shadow-md border-t-8 border-green-500 p-4 space-y-3">
            <h2 class="text-green-700 font-black text-sm uppercase">1. Início de Trajeto (Saída)</h2>
            <div class="grid grid-cols-2 gap-3">
                <input type="date" id="data_input" readonly class="border rounded-lg p-2 text-sm font-bold bg-slate-50">
                <input type="time" id="hora_inicio_input" class="border rounded-lg p-2 text-sm font-bold">
            </div>
            <select id="nome_condutor" class="w-full border rounded-lg p-3 text-sm font-bold">
                <option disabled selected>Motorista...</option>
                <option>ADRIANO NASCIMENTO</option><option>FRACIVALDO COSTA</option><option>JOELCINEI GUIMARÃES</option><option>FRACINILDO TEIXEIRA</option><option>EZEQUIEL SILVA</option><option>REGINALDO PEREIRA</option><option>LAFAIETE BATISTA</option><option>WALTER GONÇALVES</option>
            </select>
            <div>
                <label class="block text-[10px] font-bold text-green-600 uppercase">KM na Saída</label>
                <input type="tel" id="km_inicial" oninput="calcularTroca()" class="w-full border-2 border-green-100 rounded-xl p-3 text-2xl font-black text-green-700 outline-none">
            </div>
            <button onclick="enviarDados('inicio')" class="w-full bg-green-600 text-white font-black py-4 rounded-xl shadow-lg active:scale-95 transition-all uppercase">Registrar Saída</button>
        </section>

        <section class="bg-white rounded-2xl shadow-md border-t-8 border-blue-700 p-4 space-y-4">
            <h2 class="text-blue-800 font-black text-sm uppercase">2. Finalização (Retorno)</h2>
            
            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="block text-[10px] font-bold text-blue-700 uppercase">KM na Chegada</label>
                    <input type="tel" id="km_final" oninput="calcularTroca()" class="w-full border-2 border-blue-100 rounded-xl p-3 text-2xl font-black text-blue-800 outline-none">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase">KM Próx. Troca</label>
                    <input type="tel" id="km_troca" oninput="calcularTroca()" placeholder="Ex: 50000" class="w-full border-2 border-slate-100 rounded-xl p-3 text-xl font-bold text-slate-700 outline-none">
                </div>
            </div>

            <div class="bg-blue-50 rounded-xl p-4 flex justify-between items-center border border-blue-100">
                <span class="text-[10px] font-black text-blue-900 uppercase">Resta p/ Troca de Óleo:</span>
                <span id="resultado_texto" class="text-2xl font-black text-blue-300">--- KM</span>
            </div>

            <textarea id="observacao" placeholder="Avarias ou observações?" class="w-full border rounded-xl p-3 text-sm h-16 outline-none"></textarea>
            
            <button onclick="enviarDados('fim')" class="w-full bg-blue-800 text-white font-black py-5 rounded-2xl shadow-xl active:scale-95 transition-all uppercase tracking-widest text-lg">Finalizar e Enviar</button>
        </section>
    </div>

    <script>
        const frota = {
            "tjur04": { v: "SKY MUNCK", p: "QFA1I50" }, "tjur06": { v: "SAVEIRO FURGÃO", p: "QUJ3E02" },
            "tjur07": { v: "SKY MUNCK", p: "RWR3C75" }, "tjur08": { v: "CAMINHONETE HILUX", p: "QVE5H48" },
            "tjur09": { v: "SKY MUNCK", p: "RXC6J04" }, "tjur10": { v: "CAMINHONETE", p: "PHU1I37" },
            "tjur13": { v: "CAMINHONETE", p: "QVD4I38" }
        };

        function preencherVeiculoPlaca() {
            const f = frota[document.getElementById('tag_select').value];
            if(f) { 
                document.getElementById('veiculo_input').value = f.v; 
                document.getElementById('placa_input').value = f.p; 
            }
        }

        function calcularTroca() {
            const ini = parseFloat(document.getElementById('km_inicial').value) || 0;
            const fim = parseFloat(document.getElementById('km_final').value) || 0;
            const tro = parseFloat(document.getElementById('km_troca').value) || 0;
            const res = document.getElementById('resultado_texto');

            // Lógica: Prioriza KM Final se existir, senão usa o Inicial
            let kmAtual = (fim > 0) ? fim : ini;

            if(kmAtual > 0 && tro > 0) {
                const r = tro - kmAtual;
                if(r <= 0) {
                    res.innerText = "VENCIDO!";
                    res.className = "text-2xl font-black text-red-600";
                } else {
                    res.innerText = r.toLocaleString('pt-BR') + " KM";
                    res.className = r <= 500 ? "text-2xl font-black text-orange-500" : "text-2xl font-black text-green-600";
                }
            } else {
                res.innerText = "--- KM";
                res.className = "text-2xl font-black text-slate-300";
            }
        }

        async function enviarDados(tipo) {
            const scriptURL = "SUA_URL_AQUI_DO_PASSO_1"; // <--- COLE SUA URL DO APPS SCRIPT AQUI
            
            const dados = {
                tipo: tipo,
                data: document.getElementById('data_input').value,
                tag: document.getElementById('tag_select').value.toUpperCase(),
                nome: document.getElementById('nome_condutor').value,
                km_inicial: document.getElementById('km_inicial').value,
                km_final: document.getElementById('km_final').value,
                hora_inicio: document.getElementById('hora_inicio_input').value,
                hora_fim: new Date().toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'}),
                status: (tipo === 'inicio') ? "EM TRÂNSITO" : "CONCLUÍDO",
                obs: document.getElementById('observacao').value || "S/O",
                prox_oleo: document.getElementById('km_troca').value,
                placa: document.getElementById('placa_input').value,
                veiculo: document.getElementById('veiculo_input').value,
                resta_troca: document.getElementById('resultado_texto').innerText
            };

            // Envio silencioso para a planilha
            fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(dados)});

            // WhatsApp
            const textoZap = `*FROTA TELEJUR*\n*${dados.status}*\n*Motorista:* ${dados.nome}\n*Veículo:* ${dados.veiculo} (${dados.tag})\n*KM:* ${tipo === 'inicio' ? dados.km_inicial : dados.km_final}\n*Resta Troca:* ${dados.resta_troca}`;
            window.open(`https://wa.me/5593981162453?text=${encodeURIComponent(textoZap)}`);
        }

        window.onload = () => {
            document.getElementById('data_input').value = new Date().toISOString().split('T')[0];
            document.getElementById('hora_inicio_input').value = new Date().toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'});
        };
    </script>
</body>
</html>
