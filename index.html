<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<style>
body { background:#0d1117; color:white; font-family:Arial; padding:10px; }
.grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:10px; }
.card { background:#161b22; padding:10px; border-radius:10px; border-left:5px solid #2ecc71; }
.ocupado { border-left-color:red; }
</style>
</head>

<body>

<h2>🚗 DASHBOARD</h2>
<div class="grid" id="cards"></div>

<script>
const URL="COLE_SUA_URL_AQUI";

function load(){
 let s=document.createElement('script');

 window.cb=(res)=>{
  let div=document.getElementById("cards");
  div.innerHTML="";

  Object.keys(res.frota).forEach(tag=>{
   let f=res.frota[tag];
   let o=res.ocupados[tag];

   let classe="";
   let status="🟢 LIVRE";
   let extra="";

   if(o){
    classe="ocupado";
    status="🔴 EM USO";
    extra=`👤 ${o.nome}<br>🕒 ${o.hora}<br>📏 KM ${o.kmi}`;
   }

   div.innerHTML+=`
    <div class="card ${classe}">
     <b>${tag}</b><br>
     ${f.v}<br>
     ${f.p}<hr>
     ${status}<br>
     ${extra}
    </div>
   `;
  });

  document.body.removeChild(s);
 };

 s.src=`${URL}?acao=statusGeral&callback=cb&_=${Date.now()}`;
 document.body.appendChild(s);
}

setInterval(load,8000);
load();
</script>

</body>
</html>
