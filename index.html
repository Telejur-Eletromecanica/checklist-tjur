<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TELEJUR FROTA v7.4</title>
    <style>
        :root { --primary: #1a237e; --danger: #c62828; --success: #2e7d32; --disabled: #bdbdbd; }
        body { font-family: sans-serif; background: #f0f4f8; padding: 10px; margin: 0; }
        .card { max-width: 450px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .grid-status { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 15px; }
        .v-box { padding: 8px; border-radius: 8px; text-align: center; font-size: 10px; font-weight: bold; border: 1px solid #ddd; }
        .livre { background: #e8f5e9; color: var(--success); }
        .ocupado { background: #ffebee; color: var(--danger); border-color: var(--danger); }
        label { font-weight: bold; font-size: 11px; color: #555; display: block; margin-top: 12px; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 12px; margin-top: 4px; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; box-sizing: border-box; }
        .btn { width: 100%; padding: 18px; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 15px; }
        .btn-azul { background: var(--primary); color: white; }
        .readonly { background: #f1f1f1 !important; pointer-events: none; color: #666; font-weight: bold; }
        option:disabled { color: #ccc; background-color: #f9f9f9; }
        #txtSync { text-align: center; font-size: 10px; margin-bottom: 10px; color: #888; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="text-align:center; color:var(--primary); margin:0 0 5px 0;">TELEJUR v7.4</h2>
    <p id="txtSync">Sincronizando frotas...</p>
    <div id="painel" class="grid-status"></div>

    <div id="formContainer">
        <label>Veículo (TAG)</label>
        <select id="tag" onchange="buscarDados()">
            <option value="">-- SELECIONE --</option>
            <option value="TJUR 04">TJUR 04</option>
            <option value="TJUR 06">TJUR 06</option>
            <option value="TJUR 07">TJUR 07</option>
            <option value="TJUR 08">TJUR 08</option>
            <option value="TJUR 09">TJUR 09</option>
            <option value="TJUR 10">TJUR 10</option>
            <option value="TJUR 13">TJUR 13</option>
        </select>

        <label>Modelo | Placa</label>
        <input type="text" id="veiculoInfo" class="readonly" readonly placeholder="Auto">

        <label>Motorista</label>
        <select id="nomeMot" onchange="buscarDados()">
            <option value="">-- SELECIONE --</option>
            <option value="ADRIANO NASCIMENTO">ADRIANO NASCIMENTO</option>
            <option value="FRANCIVALDO COSTA">FRANCIVALDO COSTA</option>
            <option value="FRANCINILDO TEXEIRA">FRANCINILDO TEXEIRA</option>
            <option value="JOELCINEI GUIMARAES">JOELCINEI GUIMARAES</option>
            <option value="MIRIELLY">MIRIELLY</option>
            <option value="REGINALDO">REGINALDO</option>
            <option value="WALTER GONÇALVES">WALTER GONÇALVES</option>
            <option value="LAFAITE BATISTA">LAFAITE BATISTA</option>
            <option value="EZEQUIEL">EZEQUIEL</option>
        </select>

        <label>ID do Condutor</label>
        <select id="idMot">
            <option value="">-- AUTO --</option>
            <option value="ID 01">ID 01</option><option value="ID 02">ID 02</option>
            <option value="ID 03">ID 03</option><option value="ID 04">ID 04</option>
            <option value="ID 05">ID 05</option><option value="ID 06">ID 06</option>
            <option value="ID 07">ID 07</option><option value="ID 08">ID 08</option>
            <option value="ID 09">ID 09</option>
        </select>

        <label>KM Inicial</label>
        <input type="number" id="kmi" placeholder="Digite o KM">

        <div id="fimCampos" style="display:none">
            <hr>
            <label style="color:var(--danger)">KM Final (Chegada)</label>
            <input type="number" id="kmf" placeholder="Digite o KM Final">
            <label>Observação</label>
            <textarea id="obs" placeholder="Alguma avaria ou observação?"></textarea>
        </div>

        <button id="btnAcao" onclick="salvarSaida()" class="btn btn-azul">Salvar Saída</button>
    </div>

    <div id="telaAtiva" style="display:none">
        <div id="infoViagem" style="background:#f8f9fa; padding:15px; border-radius:10px; border-left:5px solid var(--primary); margin-bottom:15px"></div>
        <button onclick="enviarWhats(false)" class="btn" style="background:#25D366; color:white">WhatsApp Saída</button>
        <button onclick="prepararFim()" class="btn" style="background:#444; color:white">Finalizar Trajeto</button>
    </div>
</div>

<script>
    const URL = "https://script.google.com/macros/s/AKfycbysx-IjZe54SWbmqwl2NYJEx_kiuVtakdtE-GFYE30UxwYYQhcvOuw5DViSwMixS_QIyQ/exec";
    const dataH = new Date().toLocaleDateString('pt-BR');

    async function sync() {
        const s = document.createElement('script');
        window.cb_sync = (d) => {
            const tags = ["TJUR 04", "TJUR 06", "TJUR 07", "TJUR 08", "TJUR 09", "TJUR 10", "TJUR 13"];
            const selectTag = document.getElementById('tag');
            
            // Renderiza o painel e BLOQUEIA as opções no Select
            document.getElementById('painel').innerHTML = tags.map(t => {
                const info = d[t];
                const estaOcupado = !!info;
                
                // Busca a opção correspondente no select e desabilita se estiver ocupado
                Array.from(selectTag.options).forEach(opt => {
                    if(opt.value === t) {
                        opt.disabled = estaOcupado;
                        if(estaOcupado) opt.text = t + " (EM TRÂNSITO)";
                        else opt.text = t;
                    }
                });

                return `<div class="v-box ${estaOcupado ? 'ocupado' : 'livre'}">${t}<br>${estaOcupado ? '🔴 ' + info.nome.split(' ')[0] : '🟢 LIVRE'}</div>`;
            }).join('');
            
            document.getElementById('txtSync').innerText = "Frota Sincronizada ✅";
        };
        s.src = `${URL}?acao=statusGeral&data=${dataH}&callback=cb_sync`;
        document.body.appendChild(s);
    }

    async function buscarDados() {
        const tag = document.getElementById("tag").value;
        const nome = document.getElementById("nomeMot").value;
        if(!tag || !nome) return;
        
        const s = document.createElement('script');
        window.cb_mot = (d) => {
            if(d.veiculo) document.getElementById("veiculoInfo").value = `${d.veiculo} | ${d.placa}`;
            if(d.id) document.getElementById("idMot").value = d.id;
            window.infoExtra = d; 
        };
        s.src = `${URL}?acao=buscarDadosMotorista&tag=${encodeURIComponent(tag)}&nome=${encodeURIComponent(nome)}&data=${dataH}&callback=cb_mot`;
        document.body.appendChild(s);
    }

    function salvarSaida() {
        const d = {
            data: dataH, tag: document.getElementById("tag").value,
            id: document.getElementById("idMot").value, nome: document.getElementById("nomeMot").value,
            kmi: document.getElementById("kmi").value, 
            horaI: new Date().toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'}),
            acao: "registrar", callback: "cb_reg", planta: "PORTO"
        };
        if(!d.tag || !d.kmi || !d.nome || !d.id) return alert("Preencha todos os campos!");
        
        const s = document.createElement('script');
        window.cb_reg = (res) => {
            if(res.res === "erro") return alert(res.msg);
            d.numTrajeto = res.n; 
            d.placa = res.placa;
            d.veiculo = res.veiculo;
            d.oleo = window.infoExtra ? window.infoExtra.oleo : "";
            localStorage.setItem("trip_v7_4", JSON.stringify(d));
            location.reload();
        };
        s.src = `${URL}?${new URLSearchParams(d)}`;
        document.body.appendChild(s);
    }

    function prepararFim() {
        const d = JSON.parse(localStorage.getItem("trip_v7_4"));
        document.getElementById("telaAtiva").style.display = "none";
        document.getElementById("formContainer").style.display = "block";
        document.getElementById("fimCampos").style.display = "block";
        document.getElementById("tag").value = d.tag;
        document.getElementById("veiculoInfo").value = `${d.veiculo} | ${d.placa}`;
        document.getElementById("nomeMot").value = d.nome;
        document.getElementById("idMot").value = d.id;
        document.getElementById("kmi").value = d.kmi;
        ["tag", "nomeMot", "idMot", "kmi"].forEach(id => document.getElementById(id).classList.add("readonly"));

        document.getElementById("btnAcao").innerText = "Finalizar e Enviar WhatsApp";
        document.getElementById("btnAcao").onclick = () => {
            const kmf = document.getElementById("kmf").value;
            if(!kmf) return alert("Informe o KM Final!");
            const s = document.createElement('script');
            const hFim = new Date().toLocaleTimeString('pt-BR');
            window.cb_fin = () => { enviarWhats(true, kmf, hFim); };
            s.src = `${URL}?acao=finalizar&tag=${d.tag}&data=${dataH}&kmf=${kmf}&horaF=${hFim}&obs=${encodeURIComponent(document.getElementById("obs").value)}&callback=cb_fin`;
            document.body.appendChild(s);
        };
    }

    function enviarWhats(isFim, kmf, hFim) {
        const d = JSON.parse(localStorage.getItem("trip_v7_4"));
        let m = isFim ? `✅ *CHECKLIST CONCLUÍDO*\n` : `🚀 *SAÍDA REGISTRADA*\n`;
        m += `--------------------------------\n`;
        m += `📅 *Data:* ${d.data}\n`;
        m += `🏷️ *Tag:* ${d.tag}\n`;
        m += `🆔 *ID:* ${d.id}\n`;
        m += `👤 *Nome:* ${d.nome}\n`;
        m += `🚛 *Veículo:* ${d.veiculo}\n`;
        m += `🔢 *Placa:* ${d.placa}\n`;
        m += `📍 *Trajeto:* ${d.numTrajeto}\n`;
        m += `🏁 *Status:* ${isFim ? "CONCLUÍDO" : "EM TRÂNSITO"}\n`;
        m += `--------------------------------\n`;
        m += `🛣️ *KM Inicial:* ${d.kmi}\n`;
        m += `🕒 *Hora Início:* ${d.horaI}\n`;

        if(isFim) {
            m += `🕒 *Hora Fim:* ${hFim}\n`;
            m += `🛣️ *KM Final:* ${kmf}\n`;
            m += `📝 *Obs:* ${document.getElementById("obs").value || "Nenhuma"}\n`;
            m += `🛢️ *Próx. Troca Óleo:* ${d.oleo || "---"}\n`;
            localStorage.removeItem("trip_v7_4");
        }

        window.location.href = `https://wa.me/?text=${encodeURIComponent(m)}`;
        if(isFim) setTimeout(() => location.reload(), 1500);
    }

    window.onload = () => {
        sync();
        const salvo = localStorage.getItem("trip_v7_4");
        if(salvo) {
            const d = JSON.parse(salvo);
            document.getElementById("formContainer").style.display = "none";
            document.getElementById("telaAtiva").style.display = "block";
            document.getElementById("infoViagem").innerHTML = `<b>TRAJETO ATIVO</b><br>🚗 ${d.tag} (${d.placa})<br>👤 ${d.nome} (${d.id})<br>📍 ${d.numTrajeto}`;
        }
    };
</script>
</body>
</html>
