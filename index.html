<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TELEJUR v10.7.9</title>
    <style>
        :root { --primary: #1a237e; --danger: #c62828; --success: #2e7d32; --warning: #fbc02d; }
        body { font-family: sans-serif; background: #f0f4f8; padding: 10px; margin: 0; }
        .card { max-width: 450px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .grid-status { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 15px; }
        .v-box { padding: 8px; border-radius: 8px; text-align: center; font-size: 11px; font-weight: bold; border: 1px solid #ddd; min-height: 45px; display: flex; flex-direction: column; justify-content: center; }
        .livre { background: #e8f5e9; color: var(--success); }
        .ocupado { background: #ffebee; color: var(--danger); border-color: var(--danger); }
        .bloqueado { background: #f5f5f5; color: #999; border-style: dashed; }
        label { font-weight: bold; font-size: 11px; color: #555; display: block; margin-top: 12px; text-transform: uppercase; }
        input, select { width: 100%; padding: 12px; margin-top: 4px; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; box-sizing: border-box; }
        .status-oleo { font-size: 13px; padding: 12px; border-radius: 8px; margin-top: 8px; font-weight: bold; text-align: center; }
        .btn { width: 100%; padding: 18px; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 15px; background: var(--primary); color: white; }
        .btn-refresh { background: #555; color: white; padding: 6px 10px; font-size: 10px; border-radius: 5px; cursor: pointer; border:none; float: right; }
        .readonly { background: #f1f1f1 !important; color: #444 !important; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <button class="btn-refresh" onclick="sync()">🔄 Atualizar</button>
    <h2 style="text-align:center; color:var(--primary); margin:0;">TELEJUR v10.7.9</h2>
    <p id="txtSync" style="text-align:center; font-size:10px; color:#888; margin-bottom:10px;">Conectando...</p>
    
    <div id="painel" class="grid-status"></div>

    <div id="formContainer">
        <label>Motorista</label>
        <select id="nomeMot" onchange="sync();">
            <option value="">-- SELECIONE --</option>
            <option value="ADRIANO NASCIMENTO">ADRIANO NASCIMENTO</option>
            <option value="FRANCIVALDO COSTA">FRANCIVALDO COSTA</option>
            <option value="FRANCINILDO TEXEIRA">FRANCINILDO TEXEIRA</option>
            <option value="JOELCINEI GUIMARAES">JOELCINEI GUIMARAES</option>
            <option value="REGINALDO">REGINALDO</option>
            <option value="WALTER GONÇALVES">WALTER GONÇALVES</option>
            <option value="LAFAITE BATISTA">LAFAITE BATISTA</option>
            <option value="MIRIELLY">MIRIELLY</option>
            <option value="EZEQUIEL">EZEQUIEL</option>
        </select>

        <label>Veículo (TAG)</label>
        <select id="tag" onchange="buscarDados()">
            <option value="">-- SELECIONE --</option>
            <option value="TJUR 04">TJUR 04</option><option value="TJUR 06">TJUR 06</option>
            <option value="TJUR 07">TJUR 07</option><option value="TJUR 08">TJUR 08</option>
            <option value="TJUR 09">TJUR 09</option><option value="TJUR 10">TJUR 10</option>
            <option value="TJUR 13">TJUR 13</option>
        </select>
        
        <input type="text" id="veiculoInfo" class="readonly" readonly placeholder="Veículo | Placa">
        <input type="text" id="idMot" class="readonly" readonly placeholder="ID Condutor">

        <label>Cor do Selo</label>
        <select id="corSelo">
            <option value="">-- SELECIONE --</option>
            <option value="VERDE">VERDE</option><option value="VERMELHO">VERMELHO</option>
            <option value="AZUL">AZUL</option><option value="AMARELO">AMARELO</option>
        </select>

        <label>Validade Selo</label>
        <input type="date" id="validadeSelo">

        <label>KM Inicial</label>
        <input type="number" id="kmi" inputmode="numeric" pattern="[0-9]*" oninput="calcularStatusOleo()" placeholder="Somente números">

        <label id="labelOleo">Próx. troca óleo (KM)</label>
        <div id="containerOleo">
            <input type="text" id="proxOleo" oninput="calcularStatusOleo()" placeholder="KM ou Data">
        </div>
        <div id="statusOleoVisual" class="status-oleo" style="display:none"></div>

        <label>Tipo de Óleo</label>
        <select id="tipoOleo">
            <option value="">-- SELECIONE --</option>
            <option value="15W40">15W40</option><option value="5W30">5W30</option>
            <option value="10W40">10W40</option><option value="20W50">20W50</option>
            <option value="OUTRO">OUTRO</option>
        </select>

        <button id="btnAcao" onclick="salvarSaida()" class="btn">Registrar Saída</button>
    </div>

    <div id="telaAtiva" style="display:none">
        <div id="infoViagem" style="background:#f8f9fa; padding:15px; border-radius:10px; border-left:5px solid var(--primary); margin-bottom:15px"></div>
        <button id="btnFim" class="btn" style="background:#444">Finalizar Trajeto</button>
    </div>
</div>

<script>
    const URL = "https://script.google.com/macros/s/AKfycbysx-IjZe54SWbmqwl2NYJEx_kiuVtakdtE-GFYE30UxwYYQhcvOuw5DViSwMixS_QIyQ/exec";
    const dataH = new Date().toLocaleDateString('pt-BR');

    function calcularStatusOleo() {
        const kmiRaw = document.getElementById("kmi").value, proxOleoRaw = document.getElementById("proxOleo").value;
        const divStatus = document.getElementById("statusOleoVisual"), isDate = document.getElementById("proxOleo").type === "date";
        if (!proxOleoRaw || (!isDate && !kmiRaw)) { divStatus.style.display = "none"; return; }
        divStatus.style.display = "block";
        let status = "", classe = "status-ok";
        if (isDate) {
            const diffDays = Math.ceil((new Date(proxOleoRaw + "T12:00:00") - new Date()) / 86400000);
            status = diffDays < 0 ? "🚨 VENCIDO!" : `✅ VENCE EM ${diffDays} DIAS`;
            classe = diffDays < 0 ? "status-vencido" : (diffDays <= 7 ? "status-alerta" : "status-ok");
        } else {
            const resta = Number(proxOleoRaw.replace(/\D/g,"")) - Number(kmiRaw);
            status = resta < 0 ? `🚨 VENCIDO HÁ ${Math.abs(resta)} KM!` : `✅ FALTAM ${resta} KM`;
            classe = resta < 0 ? "status-vencido" : (resta <= 500 ? "status-vencido" : "status-ok");
        }
        divStatus.innerText = status; divStatus.className = "status-oleo " + classe;
    }

    async function sync() {
        window.cb_sync = (res) => {
            const tags = ["TJUR 04", "TJUR 06", "TJUR 07", "TJUR 08", "TJUR 09", "TJUR 10", "TJUR 13"];
            const painel = document.getElementById('painel'), mot = document.getElementById('nomeMot').value;
            const skyAuth = ["REGINALDO", "LAFAITE BATISTA", "WALTER GONÇALVES"];
            painel.innerHTML = '';
            tags.forEach(t => {
                const ocupado = res.ocupados && res.ocupados[t];
                const bloqueado = (res.frota[t].veiculo.includes("SKY") && !skyAuth.includes(mot));
                let cl = ocupado ? 'ocupado' : (bloqueado ? 'bloqueado' : 'livre');
                let st = ocupado ? '🔴 '+ocupado.nome.split(' ')[0] : (bloqueado ? '🔒 RESTRITO' : '🟢 LIVRE');
                painel.innerHTML += `<div class="v-box ${cl}"><b>${t}</b>${st}</div>`;
            });
            document.getElementById('txtSync').innerText = "Atualizado: " + new Date().toLocaleTimeString();
        };
        const s = document.createElement('script');
        s.src = `${URL}?acao=statusGeral&data=${dataH}&callback=cb_sync&_=${Date.now()}`;
        document.body.appendChild(s);
    }

    async function buscarDados() {
        const t = document.getElementById("tag").value, n = document.getElementById("nomeMot").value;
        if(!t || !n) return;
        window.cb_mot = (d) => {
            document.getElementById("veiculoInfo").value = `${d.veiculo} | ${d.placa}`;
            document.getElementById("idMot").value = d.id;
            const campo = document.getElementById("proxOleo");
            if(d.veiculo.includes("SKY")) { 
                campo.type = "date"; 
                document.getElementById("labelOleo").innerText = "Data Limite (SKY)";
            } else { 
                campo.type = "number"; // TECLADO NUMÉRICO NO ÓLEO TAMBÉM
                campo.inputMode = "numeric";
                document.getElementById("labelOleo").innerText = "Próx. troca óleo (KM)"; 
            }
            campo.value = ""; 
            document.getElementById("statusOleoVisual").style.display = "none";
        };
        const s = document.createElement('script');
        s.src = `${URL}?acao=buscarDadosMotorista&tag=${encodeURIComponent(t)}&nome=${encodeURIComponent(n)}&callback=cb_mot`;
        document.body.appendChild(s);
    }

    function salvarSaida() {
        const d = {
            data: dataH, tag: document.getElementById("tag").value, id: document.getElementById("idMot").value,
            nome: document.getElementById("nomeMot").value, kmi: document.getElementById("kmi").value, 
            oleo: document.getElementById("proxOleo").value, acao: "registrar", callback: "cb_reg",
            corSelo: document.getElementById("corSelo").value, tipoOleo: document.getElementById("tipoOleo").value,
            validadeSelo: document.getElementById("validadeSelo").value, horaI: new Date().toLocaleTimeString('pt-BR')
        };
        if(!d.tag || !d.kmi || !d.nome || !d.oleo) return alert("Preencha tudo!");
        window.cb_reg = () => { localStorage.setItem("trip_v10_3", JSON.stringify(d)); location.reload(); };
        const s = document.createElement('script');
        s.src = `${URL}?${new URLSearchParams(d)}`;
        document.body.appendChild(s);
    }

    document.getElementById("btnFim").onclick = () => {
        const kf = prompt("Digite o KM Final (Somente números):");
        if(!kf) return;
        const d = JSON.parse(localStorage.getItem("trip_v10_3"));
        window.cb_fin = () => { localStorage.removeItem("trip_v10_3"); location.reload(); };
        const s = document.createElement('script');
        s.src = `${URL}?acao=finalizar&tag=${d.tag}&kmf=${kf}&callback=cb_fin`;
        document.body.appendChild(s);
    };

    window.onload = () => { 
        sync(); 
        const s = localStorage.getItem("trip_v10_3"); 
        if(s) { 
            document.getElementById("formContainer").style.display = "none"; 
            document.getElementById("telaAtiva").style.display = "block"; 
            const d = JSON.parse(s); 
            document.getElementById("infoViagem").innerHTML = `<b>ATIVO: ${d.tag}</b><br>${d.nome}`; 
        } 
    };
</script>
</body>
</html>
