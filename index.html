<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TELEJUR</title>

<style>
body { font-family:sans-serif; background:#f4f7f6; }
.card { max-width:500px; margin:auto; background:white; padding:20px; border-radius:15px; }

.grid { display:grid; grid-template-columns:repeat(4,1fr); gap:6px; margin-bottom:15px; }

.tag { padding:10px; border-radius:10px; font-size:11px; font-weight:bold; text-align:center; }
.livre { background:#c8e6c9; }
.ocupado { background:#ffcdd2; }
.travado { background:#eee; color:#999; }

input, select { width:100%; padding:12px; margin-top:5px; }

button { width:100%; padding:15px; margin-top:10px; font-weight:bold; }
</style>
</head>

<body>

<div class="card">

<h3>TELEJUR ELETROMECANICA</h3>
<p>Checklist de Veículos | Unidade Juruti</p>

<div id="grid" class="grid"></div>

<select id="motorista">
<option value="">-- SELECIONE O MOTORISTA --</option>
<option>ADRIANO NASCIMENTO</option>
<option>FRANCIVALDO COSTA</option>
<option>WALTER GONÇALVES</option>
<option>LAFAITE BATISTA</option>
<option>REGINALDO</option>
</select>

<select id="tag"></select>

<input id="veiculo" placeholder="Veículo" readonly>
<input id="placa" placeholder="Placa" readonly>
<input id="id" placeholder="ID" readonly>
<input id="km" placeholder="KM Inicial">

<input id="oleo" placeholder="Troca de óleo">

<button onclick="iniciar()">INICIAR</button>
<button onclick="finalizar()">FINALIZAR</button>

</div>

<script>

const URL = "COLE_SUA_URL_AQUI";
const hoje = new Date().toLocaleDateString('pt-BR');

let banco = {};

function chamar(p){
let s=document.createElement('script');
s.src=URL+"?"+new URLSearchParams(p);
document.body.appendChild(s);
}

function carregar(){
chamar({acao:"status",data:hoje,callback:"resposta"});
}

window.resposta=(r)=>{
banco=r;
montar();
};

function montar(){

let grid="";
let select='<option value="">-- SELECIONE A TAG --</option>';

const autorizados=["LAFAITE BATISTA","WALTER GONÇALVES","REGINALDO"];
const mot=document.getElementById("motorista").value;

Object.keys(banco.frota).forEach(tag=>{

let ocup=banco.ocupados[tag];
let munck=["TJUR 04","TJUR 07","TJUR 09"].includes(tag);
let travado=munck && !autorizados.includes(mot) && mot;

let status="LIVRE";
let classe="livre";

if(ocup){ status="EM USO"; classe="ocupado"; }
else if(travado){ status="🔒"; classe="travado"; }

grid+=`<div class="tag ${classe}">${tag}<br>${status}</div>`;

select+=`<option value="${tag}" ${travado?"disabled":""}>
${travado?"🔒 ":""}${tag}
</option>`;

});

document.getElementById("grid").innerHTML=grid;
document.getElementById("tag").innerHTML=select;

}

/* AUTO PREENCHIMENTO */
document.getElementById("tag").addEventListener("change", ()=>{

let tag = document.getElementById("tag").value;
if(!tag) return;

let dados = banco.frota[tag];

document.getElementById("veiculo").value = dados.v;
document.getElementById("placa").value = dados.p;

/* ID AUTOMÁTICO */
document.getElementById("id").value = gerarID(tag);

/* ÓLEO INTELIGENTE */
if(dados.tipo==="DATA"){
document.getElementById("oleo").type="date";
}else{
document.getElementById("oleo").type="number";
}

});

function gerarID(tag){
let usados=banco.idsUsados[tag]||[];
let i=1;
while(usados.includes("ID"+i)) i++;
return "ID"+i;
}

/* INICIAR */
function iniciar(){

let tag=document.getElementById("tag").value;

if(banco.ocupados[tag]){
alert("🚫 VEÍCULO EM USO!");
return;
}

chamar({
acao:"registrar",
tag,
id:document.getElementById("id").value,
nome:document.getElementById("motorista").value,
kmi:document.getElementById("km").value,
horaI:new Date().toLocaleTimeString(),
oleo:document.getElementById("oleo").value,
trajeto:"1",
data:hoje,
callback:"ok"
});

alert("✅ INICIADO");
setTimeout(carregar,1000);

}

/* FINALIZAR */
function finalizar(){

let tag=document.getElementById("tag").value;

chamar({
acao:"finalizar",
tag,
kmf:document.getElementById("km").value,
horaF:new Date().toLocaleTimeString(),
data:hoje,
callback:"ok"
});

alert("🏁 FINALIZADO");
setTimeout(carregar,1000);

}

window.onload=carregar;

</script>

</body>
</html>
