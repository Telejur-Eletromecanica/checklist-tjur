<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TELEJUR - GESTÃO INTEGRADA</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; margin: 0; padding: 10px; }
        .card { max-width: 420px; margin: auto; background: white; padding: 20px; border-radius: 20px; border-top: 12px solid #1a237e; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .brand { font-size: 28px; font-weight: 900; color: #1a237e; text-align: center; margin: 0; letter-spacing: 2px; }
        .subtitle { font-size: 12px; color: #1a237e; text-align: center; font-weight: bold; display: block; margin-bottom: 20px; }
        
        .grid-frota { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 20px; }
        .v-status { padding: 10px; border-radius: 12px; text-align: center; font-size: 11px; font-weight: bold; border: 1px solid #ddd; transition: 0.3s; }
        .livre { background: #e8f5e9; color: #2e7d32; border-color: #c8e6c9; }
        .ocupado { background: #ffebee; color: #c62828; border-color: #ffcdd2; }

        label { font-weight: bold; font-size: 10px; color: #555; display: block; margin-top: 12px; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 12px; margin-top: 5px; border-radius: 10px; border: 1px solid #ccc; font-size: 16px; box-sizing: border-box; background: #fdfdfd; }
        .readonly { background: #eee !important; color: #1a237e; font-weight: bold; pointer-events: none; }
        
        .btn { width: 100%; padding: 18px; border: none; border-radius: 15px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 20px; text-transform: uppercase; }
        .btn-azul { background: #1a237e; color: white; }
        .btn-verde { background: #25D366; color: white; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="card">
    <p class="brand">TELEJUR</p>
    <span class="subtitle">CONTROLE DE FROTA V14</span>

    <div id="painelFrota" class="grid-frota">Sincronizando frota...</div>

    <div id="containerForm">
        <label>Veículo (TAG)</label>
        <select id="tag" onchange="atualizarInterface()">
            <option value="">SELECIONE A TAG</option>
            <option value="TJUR 04" data-v="SKY MUNCK" data-p="QFA1I50">TJUR 04</option>
            <option value="TJUR 06" data-v="SAVEIRO" data-p="QUJ3E02">TJUR 06</option>
            <option value="TJUR 07" data-v="SKY MUNCK" data-p="RWR3C75">TJUR 07</option>
            <option value="TJUR 08" data-v="HILUX" data-p="QVE5H48">TJUR 08</option>
            <option value="TJUR 09" data-v="SKY MUNCK" data-p="RXC6J04">TJUR 09</option>
            <option value="TJUR 10" data-v="CAMINHONETE" data-p="PHU1I37">TJUR 10</option>
            <option value="TJUR 13" data-v="HILUX" data-p="QVD4I38">TJUR 13</option>
        </select>

        <label>Informações do Veículo</label>
        <input type="text" id="displayInfo" class="readonly" readonly placeholder="Placa e Modelo">

        <label>ID e Nome do Condutor</label>
        <div style="display:flex; gap:8px">
            <select id="idCond" style="width:40%"><option>ID 01</option><option>ID 02</option><option>ID 03</option></select>
            <select id="nomeCond" style="width:60%">
                <option>ADRIANO NASCIMENTO</option><option>FRANCIVALDO COSTA</option>
                <option>JOELCINEI GUIMARÃES</option><option>LAFAITE BATISTA</option>
            </select>
        </div>

        <label>KM Inicial</label>
        <input type="number" id="kmi" placeholder="KM de Saída">

        <label>Selo / Validade</label>
        <div style="display:flex; gap:8px">
            <select id="corSelo" style="width:40%"><option>VERDE</option><option>AZUL</option><option>AMARELO</option></select>
            <input type="date" id="valSelo" onchange="calcLimite()" style="width:60%">
        </div>
        <input type="text" id="limite" class="readonly" readonly placeholder="Limite +5 dias úteis">

        <div id="sessaoFinal" class="hidden">
            <hr style="margin-top:20px; border:0; border-top:1px solid #eee">
            <label style="color:red">KM Final</label>
            <input type="number" id="kmf" placeholder="KM na Chegada">
            <label>Observações</label>
            <textarea id="obs" rows="2"></textarea>
        </div>

        <button type="button" id="btnAcao" onclick="salvarInicio()" class="btn btn-azul">SALVAR INÍCIO</button>
    </div>

    <div id="telaEspera" class="hidden">
        <div id="resumo" style="background:#f8f9fa; padding:15px; border-radius:12px; margin-bottom:15px; border-left:5px solid #1a237e"></div>
        <button onclick="enviarWhats()" class="btn btn-verde">ENVIAR INÍCIO WHATSAPP</button>
        <button onclick="irParaFinalizar()" class="btn btn-azul">FINALIZAR TRAJETO</button>
    </div>
</div>

<script>
    const API = "https://script.google.com/macros/s/AKfycbysx-IjZe54SWbmqwl2NYJEx_kiuVtakdtE-GFYE30UxwYYQhcvOuw5DViSwMixS_QIyQ/exec";
    const dataH = new Date().toLocaleDateString('pt-BR');

    async function sync() {
        const cb = "cb_"+Date.now();
        const s = document.createElement('script');
        window[cb] = (d) => {
            const tags = ["TJUR 04", "TJUR 06", "TJUR 07", "TJUR 08", "TJUR 09", "TJUR 10", "TJUR 13"];
            document.getElementById('painelFrota').innerHTML = tags.map(t => {
                const mot = d[t];
                return `<div class="v-status ${mot ? 'ocupado' : 'livre'}">${t}<br>${mot ? '🔴 '+mot.split(' ')[0] : '🟢 LIVRE'}</div>`;
            }).join('');
        };
        s.src = `${API}?acao=statusGeral&data=${dataH}&callback=${cb}`;
        document.body.appendChild(s);
    }

    function atualizarInterface() {
        const opt = document.getElementById("tag").options[document.getElementById("tag").selectedIndex];
        document.getElementById("displayInfo").value = opt.value ? `${opt.getAttribute("data-v")} | ${opt.getAttribute("data-p")}` : "";
    }

    function calcLimite() {
        let d = new Date(document.getElementById("valSelo").value + "T12:00:00");
        let uteis = 0;
        while(uteis < 5) { d.setDate(d.getDate()+1); if(d.getDay()!==0 && d.getDay()!==6) uteis++; }
        document.getElementById("limite").value = d.toLocaleDateString('pt-BR');
    }

    function salvarInicio() {
        const d = {
            tag: document.getElementById("tag").value, placa: document.getElementById("displayInfo").value.split('|')[1]?.trim(),
            nome: document.getElementById("nomeCond").value, num: document.getElementById("idCond").value,
            kmi: document.getElementById("kmi").value, selo: document.getElementById("corSelo").value,
            valSelo: document.getElementById("valSelo").value, data: dataH, horaI: new Date().toLocaleTimeString('pt-BR'),
            local: "BASE"
        };
        if(!d.tag || !d.kmi) return alert("Preencha TAG e KM Inicial!");
        fetch(`${API}?acao=registrar&${new URLSearchParams(d)}`, {mode:'no-cors'});
        localStorage.setItem("tjur_v14", JSON.stringify(d));
        location.reload();
    }

    function checkSessao() {
        const salvo = localStorage.getItem("tjur_v14");
        if(salvo) {
            const d = JSON.parse(salvo);
            document.getElementById("containerForm").classList.add("hidden");
            document.getElementById("telaEspera").classList.remove("hidden");
            document.getElementById("resumo").innerHTML = `🚗 <b>${d.tag}</b><br>👤 ${d.nome}<br>⏱️ Saída: ${d.horaI}`;
        }
    }

    function irParaFinalizar() {
        document.getElementById("telaEspera").classList.add("hidden");
        document.getElementById("containerForm").classList.remove("hidden");
        document.getElementById("sessaoFinal").classList.remove("hidden");
        ["tag", "idCond", "nomeCond", "kmi"].forEach(id => document.getElementById(id).classList.add("readonly"));
        const btn = document.getElementById("btnAcao");
        btn.innerText = "ENCERRAR TRAJETO";
        btn.onclick = async function() {
            const kmf = document.getElementById("kmf").value;
            const s = JSON.parse(localStorage.getItem("tjur_v14"));
            if(!kmf || Number(kmf) <= Number(s.kmi)) return alert("KM Final inválido!");
            await fetch(`${API}?acao=finalizar&tag=${s.tag}&data=${s.data}&kmf=${kmf}&obs=${document.getElementById("obs").value}`, {mode:'no-cors'});
            localStorage.removeItem("tjur_v14");
            window.location.href = `https://api.whatsapp.com/send?text=✅ FINALIZADO: ${s.tag} | Motorista: ${s.nome} | KM: ${s.kmi} -> ${kmf}`;
        };
    }

    window.onload = () => { sync(); checkSessao(); };
</script>
</body>
</html>
