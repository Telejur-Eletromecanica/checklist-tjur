<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TELEJUR - CHECKLIST</title>
    <style>
        body { font-family: sans-serif; background: #e3f2fd; margin: 0; padding: 10px; }
        .card { max-width: 400px; margin: auto; background: white; padding: 20px; border-radius: 15px; border-top: 10px solid #1a237e; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .header-text { text-align: center; margin-bottom: 20px; }
        .brand { font-size: 28px; font-weight: bold; color: #1a237e; letter-spacing: 2px; margin: 0; }
        .subtitle { font-size: 14px; color: #1a237e; font-weight: bold; margin: 0; text-transform: uppercase; }
        h2 { text-align: center; color: #333; font-size: 18px; margin-top: 20px; border-bottom: 2px solid #1a237e; padding-bottom: 10px; }
        label { font-weight: bold; font-size: 12px; color: #555; display: block; margin-top: 15px; }
        input, select, textarea { width: 100%; padding: 12px; margin-top: 5px; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; box-sizing: border-box; }
        input[readonly] { background: #f1f3f4; color: #666; cursor: not-allowed; }
        .status-memoria { font-size: 12px; font-weight: bold; margin-top: 5px; display: none; padding: 10px; border-radius: 8px; text-align: center; }
        .alerta-erro { background: #ffebee; color: #d32f2f; border: 1px solid #ef9a9a; display: block !important; }
        .alerta-sucesso { background: #e8f5e9; color: #2e7d32; border: 1px solid #c8e6c9; display: block !important; }
        .btn-azul { width: 100%; padding: 16px; background: #1a237e; border: none; border-radius: 10px; font-size: 18px; color: white; font-weight: bold; cursor: pointer; margin-top: 25px; transition: 0.3s; }
        .btn-verde { width: 100%; padding: 16px; background: #25D366; border: none; border-radius: 10px; font-size: 18px; color: white; font-weight: bold; cursor: pointer; margin-top: 25px; transition: 0.3s; }
        .btn-bloqueado { background: #9e9e9e !important; cursor: not-allowed !important; opacity: 0.6; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="card">
    <div class="header-text">
        <p class="brand">TELEJUR</p>
        <p class="subtitle">ELETROMECÂNICA</p>
    </div>

    <h2>CHECKLIST DE VEÍCULO</h2>

    <form id="formChecklist">
        <label>TIPO DE TRAJETO</label>
        <select id="tipoLancamento" onchange="gerenciarInterface()" required>
            <option value="INICIO">INÍCIO DE TRAJETO (SALVAR)</option>
            <option value="FIM">FIM DE TRAJETO (ENVIAR)</option>
        </select>

        <div id="msgStatus" class="status-memoria"></div>

        <label>TAG DO VEÍCULO</label>
        <select id="tag" onchange="completar()" required>
            <option value="">SELECIONE A TAG</option>
            <option value="TJUR 04" data-v="SKY MUNCK" data-p="QFA1I50">TJUR 04</option>
            <option value="TJUR 06" data-v="SAVEIRO FURGÃO" data-p="QUJ3E02">TJUR 06</option>
            <option value="TJUR 07" data-v="SKY MUNCK" data-p="RWR3C75">TJUR 07</option>
            <option value="TJUR 08" data-v="CAMINHONETE HILUX" data-p="QVE5H48">TJUR 08</option>
            <option value="TJUR 09" data-v="SKY MUNCK" data-p="RXC6J04">TJUR 09</option>
            <option value="TJUR 10" data-v="CAMINHONETE" data-p="PHU1I37">TJUR 10</option>
            <option value="TJUR 13" data-v="CAMINHONETE HILUX" data-p="QVD4I38">TJUR 13</option>
        </select>

        <label>DATA</label>
        <input type="date" id="data" onchange="verificarReserva()" required>

        <label>IDENTIFICAÇÃO</label>
        <select id="numCondutor" onchange="verificarReserva()" required>
            <option value="">SELECIONE O NÚMERO</option>
            <option>CONDUTOR 1</option><option>CONDUTOR 2</option><option>CONDUTOR 3</option>
            <option>CONDUTOR 4</option><option>CONDUTOR 5</option><option>CONDUTOR 6</option>
            <option>CONDUTOR 7</option><option>CONDUTOR 8</option><option>CONDUTOR 9</option>
        </select>
        
        <label>NOME DO CONDUTOR</label>
        <select id="nomeCondutor" onchange="verificarReserva()" required>
            <option value="">SELECIONE O NOME</option>
            <option>ADRIANO NASCIMENTO</option>
            <option>FRANCIVALDO COSTA</option>
            <option>JOELCINEI GUIMARÃES</option>
            <option>REGINALDO</option>
            <option>LAFAITE BATISTA</option>
            <option>FRANCINILDO TEXEIRA</option>
            <option>MIRIELLY</option>
            <option>RAIMUNDO WALTER</option>
        </select>

        <label>VEÍCULO</label>
        <input type="text" id="veiculo" readonly>

        <label>PLACA</label>
        <input type="text" id="placa" readonly>

        <label>COR DO SELO</label>
        <select id="corSelo" required>
            <option value="">SELECIONE A COR</option>
            <option value="VERDE">VERDE</option>
            <option value="AMARELO">AMARELO</option>
            <option value="AZUL">AZUL</option>
            <option value="VERMELHO">VERMELHO</option>
        </select>

        <label>KM INICIAL</label>
        <input type="text" id="kmi" inputmode="numeric" placeholder="0.0" oninput="mascaraKM(this)" required>

        <div id="campoFim" class="hidden">
            <label>KM FINAL</label>
            <input type="text" id="kmf" inputmode="numeric" placeholder="0.0" oninput="mascaraKM(this)">
        </div>

        <label>TIPO DE ÓLEO</label>
        <input type="text" id="tipoOleo" placeholder="Ex: 15W40">

        <label>OBSERVAÇÕES / AVARIAS</label>
        <textarea id="obs" rows="3" placeholder="Descreva problemas se houver..."></textarea>

        <button type="button" id="btnAcao" onclick="processar()" class="btn-azul">SALVAR INÍCIO DE TRAJETO</button>
    </form>
</div>

<script>
    function getHoraAtual() {
        const agora = new Date();
        return String(agora.getHours()).padStart(2, '0') + ":" + String(agora.getMinutes()).padStart(2, '0');
    }

    // FUNÇÃO PARA AUTOMATIZAR A DATA
    function setarDataHoje() {
        const hoje = new Date();
        const dia = String(hoje.getDate()).padStart(2, '0');
        const mes = String(hoje.getMonth() + 1).padStart(2, '0');
        const ano = hoje.getFullYear();
        document.getElementById('data').value = `${ano}-${mes}-${dia}`;
    }

    window.onload = function() {
        setarDataHoje();
    };

    function mascaraKM(input) {
        let value = input.value.replace(/\D/g, "");
        if (value.length > 0) {
            value = (parseInt(value) / 10).toFixed(1);
            input.value = value;
        } else { input.value = ""; }
    }

    function verificarReserva() {
        const tag = document.getElementById("tag").value;
        const data = document.getElementById("data").value;
        const numC = document.getElementById("numCondutor").value;
        const nomeC = document.getElementById("nomeCondutor").value;
        const msg = document.getElementById("msgStatus");
        const btn = document.getElementById("btnAcao");

        if (!tag || !data || !numC || !nomeC) return;

        const chaveReserva = `reserva_${tag}_${data}_${numC}`;
        const donoDaReserva = localStorage.getItem(chaveReserva);

        if (donoDaReserva && donoDaReserva !== nomeC) {
            msg.innerText = `⚠ O ${numC} já foi ocupado por ${donoDaReserva} hoje.`;
            msg.className = "status-memoria alerta-erro";
            btn.disabled = true;
            btn.classList.add("btn-bloqueado");
        } else {
            msg.style.display = "none";
            btn.disabled = false;
            btn.classList.remove("btn-bloqueado");
            gerenciarInterface(); // Restaura cor correta
        }
    }

    function gerenciarInterface() {
        var tipo = document.getElementById("tipoLancamento").value;
        var btn = document.getElementById("btnAcao");
        var campoFim = document.getElementById("campoFim");

        if (tipo === "INICIO") {
            btn.innerText = "SALVAR INÍCIO DE TRAJETO";
            btn.className = "btn-azul";
            campoFim.className = "hidden";
        } else {
            btn.innerText = "ENVIAR CHECKLIST COMPLETO";
            btn.className = "btn-verde";
            campoFim.className = "";
            recuperarDados();
        }
        verificarReserva();
    }

    function completar() {
        setarDataHoje();
        var s = document.getElementById("tag");
        var sel = s.options[s.selectedIndex];
        document.getElementById("veiculo").value = sel.getAttribute("data-v") || "";
        document.getElementById("placa").value = sel.getAttribute("data-p") || "";
        verificarReserva();
        if(document.getElementById("tipoLancamento").value === "FIM") recuperarDados();
    }

    function salvarDados() {
        const tag = document.getElementById("tag").value;
        const numC = document.getElementById("numCondutor").value;
        const nomeC = document.getElementById("nomeCondutor").value;
        const data = document.getElementById("data").value;

        if(!tag || !numC || !nomeC || !document.getElementById("kmi").value) {
            alert("Preencha todos os campos!"); return;
        }

        localStorage.setItem(`reserva_${tag}_${data}_${numC}`, nomeC);

        const dados = {
            num: numC, nome: nomeC,
            veiculo: document.getElementById("veiculo").value,
            placa: document.getElementById("placa").value,
            selo: document.getElementById("corSelo").value,
            oleo: document.getElementById("tipoOleo").value,
            obs: document.getElementById("obs").value,
            kmi: document.getElementById("kmi").value,
            horaI: getHoraAtual()
        };
        localStorage.setItem("tjur_temp_" + tag, JSON.stringify(dados));
        alert("✓ INÍCIO SALVO ÀS " + dados.horaI);
    }

    function recuperarDados() {
        var tag = document.getElementById("tag").value;
        var salvo = localStorage.getItem("tjur_temp_" + tag);
        var msg = document.getElementById("msgStatus");
        if (salvo && tag !== "") {
            var d = JSON.parse(salvo);
            document.getElementById("numCondutor").value = d.num;
            document.getElementById("nomeCondutor").value = d.nome;
            document.getElementById("veiculo").value = d.veiculo;
            document.getElementById("placa").value = d.placa;
            document.getElementById("corSelo").value = d.selo;
            document.getElementById("tipoOleo").value = d.oleo;
            document.getElementById("obs").value = d.obs;
            document.getElementById("kmi").value = d.kmi;
            msg.innerText = `✓ DADOS RECUPERADOS (Início às ${d.horaI})`;
            msg.className = "status-memoria alerta-sucesso";
        }
    }

    function processar() {
        if (document.getElementById("tipoLancamento").value === "INICIO") {
            salvarDados();
        } else {
            var kf = parseFloat(document.getElementById("kmf").value);
            var ki = parseFloat(document.getElementById("kmi").value);
            var tag = document.getElementById("tag").value;
            if(!kf) { alert("Preencha o KM FINAL!"); return; }
            var salvo = JSON.parse(localStorage.getItem("tjur_temp_" + tag));
            var percorrido = (kf - ki).toFixed(1);
            var d_format = document.getElementById("data").value.split('-').reverse().join('/');

            var texto = `*_CHECKLIST VEÍCULOS - TELEJUR_*%0A%0A` +
                        `*DATA:* ${d_format}%0A*HORA INÍCIO:* ${salvo.horaI}%0A*HORA FIM:* ${getHoraAtual()}%0A` +
                        `__________________________%0A%0A` +
                        `*ID:* ${document.getElementById("numCondutor").value}%0A*CONDUTOR:* ${document.getElementById("nomeCondutor").value}%0A` +
                        `__________________________%0A%0A` +
                        `*TAG:* ${tag}%0A*VEÍCULO:* ${document.getElementById("veiculo").value}%0A*PLACA:* ${document.getElementById("placa").value}%0A` +
                        `__________________________%0A%0A` +
                        `*COR DO SELO:* ${document.getElementById("corSelo").value}%0A*KM INICIAL:* ${ki.toFixed(1)}%0A*KM FINAL:* ${kf.toFixed(1)}%0A` +
                        `*TOTAL PERCORRIDO:* ${percorrido} KM%0A` +
                        `__________________________%0A%0A` +
                        `*ÓLEO:* ${document.getElementById("tipoOleo").value || "N/I"}%0A*OBS:* ${document.getElementById("obs").value || "SEM OBS"}`;
            
            window.location.href = "https://api.whatsapp.com/send?text=" + encodeURIComponent(texto.replace(/%0A/g, '\n')).replace(/%250A/g, '%0A');
            localStorage.removeItem("tjur_temp_" + tag);
        }
    }
</script>
</body>
</html>
