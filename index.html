<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background-color: #0f172a; color: white; }
    input, select { font-size: 16px !important; }
    .card { background-color: #1e293b; border-radius: 1rem; border: 1px solid #334155; }
  </style>
</head>
<body class="p-3">
  <div class="max-w-md mx-auto">
    
    <div class="text-center py-4">
      <h1 class="text-xl font-bold tracking-tighter text-indigo-400">TELEJUR V22</h1>
      <p class="text-[10px] text-slate-500 uppercase tracking-widest">Saída de Veículo</p>
    </div>

    <form id="formMaster" class="space-y-4">
      <div class="card p-4 space-y-3">
        <div>
          <label class="text-[10px] font-bold text-slate-400 uppercase">Motorista</label>
          <select name="nome" id="nome" onchange="buscarDados()" class="w-full bg-slate-800 p-3 rounded-lg mt-1 border-none outline-none" required>
            <option value="">-- SELECIONE --</option>
            <option value="Adriano Fracivaldo Costa">Adriano Fracivaldo Costa</option>
            <option value="Lafaiete Batista">Lafaiete Batista</option>
            <option value="Reginaldo">Reginaldo</option>
            <option value="Walter Gonçalves">Walter Gonçalves</option>
          </select>
        </div>

        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="text-[10px] font-bold text-slate-400 uppercase">TAG</label>
            <select name="tag" id="tag" onchange="buscarDados()" class="w-full bg-slate-800 p-3 rounded-lg mt-1 border-none outline-none" required>
              <option value="">--</option>
              <option value="TAG-01">01</option>
              <option value="TAG-02">02</option>
              <option value="TAG-03">03</option>
            </select>
          </div>
          <div>
            <label class="text-[10px] font-bold text-slate-400 uppercase">Trajeto</label>
            <input type="text" name="numT" id="numT" class="w-full bg-slate-700 p-3 rounded-lg mt-1 text-yellow-400 font-bold text-center border-none" readonly>
          </div>
        </div>
      </div>

      <div class="card p-4 grid grid-cols-2 gap-4">
        <div>
          <label class="text-[10px] font-bold text-slate-400 uppercase">KM Inicial</label>
          <input type="number" name="kmi" id="kmi" class="w-full bg-transparent border-b-2 border-slate-600 p-1 text-lg outline-none focus:border-indigo-500" required>
        </div>
        <div>
          <label class="text-[10px] font-bold text-slate-400 uppercase">Resta Troca</label>
          <input type="text" id="resta_label" class="w-full bg-transparent border-b-2 border-slate-600 p-1 text-lg text-indigo-300" readonly>
        </div>
      </div>

      <input type="hidden" name="proxOleo" id="proxOleo">
      <input type="hidden" name="placa" id="placa">
      <input type="hidden" name="veiculo" id="veiculo">
      <input type="hidden" name="seloVal" id="seloVal">
      <input type="hidden" name="seloCor" id="seloCor">
      <input type="hidden" name="oleoTipo" id="oleoTipo">
      <input type="hidden" name="data" id="data_form">
      <input type="hidden" name="horaInic" id="hora_form">

      <div class="px-2">
        <label class="text-[10px] font-bold text-slate-400 uppercase">Observação</label>
        <textarea name="obs" class="w-full bg-slate-800 p-3 rounded-lg mt-1 border-none text-sm" rows="2"></textarea>
      </div>

      <button type="submit" id="btn" class="w-full bg-indigo-600 py-4 rounded-xl font-bold text-lg shadow-lg active:scale-95 transition-all">
        REGISTRAR SAÍDA 🚀
      </button>
    </form>
  </div>

  <script>
    function buscarDados() {
      const tag = document.getElementById('tag').value;
      const nome = document.getElementById('nome').value;
      if (tag && nome) {
        const url = `https://script.google.com/macros/s/${SS_ID}/exec?callback=retorno&acao=buscarDadosVei&tag=${tag}&nome=${nome}`;
        // Aqui você usa o método que já tem para chamar o JSONP
        const script = document.createElement('script');
        script.src = url;
        document.body.appendChild(script);
      }
    }

    function retorno(res) {
      document.getElementById('numT').value = res.numT;
      document.getElementById('kmi').value = res.kmi;
      document.getElementById('placa').value = res.placa;
      document.getElementById('veiculo').value = res.veiculo;
      document.getElementById('proxOleo').value = res.proxOleo;
      document.getElementById('seloVal').value = res.seloVal;
      document.getElementById('seloCor').value = res.seloCor;
      document.getElementById('oleoTipo').value = res.oleoTipo;
      
      if(res.proxOleo) {
        document.getElementById('resta_label').value = (res.proxOleo - res.kmi) + " KM";
      }
    }

    document.getElementById('formMaster').onsubmit = function(e) {
      e.preventDefault();
      const agora = new Date();
      document.getElementById('data_form').value = agora.toLocaleDateString('pt-BR');
      document.getElementById('hora_form').value = agora.getHours() + ":" + agora.getMinutes();
      
      const dados = Object.fromEntries(new FormData(this));
      
      google.script.run.withSuccessHandler(res => {
        window.open(res.url, '_blank'); // Abre o WhatsApp
        location.reload();
      }).salvarEEnviarWhats(dados);
    };
  </script>
</body>
</html>
