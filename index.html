<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TELEJUR - CHECKLIST V24</title>
    <style>
        :root { --primary: #1a237e; --success: #25D366; --bg: #f4f7f9; --alert: #d32f2f; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 10px; }
        .card { max-width: 450px; margin: auto; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border-top: 12px solid var(--primary); }
        .header { text-align: center; margin-bottom: 20px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .brand { font-size: 28px; font-weight: 900; color: var(--primary); margin: 0; }
        
        label { font-weight: 700; font-size: 11px; color: #555; display: block; margin-top: 15px; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 14px; margin-top: 6px; border-radius: 10px; border: 2px solid #e0e0e0; font-size: 16px; box-sizing: border-box; }
        
        .readonly { background: #f0f2f5 !important; color: var(--primary); font-weight: bold; border: 1px dashed var(--primary); }
        .destaque-limite { background: #fff9c4 !important; border: 2px solid #fbc02d !important; color: #827717 !important; font-weight: 900; }
        
        .btn { width: 100%; padding: 18px; border: none; border-radius: 12px; font-size: 18px; color: white; font-weight: bold; cursor: pointer; margin-top: 15px; }
        .btn-azul { background: var(--primary); }
        .btn-verde { background: var(--success); }
        
        .status-badge { background: #e8f5e9; color: #2e7d32; padding: 12px; border-radius: 10px; font-weight: bold; margin-bottom: 15px; text-align: center; border: 1px solid #c8e6c9; }
        .alerta-bloqueio { background: #ffebee; color: var(--alert); padding: 15px; border-radius: 10px; border: 1px solid #ffcdd2; font-weight: bold; margin: 10px 0; display: none; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <p class="brand">TELEJUR</p>
        <p style="color: #666; font-size: 11px; font-weight: bold; margin: 0;">ELETROMECÂNICA - GESTÃO DE FROTA</p>
    </div>

    <div id="formContainer">
        <form id="checklistForm">
            <label>DATA</label>
            <input type="text" id="dataAtual" class="readonly" readonly>

            <label>VEÍCULO (TAG)</label>
            <select id="tag" onchange="selecionarVeiculo()">
                <option value="">SELECIONE A TAG</option>
                <option value="TJUR 03" data-v="CAMINHONETE HILUX" data-p="PHG0639">TJUR 03 (HILUX)</option>
                <option value="TJUR 04" data-v="SKY MUNCK" data-p="QFA1I50">TJUR 04 (MUNCK)</option>
                <option value="TJUR 06" data-v="SAVEIRO FURGÃO" data-p="QUJ3E02">TJUR 06 (SAVEIRO)</option>
                <option value="TJUR 07" data-v="SKY MUNCK" data-p="RWR3C75">TJUR 07 (MUNCK)</option>
                <option value="TJUR 08" data-v="CAMINHONETE HILUX" data-p="QVE5H48">TJUR 08 (HILUX)</option>
                <option value="TJUR 09" data-v="SKY MUNCK" data-p="RXC6J04">TJUR 09 (MUNCK)</option>
                <option value="TJUR 10" data-v="CAMINHONETE" data-p="PHU1I37">TJUR 10 (CAMINHONETE)</option>
                <option value="TJUR 13" data-v="CAMINHONETE" data-p="QVD4I38">TJUR 13 (CAMINHONETE)</option>
            </select>

            <label>INFORMAÇÕES DO VEÍCULO</label>
            <input type="text" id="infoVeiculo" class="readonly" readonly placeholder="Veículo / Placa">

            <div id="alertaErro" class="alerta-bloqueio"></div>

            <label>CONDUTOR</label>
            <select id="condutor" onchange="salvarMotorista()">
                <option value="">QUEM ESTÁ DIRIGINDO?</option>
                <option>ADRIANO NASCIMENTO</option><option>FRANCIVALDO COSTA</option>
                <option>FRANCINILDO TEXEIRA</option><option>JOELCINEI GUIMARÃES</option>
                <option>LAFAITE BATISTA</option><option>MIRIELLY</option>
                <option>RAIMUNDO WALTER</option><option>REGINALDO</option>
            </select>

            <label>KM INICIAL (PAINEL)</label>
            <input type="number" id="kmi" placeholder="Ex: 164257" oninput="validarManutencao()">

            <div style="display: flex; gap: 10px;">
                <div style="flex: 1;">
                    <label>COR DO SELO</label>
                    <select id="selo">
                        <option value="">SELECIONE</option>
                        <option>VERDE</option><option>AMARELO</option><option>AZUL</option><option>VERMELHO</option>
                    </select>
                </div>
                <div style="flex: 1;">
                    <label>VALIDADE SELO</label>
                    <input type="date" id="valSelo" onchange="gerarCarencia()">
                </div>
            </div>

            <label>DATA LIMITE (+5 DIAS ÚTEIS)</label>
            <input type="text" id="limite" class="readonly destaque-limite" readonly>

            <div id="campoFinal" class="hidden">
                <hr style="margin-top: 20px; border: 1px solid #eee;">
                <label style="color: var(--alert);">KM FINAL (RETORNO)</label>
                <input type="number" id="kmf" style="border: 2px solid var(--alert);">
                <p style="font-size: 12px; color: #2e7d32; font-weight: bold; text-align: center; margin-top: 10px;">📸 TIRE FOTO DO CHECKLIST FÍSICO!</p>
            </div>

            <label>OBSERVAÇÕES</label>
            <textarea id="obs" rows="2"></textarea>

            <button type="button" id="btnAcao" onclick="registrarInicio()" class="btn btn-azul">SALVAR INÍCIO 🟢</button>
        </form>
    </div>

    <div id="esperaContainer" class="hidden">
        <div class="status-badge">TRAJETO EM ANDAMENTO</div>
        <div id="resumo" style="background: #f8f9fa; padding: 15px; border-radius: 10px; font-size: 14px; line-height: 1.6;"></div>
        <button onclick="enviarZap('INICIO')" class="btn btn-verde">WHATSAPP: INÍCIO</button>
        <button onclick="prepararFim()" class="btn btn-azul">CHEGUEI (FINALIZAR)</button>
    </div>
</div>

<script>
    const HOJE = new Date().toLocaleDateString('pt-BR');
    document.getElementById('dataAtual').value = HOJE;

    function selecionarVeiculo() {
        const sel = document.getElementById("tag");
        const opt = sel.options[sel.selectedIndex];
        if(!opt.value) return;
        document.getElementById("infoVeiculo").value = opt.getAttribute("data-v") + " | " + opt.getAttribute("data-p");
    }

    // GESTÃO: Cálculo de 5 dias úteis (Pequeno porte / Intuitivo)
    function gerarCarencia() {
        const val = document.getElementById("valSelo").value;
        if(!val) return;
        let d = new Date(val + "T12:00:00");
        let dias = 0;
        while(dias < 5) {
            d.setDate(d.getDate() + 1);
            if(d.getDay() !== 0 && d.getDay() !== 6) dias++;
        }
        document.getElementById("limite").value = d.toLocaleDateString('pt-BR');
    }

    function salvarMotorista() { localStorage.setItem("tjur_pref_moto", document.getElementById("condutor").value); }

    function registrarInicio() {
        const d = {
            tag: document.getElementById("tag").value,
            moto: document.getElementById("condutor").value,
            kmi: document.getElementById("kmi").value,
            selo: document.getElementById("selo").value,
            limite: document.getElementById("limite").value,
            horaI: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})
        };
        if(!d.tag || !d.kmi || !d.moto) return alert("Preencha Tag, Nome e KM!");
        
        localStorage.setItem("tjur_trajeto", JSON.stringify(d));
        location.reload();
    }

    function prepararFim() {
        const s = JSON.parse(localStorage.getItem("tjur_trajeto"));
        document.getElementById("esperaContainer").classList.add("hidden");
        document.getElementById("formContainer").classList.remove("hidden");
        document.getElementById("campoFinal").classList.remove("hidden");
        
        // Trava campos
        document.getElementById("tag").value = s.tag; selecionarVeiculo();
        document.getElementById("condutor").value = s.moto;
        document.getElementById("kmi").value = s.kmi;
        
        ["tag", "condutor", "kmi", "selo", "valSelo"].forEach(id => {
            const el = document.getElementById(id);
            el.classList.add("readonly");
            el.style.pointerEvents = "none";
        });

        const btn = document.getElementById("btnAcao");
        btn.innerText = "FINALIZAR TRAJETO ✅";
        btn.className = "btn btn-verde";
        btn.onclick = () => enviarZap('FIM');
    }

    function enviarZap(tipo) {
        const s = JSON.parse(localStorage.getItem("tjur_trajeto"));
        const kmf = document.getElementById("kmf").value;
        let txt = "";
        
        if(tipo === 'INICIO') {
            txt = `*TELEJUR - INÍCIO*\n🚗 *TAG:* ${s.tag}\n👤 *CONDUTOR:* ${s.moto}\n📍 *KM:* ${s.kmi}\n🛡️ *SELO:* ${s.selo}\n📅 *LIMITE:* ${s.limite}`;
        } else {
            if(!kmf) return alert("Coloque o KM FINAL!");
            txt = `*TELEJUR - FINALIZADO*\n🚗 *TAG:* ${s.tag}\n👤 *CONDUTOR:* ${s.moto}\n📍 *KM FINAL:* ${kmf}\n⏰ *FIM:* ${new Date().toLocaleTimeString()}\n📝 *OBS:* ${document.getElementById("obs").value || "Nenhuma"}`;
            localStorage.removeItem("tjur_trajeto");
        }
        window.location.href = "whatsapp://send?text=" + encodeURIComponent(txt);
        if(tipo === 'FIM') setTimeout(() => location.reload(), 2000);
    }

    window.onload = () => {
        const s = localStorage.getItem("tjur_trajeto");
        const pref = localStorage.getItem("tjur_pref_moto");
        if(pref) document.getElementById("condutor").value = pref;
        
        if(s) {
            const d = JSON.parse(s);
            document.getElementById("formContainer").classList.add("hidden");
            document.getElementById("esperaContainer").classList.remove("hidden");
            document.getElementById("resumo").innerHTML = `<b>VEÍCULO:</b> ${d.tag}<br><b>SAÍDA:</b> ${d.horaI}<br><b>KM INICIAL:</b> ${d.kmi}`;
        }
    };
</script>
</body>
</html>
