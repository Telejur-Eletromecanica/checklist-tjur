<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Frota Telejur Intelligence</title>
</head>
<body class="bg-slate-900 pb-10 font-sans text-slate-100">

    <div class="max-w-md mx-auto p-4">
        <header class="py-6 text-center">
            <h1 class="text-2xl font-black tracking-tighter text-blue-400">TELEJUR FROTA</h1>
            <div id="relogio" class="text-[10px] font-mono text-slate-500"></div>
        </header>

        <section class="bg-slate-800 rounded-3xl p-6 shadow-2xl border border-slate-700 space-y-6">
            
            <div>
                <label class="block text-[10px] font-bold text-slate-500 uppercase mb-2">Selecione o Veículo</label>
                <select id="tag_select" onchange="validarTag()" class="w-full bg-slate-900 border-2 border-slate-700 rounded-2xl p-4 font-black text-xl text-white outline-none focus:border-blue-500 transition-all">
                    <option value="" disabled selected>---</option>
                    <option value="TJUR 04">TJUR 04</option>
                    <option value="TJUR 06">TJUR 06</option>
                    <option value="TJUR 07">TJUR 07</option>
                    <option value="TJUR 08">TJUR 08</option>
                    <option value="TJUR 09">TJUR 09</option>
                    <option value="TJUR 10">TJUR 10</option>
                    <option value="TJUR 13">TJUR 13</option>
                </select>
            </div>

            <div id="painel-info" class="grid grid-cols-2 gap-3 hidden">
                <div class="bg-slate-900 p-3 rounded-2xl border border-slate-700">
                    <span class="block text-[8px] font-bold text-slate-500 uppercase">Fila/ID</span>
                    <input type="text" id="id_condutor" readonly class="bg-transparent font-black text-blue-400 outline-none w-full">
                </div>
                <div class="bg-slate-900 p-3 rounded-2xl border border-slate-700">
                    <span class="block text-[8px] font-bold text-slate-500 uppercase">Status</span>
                    <div id="status_tag" class="font-black text-[10px] uppercase mt-1">Verificando...</div>
                </div>
            </div>

            <div>
                <label class="block text-[10px] font-bold text-slate-500 uppercase mb-2">Motorista</label>
                <select id="motorista" class="w-full bg-slate-900 border-2 border-slate-700 rounded-2xl p-4 font-bold text-white outline-none">
                    <option value="" disabled selected>Quem é você?</option>
                    <option value="ADRIANO NASCIMENTO">ADRIANO</option>
                    <option value="FRACIVALDO COSTA">FRACIVALDO</option>
                    <option value="JOELCINEI">JOELCINEI</option>
                </select>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="block text-[10px] font-bold text-slate-500 uppercase mb-2">KM Atual</label>
                    <input type="tel" id="km_atual" oninput="calcularManutencao()" placeholder="0" class="w-full bg-slate-900 border-2 border-slate-700 rounded-2xl p-4 font-black text-white outline-none">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-500 uppercase mb-2">Próx. Troca</label>
                    <input type="tel" id="km_troca" oninput="calcularManutencao()" placeholder="0" class="w-full bg-slate-900 border-2 border-slate-700 rounded-2xl p-4 font-black text-white outline-none">
                </div>
            </div>

            <div id="alerta_troca" class="bg-blue-900/30 p-4 rounded-2xl text-center border border-blue-500/30">
                <span class="text-[9px] font-bold text-blue-400 uppercase">Resíduo de Óleo</span>
                <div id="resta_valor" class="text-xl font-black text-white">--- KM</div>
            </div>

            <div class="space-y-3 pt-4">
                <button id="btn_saida" onclick="enviar('EM TRÂNSITO')" disabled class="w-full bg-green-600 disabled:bg-slate-700 text-white font-black py-5 rounded-2xl shadow-xl uppercase tracking-widest transition-all">Registrar Saída</button>
                <button id="btn_chegada" onclick="enviar('CONCLUÍDO')" disabled class="w-full bg-blue-600 disabled:bg-slate-700 text-white font-black py-5 rounded-2xl shadow-xl uppercase tracking-widest transition-all">Finalizar Trajeto</button>
            </div>

        </section>
    </div>

    <script>
        const scriptURL = "SUA_URL_AQUI";

        async function validarTag() {
            const tag = document.getElementById('tag_select').value;
            const painel = document.getElementById('painel-info');
            const statusTxt = document.getElementById('status_tag');
            
            painel.classList.remove('hidden');
            statusTxt.innerText = "LENDO PLANILHA...";
            statusTxt.className = "font-black text-[10px] uppercase mt-1 text-slate-400";

            try {
                const response = await fetch(`${scriptURL}?acao=checarStatus&tag=${tag}`);
                const data = await response.json();

                document.getElementById('id_condutor').value = data.proximoID;

                if (data.bloqueado) {
                    statusTxt.innerText = "EM TRÂNSITO";
                    statusTxt.className = "font-black text-[10px] uppercase mt-1 text-red-500";
                    document.getElementById('btn_saida').disabled = true;
                    document.getElementById('btn_chegada').disabled = false;
                } else {
                    statusTxt.innerText = "LIBERADO";
                    statusTxt.className = "font-black text-[10px] uppercase mt-1 text-green-500";
                    document.getElementById('btn_saida').disabled = false;
                    document.getElementById('btn_chegada').disabled = true;
                }
            } catch (e) {
                alert("Erro de conexão!");
            }
        }

        function calcularManutencao() {
            const atual = parseInt(document.getElementById('km_atual').value) || 0;
            const troca = parseInt(document.getElementById('km_troca').value) || 0;
            const resta = troca - atual;
            const display = document.getElementById('resta_valor');
            
            if (resta <= 0 && troca > 0) {
                display.innerText = "VENCIDO!";
                display.className = "text-xl font-black text-red-500";
            } else {
                display.innerText = resta + " KM";
                display.className = "text-xl font-black text-white";
            }
        }

        async function enviar(status) {
            const tag = document.getElementById('tag_select').value;
            const motorista = document.getElementById('motorista').value;
            const km = document.getElementById('km_atual').value;
            
            if (!tag || !motorista || !km) return alert("Preencha todos os campos!");

            const btn = event.target;
            btn.innerText = "SALVANDO...";
            btn.disabled = true;

            const payload = {
                status: status,
                data: new Date().toLocaleDateString('pt-BR'),
                tag: tag,
                id_motorista: document.getElementById('id_condutor').value,
                nome: motorista,
                km: km,
                hora: new Date().toLocaleTimeString('pt-BR'),
                resta_troca: document.getElementById('resta_valor').innerText,
                obs: "REGISTRO SISTEMA"
            };

            await fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload)});
            
            alert("Operação realizada com sucesso!");
            location.reload();
        }

        setInterval(() => {
            document.getElementById('relogio').innerText = new Date().toLocaleString();
        }, 1000);
    </script>
</body>
</html>
