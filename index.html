<!DOCTYPE html>
<html>
<head>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 p-4">
  <div class="max-w-2xl mx-auto bg-white p-6 rounded-xl shadow-md">
    <h2 class="text-2xl font-bold mb-6 text-slate-700 border-b pb-2">Checklist de Trajeto</h2>
    
    <form id="formChecklist" class="space-y-4">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-semibold text-gray-600">TagID (Veículo)</label>
          <select name="tag" id="tag" onchange="atualizarTrajeto()" class="w-full p-2.5 border rounded-lg focus:ring-2 focus:ring-blue-500" required>
            <option value="">Selecione a TAG</option>
            <option value="TAG-01">TAG-01</option>
            <option value="TAG-02">TAG-02</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-semibold text-gray-600">Motorista (Nome)</label>
          <select name="nome" id="nome" onchange="atualizarTrajeto()" class="w-full p-2.5 border rounded-lg focus:ring-2 focus:ring-blue-500" required>
            <option value="">Selecione o Condutor</option>
            <option value="João Silva">João Silva</option>
            <option value="Maria Oliveira">Maria Oliveira</option>
          </select>
        </div>
      </div>

      <div class="bg-blue-50 p-3 rounded-lg flex justify-between items-center border border-blue-100">
        <span class="text-blue-700 font-medium">Sequência do Dia:</span>
        <input type="text" id="trajeto_label" class="bg-transparent text-right font-bold text-blue-800 outline-none" readonly value="Selecione TAG e Nome">
      </div>

      <div class="grid grid-cols-2 md:grid-cols-3 gap-4">
        <div>
          <label class="block text-xs font-bold uppercase text-gray-500">KM Inicial</label>
          <input type="number" name="km_inicial" class="w-full p-2 border rounded shadow-sm" required>
        </div>
        <div>
          <label class="block text-xs font-bold uppercase text-gray-500">Hora Início</label>
          <input type="time" name="hora_inicio" class="w-full p-2 border rounded shadow-sm">
        </div>
        <div>
          <label class="block text-xs font-bold uppercase text-gray-500">Resta p/ Troca</label>
          <input type="number" name="resta_troca" class="w-full p-2 border rounded shadow-sm">
        </div>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-semibold text-gray-600">Status Geral</label>
          <select name="status" class="w-full p-2 border rounded-lg">
            <option value="OK">Tudo OK</option>
            <option value="ALERTA">Alerta / Manutenção</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-semibold text-gray-600">Observação</label>
          <input type="text" name="obs" class="w-full p-2 border rounded-lg">
        </div>
      </div>

      <div class="hidden">
        <input type="text" name="placa" value="ABC-1234">
        <input type="text" name="veiculo" value="Modelo do Carro">
      </div>

      <button type="submit" id="btnEnviar" class="w-full bg-blue-600 text-white font-bold py-4 rounded-lg hover:bg-blue-700 transition duration-200">
        SALVAR TRAJETO
      </button>
    </form>
  </div>

  <script>
    function atualizarTrajeto() {
      const tag = document.getElementById('tag').value;
      const nome = document.getElementById('nome').value;
      const display = document.getElementById('trajeto_label');

      if (tag && nome) {
        display.value = "Verificando...";
        google.script.run
          .withSuccessHandler(res => display.value = "Trajeto " + res)
          .getProximoTrajeto(tag, nome);
      }
    }

    document.getElementById('formChecklist').onsubmit = function(e) {
      e.preventDefault();
      const btn = document.getElementById('btnEnviar');
      btn.disabled = true;
      btn.innerText = "Processando...";
      
      const formData = new FormData(this);
      const dados = Object.fromEntries(formData);
      
      google.script.run
        .withSuccessHandler(msg => {
          alert(msg);
          this.reset();
          btn.disabled = false;
          btn.innerText = "SALVAR TRAJETO";
          document.getElementById('trajeto_label').value = "Selecione TAG e Nome";
        })
        .salvarChecklist(dados);
    };
  </script>
</body>
</html>
