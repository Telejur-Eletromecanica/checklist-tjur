<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frota Telejur V22</title>
    <style>
        body { background: #ffffff; color: #222; font-family: sans-serif; padding: 10px; margin: 0; }
        .card { background: white; max-width: 480px; margin: auto; padding: 15px; border: 1px solid #ddd; border-radius: 12px; }
        h2 { text-align: center; color: #1a73e8; font-size: 1.2rem; margin-bottom: 15px; }
        .sec { background: #f1f3f4; padding: 6px; margin: 15px 0 5px 0; border-radius: 4px; font-weight: bold; font-size: 0.75rem; color: #555; text-transform: uppercase; }
        label { font-size: 0.7rem; font-weight: bold; color: #888; display: block; margin-top: 10px; }
        select, input { width: 100%; padding: 12px; margin-top: 4px; border-radius: 8px; border: 1px solid #ccc; font-size: 1rem; box-sizing: border-box; }
        input[readonly] { background: #f8f9fa; color: #444; font-weight: bold; }
        .grid { display: flex; gap: 10px; }
        .col { flex: 1; }
        .btn { width: 100%; padding: 16px; border-radius: 10px; border: none; font-weight: bold; margin-top: 12px; cursor: pointer; color: white; font-size: 1rem; }
        .btn-saida { background: #1a73e8; }
        .btn-chegada { background: #d93025; }
        #statusMsg { text-align: center; color: #1a73e8; font-weight: bold; font-size: 0.85rem; min-height: 1.5rem; }
    </style>
</head>
<body>

<div class="card">
    <h2>TELEJUR - FROTA</h2>
    <div id="statusMsg">Aguardando seleção...</div>

    <form id="formApp">
        <div class="sec">1. Identificação</div>
        <label>Motorista</label>
        <select name="nome" id="nome" onchange="sincronizar()" required>
            <option value="">-- Selecione --</option>
            <option value="ADRIANO NASCIMENTO">ADRIANO NASCIMENTO</option>
            <option value="FRACIVALDO COSTA">FRACIVALDO COSTA</option>
            <option value="LAFAIETE BATISTA">LAFAIETE BATISTA</option>
            <option value="REGINALDO">REGINALDO</option>
            <option value="WALTER GONÇALVES">WALTER GONÇALVES</option>
            <option value="EZEQUEIL SILVA">EZEQUEIL SILVA</option>
        </select>

        <div class="grid">
            <div class="col">
                <label>TAG</label>
                <select name="tag" id="tag" onchange="sincronizar()" required>
                    <option value="">--</option>
                    <option value="TJUR 04">TJUR 04</option>
                    <option value="TJUR 06">TJUR 06</option>
                    <option value="TJUR 07">TJUR 07</option>
                    <option value="TJUR 08">TJUR 08</option>
                    <option value="TJUR 09">TJUR 09</option>
                    <option value="TJUR 10">TJUR 10</option>
                    <option value="TJUR 13">TJUR 13</option>
                </select>
            </div>
            <div class="col">
                <label>ID Sequência</label>
                <input type="text" name="condutorID" id="condutorID" readonly>
            </div>
        </div>

        <div class="sec">2. Dados do Veículo</div>
        <div class="grid">
            <div class="col"><label>Veículo</label><input type="text" name="veiculo" id="veiculo" readonly></div>
            <div class="col"><label>Placa</label><input type="text" name="placa" id="placa" readonly></div>
        </div>

        <div class="grid">
            <div class="col"><label>KM Inicial</label><input type="number" name="kmi" id="kmi" readonly></div>
            <div class="col"><label>KM Final</label><input type="number" name="kmf" id="kmf" placeholder="000000"></div>
        </div>

        <div class="sec">3. Manutenção</div>
        <div class="grid">
            <div class="col"><label>Validade Selo</label><input type="text" id="valSelo" readonly></div>
            <div class="col"><label>Cor do Selo</label><input type="text" id="corSelo" readonly></div>
        </div>
        
        <input type="hidden" name="proxOleo" id="proxOleo">
        <input type="hidden" name="numT" id="numT">
        <label>Observação</label>
        <input type="text" name="obs" id="obs" placeholder="Alguma avaria ou observação?">

        <button type="button" onclick="salvar('SAIDA')" class="btn btn-saida">🚀 INICIAR SAÍDA</button>
        <button type="button" onclick="salvar('CHEGADA')" class="btn btn-chegada">🏁 FINALIZAR CHEGADA</button>
    </form>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbysx-IjZe54SWbmqwl2NYJEx_kiuVtakdtE-GFYE30UxwYYQhcvOuw5DViSwMixS_QIyQ/exec";

    function sincronizar() {
        const tag = document.getElementById('tag').value;
        const nome = document.getElementById('nome').value;
        if(tag && nome) {
            document.getElementById('statusMsg').innerText = "🔄 Sincronizando...";
            const old = document.getElementById('sync-js');
            if(old) old.remove();
            const script = document.createElement('script');
            script.id = 'sync-js';
            script.src = `${SCRIPT_URL}?callback=callbackSync&acao=buscarDadosVei&tag=${encodeURIComponent(tag)}&t=${Date.now()}`;
            document.body.appendChild(script);
        }
    }

    function callbackSync(r) {
        document.getElementById('statusMsg').innerText = "✅ Sincronizado";
        document.getElementById('condutorID').value = r.condutorSugerido;
        document.getElementById('veiculo').value = r.veiculo;
        document.getElementById('placa').value = r.placa;
        document.getElementById('kmi').value = r.kmi;
        document.getElementById('proxOleo').value = r.proxOleo;
        document.getElementById('valSelo').value = r.valSelo;
        document.getElementById('corSelo').value = r.corSelo;
        document.getElementById('numT').value = r.numT;
    }

    function salvar(tipo) {
        const btn = event.target;
        if(tipo === 'CHEGADA' && !document.getElementById('kmf').value) {
            alert("Informe o KM Final!"); return;
        }
        btn.disabled = true;
        const dados = Object.fromEntries(new FormData(document.getElementById('formApp')));
        dados.tipo = tipo;
        dados.data = new Date().toLocaleDateString('pt-BR');
        const hora = new Date().getHours().toString().padStart(2,'0') + ":" + new Date().getMinutes().toString().padStart(2,'0');
        if(tipo === 'SAIDA') dados.horaInic = hora; else dados.horaFim = hora;

        fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(dados) })
        .then(() => { alert("Sucesso!"); location.reload(); })
        .catch(() => { alert("Erro!"); btn.disabled = false; });
    }
</script>
</body>
</html>
