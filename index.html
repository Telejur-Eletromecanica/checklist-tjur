<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TELEJUR - SMART FROTA V46</title>
    <style>
        :root { --primary: #1a237e; --secondary: #303f9f; --success: #25D366; --bg: #f0f4f8; --danger: #d32f2f; --warning: #ffc107; }
        body { font-family: 'Segoe UI', Roboto, sans-serif; background: var(--bg); margin: 0; padding: 15px; color: #333; }
        .card { max-width: 450px; margin: auto; background: white; padding: 25px; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); border-top: 12px solid var(--primary); }
        
        .brand-area { text-align: center; margin-bottom: 20px; }
        .brand { font-size: 32px; font-weight: 900; color: var(--primary); letter-spacing: -1px; margin: 0; }
        .subtitle { font-size: 11px; color: #666; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; }

        .section-title { font-size: 14px; font-weight: 800; color: var(--primary); margin: 25px 0 10px; border-left: 4px solid var(--primary); padding-left: 10px; text-transform: uppercase; }
        
        label { font-weight: 700; font-size: 11px; color: #777; display: block; margin-top: 15px; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 14px; margin-top: 6px; border-radius: 12px; border: 2px solid #edf2f7; font-size: 16px; box-sizing: border-box; transition: 0.2s; background: #fcfdfe; }
        input:focus { border-color: var(--primary); outline: none; background: white; }
        
        .readonly { background: #f1f5f9 !important; color: var(--primary); font-weight: 700; border: 2px solid #e2e8f0; pointer-events: none; }
        .campo-alerta { background: #fffcf0; border: 2px solid var(--warning); color: #856404; font-weight: 800; }

        .banner-checklist { background: #fff4e5; color: #663c00; padding: 15px; border-radius: 15px; border: 1px solid #ffe5cc; margin: 15px 0; font-size: 13px; text-align: center; font-weight: 600; line-height: 1.5; }
        
        .btn { width: 100%; padding: 18px; border: none; border-radius: 15px; font-size: 17px; color: white; font-weight: 800; cursor: pointer; margin-top: 15px; transition: 0.3s; transform: translateY(0); }
        .btn:active { transform: translateY(2px); }
        .btn-azul { background: var(--primary); box-shadow: 0 4px 15px rgba(26,35,126,0.3); }
        .btn-verde { background: var(--success); box-shadow: 0 4px 15px rgba(37,211,102,0.3); }
        
        .msg-validacao { padding: 12px; border-radius: 10px; font-size: 13px; font-weight: 700; margin-top: 15px; display: none; text-align: center; border: 1px solid transparent; }
        .msg-erro { background: #fff5f5; color: #c53030; border-color: #feb2b2; }

        .hidden { display: none; }
        #telaAndamento { text-align: center; }
        .resumo-box { background: #f8fafc; border-radius: 20px; padding: 20px; text-align: left; margin: 20px 0; border: 1px solid #e2e8f0; font-size: 14px; }
    </style>
</head>
<body>

<div class="card">
    <div class="brand-area">
        <div class="brand">TELEJUR</div>
        <div class="subtitle">Logística & Operações</div>
    </div>

    <div id="containerForm">
        <div class="banner-checklist">
            📸 <b>CHECKLIST DO CARRO:</b><br>Não esqueça de registrar as fotos externas antes da saída!
        </div>

        <div class="section-title">Dados do Veículo</div>
        
        <label>TAG Frota</label>
        <select id="tag" onchange="autoPreencherVeiculo(); validarAcesso();">
            <option value="">SELECIONE A TAG</option>
            <option value="TJUR 04" data-v="SKY MUNCK" data-p="QFA1I50">TJUR 04</option>
            <option value="TJUR 06" data-v="SAVEIRO" data-p="QUJ3E02">TJUR 06</option>
            <option value="TJUR 07" data-v="SKY MUNCK" data-p="RWR3C75">TJUR 07</option>
            <option value="TJUR 13" data-v="HILUX" data-p="QVD4I38">TJUR 13</option>
        </select>

        <div style="display:flex; gap:10px;">
            <div style="flex:2"><label>Veículo</label><input type="text" id="v_nome" class="readonly" readonly></div>
            <div style="flex:1"><label>Placa</label><input type="text" id="v_placa" class="readonly" readonly></div>
        </div>

        <div id="statusVinc" class="msg-validacao"></div>

        <div class="section-title">Identificação do Condutor</div>
        
        <div style="display:flex; gap:10px;">
            <div style="flex:1">
                <label>ID</label>
                <select id="idCond" onchange="validarAcesso()">
                    <option value="CONDUTOR 1">01</option>
                    <option value="CONDUTOR 2">02</option>
                    <option value="CONDUTOR 3">03</option>
                </select>
            </div>
            <div style="flex:3">
                <label>Nome Completo</label>
                <input type="text" id="nomeCond" list="listaSugestoes" placeholder="Digite seu nome..." onchange="validarAcesso()">
                <datalist id="listaSugestoes">
                    <option value="ADRIANO NASCIMENTO">
                    <option value="FRANCIVALDO COSTA">
                    <option value="LAFAITE BATISTA">
                    <option value="REGINALDO">
                </datalist>
            </div>
        </div>

        <div class="section-title">Manutenção & Checklist</div>
        
        <div style="display:flex; gap:10px;">
            <div style="flex:1"><label>KM Inicial</label><input type="number" id="kmi" placeholder="00000"></div>
            <div style="flex:1">
                <label>Cor do Selo</label>
                <select id="corSelo">
                    <option value="VERDE">VERDE</option>
                    <option value="AMARELO">AMARELO</option>
                    <option value="AZUL">AZUL</option>
                    <option value="VERMELHO">VERMELHO</option>
                </select>
            </div>
        </div>

        <label>Validade do Selo</label>
        <input type="date" id="valSelo" onchange="calcCarencia()">

        <label>Limite (+5 Dias Úteis)</label>
        <input type="text" id="limiteSelo" class="readonly campo-alerta" readonly placeholder="Calculado automático">

        <div id="blocoFinal" class="hidden">
            <hr style="margin:25px 0; border:0; border-top:1px dashed #ccc;">
            <label style="color:var(--danger)">📍 KM Final (Chegada)</label>
            <input type="number" id="kmf" style="border-color:var(--danger)">
            <label>Observações do Trajeto</label>
            <textarea id="obs" rows="2" placeholder="Alguma avaria ou ocorrência?"></textarea>
        </div>

        <button id="btnAcao" onclick="registrarSaida()" class="btn btn-azul">INICIAR TRAJETO 🟢</button>
    </div>

    <div id="telaAndamento" class="hidden">
        <div style="font-size: 50px; margin-top:20px;">🚚</div>
        <h2 style="color:var(--primary); margin:10px 0;">TRAJETO ATIVO</h2>
        <div id="resumo" class="resumo-box"></div>
        <button onclick="enviarWpp('INICIO')" class="btn btn-verde">NOTIFICAR INÍCIO (WHATSAPP)</button>
        <button onclick="prepararChegada()" class="btn btn-azul" style="background:#444; box-shadow:none;">PREPARAR CHEGADA</button>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbysx-IjZe54SWbmqwl2NYJEx_kiuVtakdtE-GFYE30UxwYYQhcvOuw5DViSwMixS_QIyQ/exec";
    const HOJE = new Date().toLocaleDateString('pt-BR');

    function autoPreencherVeiculo() {
        const sel = document.getElementById("tag");
        const opt = sel.options[sel.selectedIndex];
        document.getElementById("v_nome").value = opt.getAttribute("data-v") || "";
        document.getElementById("v_placa").value = opt.getAttribute("data-p") || "";
    }

    function calcCarencia() {
        const dataInput = document.getElementById("valSelo").value;
        if(!dataInput) return;
        let d = new Date(dataInput + "T12:00:00");
        let uteis = 0;
        while(uteis < 5) {
            d.setDate(d.getDate() + 1);
            if(d.getDay() !== 0 && d.getDay() !== 6) uteis++;
        }
        document.getElementById("limiteSelo").value = d.toLocaleDateString('pt-BR');
    }

    async function validarAcesso() {
        const tag = document.getElementById("tag").value;
        const id = document.getElementById("idCond").value;
        const nome = document.getElementById("nomeCond").value;
        const msg = document.getElementById("statusVinc");
        const btn = document.getElementById("btnAcao");

        if(!tag || !id || !nome) return;
        msg.style.display = "block"; msg.className = "msg-validacao"; msg.innerText = "Sincronizando...";

        try {
            const res = await fetch(`${SCRIPT_URL}?acao=verificar&tag=${tag}&id=${id}&data=${HOJE}`);
            const dono = (await res.text()).trim();
            if(dono !== "livre" && dono !== "" && dono !== nome) {
                msg.classList.add("msg-erro");
                msg.innerHTML = `⚠️ <b>BLOQUEADO:</b> Este ID na ${tag} está com <b>${dono}</b>.`;
                btn.disabled = true;
            } else { msg.style.display = "none"; btn.disabled = false; }
        } catch(e) { msg.style.display = "none"; }
    }

    async function registrarSaida() {
        const d = {
            tag: document.getElementById("tag").value,
            id: document.getElementById("idCond").value,
            nome: document.getElementById("nomeCond").value.toUpperCase(),
            kmi: document.getElementById("kmi").value,
            selo: document.getElementById("corSelo").value,
            valSelo: document.getElementById("valSelo").value,
            limite: document.getElementById("limiteSelo").value,
            horaI: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}),
            data: HOJE,
            v: document.getElementById("v_nome").value,
            p: document.getElementById("v_placa").value
        };

        if(!d.tag || !d.kmi || !d.nome) return alert("Por favor, preencha todos os campos obrigatórios!");

        document.getElementById("btnAcao").innerText = "SALVANDO...";
        await fetch(`${SCRIPT_URL}?acao=registrar&tag=${d.tag}&id=${d.id}&nome=${d.nome}&data=${d.data}&kmi=${d.kmi}&horaI=${d.horaI}`, {mode:'no-cors'});
        localStorage.setItem("tjur_active", JSON.stringify(d));
        location.reload();
    }

    function prepararChegada() {
        const s = JSON.parse(localStorage.getItem("tjur_active"));
        document.getElementById("telaAndamento").classList.add("hidden");
        document.getElementById("containerForm").classList.remove("hidden");
        document.getElementById("blocoFinal").classList.remove("hidden");
        
        document.getElementById("tag").value = s.tag;
        document.getElementById("idCond").value = s.id;
        document.getElementById("nomeCond").value = s.nome;
        document.getElementById("kmi").value = s.kmi;
        document.getElementById("corSelo").value = s.selo;
        document.getElementById("valSelo").value = s.valSelo;
        document.getElementById("limiteSelo").value = s.limite;
        autoPreencherVeiculo();

        ["tag", "idCond", "nomeCond", "kmi", "corSelo", "valSelo"].forEach(id => document.getElementById(id).classList.add("readonly"));
        
        const btn = document.getElementById("btnAcao");
        btn.innerText = "FINALIZAR TRAJETO ✅";
        btn.className = "btn btn-verde";
        btn.onclick = concluir;
    }

    async function concluir() {
        const s = JSON.parse(localStorage.getItem("tjur_active"));
        const kmf = document.getElementById("kmf").value;
        if(!kmf) return alert("O KM Final é obrigatório para encerrar!");

        const dF = {
            ...s,
            kmf: kmf,
            horaF: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}),
            obs: document.getElementById("obs").value || "Nenhuma"
        };

        await fetch(`${SCRIPT_URL}?acao=finalizar&tag=${s.tag}&id=${s.id}&data=${s.data}&kmf=${kmf}&horaF=${dF.horaF}`, {mode:'no-cors'});
        enviarWpp('FIM', dF);
        localStorage.removeItem("tjur_active");
        setTimeout(() => location.reload(), 1500);
    }

    function enviarWpp(tipo, dF = null) {
        const s = dF || JSON.parse(localStorage.getItem("tjur_active"));
        const valF = s.valSelo ? s.valSelo.split('-').reverse().join('/') : "---";
        
        let m = `*CHECKLIST VEÍCULOS - TELEJUR*\n`;
        m += `============================\n`;
        m += `${tipo === 'INICIO' ? '🟢 *INÍCIO DE TRAJETO*' : '✅ *TRAJETO FINALIZADO*'}\n\n`;
        m += `*DATA:* ${s.data}\n`;
        m += `*HORÁRIO:* ${tipo === 'INICIO' ? s.horaI : s.horaI + ' às ' + s.horaF}\n`;
        m += `----------------------------\n`;
        m += `👤 *CONDUTOR:* ${s.nome} (${s.id})\n`;
        m += `🚗 *VEÍCULO:* ${s.v} | *TAG:* ${s.tag}\n`;
        m += `🔢 *PLACA:* ${s.p}\n`;
        m += `📍 *KM:* ${tipo === 'INICIO' ? s.kmi : s.kmi + ' ➔ ' + s.kmf}\n`;
        m += `----------------------------\n`;
        m += `🛡️ *MANUTENÇÃO*\n`;
        m += `*SELO:* ${s.selo}\n`;
        m += `*VALIDADE:* ${valF}\n`;
        m += `*CARÊNCIA:* ${s.limite}\n`;
        if(tipo === 'FIM') m += `\n📝 *OBS:* ${s.obs}`;
        m += `\n============================`;

        window.location.href = `whatsapp://send?text=${encodeURIComponent(m)}`;
    }

    window.onload = () => {
        const active = localStorage.getItem("tjur_active");
        if(active) {
            const d = JSON.parse(active);
            document.getElementById("containerForm").classList.add("hidden");
            document.getElementById("telaAndamento").classList.remove("hidden");
            document.getElementById("resumo").innerHTML = `<b>Veículo:</b> ${d.tag} (${d.p})<br><b>Condutor:</b> ${d.nome}<br><b>Saída:</b> ${d.horaI} | <b>KM:</b> ${d.kmi}`;
        }
    };
</script>
</body>
</html>
