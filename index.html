<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Frota Telejur</title>
</head>
<body class="bg-slate-100 pb-10 font-sans text-slate-800">
    <header class="bg-blue-800 text-white shadow-lg sticky top-0 z-50">
        <div class="p-4 text-center border-b border-blue-700"><h1 class="font-bold text-lg uppercase">Frota Telejur</h1></div>
        <div class="flex justify-around bg-blue-900">
            <button onclick="mudarTela('saida')" id="btn-saida" class="w-1/2 py-3 font-bold text-[10px] border-b-4 border-white">1. SAÍDA</button>
            <button onclick="mudarTela('retorno')" id="btn-retorno" class="w-1/2 py-3 font-bold text-[10px] opacity-60">2. CHEGADA</button>
        </div>
    </header>

    <div class="max-w-md mx-auto p-4 space-y-4">
        <div id="tela-saida" class="space-y-4">
            <section class="bg-white rounded-2xl shadow-sm border p-5 space-y-4">
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">VEÍCULO (TAG)</label>
                    <select id="tag_select" onchange="atualizarVeiculo()" class="w-full border-2 border-blue-50 rounded-xl p-4 font-black text-blue-700 bg-blue-50 outline-none text-lg">
                        <option value="" disabled selected>ESCOLHA A TAG...</option>
                        <option value="TJUR 04">TJUR 04</option><option value="TJUR 06">TJUR 06</option>
                        <option value="TJUR 07">TJUR 07</option><option value="TJUR 08">TJUR 08</option>
                        <option value="TJUR 09">TJUR 09</option><option value="TJUR 10">TJUR 10</option>
                        <option value="TJUR 13">TJUR 13</option>
                    </select>
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <input type="text" id="veiculo_input" readonly placeholder="VEÍCULO" class="bg-slate-50 border p-3 rounded-lg text-xs font-bold text-center uppercase">
                    <input type="text" id="placa_input" readonly placeholder="PLACA" class="bg-slate-50 border p-3 rounded-lg text-xs font-bold text-center uppercase">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">MOTORISTA</label>
                    <select id="nome_condutor" onchange="verificarStatus()" class="w-full border-2 border-slate-100 rounded-xl p-3 text-sm font-bold bg-white">
                        <option value="" disabled selected>Selecione o motorista...</option>
                        <option>ADRIANO NASCIMENTO</option><option>FRACIVALDO COSTA</option><option>JOELCINEI GUIMARÃES</option><option>FRACINILDO TEIXEIRA</option><option>EZEQUIEL SILVA</option><option>REGINALDO PEREIRA</option><option>LAFAIETE BATISTA</option><option>WALTER GONÇALVES</option>
                    </select>
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">IDENTIFICAÇÃO</label>
                    <input type="text" id="id_condutor" readonly class="w-full border-2 border-slate-100 rounded-xl p-3 text-sm font-black bg-slate-50 text-blue-600 text-center uppercase" value="Aguardando Motorista...">
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <div class="col-span-1">
                        <label class="block text-[10px] font-bold text-green-600 uppercase mb-1">KM SAÍDA</label>
                        <input type="tel" id="km_inicial" oninput="calcular()" placeholder="000000" class="w-full border-2 border-green-100 rounded-xl p-3 text-xl font-black text-center">
                    </div>
                    <div class="col-span-1">
                        <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">TIPO ÓLEO</label>
                        <select id="tipo_oleo" class="w-full border-2 border-slate-100 rounded-xl p-3 text-sm font-bold uppercase">
                            <option>5w30</option><option>5w40</option><option>10w40</option><option selected>15w40</option><option>20w50</option>
                        </select>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-2 border-t pt-4">
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">PRÓX. TROCA</label>
                        <input type="tel" id="km_troca" oninput="calcular()" placeholder="000000" class="w-full border-2 border-slate-100 rounded-xl p-3 text-xl font-bold text-center">
                    </div>
                    <div class="flex flex-col justify-end">
                        <div id="res_resta" class="bg-blue-50 border border-blue-100 rounded-xl p-3 text-center text-xs font-black text-blue-500 uppercase">--- KM</div>
                    </div>
                </div>
                <button id="btn_enviar" onclick="enviar('inicio')" disabled class="w-full bg-slate-400 text-white font-black py-5 rounded-xl uppercase text-lg">Registrar Saída</button>
            </section>
        </div>

        <div id="tela-retorno" class="hidden space-y-4">
            <section class="bg-white rounded-2xl shadow-md border p-5 space-y-4">
                <label class="block text-[10px] font-bold text-blue-700 uppercase text-center">KM CHEGADA</label>
                <input type="tel" id="km_final" oninput="calcular()" placeholder="000000" class="w-full border-2 border-blue-100 rounded-xl p-4 text-4xl font-black text-center">
                <div id="res_resta_fim" class="bg-blue-50 p-4 rounded-xl text-center text-xl font-black text-blue-600 uppercase">--- KM</div>
                <textarea id="obs" placeholder="OBSERVAÇÕES..." class="w-full border rounded-xl p-4 text-sm h-32 bg-slate-50 uppercase"></textarea>
                <button id="btn_finalizar" onclick="enviar('fim')" class="w-full bg-blue-800 text-white font-black py-5 rounded-2xl uppercase text-lg">Finalizar Trajeto</button>
            </section>
        </div>
    </div>

    <script>
        const scriptURL = "https://script.google.com/macros/s/AKfycbysx-IjZe54SWbmqwl2NYJEx_kiuVtakdtE-GFYE30UxwYYQhcvOuw5DViSwMixS_QIyQ/exec"; 
        const frota = { "TJUR 04": ["Sky munck", "QFA1I50"], "TJUR 06": ["Saveiro furgão", "QUJ3E02"], "TJUR 07": ["Sky munck", "RWR3C75"], "TJUR 08": ["Caminhonete hilux", "QVE5H48"], "TJUR 09": ["Sky munck", "RXC6J04"], "TJUR 10": ["Caminhonete", "PHU1I37"], "TJUR 13": ["Caminhonete", "QVD4I38"] };

        function mudarTela(t) { 
            document.getElementById('tela-saida').classList.toggle('hidden', t !== 'saida'); 
            document.getElementById('tela-retorno').classList.toggle('hidden', t !== 'retorno'); 
            document.getElementById('btn-saida').classList.toggle('opacity-60', t !== 'saida');
            document.getElementById('btn-retorno').classList.toggle('opacity-60', t !== 'retorno');
        }

        function atualizarVeiculo() {
            const tag = document.getElementById('tag_select').value;
            document.getElementById('veiculo_input').value = frota[tag][0];
            document.getElementById('placa_input').value = frota[tag][1];
            document.getElementById('id_condutor').value = "Selecione o motorista...";
        }

        async function verificarStatus() {
            const tag = document.getElementById('tag_select').value;
            const idCampo = document.getElementById('id_condutor');
            const btn = document.getElementById('btn_enviar');
            if(!tag) { alert("Escolha a TAG primeiro!"); return; }

            idCampo.value = "CHOCANDO DADOS...";
            try {
                const r = await fetch(`${scriptURL}?tag=${encodeURIComponent(tag)}&_=${new Date().getTime()}`);
                const d = await r.json();
                if (d.OCUPADO) {
                    alert(`BLOQUEIO: ${tag} está com ${d.MOTORISTA.toUpperCase()}.`);
                    idCampo.value = "TAG EM USO";
                    idCampo.style.color = "red";
                    btn.disabled = true;
                } else {
                    idCampo.value = d.SUGESTAOID || "Condutor 1";
                    idCampo.style.color = "blue";
                    btn.disabled = false;
                    btn.classList.replace('bg-slate-400', 'bg-green-600');
                }
            } catch (e) { idCampo.value = "ERRO CONEXÃO"; }
        }

        function calcular() {
            const limpar = (id) => parseInt(document.getElementById(id).value.replace(/\D/g, '')) || 0;
            const ref = limpar('km_final') > 0 ? limpar('km_final') : limpar('km_inicial');
            const tro = limpar('km_troca');
            if (ref > 0 && tro > 0) {
                const r = tro - ref; const txt = r <= 0 ? "VENCIDO!" : r + " KM";
                document.getElementById('res_resta').innerText = txt; document.getElementById('res_resta_fim').innerText = txt;
            }
        }

        async function enviar(tipo) {
            const btn = event.target; 
            if(!confirm("Confirmar envio?")) return;
            btn.disabled = true; btn.innerText = "GRAVANDO...";
            const agora = new Date(); const hora = agora.toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'});
            const dados = {
                tipo: tipo, data: agora.toLocaleDateString('pt-BR'), tag: document.getElementById('tag_select').value, 
                id_motorista: document.getElementById('id_condutor').value, nome: document.getElementById('nome_condutor').value.toUpperCase(), 
                km_inicial: document.getElementById('km_inicial').value.replace(/\D/g, ''), km_final: document.getElementById('km_final').value.replace(/\D/g, ''), 
                hora_inicio: tipo === 'inicio' ? hora : "", hora_fim: tipo === 'fim' ? hora : "", 
                veiculo: document.getElementById('veiculo_input').value, placa: document.getElementById('placa_input').value, 
                tipo_oleo: document.getElementById('tipo_oleo').value, prox_oleo: document.getElementById('km_troca').value.replace(/\D/g, ''), 
                resta_troca: document.getElementById('res_resta').innerText, obs: document.getElementById('obs').value.toUpperCase() || "S/O"
            };
            try {
                await fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(dados)});
                const zap = `🚀 *TRAJETO: ${tipo === 'inicio' ? 'SAÍDA' : 'CHEGADA'}*\n👤 *MOTORISTA:* ${dados.nome}\n🆔 *${dados.id_motorista}*\n🏷️ *TAG:* ${dados.tag}\n📍 *KM:* ${tipo === 'inicio' ? dados.km_inicial : dados.km_final}\n⚠️ *RESTA:* ${dados.resta_troca}`;
                window.open(`https://wa.me/5593981162453?text=${encodeURIComponent(zap)}`);
                if(tipo === 'fim') location.reload(); else mudarTela('retorno');
            } catch(e) { alert("Erro!"); btn.disabled = false; }
        }
    </script>
</body>
</html>
