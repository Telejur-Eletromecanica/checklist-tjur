<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TELEJUR v12.1</title>
    <style>
        :root { --primary: #1a237e; --danger: #c62828; --success: #2e7d32; --warning: #ef6c00; }
        body { font-family: sans-serif; background: #f0f4f8; padding: 10px; margin: 0; }
        .card { max-width: 450px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .grid-status { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 15px; }
        .v-box { padding: 8px; border-radius: 8px; text-align: center; font-size: 10px; font-weight: bold; border: 1px solid #ddd; }
        .livre { background: #e8f5e9; color: var(--success); }
        .ocupado { background: #ffebee; color: var(--danger); border-color: var(--danger); }
        .id-badge-container { margin: 10px 0; padding: 10px; background: #fff3e0; border-radius: 8px; border: 1px solid var(--warning); }
        .id-badge { display: inline-block; background: var(--warning); color: white; padding: 2px 8px; border-radius: 12px; font-size: 10px; margin: 2px; font-weight: bold; }
        label { font-weight: bold; font-size: 11px; color: #555; display: block; margin-top: 12px; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 12px; margin-top: 4px; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; box-sizing: border-box; }
        .btn { width: 100%; padding: 18px; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 15px; }
        .btn-azul { background: var(--primary); color: white; }
        .btn-refresh { background: #555; color: white; padding: 6px 10px; font-size: 10px; border-radius: 5px; cursor: pointer; border:none; float: right; margin-left: 5px; }
        .readonly { background: #f1f1f1 !important; color: #444 !important; font-weight: bold; }
        #msgSucesso { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 999; text-align: center; justify-content: center; align-items: center; flex-direction: column; padding: 20px; }
    </style>
</head>
<body>

<div id="msgSucesso">
    <h1 style="font-size:80px; margin:0">✔</h1>
    <h2 style="color:var(--success); text-transform: uppercase;">Checklist Concluído</h2>
    <h3 id="agradecimento" style="color:#555;"></h3>
    <p>Sincronizando com WhatsApp...</p>
</div>

<div class="card">
    <button class="btn-refresh" onclick="sync()">🔄 Atualizar</button>
    <button class="btn-refresh" style="background:var(--danger)" onclick="if(confirm('Limpar dados?')){localStorage.removeItem('trip_v12_1');location.reload();}">🗑️ Reset</button>
    
    <h2 style="text-align:center; color:var(--primary); margin:0;">TELEJUR v12.1</h2>
    <p id="txtSync" style="text-align:center; font-size:10px; color:#888; margin-bottom:10px;">Sincronizando...</p>
    
    <div id="painel" class="grid-status"></div>

    <div id="containerIdsUsados" class="id-badge-container" style="display:none">
        <span style="font-size: 10px; color: var(--warning); font-weight: bold;">FILA DE HOJE:</span><br>
        <div id="listaIdsUsados"></div>
    </div>

    <div id="formContainer">
        <label>Motorista</label>
        <select id="nomeMot" onchange="buscarDados();">
            <option value="">-- SELECIONE --</option>
            <option value="ADRIANO NASCIMENTO">ADRIANO NASCIMENTO</option>
            <option value="FRANCIVALDO COSTA">FRANCIVALDO COSTA</option>
            <option value="FRANCINILDO TEXEIRA">FRANCINILDO TEXEIRA</option>
            <option value="JOELCINEI GUIMARAES">JOELCINEI GUIMARAES</option>
            <option value="MIRIELLY">MIRIELLY</option>
            <option value="REGINALDO">REGINALDO</option>
            <option value="WALTER GONÇALVES">WALTER GONÇALVES</option>
            <option value="LAFAITE BATISTA">LAFAITE BATISTA</option>
            <option value="EZEQUIEL">EZEQUIEL</option>
        </select>

        <label>Veículo (TAG)</label>
        <select id="tag" onchange="buscarDados();">
            <option value="">-- SELECIONE --</option>
            <option value="TJUR 04">TJUR 04</option>
            <option value="TJUR 06">TJUR 06</option>
            <option value="TJUR 07">TJUR 07</option>
            <option value="TJUR 08">TJUR 08</option>
            <option value="TJUR 09">TJUR 09</option>
            <option value="TJUR 10">TJUR 10</option>
            <option value="TJUR 13">TJUR 13</option>
        </select>
        <input type="text" id="veiculoInfo" class="readonly" readonly placeholder="Dados do Veículo">

        <label>Número do Condutor (Fila)</label>
        <input type="text" id="idMot" class="readonly" readonly placeholder="Calculando fila...">

        <label>Cor do Selo</label>
        <select id="corSelo">
            <option value="">-- SELECIONE --</option>
            <option value="VERDE">VERDE</option>
            <option value="VERMELHO">VERMELHO</option>
            <option value="AZUL">AZUL</option>
            <option value="AMARELO">AMARELO</option>
        </select>

        <label>Validade Selo</label>
        <input type="date" id="validadeSelo">

        <label>KM Inicial</label>
        <input type="number" id="kmi">

        <label>Tipo de Óleo</label>
        <select id="tipoOleo">
            <option value="">-- SELECIONE --</option>
            <option value="15W40">15W40</option>
            <option value="5W30">5W30</option>
            <option value="10W40">10W40</option>
            <option value="20W50">20W50</option>
        </select>

        <div id="fimCampos" style="display:none">
            <hr><label style="color:var(--danger)">KM Chegada</label>
            <input type="number" id="kmf">
            <label>Observação</label>
            <textarea id="obs"></textarea>
        </div>

        <button id="btnAcao" onclick="salvarSaida()" class="btn btn-azul">Registrar Saída</button>
    </div>

    <div id="telaAtiva" style="display:none">
        <div id="infoViagem" style="background:#f8f9fa; padding:15px; border-radius:10px; border-left:5px solid var(--primary); margin-bottom:15px"></div>
        <button onclick="enviarWhats(false)" class="btn" style="background:#25D366; color:white">WhatsApp Saída</button>
        <button onclick="prepararFim()" class="btn" style="background:#444; color:white">Finalizar Trajeto</button>
    </div>
</div>

<script>
    const URL = "https://script.google.com/macros/s/AKfycbysx-IjZe54SWbmqwl2NYJEx_kiuVtakdtE-GFYE30UxwYYQhcvOuw5DViSwMixS_QIyQ/exec";
    const dataH = new Date().toLocaleDateString('pt-BR');
    let idsJaUsadosHoje = [];

    function tocarBip() {
        try {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(800, audioCtx.currentTime);
            gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 0.2);
        } catch(e) { console.log("Erro ao tocar bip"); }
    }

    async function sync() {
        return new Promise((resolve) => {
            const s = document.createElement('script');
            window.cb_sync = (res) => {
                idsJaUsadosHoje = res.idsOcupados || [];
                const container = document.getElementById('containerIdsUsados');
                const lista = document.getElementById('listaIdsUsados');
                if(idsJaUsadosHoje.length > 0) {
                    container.style.display = 'block';
                    lista.innerHTML = idsJaUsadosHoje.map(id => `<span class="id-badge">${id}</span>`).join('');
                }
                document.getElementById('txtSync').innerText = "Sincronizado: " + new Date().toLocaleTimeString();
                if(s.parentNode) document.body.removeChild(s);
                resolve();
            };
            s.src = `${URL}?acao=statusGeral&data=${dataH}&callback=cb_sync&_=${new Date().getTime()}`;
            document.body.appendChild(s);
        });
    }

    async function buscarDados() {
        const t = document.getElementById("tag").value, n = document.getElementById("nomeMot").value;
        if(!t || !n) return;
        
        await sync(); 
        const s = document.createElement('script');
        window.cb_mot = (d) => {
            document.getElementById("veiculoInfo").value = `${d.veiculo} | ${d.placa}`;
            let numeros = idsJaUsadosHoje.map(idStr => parseInt(String(idStr).replace(/[^\d]/g, '')) || 0);
            let proxNum = (numeros.length > 0 ? Math.max(...numeros) : 0) + 1;
            document.getElementById("idMot").value = proxNum < 10 ? '0' + proxNum : proxNum;
            if(s.parentNode) document.body.removeChild(s);
        };
        s.src = `${URL}?acao=buscarDadosMotorista&tag=${encodeURIComponent(t)}&nome=${encodeURIComponent(n)}&callback=cb_mot&_=${new Date().getTime()}`;
        document.body.appendChild(s);
    }

    async function salvarSaida() {
        const idSimples = document.getElementById("idMot").value;
        const d = {
            data: dataH, tag: document.getElementById("tag").value, id: idSimples,
            nome: document.getElementById("nomeMot").value, kmi: document.getElementById("kmi").value,
            corSelo: document.getElementById("corSelo").value,
            horaI: new Date().toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'}),
            acao: "registrar", callback: "cb_reg"
        };
        if(!d.tag || !d.nome || !d.kmi) return alert("Preencha os campos obrigatórios!");

        const s = document.createElement('script');
        window.cb_reg = (res) => {
            d.numTrajeto = res.n; d.placa = res.placa; d.veiculo = res.veiculo;
            localStorage.setItem("trip_v12_1", JSON.stringify(d)); 
            location.reload();
        };
        s.src = `${URL}?${new URLSearchParams(d)}`;
        document.body.appendChild(s);
    }

    function prepararFim() {
        const d = JSON.parse(localStorage.getItem("trip_v12_1"));
        document.getElementById("telaAtiva").style.display = "none";
        document.getElementById("formContainer").style.display = "block";
        document.getElementById("fimCampos").style.display = "block";
        document.getElementById("btnAcao").innerText = "Concluir Checklist";
        document.getElementById("btnAcao").onclick = () => {
            const kf = document.getElementById("kmf").value;
            const hF = new Date().toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'});
            const s = document.createElement('script');
            window.cb_fin = (res) => { 
                if(res.res === "fim") {
                    tocarBip();
                    document.getElementById("agradecimento").innerText = "OBRIGADO, " + d.nome.split(' ')[0] + "!";
                    document.getElementById("msgSucesso").style.display = "flex";
                    setTimeout(() => { enviarWhats(true, kf, hF); }, 2500);
                }
            };
            s.src = `${URL}?acao=finalizar&tag=${d.tag}&nome=${encodeURIComponent(d.nome)}&kmf=${kf}&horaF=${hF}&callback=cb_fin`;
            document.body.appendChild(s);
        };
    }

    function enviarWhats(isF, kf, hF) {
        const d = JSON.parse(localStorage.getItem("trip_v12_1"));
        let idWhats = "*ID: CONDUTOR " + d.id + "*";
        let m = isF ? `✅ *CHECKLIST CONCLUÍDO*\n` : `🚀 *SAÍDA REGISTRADA*\n`;
        m += `🆔 ${idWhats}\n👤 *Nome:* ${d.nome}\n🏷️ *Tag:* ${d.tag}\n🚛 *Veículo:* ${d.veiculo}\n`;
        if(isF) {
            m += `🛣️ *KM Final:* ${kf}\n🕒 *Hora:* ${hF}\n`;
            localStorage.removeItem("trip_v12_1");
        }
        window.location.href = `https://wa.me/?text=${encodeURIComponent(m)}`;
        if(isF) setTimeout(() => { location.reload(); }, 2000);
    }

    window.onload = () => { sync(); const s = localStorage.getItem("trip_v12_1"); if(s) { document.getElementById("formContainer").style.display = "none"; document.getElementById("telaAtiva").style.display = "block"; } };
</script>
</body>
</html>
