<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TELEJUR JURUTI v14.0.5 PRO</title>
    <style>
        :root { --primary: #1a237e; --success: #2e7d32; --danger: #c62828; --bg: #f4f7f9; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; padding: 10px; color: #333; }
        .card { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 1px solid #e0e0e0; }
        .header { text-align: center; margin-bottom: 20px; }
        .header h1 { font-size: 20px; color: var(--primary); margin: 0; letter-spacing: 1px; }
        
        .frota-status { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin: 15px 0; }
        .v-box { padding: 10px 2px; border-radius: 8px; text-align: center; font-size: 10px; font-weight: bold; border: 1px solid #ddd; transition: 0.3s; }
        .v-livre { background: #e8f5e9; color: var(--success); }
        .v-trajeto { background: #ffebee; color: var(--danger); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }

        label { font-size: 11px; font-weight: 700; display: block; margin-top: 15px; color: #555; }
        input, select, textarea { width: 100%; padding: 14px; margin-top: 5px; border-radius: 10px; border: 1px solid #ccc; font-size: 16px; box-sizing: border-box; background: #fff; }
        input:read-only { background: #f9f9f9; color: var(--primary); border-color: #eee; }
        
        .btn { width: 100%; padding: 18px; border: none; border-radius: 12px; font-size: 16px; font-weight: 800; color: white; margin-top: 20px; cursor: pointer; text-transform: uppercase; }
        .btn-ini { background: var(--success); box-shadow: 0 4px 15px rgba(46, 125, 50, 0.3); }
        .btn-fim { background: var(--primary); box-shadow: 0 4px 15px rgba(26, 35, 126, 0.3); }
        #msgOleo { font-size: 13px; font-weight: bold; text-align: center; margin-top: 10px; padding: 10px; border-radius: 8px; display: none; }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <h1>TELEJUR JURUTI</h1>
        <div id="syncStatus" style="font-size: 10px; color: #777; margin-top: 5px;">Sincronizando banco de dados...</div>
    </div>

    <div id="painelFrota" class="frota-status"></div>

    <label>Selecione seu Nome</label>
    <select id="nomeMot" onchange="atualizarRegras()">
        <option value="">-- QUEM ESTÁ CONDUZINDO? --</option>
        <option value="ADRIANO NASCIMENTO">ADRIANO NASCIMENTO</option>
        <option value="FRANCIVALDO COSTA">FRANCIVALDO COSTA</option>
        <option value="FRANCINILDO TEXEIRA">FRANCINILDO TEXEIRA</option>
        <option value="JOELCINEI GUIMARAES">JOELCINEI GUIMARAES</option>
        <option value="REGINALDO">REGINALDO</option>
        <option value="WALTER GONÇALVES">WALTER GONÇALVES</option>
        <option value="LAFAITE BATISTA">LAFAITE BATISTA</option>
        <option value="MIRIELLY">MIRIELLY</option>
        <option value="EZEQUIEL">EZEQUIEL</option>
    </select>

    <label>TAG do Veículo</label>
    <select id="tag" onchange="carregarVeiculo()">
        <option value="">-- SELECIONE A TAG --</option>
    </select>

    <div style="display: flex; gap: 8px;">
        <div style="flex: 2;"><label>Veículo</label><input type="text" id="v_nome" readonly></div>
        <div style="flex: 1;"><label>Placa</label><input type="text" id="v_placa" readonly></div>
    </div>

    <label>ID do Condutor</label>
    <input type="text" id="idMot" readonly>

    <label id="lblKm">KM</label>
    <input type="number" id="kmInput" placeholder="Informe o KM atual" oninput="validarOleo()">

    <label id="lblOleo">Próxima Troca de Óleo</label>
    <input type="text" id="oleoInput" oninput="validarOleo()">
    
    <div id="msgOleo"></div>

    <div style="display: flex; gap: 8px;">
        <div style="flex: 1;"><label>Cor Selo</label><select id="corSelo"><option value="VERDE">VERDE</option><option value="VERMELHO">VERMELHO</option></select></div>
        <div style="flex: 1;"><label>Validade</label><input type="date" id="valSelo"></div>
    </div>

    <label>Observações / Avarias</label>
    <textarea id="obs" rows="2" placeholder="Descreva qualquer detalhe..."></textarea>

    <button id="btnAcao" onclick="processarEnvio()" class="btn btn-ini">Aguardando Sincronização...</button>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbysx-IjZe54SWbmqwl2NYJEx_kiuVtakdtE-GFYE30UxwYYQhcvOuw5DViSwMixS_QIyQ/exec";
    const hoje = new Date().toLocaleDateString('pt-BR');
    let db = { ocupados: {}, frota: {}, proximoID: "" };
    let modoAtual = "registrar"; 

    function chamar(p) {
        const s = document.createElement('script');
        s.src = `${SCRIPT_URL}?${new URLSearchParams(p).toString()}`;
        document.body.appendChild(s);
    }

    function sync() {
        chamar({ acao: "statusGeral", data: hoje, callback: "onSync" });
    }

    window.onSync = (r) => {
        db = r;
        document.getElementById('syncStatus').innerText = "✅ Banco de Dados Atualizado: " + new Date().toLocaleTimeString();
        document.getElementById('btnAcao').innerText = "Selecionar Motorista/TAG";
        atualizarRegras();
    }

    function atualizarRegras() {
        const mot = document.getElementById('nomeMot').value;
        const tagSel = document.getElementById('tag');
        const painel = document.getElementById('painelFrota');
        const muncks = ["TJUR 04", "TJUR 07", "TJUR 09"];
        const autorizados = ["LAFAITE BATISTA", "WALTER GONÇALVES", "REGINALDO"];
        
        const valorBackup = tagSel.value;
        tagSel.innerHTML = '<option value="">-- SELECIONE --</option>';
        painel.innerHTML = '';

        Object.keys(db.frota).forEach(t => {
            const isMunck = muncks.includes(t);
            const isAuth = autorizados.includes(mot);
            const ocup = db.ocupados[t];
            const restrito = isMunck && !isAuth && mot !== "";

            let classe = ocup ? "v-trajeto" : (restrito ? "v-box" : "v-livre");
            painel.innerHTML += `<div class="v-box ${classe}">${t}<br>${ocup ? 'EM USO' : (restrito ? 'BLOQUEIO' : 'LIVRE')}</div>`;

            const opt = document.createElement('option');
            opt.value = t;
            opt.text = (restrito ? "🔒 " : (ocup ? "🚩 " : "✅ ")) + t;
            // Bloqueia se for Munck e não autorizado OU se estiver ocupado por OUTRO motorista
            opt.disabled = restrito || (ocup && ocup.nome !== mot && mot !== "");
            tagSel.appendChild(opt);
        });
        tagSel.value = valorBackup;
    }

    function carregarVeiculo() {
        const t = document.getElementById('tag').value;
        const btn = document.getElementById('btnAcao');
        if(!t) return;

        const info = db.frota[t];
        const ocup = db.ocupados[t];

        document.getElementById('v_nome').value = info.v;
        document.getElementById('v_placa').value = info.p;
        
        const inputOleo = document.getElementById('oleoInput');
        inputOleo.type = info.tipo === "DATA" ? "date" : "number";
        document.getElementById('lblOleo').innerText = "Próxima Troca (" + info.tipo + ")";

        if(ocup) {
            // MODO FINALIZAR
            modoAtual = "finalizar";
            document.getElementById('idMot').value = ocup.id;
            document.getElementById('oleoInput').value = ocup.oleo;
            document.getElementById('valSelo').value = ocup.valSelo ? ocup.valSelo.split('T')[0] : "";
            document.getElementById('corSelo').value = ocup.corSelo || "VERDE";
            document.getElementById('lblKm').innerText = "KM FINAL DO TRAJETO";
            document.getElementById('kmInput').value = "";
            btn.innerText = "🏁 FINALIZAR TRAJETO";
            btn.className = "btn btn-fim";
        } else {
            // MODO INICIAR
            modoAtual = "registrar";
            document.getElementById('idMot').value = db.proximoID;
            document.getElementById('oleoInput').value = db.ultimosOleos[t] || "";
            document.getElementById('lblKm').innerText = "KM INICIAL";
            document.getElementById('kmInput').value = "";
            btn.innerText = "✅ INICIAR TRAJETO";
            btn.className = "btn btn-ini";
        }
        validarOleo();
    }

    function validarOleo() {
        const t = document.getElementById('tag').value;
        if(!t || db.frota[t].tipo !== "KM") { document.getElementById('msgOleo').style.display="none"; return; }
        const km = parseInt(document.getElementById('kmInput').value) || 0;
        const prox = parseInt(document.getElementById('oleoInput').value) || 0;
        const msg = document.getElementById('msgOleo');
        if(!prox || !km) { msg.style.display="none"; return; }
        const saldo = prox - km;
        msg.style.display = "block";
        msg.style.background = saldo > 0 ? "#e8f5e9" : "#ffebee";
        msg.style.color = saldo > 0 ? "green" : "red";
        msg.innerText = saldo > 0 ? `Faltam ${saldo.toLocaleString()} KM para a troca` : `ÓLEO VENCIDO há ${Math.abs(saldo).toLocaleString()} KM`;
    }

    function processarEnvio() {
        const t = document.getElementById('tag').value;
        const n = document.getElementById('nomeMot').value;
        const km = document.getElementById('kmInput').value;
        const btn = document.getElementById('btnAcao');

        if(!t || !n || !km) { alert("Preencha Motorista, TAG e KM antes de enviar."); return; }

        btn.disabled = true;
        btn.innerText = "⏳ PROCESSANDO NO GOOGLE...";

        const trajeto = db.ocupados[t] ? db.ocupados[t].trajetoNum : ((db.contagem[t] || 0) + 1 + "º Trajeto");

        const dados = {
            acao: modoAtual, tag: t, nome: n, id: document.getElementById('idMot').value,
            kmi: km, kmf: km, oleo: document.getElementById('oleoInput').value,
            corSelo: document.getElementById('corSelo').value,
            validadeSelo: document.getElementById('valSelo').value,
            obs: document.getElementById('obs').value || "Sem observações",
            data: hoje, trajeto: trajeto,
            horaI: new Date().toLocaleTimeString('pt-BR'), 
            horaF: new Date().toLocaleTimeString('pt-BR'),
            callback: "onFinalizado"
        };

        window.onFinalizado = (r) => {
            if(r.res === "erro") { alert("Erro ao salvar. Verifique sua internet."); btn.disabled = false; return; }
            
            const msgWA = `*CHECKLIST ${modoAtual === 'registrar' ? 'INICIAL' : 'FINAL'}*\n` +
                        `📌 *Trajeto:* ${dados.trajeto}\n` +
                        `👤 *Motorista:* ${n}\n` +
                        `🆔 *ID:* ${dados.id}\n` +
                        `🏷️ *TAG:* ${t}\n` +
                        `🚚 *Veículo:* ${document.getElementById('v_nome').value}\n` +
                        `📏 *KM:* ${km}\n` +
                        `⌛ *Troca Óleo:* ${dados.oleo}\n` +
                        `💡 *Selo:* ${dados.corSelo} (${dados.validadeSelo})\n` +
                        `📝 *Obs:* ${dados.obs}`;

            window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(msgWA)}`);
            setTimeout(() => location.reload(), 2000);
        };
        chamar(dados);
    }
    window.onload = sync;
</script>
</body>
</html>
