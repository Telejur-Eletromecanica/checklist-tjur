<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TELEJUR - V15</title>
    <style>
        body { font-family: sans-serif; background: #e3f2fd; margin: 0; padding: 10px; }
        .card { max-width: 400px; margin: auto; background: white; padding: 20px; border-radius: 15px; border-top: 10px solid #1a237e; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .header-text { text-align: center; margin-bottom: 20px; }
        .brand { font-size: 28px; font-weight: bold; color: #1a237e; letter-spacing: 2px; margin: 0; }
        .subtitle { font-size: 14px; color: #1a237e; font-weight: bold; margin: 0; text-transform: uppercase; }
        h2 { text-align: center; color: #333; font-size: 18px; margin-top: 20px; border-bottom: 2px solid #1a237e; padding-bottom: 10px; }
        label { font-weight: bold; font-size: 11px; color: #555; display: block; margin-top: 12px; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 12px; margin-top: 5px; border-radius: 8px; border: 1px solid #ccc; font-size: 15px; box-sizing: border-box; background: #f9f9f9; }
        .readonly-field { background: #f0f0f0 !important; color: #1a237e; font-weight: bold; border: 1px dashed #1a237e; cursor: not-allowed; }
        .campo-destaque { background: #fff9c4; border: 1px solid #fbc02d; color: #827717; font-weight: bold; }
        .btn-azul { width: 100%; padding: 16px; background: #1a237e; border: none; border-radius: 10px; font-size: 18px; color: white; font-weight: bold; cursor: pointer; margin-top: 20px; }
        .btn-verde { width: 100%; padding: 16px; background: #25D366; border: none; border-radius: 10px; font-size: 18px; color: white; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .alerta-erro { background: #fff3cd; color: #856404; padding: 12px; border-radius: 8px; font-size: 13px; font-weight: bold; margin-top: 15px; border: 1px solid #ffeeba; display: none; text-align: center; }
        .hidden { display: none; }
        #telaEspera { text-align: center; padding: 20px; display: none; }
        .info-trajeto { background: #f8f9fa; border-radius: 10px; padding: 15px; margin: 15px 0; border-left: 5px solid #1a237e; text-align: left; font-size: 13px; line-height: 1.6; }
    </style>
</head>
<body>

<div class="card">
    <div class="header-text">
        <p class="brand">TELEJUR</p>
        <p class="subtitle">ELETROMECÂNICA</p>
    </div>

    <div id="containerForm">
        <h2 id="tituloAcao">CHECKLIST DE VEÍCULO</h2>
        <form id="formChecklist">
            <label>DATA DO CHECKLIST</label>
            <input type="text" id="dataAuto" class="readonly-field" readonly>

            <label>TAG DO VEÍCULO</label>
            <select id="tag" onchange="atualizarInterfacePorTag(); validarVinculoFixo();">
                <option value="">SELECIONE A TAG</option>
                <option value="TJUR 04" data-v="SKY MUNCK" data-p="QFA1I50">TJUR 04</option>
                <option value="TJUR 06" data-v="SAVEIRO FURGÃO" data-p="QUJ3E02">TJUR 06</option>
                <option value="TJUR 07" data-v="SKY MUNCK" data-p="RWR3C75">TJUR 07</option>
                <option value="TJUR 08" data-v="CAMINHONETE HILUX" data-p="QVE5H48">TJUR 08</option>
                <option value="TJUR 09" data-v="SKY MUNCK" data-p="RXC6J04">TJUR 09</option>
                <option value="TJUR 10" data-v="CAMINHONETE" data-p="PHU1I37">TJUR 10</option>
                <option value="TJUR 13" data-v="CAMINHONETE HILUX" data-p="QVD4I38">TJUR 13</option>
            </select>

            <input type="hidden" id="displayVeiculo">
            <input type="hidden" id="displayPlaca">

            <div id="msgErroVinc" class="alerta-erro"></div>

            <label>IDENTIFICAÇÃO (ID)</label>
            <select id="numCondutor" onchange="validarVinculoFixo()">
                <option value="">SELECIONE</option>
                <option value="CONDUTOR 1">CONDUTOR 1</option><option value="CONDUTOR 2">CONDUTOR 2</option>
                <option value="CONDUTOR 3">CONDUTOR 3</option><option value="CONDUTOR 4">CONDUTOR 4</option>
                <option value="CONDUTOR 5">CONDUTOR 5</option><option value="CONDUTOR 6">CONDUTOR 6</option>
                <option value="CONDUTOR 7">CONDUTOR 7</option><option value="CONDUTOR 8">CONDUTOR 8</option>
                <option value="CONDUTOR 9">CONDUTOR 9</option>
            </select>

            <label>NOME DO CONDUTOR</label>
            <select id="nomeCondutor" onchange="validarVinculoFixo()">
                <option value="">SELECIONE</option>
                <option>ADRIANO NASCIMENTO</option><option>FRANCIVALDO COSTA</option>
                <option>FRANCINILDO TEXEIRA</option><option>JOELCINEI GUIMARÃES</option>
                <option>LAFAITE BATISTA</option><option>MIRIELLY</option>
                <option>RAIMUNDO WALTER</option><option>REGINALDO</option>
            </select>

            <label>KM INICIAL</label>
            <input type="number" id="kmi" placeholder="Ex: 149615">

            <label>COR DO SELO</label>
            <select id="corSelo">
                <option value="">SELECIONE</option>
                <option value="VERDE">VERDE</option><option value="AMARELO">AMARELO</option>
                <option value="AZUL">AZUL</option><option value="VERMELHO">VERMELHO</option>
            </select>

            <label>VALIDADE DO SELO</label>
            <input type="date" id="validadeSelo" onchange="calcularDataLimite()">

            <label>DATA LIMITE (+5 DIAS ÚTEIS)</label>
            <input type="text" id="dataLimiteSelo" class="readonly-field campo-destaque" readonly>

            <div id="campoFim" class="hidden">
                <label>KM FINAL</label>
                <input type="number" id="kmf" placeholder="Digite o KM Final">
            </div>

            <div id="blocoOleo">
                <label id="labelTrocaOleo">PRÓXIMA TROCA DE ÓLEO (KM)</label>
                <input type="text" id="proximaTrocaKM" placeholder="Ex: 155000">
                <input type="date" id="proximaTrocaData" class="hidden">
            </div>

            <label>OBSERVAÇÃO</label>
            <textarea id="obs" rows="2"></textarea>

            <button type="button" id="btnAcao" onclick="iniciarTrajeto()" class="btn-azul">SALVAR INÍCIO DE TRAJETO</button>
        </form>
    </div>

    <div id="telaEspera">
        <h3 style="color: #1a237e;">TRAJETO EM ANDAMENTO</h3>
        <div id="resumoTrajeto" class="info-trajeto"></div>
        <button type="button" onclick="enviarRelatorioInicial()" class="btn-verde">ENVIAR INÍCIO NO WHATSAPP</button>
        <button type="button" onclick="irParaFinalizar()" class="btn-azul">FINALIZAR TRAJETO</button>
    </div>
</div>

<script>
    const URL_PLANILHA = "https://script.google.com/macros/s/AKfycbysx-IjZe54SWbmqwl2NYJEx_kiuVtakdtE-GFYE30UxwYYQhcvOuw5DViSwMixS_QIyQ/exec";
    const dataHojeStr = new Date().toLocaleDateString('pt-BR');
    document.getElementById('dataAuto').value = dataHojeStr;

    function calcularDataLimite() {
        const inputData = document.getElementById("validadeSelo").value;
        if (!inputData) return;
        let data = new Date(inputData + "T12:00:00"); 
        let diasUteisAdicionados = 0;
        while (diasUteisAdicionados < 5) {
            data.setDate(data.getDate() + 1);
            if (data.getDay() !== 0 && data.getDay() !== 6) diasUteisAdicionados++;
        }
        document.getElementById("dataLimiteSelo").value = data.toLocaleDateString('pt-BR');
    }

    function atualizarInterfacePorTag() {
        const select = document.getElementById("tag");
        const option = select.options[select.selectedIndex];
        if(!option || !select.value) return;
        document.getElementById("displayVeiculo").value = option.getAttribute("data-v");
        document.getElementById("displayPlaca").value = option.getAttribute("data-p");
        const labelOleo = document.getElementById("labelTrocaOleo");
        if (option.getAttribute("data-v") === "SKY MUNCK") {
            labelOleo.innerText = "PRÓXIMA TROCA DE ÓLEO (DATA)";
            document.getElementById("proximaTrocaKM").classList.add("hidden");
            document.getElementById("proximaTrocaData").classList.remove("hidden");
        } else {
            labelOleo.innerText = "PRÓXIMA TROCA DE ÓLEO (KM)";
            document.getElementById("proximaTrocaKM").classList.remove("hidden");
            document.getElementById("proximaTrocaData").classList.add("hidden");
        }
    }

    async function validarVinculoFixo() {
        const idCond = document.getElementById("numCondutor").value;
        const nome = document.getElementById("nomeCondutor").value;
        const btn = document.getElementById("btnAcao");
        const msg = document.getElementById("msgErroVinc");
        if(!idCond || !nome) return;
        msg.style.display = "block"; msg.innerHTML = "Validando...";
        try {
            const r = await fetch(`${URL_PLANILHA}?acao=verificar&id=${encodeURIComponent(idCond)}&data=${dataHojeStr}`);
            const dono = await r.text();
            if(dono.trim() !== "livre" && dono.trim() !== nome.trim()) {
                msg.innerHTML = `⚠ BLOQUEADO: ${idCond} ocupado por ${dono}`;
                btn.disabled = true; btn.style.opacity = "0.5";
            } else { msg.style.display = "none"; btn.disabled = false; btn.style.opacity = "1"; }
        } catch(e) { msg.style.display = "none"; btn.disabled = false; }
    }

    async function iniciarTrajeto() {
        const tag = document.getElementById("tag").value;
        const kmi = document.getElementById("kmi").value;
        const selo = document.getElementById("corSelo").value;
        if(!tag || !kmi || !selo) { alert("Preencha Tag, KM Inicial e Selo!"); return; }
        const btn = document.getElementById("btnAcao");
        btn.innerText = "SALVANDO..."; btn.disabled = true;

        const d = {
            tag: tag, veiculo: document.getElementById("displayVeiculo").value, placa: document.getElementById("displayPlaca").value,
            num: document.getElementById("numCondutor").value, nome: document.getElementById("nomeCondutor").value, kmi: kmi,
            selo: selo, valSeloF: document.getElementById("validadeSelo").value ? document.getElementById("validadeSelo").value.split('-').reverse().join('/') : "---",
            dataLimite: document.getElementById("dataLimiteSelo").value || "---",
            oleo: document.getElementById("proximaTrocaKM").value || (document.getElementById("proximaTrocaData").value ? document.getElementById("proximaTrocaData").value.split('-').reverse().join('/') : "---"),
            obs: document.getElementById("obs").value, horaI: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}), data: dataHojeStr
        };

        const url = `${URL_PLANILHA}?acao=registrar&data=${encodeURIComponent(d.data)}&tag=${encodeURIComponent(d.tag)}&id=${encodeURIComponent(d.num)}&nome=${encodeURIComponent(d.nome)}&kmi=${encodeURIComponent(d.kmi)}&horaI=${encodeURIComponent(d.horaI)}&selo=${encodeURIComponent(d.selo)}&valSelo=${encodeURIComponent(d.valSeloF)}&limite=${encodeURIComponent(d.dataLimite)}&oleo=${encodeURIComponent(d.oleo)}`;
        await fetch(url, { mode: 'no-cors' });
        localStorage.setItem("tjur_checklist_ativo", JSON.stringify(d));
        location.reload();
    }

    function enviarRelatorioInicial() {
        const d = JSON.parse(localStorage.getItem("tjur_checklist_ativo"));
        const msg = `*CHECKLIST TELEJUR*\n*STATUS:* 🟢 INÍCIO\n*CONDUTOR:* ${d.nome}\n*VEÍCULO:* ${d.tag}\n*KM:* ${d.kmi}`;
        window.location.href = "whatsapp://send?text=" + encodeURIComponent(msg);
    }

    function irParaFinalizar() {
        const s = JSON.parse(localStorage.getItem("tjur_checklist_ativo"));
        document.getElementById("telaEspera").style.display = "none";
        document.getElementById("containerForm").style.display = "block";
        document.getElementById("campoFim").classList.remove("hidden");
        document.getElementById("tag").value = s.tag; 
        document.getElementById("numCondutor").value = s.num;
        document.getElementById("nomeCondutor").value = s.nome;
        document.getElementById("kmi").value = s.kmi;
        const btn = document.getElementById("btnAcao");
        btn.innerText = "FINALIZAR TUDO"; btn.className = "btn-verde";
        btn.onclick = async function() {
            const kmf = document.getElementById("kmf").value;
            if(!kmf) return alert("Informe KM Final!");
            btn.innerText = "GRAVANDO..."; btn.disabled = true;
            const url = `${URL_PLANILHA}?acao=finalizar&tag=${encodeURIComponent(s.tag)}&data=${encodeURIComponent(s.data)}&kmf=${encodeURIComponent(kmf)}&obs=${encodeURIComponent(document.getElementById("obs").value)}`;
            await fetch(url, { mode: 'no-cors' });
            localStorage.removeItem("tjur_checklist_ativo");
            alert("Finalizado!"); location.reload();
        };
    }

    window.onload = function() {
        const s = localStorage.getItem("tjur_checklist_ativo");
        if(s) {
            const d = JSON.parse(s);
            document.getElementById("containerForm").style.display = "none";
            document.getElementById("telaEspera").style.display = "block";
            document.getElementById("resumoTrajeto").innerHTML = `<b>TAG:</b> ${d.tag}<br><b>ID:</b> ${d.num}<br><b>INÍCIO:</b> ${d.horaI}`;
        }
    };
</script>
</body>
</html>
