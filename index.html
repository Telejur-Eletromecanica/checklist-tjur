<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Checklist Frota - Telejur</title>
</head>
<body class="bg-gray-100 pb-10">

    <header class="bg-blue-600 p-4 text-white text-center shadow-md sticky top-0 z-10">
        <h1 class="font-bold text-lg">Checklist de Veículo</h1>
        <p class="text-xs opacity-80 uppercase tracking-widest">Controle de Frota</p>
    </header>

    <div class="max-w-md mx-auto p-4 space-y-4">
        <section class="bg-white rounded-xl shadow-sm p-4 border-t-4 border-blue-500">
            <h2 class="text-blue-600 font-bold mb-3">👤 Identificação</h2>
            <div class="grid grid-cols-2 gap-3">
                <div class="col-span-1">
                    <label class="block text-xs text-gray-500 uppercase font-bold">Data</label>
                    <input type="date" id="data_input" readonly class="w-full bg-gray-100 border border-gray-200 rounded p-2 text-sm outline-none">
                </div>
                <div class="col-span-1">
                    <label class="block text-xs text-gray-500 uppercase font-bold text-blue-600">ID Condutor</label>
                    <select id="id_condutor" class="w-full bg-blue-50 border border-blue-200 rounded p-2 text-sm font-bold">
                        <option value="1">Condutor 1</option>
                        <option value="2">Condutor 2</option>
                        <option value="3">Condutor 3</option>
                        <option value="4">Condutor 4</option>
                        <option value="5">Condutor 5</option>
                        <option value="6">Condutor 6</option>
                        <option value="7">Condutor 7</option>
                        <option value="8">Condutor 8</option>
                        <option value="9">Condutor 9</option>
                        <option value="10">Condutor 10</option>
                    </select>
                </div>
                <div class="col-span-2">
                    <label class="block text-xs text-gray-500 uppercase font-bold">Nome</label>
                    <select id="nome_condutor" class="w-full bg-gray-50 border border-gray-200 rounded p-2 text-sm">
                        <option>ADRIANO NASCIMENTO</option><option>FRACIVALDO COSTA</option><option>JOELCINEI GUIMARÃES</option><option>FRACINILDO TEIXEIRA</option><option>EZEQUIEL SILVA</option><option>REGINALDO PEREIRA</option><option>LAFAIETE BATISTA</option><option>WALTER GONÇALVES</option>
                    </select>
                </div>
                <div class="col-span-2">
                    <label class="block text-xs text-gray-500 uppercase font-bold text-blue-600">TAG</label>
                    <select id="tag_select" onchange="preencherVeiculoPlaca()" class="w-full border-2 border-blue-200 rounded p-2 text-sm font-bold bg-blue-50">
                        <option value="" disabled selected>Selecione a TAG</option>
                        <option value="tjur04">TJUR 04</option><option value="tjur06">TJUR 06</option><option value="tjur07">TJUR 07</option><option value="tjur08">TJUR 08</option><option value="tjur09">TJUR 09</option><option value="tjur10">TJUR 10</option><option value="tjur13">TJUR 13</option>
                    </select>
                </div>
                <div class="col-span-1">
                    <input type="text" id="veiculo_input" readonly placeholder="Veículo" class="w-full bg-gray-100 border p-2 text-xs">
                </div>
                <div class="col-span-1">
                    <input type="text" id="placa_input" readonly placeholder="Placa" class="w-full bg-gray-100 border p-2 text-xs uppercase">
                </div>
            </div>
        </section>

        <section class="bg-white rounded-xl shadow-sm p-4 border-t-4 border-green-500">
            <h2 class="text-green-600 font-bold mb-3">🛣️ Trajeto e KM</h2>
            <div class="grid grid-cols-2 gap-3">
                <div class="col-span-2">
                    <input type="number" id="num_trajeto" placeholder="Nº Trajeto" class="w-full border p-2 text-sm font-bold">
                </div>
                <div>
                    <label class="text-[10px] uppercase font-bold">Hora Início</label>
                    <input type="time" id="hora_inicio_input" class="w-full border p-2 text-sm">
                </div>
                <div>
                    <label class="text-[10px] uppercase font-bold text-blue-600">Hora Fim</label>
                    <input type="time" id="hora_fim" class="w-full border p-2 text-sm bg-blue-50">
                </div>
                <div>
                    <label class="text-[10px] uppercase font-bold">KM Inicial</label>
                    <input type="tel" id="km_inicial" oninput="calcularTroca()" class="w-full border p-2 text-lg font-black text-green-700">
                </div>
                <div>
                    <label class="text-[10px] uppercase font-bold">KM Final</label>
                    <input type="tel" id="km_final" class="w-full border p-2 text-lg font-bold">
                </div>
            </div>
            <button onclick="enviarDados('inicio')" class="mt-4 w-full bg-green-600 text-white font-bold py-3 rounded-lg active:scale-95 transition-all">🟢 INICIAR TRAJETO</button>
        </section>

        <section class="bg-white rounded-xl shadow-sm p-4 border-t-4 border-orange-500">
            <h2 class="text-orange-600 font-bold mb-3">🔧 Manutenção</h2>
            <div class="grid grid-cols-2 gap-3">
                <input type="text" id="tipo_oleo" placeholder="Tipo de Óleo" class="w-full border p-2 text-sm">
                <input type="tel" id="km_troca" oninput="calcularTroca()" placeholder="Próx. Troca" class="w-full border p-2 text-sm font-bold">
                <div id="status_caixa" class="col-span-2 bg-gray-50 p-2 rounded border flex justify-between items-center">
                    <span class="text-[10px] font-bold uppercase">Resta:</span>
                    <span id="resultado_texto" class="text-xl font-black">--- KM</span>
                </div>
                <select id="cor_selo" class="w-full border p-2 text-sm"><option>AZUL</option><option>VERDE</option><option>AMARELO</option><option>VERMELHO</option></select>
                <input type="date" id="validade_selo" class="w-full border p-2 text-sm">
                <textarea id="observacao" placeholder="Observações..." class="col-span-2 border p-2 text-sm"></textarea>
            </div>
        </section>

        <button onclick="enviarDados('fim')" class="w-full bg-blue-700 text-white font-black py-5 rounded-xl shadow-lg active:scale-95 transition-all uppercase">🏁 FINALIZAR E ENVIAR</button>
    </div>

    <script>
        const frota = {
            "tjur04": { v: "SKY MUNCK", p: "QFA1I50" }, "tjur06": { v: "SAVEIRO FURGÃO", p: "QUJ3E02" },
            "tjur07": { v: "SKY MUNCK", p: "RWR3C75" }, "tjur08": { v: "CAMINHONETE HILUX", p: "QVE5H48" },
            "tjur09": { v: "SKY MUNCK", p: "RXC6J04" }, "tjur10": { v: "CAMINHONETE", p: "PHU1I37" },
            "tjur13": { v: "CAMINHONETE", p: "QVD4I38" }
        };

        function preencherVeiculoPlaca() {
            const f = frota[document.getElementById('tag_select').value];
            if(f) { document.getElementById('veiculo_input').value = f.v; document.getElementById('placa_input').value = f.p; }
        }

        function calcularTroca() {
            const ini = parseInt(document.getElementById('km_inicial').value.replace(/\D/g,''));
            const tro = parseInt(document.getElementById('km_troca').value.replace(/\D/g,''));
            const res = document.getElementById('resultado_texto');
            if(!isNaN(ini) && !isNaN(tro)) {
                const r = tro - ini;
                res.innerText = r + " KM";
                res.className = r <= 500 ? "text-xl font-black text-red-600" : "text-xl font-black text-green-600";
            }
        }

        async function enviarDados(tipo) {
            const scriptURL = "https://script.google.com/macros/s/AKfycbysx-IjZe54SWbmqwl2NYJEx_kiuVtakdtE-GFYE30UxwYYQhcvOuw5DViSwMixS_QIyQ/exec";
            const horaFim = (tipo === 'fim') ? new Date().toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'}) : "";
            if(tipo === 'fim') document.getElementById('hora_fim').value = horaFim;

            const dados = {
                tipo: tipo,
                data: document.getElementById('data_input').value,
                tag: document.getElementById('tag_select').value.toUpperCase(),
                id: document.getElementById('id_condutor').value,
                nome: document.getElementById('nome_condutor').value,
                km_inicial: document.getElementById('km_inicial').value,
                hora_inicio: document.getElementById('hora_inicio_input').value,
                hora_fim: horaFim,
                km_final: document.getElementById('km_final').value,
                status: (tipo === 'inicio') ? "EM TRÂNSITO" : "CONCLUÍDO",
                obs: document.getElementById('observacao').value || "S/O",
                prox_oleo: document.getElementById('km_troca').value,
                num_trajeto: document.getElementById('num_trajeto').value,
                placa: document.getElementById('placa_input').value,
                veiculo: document.getElementById('veiculo_input').value,
                val_selo: document.getElementById('validade_selo').value,
                cor_selo: document.getElementById('cor_selo').value,
                tipo_oleo: document.getElementById('tipo_oleo').value,
                resta_troca: document.getElementById('resultado_texto').innerText
            };

            // Envia para Planilha
            fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(dados)});

            // WhatsApp
            const textoZap = `*CONTROLE TELEJUR*\n*Status:* ${dados.status}\n*Motorista:* ${dados.nome}\n*Tag:* ${dados.tag}\n*KM:* ${tipo === 'inicio' ? dados.km_inicial : dados.km_final}`;
            window.open(`https://wa.me/5593981162453?text=${encodeURIComponent(textoZap)}`);
        }

        window.onload = () => {
            document.getElementById('data_input').value = new Date().toISOString().split('T')[0];
            document.getElementById('hora_inicio_input').value = new Date().toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'});
        };
    </script>
</body>
</html>
