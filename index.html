<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checklist Frota V2</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 p-4 font-sans">
    <div class="max-w-md mx-auto bg-white rounded-xl shadow-lg p-6">
        <h2 class="text-2xl font-bold text-blue-700 text-center border-b-2 border-blue-100 pb-3 mb-6">CHECKLIST TELEJUR</h2>
        
        <div id="statusMsg" class="hidden mb-4 p-3 rounded-lg text-sm font-medium text-center"></div>

        <form id="frotaForm" class="space-y-4">
            <div>
                <label class="block text-xs font-bold text-gray-500 uppercase">Motorista</label>
                <select name="nome" id="nome" onchange="sync()" class="w-full p-3 bg-slate-50 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" required>
                    <option value="">-- Selecione --</option>
                    <option value="ADRIANO NASCIMENTO">ADRIANO NASCIMENTO</option>
                    <option value="FRACIVALDO COSTA">FRACIVALDO COSTA</option>
                    <option value="REGINALDO">REGINALDO</option>
                </select>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase">TAG</label>
                    <select name="tag" id="tag" onchange="sync()" class="w-full p-3 bg-slate-50 border rounded-lg outline-none" required>
                        <option value="">--</option>
                        <option value="TJUR 04">TJUR 04</option>
                        <option value="TJUR 13">TJUR 13</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase">ID Seq.</label>
                    <input type="text" name="condutorID" id="condutorID" class="w-full p-3 bg-gray-100 border rounded-lg text-gray-600" readonly>
                </div>
            </div>

            <div id="detalhes" class="hidden space-y-4 border-t pt-4">
                <div class="bg-blue-50 p-3 rounded-lg">
                    <p class="text-xs text-blue-600 font-bold uppercase">Veículo Identificado</p>
                    <p id="txtVeiculo" class="text-lg font-bold text-slate-800"></p>
                    <p id="txtPlaca" class="text-sm text-slate-500"></p>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase">KM Inicial</label>
                        <input type="number" name="kmi" id="kmi" class="w-full p-3 bg-gray-100 border rounded-lg" readonly>
                    </div>
                    <div id="boxKMFinal" class="hidden">
                        <label class="block text-xs font-bold text-blue-600 uppercase">KM Final</label>
                        <input type="number" name="kmf" id="kmf" class="w-full p-3 border-2 border-blue-400 rounded-lg">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase">Observação</label>
                    <input type="text" name="obs" id="obs" value="S/O" class="w-full p-3 bg-slate-50 border rounded-lg">
                </div>

                <button type="button" id="btnAcao" onclick="salvar()" class="w-full py-4 rounded-xl font-bold text-white transition-all transform active:scale-95 shadow-md"></button>
            </div>
        </form>
    </div>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbysx-IjZe54SWbmqwl2NYJEx_kiuVtakdtE-GFYE30UxwYYQhcvOuw5DViSwMixS_QIyQ/exec";
        let modoAtual = "SAIDA";

        function sync() {
            const tag = document.getElementById('tag').value, nome = document.getElementById('nome').value;
            if(!tag || !nome) return;
            
            showMsg("⏳ Sincronizando...", "bg-amber-100 text-amber-700");
            const s = document.createElement('script');
            s.src = `${API}?callback=render&acao=buscarDadosVei&tag=${encodeURIComponent(tag)}&nome=${encodeURIComponent(nome)}&t=${Date.now()}`;
            document.body.appendChild(s);
        }

        function render(r) {
            if(r.bloqueado) return showMsg(r.msg, "bg-red-100 text-red-700");
            
            document.getElementById('detalhes').classList.remove('hidden');
            document.getElementById('txtVeiculo').innerText = r.veiculo;
            document.getElementById('txtPlaca').innerText = r.placa;
            document.getElementById('kmi').value = r.kmi;
            document.getElementById('condutorID').value = r.condutorID;
            modoAtual = r.modo;

            const btn = document.getElementById('btnAcao');
            if(modoAtual === "SAIDA") {
                btn.innerText = "🚀 REGISTRAR SAÍDA";
                btn.className = "w-full py-4 rounded-xl font-bold text-white bg-blue-600 hover:bg-blue-700";
                document.getElementById('boxKMFinal').classList.add('hidden');
            } else {
                btn.innerText = "🏁 REGISTRAR CHEGADA";
                btn.className = "w-full py-4 rounded-xl font-bold text-white bg-red-600 hover:bg-red-700";
                document.getElementById('boxKMFinal').classList.remove('hidden');
            }
            showMsg(`Modo ${modoAtual} Ativo`, "bg-green-100 text-green-700");
            
            // Salva dados ocultos para o POST
            window.dadosVei = r;
        }

        async function salvar() {
            const btn = document.getElementById('btnAcao');
            if(modoAtual === "CHEGADA" && !document.getElementById('kmf').value) return alert("Informe o KM Final!");
            
            btn.disabled = true; btn.innerText = "💾 GRAVANDO...";
            
            const fd = new FormData(document.getElementById('frotaForm'));
            const data = Object.fromEntries(fd);
            data.tipo = modoAtual;
            data.data = new Date().toLocaleDateString('pt-BR');
            const hora = new Date().toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'});
            
            if(modoAtual === "SAIDA") data.horaInic = hora; else data.horaFim = hora;
            // Mescla dados do veículo vindo do sync
            Object.assign(data, window.dadosVei);

            try {
                const resp = await fetch(API, { method: 'POST', body: JSON.stringify(data) });
                if(resp.ok) {
                    const km = modoAtual === "SAIDA" ? data.kmi : data.kmf;
                    const resta = parseInt(data.proxOleo.toString().replace(/\D/g,'')) - km;
                    let txt = `📋 *CHECKLIST TELEJUR - ${modoAtual}*\n---\n👤 *Motorista:* ${data.nome}\n🚗 *Veículo:* ${data.veiculo}\n🏷️ *Tag:* ${data.tag}\n🆔 *ID:* ${data.condutorID}\n🛣️ *KM:* ${km}\n🛢️ *Resta:* ${resta} KM\n💬 *Obs:* ${data.obs}`;
                    window.open(`https://api.whatsapp.com/send?phone=5593981162453&text=${encodeURIComponent(txt)}`, '_blank');
                    location.reload();
                }
            } catch (e) {
                alert("Erro ao salvar! Tente novamente.");
                btn.disabled = false; btn.innerText = "TENTAR NOVAMENTE";
            }
        }

        function showMsg(m, c) {
            const el = document.getElementById('statusMsg');
            el.className = `mb-4 p-3 rounded-lg text-sm font-medium text-center ${c}`;
            el.innerText = m; el.classList.remove('hidden');
        }
    </script>
</body>
</html>
