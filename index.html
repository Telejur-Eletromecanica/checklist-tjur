<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checklist Telejur V21</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .readonly-field { background-color: #f3f4f6; color: #6b7280; border-color: #d1d5db; }
        .hidden { display: none; }
        #confirmacaoOverlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:1000; justify-content:center; align-items:center; flex-direction:column; color:white; }
    </style>
</head>
<body class="bg-gray-100 p-4">

    <div id="confirmacaoOverlay">
        <div class="text-6xl mb-4">✅</div>
        <div id="msgConfirmacao" class="text-xl font-bold">Salvo com Sucesso!</div>
    </div>

    <div class="max-w-md mx-auto bg-white rounded-xl shadow-md overflow-hidden p-6">
        <h1 class="text-2xl font-bold text-center mb-6 text-blue-800">CHECKLIST TELEJUR</h1>

        <div id="telaEspera" class="hidden text-center p-6 border-2 border-dashed border-blue-300 rounded-lg">
            <h2 class="text-xl font-bold text-blue-600 mb-4">TRAJETO EM ANDAMENTO</h2>
            <div id="resumoTrajeto" class="text-sm text-gray-700 mb-6 bg-gray-50 p-3 rounded text-left"></div>
            <button onclick="enviarRelatorioInicial()" class="w-full bg-blue-500 text-white font-bold py-3 rounded-lg mb-3 shadow-md">📤 REENVIAR WHATSAPP (INÍCIO)</button>
            <button onclick="irParaFinalizar()" class="w-full bg-green-600 text-white font-bold py-4 rounded-lg shadow-lg text-lg">🏁 FINALIZAR TRAJETO</button>
        </div>

        <form id="containerForm" onsubmit="event.preventDefault();">
            
            <div class="mb-4">
                <label class="block text-gray-700 font-bold mb-2 text-sm">TAG DO VEÍCULO:</label>
                <select id="tag" onchange="atualizarInterfacePorTag(); validarVinculoFixo();" class="w-full border rounded-lg p-3 bg-white shadow-sm border-blue-200 focus:ring-2 focus:ring-blue-500">
                    <option value="">Selecione a TAG</option>
                    <option value="T-01" data-v="CHEVROLET ONIX" data-p="ABC-1234">T-01 - ONIX</option>
                    <option value="T-02" data-v="FIAT STRADA" data-p="DEF-5678">T-02 - STRADA</option>
                    <option value="T-03" data-v="SKY MUNCK" data-p="GHI-9012">T-03 - SKY MUNCK</option>
                </select>
            </div>

            <div class="grid grid-cols-2 gap-4 mb-4">
                <div>
                    <label class="block text-gray-700 text-xs font-bold">VEÍCULO:</label>
                    <input type="text" id="displayVeiculo" readonly class="w-full border rounded-lg p-2 bg-gray-100 text-sm font-semibold uppercase">
                </div>
                <div>
                    <label class="block text-gray-700 text-xs font-bold">PLACA:</label>
                    <input type="text" id="displayPlaca" readonly class="w-full border rounded-lg p-2 bg-gray-100 text-sm font-semibold uppercase">
                </div>
            </div>

            <div class="mb-4 p-3 bg-blue-50 rounded-lg border border-blue-100">
                <label class="block text-gray-700 font-bold mb-2 text-sm">IDENTIFICAÇÃO DO CONDUTOR:</label>
                <div class="flex gap-2">
                    <input type="number" id="numCondutor" placeholder="ID" onblur="validarVinculoFixo()" class="w-1/4 border rounded-lg p-3 text-center font-bold border-blue-300">
                    <input type="text" id="nomeCondutor" placeholder="NOME COMPLETO" class="w-3/4 border rounded-lg p-3 uppercase border-blue-300">
                </div>
                <div id="msgErroVinc" class="text-red-600 text-xs mt-2 font-bold hidden"></div>
            </div>

            <div class="mb-4">
                <label class="block text-gray-700 font-bold mb-1 text-sm">KM INICIAL:</label>
                <input type="number" id="kmi" class="w-full border rounded-lg p-3 border-blue-200 shadow-sm" placeholder="Ex: 12540">
            </div>

            <div class="mb-4 p-3 bg-yellow-50 rounded-lg border border-yellow-200">
                <label id="labelTrocaOleo" class="block text-gray-800 font-bold mb-1 text-xs">PRÓXIMA TROCA DE ÓLEO (KM)</label>
                <input type="number" id="proximaTrocaKM" class="w-full border rounded-lg p-2 border-yellow-400" placeholder="Ex: 20000">
                <input type="date" id="proximaTrocaData" class="w-full border rounded-lg p-2 border-yellow-400 hidden">
            </div>

            <div class="grid grid-cols-2 gap-4 mb-4">
                <div>
                    <label class="block text-gray-700 font-bold mb-1 text-xs text-red-600">COR DO SELO:</label>
                    <select id="corSelo" class="w-full border rounded-lg p-3 border-red-200 font-bold">
                        <option value="">Selecione</option>
                        <option value="AZUL">AZUL</option>
                        <option value="VERMELHO">VERMELHO</option>
                        <option value="VERDE">VERDE</option>
                        <option value="AMARELO">AMARELO</option>
                    </select>
                </div>
                <div>
                    <label class="block text-gray-700 font-bold mb-1 text-xs">VALIDADE SELO:</label>
                    <input type="date" id="validadeSelo" onchange="calcularDataLimite()" class="w-full border rounded-lg p-3 border-blue-200">
                </div>
            </div>

            <input type="hidden" id="dataLimiteSelo">
            <input type="hidden" id="dataAuto">

            <div id="campoFim" class="hidden mt-6 pt-6 border-t-4 border-green-500">
                <div class="mb-4">
                    <label class="block text-green-700 font-bold mb-1">KM FINAL:</label>
                    <input type="number" id="kmf" class="w-full border-2 border-green-500 rounded-lg p-4 text-xl font-bold shadow-lg" placeholder="KM de Chegada">
                </div>
                <div id="avisoFoto" class="bg-orange-100 text-orange-800 p-3 rounded mb-4 text-xs text-center border border-orange-200"></div>
            </div>

            <div class="mb-4">
                <label class="block text-gray-700 font-bold mb-1 text-sm">OBSERVAÇÕES:</label>
                <textarea id="obs" rows="2" class="w-full border rounded-lg p-2 text-sm border-blue-200" placeholder="Alguma avaria ou observação?"></textarea>
            </div>

            <button id="btnAcao" onclick="iniciarTrajeto()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-lg shadow-lg text-lg transition-all">INICIAR TRAJETO</button>
        </form>
    </div>

    <script>
        const URL_PLANILHA = "SUA_NOVA_URL_DO_GOOGLE_SCRIPT_AQUI"; // <--- COLOQUE SUA URL AQUI
        const dataHojeStr = new Date().toLocaleDateString('pt-BR');

        window.onload = function() {
            document.getElementById('dataAuto').value = dataHojeStr;
            const salvo = localStorage.getItem("tjur_checklist_ativo");
            if(salvo) {
                const d = JSON.parse(salvo);
                document.getElementById("containerForm").classList.add("hidden");
                document.getElementById("telaEspera").classList.remove("hidden");
                document.getElementById("resumoTrajeto").innerHTML = `<b>TAG:</b> ${d.tag} | <b>ID:</b> ${d.num}<br><b>VEÍCULO:</b> ${d.veiculo}<br><b>INÍCIO:</b> ${d.horaI}`;
            }
        };

        function atualizarInterfacePorTag() {
            const select = document.getElementById("tag");
            const opt = select.options[select.selectedIndex];
            if(!opt.value) return;
            document.getElementById("displayVeiculo").value = opt.getAttribute("data-v");
            document.getElementById("displayPlaca").value = opt.getAttribute("data-p");
            
            const isMunck = opt.getAttribute("data-v") === "SKY MUNCK";
            document.getElementById("labelTrocaOleo").innerText = isMunck ? "PRÓXIMA TROCA DE ÓLEO (DATA)" : "PRÓXIMA TROCA DE ÓLEO (KM)";
            document.getElementById("proximaTrocaKM").classList.toggle("hidden", isMunck);
            document.getElementById("proximaTrocaData").classList.toggle("hidden", !isMunck);
        }

        async function validarVinculoFixo() {
            const tag = document.getElementById("tag").value;
            const idC = document.getElementById("numCondutor").value;
            if(!tag || !idC) return;
            try {
                const r = await fetch(`${URL_PLANILHA}?acao=verificar&tag=${tag}&id=${idC}&data=${dataHojeStr}`);
                const dono = await r.text();
                const msg = document.getElementById("msgErroVinc");
                if(dono !== "livre" && dono !== document.getElementById("nomeCondutor").value) {
                    msg.innerHTML = `⚠ TAG ${tag} ocupada por ${dono}!`;
                    msg.classList.remove("hidden");
                    document.getElementById("btnAcao").disabled = true;
                } else {
                    msg.classList.add("hidden");
                    document.getElementById("btnAcao").disabled = false;
                }
            } catch(e) {}
        }

        async function iniciarTrajeto() {
            const tag = document.getElementById("tag").value;
            const kmi = document.getElementById("kmi").value;
            const idC = document.getElementById("numCondutor").value;
            if(!tag || !kmi || !idC) { alert("Preencha TAG, ID e KM Inicial!"); return; }

            const campoKM = document.getElementById("proximaTrocaKM");
            const campoData = document.getElementById("proximaTrocaData");
            let oleo = !campoKM.classList.contains("hidden") ? (campoKM.value ? campoKM.value + " KM" : "---") : (campoData.value ? campoData.value.split('-').reverse().join('/') : "---");

            const d = {
                tag, kmi, oleo,
                num: idC,
                nome: document.getElementById("nomeCondutor").value.toUpperCase(),
                veiculo: document.getElementById("displayVeiculo").value,
                placa: document.getElementById("displayPlaca").value,
                selo: document.getElementById("corSelo").value,
                valSeloRaw: document.getElementById("validadeSelo").value,
                valSeloF: document.getElementById("validadeSelo").value ? document.getElementById("validadeSelo").value.split('-').reverse().join('/') : "---",
                dataLimite: document.getElementById("dataLimiteSelo").value || "---",
                obs: document.getElementById("obs").value,
                horaI: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}),
                data: dataHojeStr
            };

            const query = new URLSearchParams({ acao:"registrar", ...d });
            try {
                await fetch(`${URL_PLANILHA}?${query.toString()}`, {mode:'no-cors'});
                localStorage.setItem("tjur_checklist_ativo", JSON.stringify(d));
                mostrarSucesso("Iniciado!", () => location.reload());
            } catch(e) { alert("Erro de conexão!"); }
        }

        function irParaFinalizar() {
            const d = JSON.parse(localStorage.getItem("tjur_checklist_ativo"));
            document.getElementById("telaEspera").classList.add("hidden");
            document.getElementById("containerForm").classList.remove("hidden");
            document.getElementById("campoFim").classList.remove("hidden");
            
            // Preenche e Bloqueia
            document.getElementById("obs").value = d.obs || "";
            ["tag", "numCondutor", "nomeCondutor", "corSelo", "kmi", "validadeSelo"].forEach(id => {
                const el = document.getElementById(id);
                if(id === "validadeSelo") el.value = d.valSeloRaw;
                else if(id === "numCondutor") el.value = d.num;
                else if(id === "nomeCondutor") el.value = d.nome;
                else if(id === "corSelo") el.value = d.selo;
                else el.value = d[id];
                el.classList.add("readonly-field");
                el.style.pointerEvents = "none";
            });

            // Mostra o Óleo que foi salvo no início
            const campoKM = document.getElementById("proximaTrocaKM");
            const campoData = document.getElementById("proximaTrocaData");
            if(d.oleo.includes("KM")) {
                campoKM.value = d.oleo.replace(" KM", "");
                campoKM.classList.remove("hidden");
            } else if(d.oleo !== "---") {
                campoData.value = d.oleo.split('/').reverse().join('-');
                campoData.classList.remove("hidden");
            }

            const btn = document.getElementById("btnAcao");
            btn.innerText = "FINALIZAR E ENVIAR WHATSAPP";
            btn.className = "w-full bg-green-600 text-white font-bold py-4 rounded-lg shadow-lg text-lg";
            btn.onclick = async function() {
                const kmf = document.getElementById("kmf").value;
                if(!kmf) { alert("Informe o KM Final!"); return; }
                const hF = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
                
                // Recaptura óleo caso tenha sido editado
                let oleoFinal = !campoKM.classList.contains("hidden") ? (campoKM.value + " KM") : (campoData.value ? campoData.value.split('-').reverse().join('/') : d.oleo);
                const obsFinal = document.getElementById("obs").value;

                const params = new URLSearchParams({ acao:"finalizar", data:d.data, tag:d.tag, id:d.num, horaF:hF, kmf, oleo:oleoFinal, obs:obsFinal });
                const msg = `*CHECKLIST - FINALIZADO*\n*CONDUTOR:* ${d.nome}\n*TAG:* ${d.tag}\n*KM INICIAL:* ${d.kmi}\n*KM FINAL:* ${kmf}\n*ÓLEO:* ${oleoFinal}\n*OBS:* ${obsFinal}`;

                try {
                    await fetch(`${URL_PLANILHA}?${params.toString()}`, {mode:'no-cors'});
                    localStorage.removeItem("tjur_checklist_ativo");
                    mostrarSucesso("Finalizado!", () => {
                        window.location.href = "whatsapp://send?text=" + encodeURIComponent(msg);
                    });
                } catch(e) { alert("Erro ao finalizar!"); }
            };
        }

        function mostrarSucesso(msg, cb) {
            document.getElementById("msgConfirmacao").innerText = msg;
            document.getElementById("confirmacaoOverlay").style.display = "flex";
            setTimeout(() => { document.getElementById("confirmacaoOverlay").style.display = "none"; cb(); }, 1500);
        }

        function calcularDataLimite() {
            const val = document.getElementById("validadeSelo").value;
            if(!val) return;
            let d = new Date(val + "T12:00:00");
            let add = 0;
            while(add < 5) { d.setDate(d.getDate()+1); if(d.getDay()!==0 && d.getDay()!==6) add++; }
            document.getElementById("dataLimiteSelo").value = d.toLocaleDateString('pt-BR');
        }

        function enviarRelatorioInicial() {
            const d = JSON.parse(localStorage.getItem("tjur_checklist_ativo"));
            const msg = `*CHECKLIST - EM ANDAMENTO*\n*CONDUTOR:* ${d.nome}\n*TAG:* ${d.tag}\n*KM INICIAL:* ${d.kmi}\n*ÓLEO:* ${d.oleo}`;
            window.location.href = "whatsapp://send?text=" + encodeURIComponent(msg);
        }
    </script>
</body>
</html>
