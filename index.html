<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TELEJUR v10.7</title>
    <style>
        /* CONFIGURAГҮГ•ES VISUAIS */
        :root { --primary: #1a237e; --danger: #c62828; --success: #2e7d32; --warning: #fbc02d; }
        body { font-family: sans-serif; background: #f0f4f8; padding: 10px; margin: 0; }
        .card { max-width: 450px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .grid-status { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 15px; }
        .v-box { padding: 8px; border-radius: 8px; text-align: center; font-size: 10px; font-weight: bold; border: 1px solid #ddd; }
        .livre { background: #e8f5e9; color: var(--success); }
        .ocupado { background: #ffebee; color: var(--danger); border-color: var(--danger); }
        .bloqueado { background: #f5f5f5; color: #999; border-style: dashed; }
        
        label { font-weight: bold; font-size: 11px; color: #555; display: block; margin-top: 12px; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 12px; margin-top: 4px; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; box-sizing: border-box; }
        
        /* STATUS DE Г“LEO COM ALERTAS VISUAIS */
        .status-oleo { font-size: 13px; padding: 12px; border-radius: 8px; margin-top: 8px; font-weight: bold; text-align: center; border: 2px solid transparent; transition: 0.3s; }
        .status-ok { background: #2e7d32; color: white; }
        .status-alerta { background: #fbc02d; color: #333; border-color: #f9a825; }
        .status-vencido { background: #d32f2f; color: white; border-color: #b71c1c; animation: blink 1s infinite; }

        @keyframes blink { 0% {opacity: 1;} 50% {opacity: 0.5;} 100% {opacity: 1;} }

        .btn { width: 100%; padding: 18px; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 15px; }
        .btn-azul { background: var(--primary); color: white; }
        .btn-refresh { background: #555; color: white; padding: 6px 10px; font-size: 10px; border-radius: 5px; cursor: pointer; border:none; float: right; margin-left: 5px; }
        .readonly { background: #f1f1f1 !important; color: #444 !important; font-weight: bold; }
        #msgSucesso { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 999; text-align: center; justify-content: center; align-items: center; flex-direction: column; padding: 20px; }
    </style>
</head>
<body>

<div id="msgSucesso">
    <h1 style="font-size:80px; margin:0">вң”</h1>
    <h2 style="color:var(--success); text-transform: uppercase; margin-bottom: 5px;">Checklist ConcluГӯdo</h2>
    <h3 id="agradecimento" style="color:#555; margin-top: 0;"></h3>
    <p>Abrindo WhatsApp...</p>
</div>

<div class="card">
    <button class="btn-refresh" onclick="sync()">рҹ”„ Atualizar</button>
    <button class="btn-refresh" style="background:var(--danger)" onclick="if(confirm('Resetar App?')){localStorage.removeItem('trip_v10_3');location.reload();}">рҹ—‘пёҸ Reset</button>
    
    <h2 style="text-align:center; color:var(--primary); margin:0;">TELEJUR v10.7</h2>
    <p id="txtSync" style="text-align:center; font-size:10px; color:#888; margin-bottom:10px;">Iniciando...</p>
    
    <div id="painel" class="grid-status"></div>

    <div id="formContainer">
        <label>Motorista</label>
        <select id="nomeMot" onchange="sync(); buscarDados();">
            <option value="">-- SELECIONE --</option>
            <option value="ADRIANO NASCIMENTO">ADRIANO NASCIMENTO</option>
            <option value="FRANCIVALDO COSTA">FRANCIVALDO COSTA</option>
            <option value="FRANCINILDO TEXEIRA">FRANCINILDO TEXEIRA</option>
            <option value="JOELCINEI GUIMARAES">JOELCINEI GUIMARAES</option>
            <option value="MIRIELLY">MIRIELLY</option>
            <option value="REGINALDO">REGINALDO</option>
            <option value="WALTER GONГҮALVES">WALTER GONГҮALVES</option>
            <option value="LAFAITE BATISTA">LAFAITE BATISTA</option>
            <option value="EZEQUIEL">EZEQUIEL</option>
        </select>

        <label>VeГӯculo (TAG)</label>
        <select id="tag" onchange="buscarDados()">
            <option value="">-- SELECIONE --</option>
            <option value="TJUR 04">TJUR 04</option><option value="TJUR 06">TJUR 06</option>
            <option value="TJUR 07">TJUR 07</option><option value="TJUR 08">TJUR 08</option>
            <option value="TJUR 09">TJUR 09</option><option value="TJUR 10">TJUR 10</option>
            <option value="TJUR 13">TJUR 13</option>
        </select>
        <input type="text" id="veiculoInfo" class="readonly" readonly placeholder="Dados do VeГӯculo">

        <label>ID Condutor</label>
        <input type="text" id="idMot" class="readonly" readonly>

        <label>Cor do Selo</label>
        <select id="corSelo">
            <option value="">-- SELECIONE --</option>
            <option value="VERDE">VERDE</option>
            <option value="VERMELHO">VERMELHO</option>
            <option value="AZUL">AZUL</option>
            <option value="AMARELO">AMARELO</option>
        </select>

        <label>Validade Selo</label>
        <input type="date" id="validadeSelo">

        <label>KM Inicial</label>
        <input type="text" id="kmi" placeholder="Digite o KM Atual" oninput="this.value=this.value.replace(/\D/g,''); calcularStatusOleo();">

        <label id="labelOleo">PrГіx. troca Гіleo</label>
        <div id="containerOleo">
            <input type="text" id="proxOleo" oninput="calcularStatusOleo()">
        </div>
        <div id="statusOleoVisual" class="status-oleo" style="display:none"></div>

        <label>Tipo de Г“leo</label>
        <select id="tipoOleo">
            <option value="">-- SELECIONE --</option>
            <option value="15W40">15W40</option>
            <option value="5W30">5W30</option>
            <option value="10W40">10W40</option>
            <option value="20W50">20W50</option>
            <option value="OUTRO">OUTRO / NГғO INFORMADO</option>
        </select>

        <div id="fimCampos" style="display:none">
            <hr><label style="color:var(--danger)">KM Chegada</label>
            <input type="number" id="kmf">
            <label>ObservaГ§ГЈo</label>
            <textarea id="obs"></textarea>
        </div>

        <button id="btnAcao" onclick="salvarSaida()" class="btn btn-azul">Registrar SaГӯda</button>
    </div>

    <div id="telaAtiva" style="display:none">
        <div id="infoViagem" style="background:#f8f9fa; padding:15px; border-radius:10px; border-left:5px solid var(--primary); margin-bottom:15px"></div>
        <button onclick="enviarWhats(false)" class="btn" style="background:#25D366; color:white">WhatsApp SaГӯda</button>
        <button onclick="prepararFim()" class="btn" style="background:#444; color:white">Finalizar Trajeto</button>
    </div>
</div>

<script>
    const URL = "https://script.google.com/macros/s/AKfycbysx-IjZe54SWbmqwl2NYJEx_kiuVtakdtE-GFYE30UxwYYQhcvOuw5DViSwMixS_QIyQ/exec";
    const dataH = new Date().toLocaleDateString('pt-BR');
    let statusOleoGlobal = "";

    function calcularStatusOleo() {
        const kmiRaw = document.getElementById("kmi").value;
        const proxOleoRaw = document.getElementById("proxOleo").value;
        const divStatus = document.getElementById("statusOleoVisual");
        const isDate = document.getElementById("proxOleo").type === "date";

        if (!proxOleoRaw || (!isDate && !kmiRaw)) {
            divStatus.style.display = "none";
            return;
        }

        divStatus.style.display = "block";
        let status = "";
        let classe = "";

        if (isDate) {
            const hoje = new Date();
            const dataLimite = new Date(proxOleoRaw + "T12:00:00");
            const diffDays = Math.ceil((dataLimite - hoje) / (1000 * 60 * 60 * 24));

            if (diffDays < 0) {
                status = `рҹҡЁ ATENГҮГғO MГҒXIMA: Г“LEO VENCIDO!`;
                classe = "status-vencido";
            } else if (diffDays <= 7) {
                status = `вҡ пёҸ ATENГҮГғO: VENCE EM ${diffDays} DIAS`;
                classe = "status-alerta";
            } else {
                status = `вң… Г“LEO EM DIA (${diffDays} DIAS RESTANTES)`;
                classe = "status-ok";
            }
        } else {
            const kmAtual = Number(String(kmiRaw).replace(/\D/g, ""));
            const kmLimite = Number(String(proxOleoRaw).replace(/\D/g, ""));
            const resta = kmLimite - kmAtual;

            if (resta < 0) {
                status = `рҹҡЁ ATENГҮГғO MГҒXIMA: VENCIDO HГҒ ${Math.abs(resta)} KM!`;
                classe = "status-vencido";
            } else if (resta <= 500) {
                status = `вҡ пёҸ ATENГҮГғO: TROCAR EM ${resta} KM (URGENTE)`;
                classe = "status-vencido"; 
            } else if (resta <= 2999) {
                status = `рҹҹЎ ALERTA: FALTAM ${resta} KM PARA A TROCA`;
                classe = "status-alerta";
            } else {
                status = `вң… TUDO OK! FALTAM ${resta} KM. PODE RODAR!`;
                classe = "status-ok";
            }
        }

        divStatus.innerText = status;
        divStatus.className = "status-oleo " + classe;
        statusOleoGlobal = status;
    }

    async function sync() {
        const s = document.createElement('script');
        const motSel = document.getElementById('nomeMot').value;
        const autorizadosSky = ["REGINALDO", "LAFAITE BATISTA", "WALTER GONГҮALVES"];
        window.cb_sync = (res) => {
            const tags = ["TJUR 04", "TJUR 06", "TJUR 07", "TJUR 08", "TJUR 09", "TJUR 10", "TJUR 13"];
            const selT = document.getElementById('tag');
            const painel = document.getElementById('painel');
            painel.innerHTML = '';
            tags.forEach(t => {
                const infoOcupado = res.ocupados[t];
                const infoFrota = res.frota[t];
                const isSky = infoFrota.veiculo === "SKY MUNCK";
                const bloqueado = (isSky && !autorizadosSky.includes(motSel));
                const opt = Array.from(selT.options).find(o => o.value === t);
                if(opt) {
                    if(infoOcupado) { opt.disabled = true; opt.text = t + " (EM USO)"; }
                    else if(bloqueado) { opt.disabled = true; opt.text = t + " (RESTRITO)"; }
                    else { opt.disabled = false; opt.text = t; }
                }
                let cl = infoOcupado ? 'ocupado' : (bloqueado ? 'bloqueado' : 'livre');
                let stTxt = infoOcupado ? 'рҹ”ҙ '+infoOcupado.nome.split(' ')[0] : (bloqueado ? 'рҹ”’ RESTRITO' : 'рҹҹў LIVRE');
                painel.innerHTML += `<div class="v-box ${cl}">${t}<br>${stTxt}</div>`;
            });
            document.getElementById('txtSync').innerText = "Sincronizado: " + new Date().toLocaleTimeString();
            if(s.parentNode) document.body.removeChild(s);
        };
        s.src = `${URL}?acao=statusGeral&data=${dataH}&callback=cb_sync&_=${new Date().getTime()}`;
        document.body.appendChild(s);
    }

    async function buscarDados() {
        const t = document.getElementById("tag").value, n = document.getElementById("nomeMot").value;
        if(!t || !n) return;
        const s = document.createElement('script');
        window.cb_mot = (d) => {
            document.getElementById("veiculoInfo").value = `${d.veiculo} | ${d.placa}`;
            document.getElementById("idMot").value = d.id;
            const container = document.getElementById("containerOleo");
            if(d.tipoOleo === "data") {
                container.innerHTML = `<input type="date" id="proxOleo" oninput="calcularStatusOleo()">`;
                document.getElementById("labelOleo").innerText = "PrГіx. troca Гіleo (DATA)";
            } else {
                container.innerHTML = `<input type="text" id="proxOleo" oninput="this.value=this.value.replace(/\\D/g,''); calcularStatusOleo();">`;
                document.getElementById("labelOleo").innerText = "PrГіx. troca Гіleo (KM)";
            }
            document.getElementById("proxOleo").value = d.oleo;
            calcularStatusOleo();
        };
        s.src = `${URL}?acao=buscarDadosMotorista&tag=${encodeURIComponent(t)}&nome=${encodeURIComponent(n)}&data=${dataH}&callback=cb_mot`;
        document.body.appendChild(s);
    }

    function salvarSaida() {
        let valOleo = document.getElementById("proxOleo").value;
        if(document.getElementById("proxOleo").type === "date") {
            valOleo = valOleo ? new Date(valOleo + "T12:00:00").toLocaleDateString('pt-BR') : "";
        }
        const d = {
            data: dataH, tag: document.getElementById("tag").value, id: document.getElementById("idMot").value,
            nome: document.getElementById("nomeMot").value, kmi: document.getElementById("kmi").value, 
            oleo: valOleo, corSelo: document.getElementById("corSelo").value,
            tipoOleo: document.getElementById("tipoOleo").value,
            statusOleo: statusOleoGlobal,
            horaI: new Date().toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'}),
            validadeSelo: document.getElementById("validadeSelo").value ? new Date(document.getElementById("validadeSelo").value + "T12:00:00").toLocaleDateString('pt-BR') : "",
            acao: "registrar", callback: "cb_reg"
        };
        if(!d.tag || !d.kmi || !d.nome || !d.validadeSelo || !d.oleo || !d.corSelo || !d.tipoOleo) return alert("Preencha todos os campos!");
        const s = document.createElement('script');
        window.cb_reg = (res) => {
            d.numTrajeto = res.n; d.placa = res.placa; d.veiculo = res.veiculo; d.statusOleo = statusOleoGlobal;
            localStorage.setItem("trip_v10_3", JSON.stringify(d)); location.reload();
        };
        s.src = `${URL}?${new URLSearchParams(d)}`;
        document.body.appendChild(s);
    }

    function enviarWhats(isF, kf, hF) {
        const d = JSON.parse(localStorage.getItem("trip_v10_3"));
        const numId = d.id.replace(/\D/g, "").replace(/^0+/, "");
        const idT = `*ID*: CONDUTOR ${numId}`;
        let m = isF ? `вң… *CHECKLIST CONCLUГҚDO*\n` : `рҹҡҖ *SAГҚDA REGISTRADA*\n`;
        m += `--------------------------------\nрҹ“… *Data:* ${d.data}\nрҹҸ·пёҸ *Tag:* ${d.tag}\nрҹҶ” ${idT}\nрҹ‘Ө *Nome:* ${d.nome}\nрҹҡӣ *VeГӯculo:* ${d.veiculo}\nрҹ”ў *Placa:* ${d.placa}\nрҹ“Қ *Trajeto:* ${d.numTrajeto}\n--------------------------------\n`;
        m += `рҹӣЈпёҸ *KM Inicial:* ${d.kmi}\nрҹ•’ *Hora InГӯcio:* ${d.horaI}\nрҹҺЁ *Cor do Selo:* ${d.corSelo}\nрҹ“ң *Validade Selo:* ${d.validadeSelo}\nрҹӣўпёҸ *Tipo Г“leo:* ${d.tipoOleo}\nвҢӣ *Troca Г“leo:* ${d.oleo}${d.oleo.includes('/') ? '' : ' KM'}\nрҹ“ў *Status Г“leo:* ${d.statusOleo}\n`;
        if(isF) {
            m += `--------------------------------\nрҹ•’ *Hora Fim:* ${hF}\nрҹӣЈпёҸ *KM Final:* ${kf}\nрҹ“қ *Obs:* ${document.getElementById("obs").value || "Nenhuma"}\n`;
            localStorage.removeItem("trip_v10_3");
        }
        window.location.href = `https://wa.me/?text=${encodeURIComponent(m)}`;
        if(isF) setTimeout(() => { location.reload(); }, 2000);
    }

    function prepararFim() {
        const d = JSON.parse(localStorage.getItem("trip_v10_3"));
        document.getElementById("telaAtiva").style.display = "none";
        document.getElementById("formContainer").style.display = "block";
        document.getElementById("fimCampos").style.display = "block";
        document.getElementById("tag").value = d.tag;
        document.getElementById("nomeMot").value = d.nome;
        document.getElementById("idMot").value = d.id;
        document.getElementById("kmi").value = d.kmi;
        document.getElementById("validadeSelo").type = "text"; 
        document.getElementById("validadeSelo").value = d.validadeSelo;
        document.getElementById("tipoOleo").innerHTML = `<option value="${d.tipoOleo}">${d.tipoOleo}</option>`;
        document.getElementById("corSelo").innerHTML = `<option value="${d.corSelo}">${d.corSelo}</option>`;
        document.getElementById("containerOleo").innerHTML = `<input type="text" id="proxOleo" value="${d.oleo}" readonly class="readonly">`;
        document.getElementById("veiculoInfo").value = `${d.veiculo} | ${d.placa}`;
        ["tag", "nomeMot", "idMot", "kmi", "validadeSelo", "proxOleo", "corSelo", "tipoOleo"].forEach(i => document.getElementById(i).classList.add("readonly"));
        document.getElementById("btnAcao").innerText = "Concluir Checklist";
        document.getElementById("btnAcao").onclick = () => {
            const kf = document.getElementById("kmf").value;
            if(!kf || Number(kf) <= Number(d.kmi)) return alert("KM Final invГЎlido!");
            const s = document.createElement('script'), hF = new Date().toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'});
            window.cb_fin = (res) => { 
                if(res.res === "fim") { 
                    document.getElementById("agradecimento").innerText = "OBRIGADO, " + d.nome.split(' ')[0] + "!";
                    document.getElementById("msgSucesso").style.display = "flex"; 
                    setTimeout(() => { enviarWhats(true, kf, hF); }, 2000); 
                }
            };
            s.src = `${URL}?acao=finalizar&tag=${d.tag}&nome=${encodeURIComponent(d.nome)}&kmf=${kf}&horaF=${hF}&obs=${encodeURIComponent(document.getElementById("obs").value)}&callback=cb_fin`;
            document.body.appendChild(s);
        };
    }

    window.onload = () => { sync(); const s = localStorage.getItem("trip_v10_3"); if(s) { document.getElementById("formContainer").style.display = "none"; document.getElementById("telaAtiva").style.display = "block"; const d = JSON.parse(s); document.getElementById("infoViagem").innerHTML = `<b>CHECKLIST ATIVO</b><br>рҹҡ— ${d.tag}<br>рҹ‘Ө ${d.nome}`; } };
</script>
</body>
</html>
