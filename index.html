<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TELEJUR - CHECKLIST</title>
    <style>
        body { font-family: sans-serif; background: #e3f2fd; margin: 0; padding: 10px; }
        .card { max-width: 400px; margin: auto; background: white; padding: 20px; border-radius: 15px; border-top: 10px solid #1a237e; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .header-text { text-align: center; margin-bottom: 20px; }
        .brand { font-size: 28px; font-weight: bold; color: #1a237e; letter-spacing: 2px; margin: 0; }
        .subtitle { font-size: 14px; color: #1a237e; font-weight: bold; margin: 0; text-transform: uppercase; }
        h2 { text-align: center; color: #333; font-size: 18px; margin-top: 20px; border-bottom: 2px solid #1a237e; padding-bottom: 10px; }
        label { font-weight: bold; font-size: 12px; color: #555; display: block; margin-top: 15px; }
        input, select, textarea { width: 100%; padding: 12px; margin-top: 5px; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; box-sizing: border-box; }
        input[readonly], input:disabled { background: #f1f3f4; border: 1px dashed #ccc; color: #666; cursor: not-allowed; }
        .hidden { display: none; }
        .status-memoria { font-size: 12px; font-weight: bold; margin-top: 5px; display: none; background: #e8f5e9; color: #2e7d32; padding: 8px; border-radius: 4px; text-align: center; border: 1px solid #c8e6c9; }
        
        /* BOTÃO AZUL (INÍCIO) */
        .btn-azul { width: 100%; padding: 16px; background: #1a237e; border: none; border-radius: 10px; font-size: 18px; color: white; font-weight: bold; cursor: pointer; margin-top: 25px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: 0.3s; }
        /* BOTÃO VERDE (FIM/WHATSAPP) */
        .btn-verde { width: 100%; padding: 16px; background: #25D366; border: none; border-radius: 10px; font-size: 18px; color: white; font-weight: bold; cursor: pointer; margin-top: 25px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: 0.3s; }
        
        button:active { transform: scale(0.98); opacity: 0.9; }
    </style>
</head>
<body>

<div class="card">
    <div class="header-text">
        <p class="brand">TELEJUR</p>
        <p class="subtitle">ELETROMECÂNICA</p>
    </div>

    <h2>CHECKLIST DE VEÍCULO</h2>

    <form id="formChecklist">
        <label>TIPO DE TRAJETO</label>
        <select id="tipoLancamento" onchange="gerenciarInterface()" required>
            <option value="INICIO">INÍCIO DE TRAJETO (SALVAR)</option>
            <option value="FIM">FIM DE TRAJETO (ENVIAR)</option>
        </select>

        <div id="msgStatus" class="status-memoria"></div>

        <label>TAG DO VEÍCULO</label>
        <select id="tag" onchange="completar()" required>
            <option value="">SELECIONE A TAG</option>
            <option value="TJUR 04" data-v="SKY MUNCK" data-p="QFA1I50" data-troca="data">TJUR 04</option>
            <option value="TJUR 06" data-v="SAVEIRO FURGÃO" data-p="QUJ3E02" data-troca="km">TJUR 06</option>
            <option value="TJUR 07" data-v="SKY MUNCK" data-p="RWR3C75" data-troca="data">TJUR 07</option>
            <option value="TJUR 08" data-v="CAMINHONETE HILUX" data-p="QVE5H48" data-troca="km">TJUR 08</option>
            <option value="TJUR 09" data-v="SKY MUNCK" data-p="RXC6J04" data-troca="data">TJUR 09</option>
            <option value="TJUR 10" data-v="CAMINHONETE" data-p="PHU1I37" data-troca="km">TJUR 10</option>
            <option value="TJUR 13" data-v="CAMINHONETE HILUX" data-p="QVD4I38" data-troca="km">TJUR 13</option>
        </select>

        <label>DATA DO RELATÓRIO</label>
        <input type="date" id="data" required>

        <label>VEÍCULO</label>
        <input type="text" id="veiculo" readonly placeholder="Preenchido pela TAG">

        <label>PLACA</label>
        <input type="text" id="placa" readonly placeholder="Preenchido pela TAG">

        <label>CONDUTOR</label>
        <select id="condutor" required>
            <option value="">SELECIONE O NOME</option>
            <option>FRANCIVALDO COSTA</option>
            <option>ADRIANO NASCIMENTO</option>
            <option>JOELCINEI GUIMARÃES</option>
            <option>REGINALDO</option>
            <option>LAFAITE BATISTA</option>
            <option>FRANCINILDO TEXEIRA</option>
            <option>MIRIELLY</option>
            <option>RAIMUNDO WALTER</option>
        </select>

        <label>COR DO SELO</label>
        <select id="corSelo" required>
            <option value="">SELECIONE A COR</option>
            <option value="VERDE">VERDE</option>
            <option value="AMARELO">AMARELO</option>
            <option value="AZUL">AZUL</option>
            <option value="VERMELHO">VERMELHO</option>
        </select>

        <label>KM INICIAL</label>
        <input type="text" id="kmi" inputmode="numeric" placeholder="0.0" oninput="mascaraKM(this)" required>

        <div id="campoFim" class="hidden">
            <label>KM FINAL</label>
            <input type="text" id="kmf" inputmode="numeric" placeholder="0.0" oninput="mascaraKM(this)">
        </div>

        <label>TIPO DE ÓLEO</label>
        <input type="text" id="tipoOleo" placeholder="Ex: 15W40">

        <div id="divTrocaData" class="hidden">
            <label>DATA DA PRÓXIMA TROCA</label>
            <input type="date" id="dataTroca">
        </div>

        <div id="divTrocaKM" class="hidden">
            <label>KM DA PRÓXIMA TROCA</label>
            <input type="text" id="kmTroca" inputmode="numeric" placeholder="0.0" oninput="mascaraKM(this)">
        </div>

        <label>OBSERVAÇÕES / AVARIAS</label>
        <textarea id="obs" rows="3" placeholder="Descreva problemas se houver..."></textarea>

        <button type="button" id="btnAcao" onclick="processar()">SALVAR INÍCIO DE TRAJETO</button>
    </form>
</div>

<script>
    function setarDataHoje() {
        const hoje = new Date();
        const dia = String(hoje.getDate()).padStart(2, '0');
        const mes = String(hoje.getMonth() + 1).padStart(2, '0');
        const ano = hoje.getFullYear();
        document.getElementById('data').value = `${ano}-${mes}-${dia}`;
    }

    window.onload = function() {
        setarDataHoje();
        gerenciarInterface();
    };

    function mascaraKM(input) {
        let value = input.value.replace(/\D/g, "");
        if (value.length > 0) {
            value = (parseInt(value) / 10).toFixed(1);
            input.value = value;
        } else { input.value = ""; }
    }

    function gerenciarInterface() {
        var tipo = document.getElementById("tipoLancamento").value;
        var btn = document.getElementById("btnAcao");
        var campoFim = document.getElementById("campoFim");
        var msg = document.getElementById("msgStatus");

        if (tipo === "INICIO") {
            btn.innerText = "SALVAR INÍCIO DE TRAJETO";
            btn.className = "btn-azul"; // Define cor Azul
            campoFim.className = "hidden";
            msg.style.display = "none";
        } else {
            btn.innerText = "ENVIAR CHECKLIST COMPLETO";
            btn.className = "btn-verde"; // Define cor Verde
            campoFim.className = "";
            recuperarDados();
        }
    }

    function completar() {
        var s = document.getElementById("tag");
        var sel = s.options[s.selectedIndex];
        document.getElementById("veiculo").value = sel.getAttribute("data-v") || "";
        document.getElementById("placa").value = sel.getAttribute("data-p") || "";
        setarDataHoje();
        
        var tipoTroca = sel.getAttribute("data-troca");
        document.getElementById("divTrocaData").classList.toggle("hidden", tipoTroca !== "data");
        document.getElementById("divTrocaKM").classList.toggle("hidden", tipoTroca !== "km");
        
        if(document.getElementById("tipoLancamento").value === "FIM") recuperarDados();
    }

    function processar() {
        var tipo = document.getElementById("tipoLancamento").value;
        if (tipo === "INICIO") salvarDados(); else enviarWhatsApp();
    }

    function salvarDados() {
        var tag = document.getElementById("tag").value;
        if (!tag || !document.getElementById("kmi").value) {
            alert("Preencha a TAG e o KM Inicial para salvar.");
            return;
        }
        var dados = {
            condutor: document.getElementById("condutor").value,
            kmi: document.getElementById("kmi").value,
            cor: document.getElementById("corSelo").value,
            oleo: document.getElementById("tipoOleo").value,
            obs: document.getElementById("obs").value
        };
        localStorage.setItem("tjur_temp_" + tag, JSON.stringify(dados));
        alert("✓ INÍCIO DE TRAJETO SALVO!\n\nOs dados ficarão guardados no seu celular até você finalizar o trajeto.");
    }

    function recuperarDados() {
        var tag = document.getElementById("tag").value;
        var msg = document.getElementById("msgStatus");
        var salvo = localStorage.getItem("tjur_temp_" + tag);

        if (salvo && tag !== "") {
            var dados = JSON.parse(salvo);
            document.getElementById("condutor").value = dados.condutor;
            document.getElementById("kmi").value = dados.kmi;
            document.getElementById("corSelo").value = dados.cor;
            document.getElementById("tipoOleo").value = dados.oleo;
            document.getElementById("obs").value = dados.obs;
            msg.innerText = "✓ DADOS DO INÍCIO RECUPERADOS";
            msg.style.display = "block";
        }
    }

    function enviarWhatsApp() {
        if(!document.getElementById("kmf").value) {
            alert("Preencha o KM FINAL para enviar.");
            return;
        }
        var tag = document.getElementById("tag").value;
        var d = document.getElementById('data').value.split('-').reverse().join('/');
        var c = document.getElementById('condutor').value;
        var v = document.getElementById('veiculo').value;
        var p = document.getElementById('placa').value;
        var selo = document.getElementById('corSelo').value;
        var ki = document.getElementById('kmi').value;
        var kf = document.getElementById('kmf').value;
        var oleo = document.getElementById('tipoOleo').value || "NÃO INFORMADO";
        var obs = document.getElementById('obs').value || "SEM OBSERVAÇÕES";
        var tipoTroca = document.getElementById("tag").options[document.getElementById("tag").selectedIndex].getAttribute("data-troca");
        
        var proxTroca = "NÃO INFORMADO";
        if(tipoTroca === "data") {
            var dt = document.getElementById('dataTroca').value;
            proxTroca = dt ? dt.split('-').reverse().join('/') : "NÃO INFORMADO";
        } else {
            proxTroca = document.getElementById('kmTroca').value || "NÃO INFORMADO";
        }

        var texto = `*_CHECKLIST VEÍCULOS - TELEJUR_*%0A==========================%0A%0A%0A*DATA:* ${d}%0A__________________________%0A%0A*CONDUTOR:* ${c}%0A__________________________%0A%0A*TAG:* ${tag}%0A__________________________%0A%0A*VEÍCULO:* ${v}%0A__________________________%0A%0A*PLACA:* ${p}%0A__________________________%0A%0A*COR DO SELO:* ${selo}%0A__________________________%0A%0A*KM INICIAL:* ${ki}%0A__________________________%0A%0A*KM FINAL:* ${kf}%0A__________________________%0A%0A*ÓLEO:* ${oleo}%0A__________________________%0A%0A*PRÓX. TROCA (${tipoTroca.toUpperCase()}):* ${proxTroca}%0A__________________________%0A%0A*OBSERVAÇÕES:* ${obs}`;

        localStorage.removeItem("tjur_temp_" + tag);
        window.location.href = "https://api.whatsapp.com/send?text=" + encodeURIComponent(texto.replace(/%0A/g, '\n')).replace(/%250A/g, '%0A');
    }
</script>
</body>
</html>
