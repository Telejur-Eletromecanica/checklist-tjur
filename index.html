<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TELEJUR - CONTROLE</title>

<style>
body { font-family: sans-serif; background: #e3f2fd; padding: 10px; }
.card { max-width: 400px; margin: auto; background: white; padding: 20px; border-radius: 15px; }
h2 { font-size: 16px; margin-top: 20px; }
input, select, button { width: 100%; padding: 10px; margin-top: 10px; }
button { background: #1a237e; color: white; border: none; }
.box { background: #f1f1f1; padding: 10px; border-radius: 10px; margin-top: 10px; }
</style>
</head>

<body>

<div class="card">

<h2>📊 DASHBOARD</h2>
<div id="dashboard" class="box">Carregando...</div>

<h2>🚫 VEÍCULOS EM USO</h2>
<div id="ocupados" class="box">Carregando...</div>

<h2>🚗 CHECKLIST</h2>

<input id="tag" placeholder="TAG">
<input id="id" placeholder="ID">
<input id="nome" placeholder="Nome">
<input id="kmi" placeholder="KM Inicial">

<button onclick="registrar()">INICIAR</button>

<input id="kmf" placeholder="KM Final">
<button onclick="finalizar()">FINALIZAR</button>

</div>

<script>
const URL = "https://script.google.com/macros/s/AKfycbysx-IjZe54SWbmqwl2NYJEx_kiuVtakdtE-GFYE30UxwYYQhcvOuw5DViSwMixS_QIyQ/exec";

/* DASHBOARD */
async function dashboard() {
  const r = await fetch(URL + "?acao=dashboard");
  const d = await r.json();

  document.getElementById("dashboard").innerHTML =
    `🚗 Total: ${d.total}<br>
     🔴 Em uso: ${d.emUso}<br>
     🟢 Livres: ${d.livres}<br>
     ⚠ Manutenção: ${d.manutencao.length}`;
}

/* OCUPADOS */
async function ocupados() {
  const r = await fetch(URL + "?acao=ocupados");
  const lista = await r.json();

  let html = "";

  if (!lista.length) {
    html = "✅ Nenhum veículo em uso";
  } else {
    lista.forEach(v => {
      html += `🚫 ${v.tag}<br>👤 ${v.nome}<br>⏱ ${v.hora}<hr>`;
    });
  }

  document.getElementById("ocupados").innerHTML = html;
}

/* REGISTRAR */
async function registrar() {
  const url = `${URL}?acao=registrar&tag=${tag.value}&id=${id.value}&nome=${nome.value}&kmi=${kmi.value}&horaI=${new Date().toLocaleTimeString()}`;

  const r = await fetch(url);
  const res = await r.json();

  if (res.erro) {
    if (res.tipo === "veiculo") alert("🚫 Veículo em uso por " + res.por);
    else alert("🚫 Motorista já está em uso");
    return;
  }

  alert("✅ Iniciado");
  atualizar();
}

/* FINALIZAR */
async function finalizar() {
  const url = `${URL}?acao=finalizar&tag=${tag.value}&kmf=${kmf.value}`;

  const r = await fetch(url);
  const res = await r.json();

  if (res.erro) {
    alert("Erro ao finalizar");
    return;
  }

  alert("Finalizado");
  atualizar();
}

function atualizar() {
  dashboard();
  ocupados();
}

/* AUTO LOAD */
atualizar();
setInterval(atualizar, 10000);
</script>

</body>
</html>
