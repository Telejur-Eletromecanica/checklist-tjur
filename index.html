<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TELEJUR - SMART FROTA V46</title>
    <style>
        :root { --primary: #1a237e; --success: #25D366; --bg: #f4f7f9; --danger: #d32f2f; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 10px; }
        .card { max-width: 450px; margin: auto; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-top: 10px solid var(--primary); }
        .brand { font-size: 24px; font-weight: 900; color: var(--primary); text-align: center; margin: 0; }
        .subtitle { font-size: 10px; color: #888; text-align: center; font-weight: bold; margin-bottom: 15px; text-transform: uppercase; }

        label { font-weight: 700; font-size: 11px; color: #666; display: block; margin-top: 12px; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 12px; margin-top: 5px; border-radius: 10px; border: 2px solid #eee; font-size: 15px; box-sizing: border-box; }
        
        .readonly { background: #f0f2f5 !important; color: var(--primary); font-weight: bold; pointer-events: none; }
        .destaque { background: #fff9c4 !important; border: 1.5px solid #fbc02d !important; color: #827717; font-weight: bold; }
        
        .foto-banner { background: #e8f5e9; color: #2e7d32; padding: 12px; border-radius: 8px; border: 1.5px solid #c8e6c9; margin: 10px 0; font-weight: bold; text-align: center; font-size: 12px; }

        .btn { width: 100%; padding: 16px; border: none; border-radius: 12px; font-size: 16px; color: white; font-weight: bold; cursor: pointer; margin-top: 12px; }
        .btn-azul { background: var(--primary); }
        .btn-verde { background: var(--success); }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="card">
    <div class="brand">TELEJUR</div>
    <div class="subtitle">LOGÍSTICA OPERACIONAL</div>

    <div id="containerForm">
        <div class="foto-banner">📸 AVISO: REGISTRE AS FOTOS DO CHECKLIST FÍSICO DO VEÍCULO!</div>
        
        <label>DATA DO CHECKLIST</label>
        <input type="text" id="dataAuto" class="readonly" readonly>

        <label>TAG DO VEÍCULO</label>
        <select id="tag" onchange="atualizarVeiculo();">
            <option value="">SELECIONE</option>
            <option value="TJUR 03" data-v="HILUX" data-p="PHG0639">TJUR 03</option>
            <option value="TJUR 04" data-v="MUNCK" data-p="QFA1I50">TJUR 04</option>
            <option value="TJUR 06" data-v="SAVEIRO" data-p="QUJ3E02">TJUR 06</option>
            <option value="TJUR 07" data-v="SKY MUNCK" data-p="RWR3C75">TJUR 07</option>
            <option value="TJUR 13" data-v="HILUX" data-p="QVD4I38">TJUR 13</option>
        </select>

        <div style="display:flex; gap:8px;">
            <div style="flex:2"><label>VEÍCULO</label><input type="text" id="v_nome" class="readonly" readonly></div>
            <div style="flex:1"><label>PLACA</label><input type="text" id="v_placa" class="readonly" readonly></div>
        </div>

        <div style="display:flex; gap:8px;">
            <div style="flex:1">
                <label>ID CONDUTOR</label>
                <select id="numCondutor">
                    <option value="CONDUTOR 1">ID 01</option>
                    <option value="CONDUTOR 2">ID 02</option>
                    <option value="CONDUTOR 3">ID 03</option>
                </select>
            </div>
            <div style="flex:3">
                <label>NOME DO MOTORISTA</label>
                <input type="text" id="nomeCondutor" placeholder="Nome Completo">
            </div>
        </div>

        <div style="display:flex; gap:8px;">
            <div style="flex:1"><label>KM INICIAL</label><input type="number" id="kmi"></div>
            <div style="flex:1">
                <label>COR DO SELO</label>
                <select id="corSelo">
                    <option>VERDE</option><option>AMARELO</option>
                    <option>AZUL</option><option>VERMELHO</option>
                </select>
            </div>
        </div>

        <label>VALIDADE DO SELO</label>
        <input type="date" id="validadeSelo" onchange="calcularLimite()">

        <label>LIMITE (+5 DIAS ÚTEIS)</label>
        <input type="text" id="dataLimite" class="readonly destaque" readonly>

        <div id="blocoOleo">
            <label id="labelOleo">PRÓXIMA TROCA DE ÓLEO (KM)</label>
            <input type="number" id="oleoKM" placeholder="Ex: 155000">
            <input type="date" id="oleoData" class="hidden">
        </div>

        <div id="campoFim" class="hidden">
            <label style="color:var(--danger)">📍 KM FINAL (CHEGADA)</label>
            <input type="number" id="kmf" style="border: 2px solid var(--danger)">
        </div>

        <label>OBSERVAÇÃO</label>
        <textarea id="obs" rows="2"></textarea>

        <button id="btnAcao" onclick="iniciar()" class="btn btn-azul">SALVAR INÍCIO 🟢</button>
    </div>

    <div id="telaEspera" class="hidden" style="text-align:center;">
        <h2 style="color:var(--primary)">🚀 EM ROTA</h2>
        <div id="resumo" style="background:#f8f9fa; padding:15px; border-radius:15px; text-align:left; margin-bottom:15px; font-size: 14px; line-height: 1.6;"></div>
        <button onclick="enviarWpp('INICIO')" class="btn btn-verde">WHATSAPP INÍCIO</button>
        <button onclick="irParaFinalizar()" class="btn btn-azul" style="background:#444">FINALIZAR TRAJETO</button>
    </div>
</div>

<script>
    const dataH = new Date().toLocaleDateString('pt-BR');
    document.getElementById('dataAuto').value = dataH;

    function calcularLimite() {
        const inputData = document.getElementById("validadeSelo").value;
        if (!inputData) return;
        let data = new Date(inputData + "T12:00:00");
        let uteis = 0;
        while (uteis < 5) {
            data.setDate(data.getDate() + 1);
            if (data.getDay() !== 0 && data.getDay() !== 6) uteis++;
        }
        document.getElementById("dataLimite").value = data.toLocaleDateString('pt-BR');
    }

    function atualizarVeiculo() {
        const sel = document.getElementById("tag");
        const opt = sel.options[sel.selectedIndex];
        document.getElementById("v_nome").value = opt.getAttribute("data-v") || "";
        document.getElementById("v_placa").value = opt.getAttribute("data-p") || "";
        
        // Lógica de Óleo (Data para SKY MUNCK, KM para outros)
        const isMunck = opt.getAttribute("data-v") === "SKY MUNCK" || opt.getAttribute("data-v") === "MUNCK";
        document.getElementById("labelOleo").innerText = isMunck ? "PRÓXIMA TROCA DE ÓLEO (DATA)" : "PRÓXIMA TROCA DE ÓLEO (KM)";
        document.getElementById("oleoKM").classList.toggle("hidden", isMunck);
        document.getElementById("oleoData").classList.toggle("hidden", !isMunck);
    }

    function iniciar() {
        const d = {
            tag: document.getElementById("tag").value,
            veiculo: document.getElementById("v_nome").value,
            placa: document.getElementById("v_placa").value,
            num: document.getElementById("numCondutor").value,
            nome: document.getElementById("nomeCondutor").value.toUpperCase(),
            kmi: document.getElementById("kmi").value,
            selo: document.getElementById("corSelo").value,
            valSelo: document.getElementById("validadeSelo").value,
            limite: document.getElementById("dataLimite").value,
            oleo: document.getElementById("oleoKM").value || document.getElementById("oleoData").value,
            obs: document.getElementById("obs").value,
            horaI: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}),
            data: dataH
        };
        if(!d.tag || !d.kmi || !d.nome) return alert("Preencha os campos obrigatórios!");
        localStorage.setItem("tjur_ativo", JSON.stringify(d));
        location.reload();
    }

    function irParaFinalizar() {
        const s = JSON.parse(localStorage.getItem("tjur_ativo"));
        document.getElementById("telaEspera").classList.add("hidden");
        document.getElementById("containerForm").classList.remove("hidden");
        document.getElementById("campoFim").classList.remove("hidden");
        
        document.getElementById("tag").value = s.tag;
        atualizarVeiculo();
        document.getElementById("numCondutor").value = s.num;
        document.getElementById("nomeCondutor").value = s.nome;
        document.getElementById("kmi").value = s.kmi;
        document.getElementById("corSelo").value = s.selo;
        document.getElementById("validadeSelo").value = s.valSelo;
        document.getElementById("dataLimite").value = s.limite;
        
        ["tag", "numCondutor", "nomeCondutor", "kmi", "validadeSelo", "corSelo"].forEach(id => document.getElementById(id).classList.add("readonly"));
        
        const btn = document.getElementById("btnAcao");
        btn.innerText = "FINALIZAR TRAJETO ✅";
        btn.onclick = finalizar;
    }

    function finalizar() {
        const s = JSON.parse(localStorage.getItem("tjur_ativo"));
        const kmf = document.getElementById("kmf").value;
        if(!kmf) return alert("Informe o KM Final!");
        
        const hF = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        enviarWpp('FIM', { kmf, hF });
        localStorage.removeItem("tjur_ativo");
        setTimeout(() => location.reload(), 2000);
    }

    function enviarWpp(tipo, dadosF = null) {
        const s = JSON.parse(localStorage.getItem("tjur_ativo"));
        const valF = s.valSelo ? s.valSelo.split('-').reverse().join('/') : "---";
        const oleoF = s.oleo.includes('-') ? s.oleo.split('-').reverse().join('/') : s.oleo + " KM";

        let txt = `*CHECKLIST VEÍCULOS - TELEJUR*\n==========================\n`;
        txt += `*STATUS:* ${tipo === 'INICIO' ? '🟢 EM ROTA' : '✅ FINALIZADO'}\n\n`;
        txt += `*DATA:* ${s.data}\n*HORA:* ${tipo === 'INICIO' ? s.horaI : dadosF.hF}\n`;
        txt += `--------------------------\n`;
        txt += `👤 *CONDUTOR:* ${s.nome}\n*ID:* ${s.num}\n`;
        txt += `🚗 *VEÍCULO:* ${s.veiculo} (${s.tag})\n*PLACA:* ${s.placa}\n`;
        txt += `📍 *KM:* ${tipo === 'INICIO' ? s.kmi : dadosF.kmf}\n`;
        txt += `--------------------------\n`;
        txt += `🛡️ *SELO:* ${s.selo}\n*VALIDADE:* ${valF}\n*LIMITE (+5D):* ${s.limite}\n*PRÓX. ÓLEO:* ${oleoF}\n`;
        txt += `--------------------------\n*OBS:* ${document.getElementById("obs").value || "Nenhuma"}`;

        window.location.href = `whatsapp://send?text=${encodeURIComponent(txt)}`;
    }

    window.onload = () => {
        const s = localStorage.getItem("tjur_ativo");
        if(s) {
            const d = JSON.parse(s);
            document.getElementById("containerForm").classList.add("hidden");
            document.getElementById("telaEspera").classList.remove("hidden");
            document.getElementById("resumo").innerHTML = `<b>TAG:</b> ${d.tag}<br><b>MOTORISTA:</b> ${d.nome}<br><b>INÍCIO:</b> ${d.horaI}`;
        }
    };
</script>
</body>
</html>
