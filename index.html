<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TELEJUR v10.9.6</title>
    <style>
        :root { --primary: #1a237e; --danger: #c62828; --success: #2e7d32; --warning: #ff9800; }
        body { font-family: sans-serif; background: #f0f4f8; padding: 10px; margin: 0; }
        .card { max-width: 450px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        
        .header-box { text-align: center; margin-bottom: 20px; }
        .header-box h1 { color: var(--primary); font-size: 18px; margin: 0; text-transform: uppercase; }
        .header-box h2 { color: #555; font-size: 14px; margin: 5px 0 0 0; font-weight: normal; }
        
        .grid-status { display: grid; grid-template-columns: repeat(auto-fit, minmax(90px, 1fr)); gap: 8px; margin-bottom: 15px; }
        .v-box { padding: 8px; border-radius: 8px; text-align: center; font-size: 11px; font-weight: bold; border: 1px solid #ddd; min-height: 45px; display: flex; flex-direction: column; justify-content: center; transition: 0.3s; }
        .livre { background: #e8f5e9; color: var(--success); }
        .ocupado { background: #ffebee; color: var(--danger); border-color: var(--danger); }
        .restrito { background: #eeeeee; color: #999; border-style: dashed; filter: grayscale(1); }
        
        label { font-weight: bold; font-size: 11px; color: #555; display: block; margin-top: 12px; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 12px; margin-top: 4px; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; box-sizing: border-box; }
        
        .btn { width: 100%; padding: 18px; border: none; border-radius: 10px; font-size: 15px; font-weight: bold; cursor: pointer; margin-top: 15px; color: white; }
        .btn-inicio { background: var(--success); }
        .btn-final { background: var(--primary); }
        .readonly { background: #f9f9f9 !important; color: #444; font-weight: bold; }
        
        #alertaBloqueio { background: #ffebee; color: var(--danger); padding: 10px; border-radius: 8px; border: 1px solid var(--danger); font-size: 12px; font-weight: bold; margin-top: 15px; text-align: center; display: none; }
        hr { border: 0; border-top: 2px dashed #eee; margin: 25px 0; }
    </style>
</head>
<body>

<div class="card">
    <div class="header-box">
        <h1>TELEJUR ELETROMECÂNICA<br>UNIDADE JURUTI</h1>
        <h2>Checklist de Veículos</h2>
        <p id="txtSync" style="font-size:10px; color:#888; margin-top:10px;">Sincronizando frota...</p>
    </div>
    
    <div id="painel" class="grid-status"></div>

    <div id="formFull">
        <label>Motorista</label>
        <select id="nomeMot" onchange="sync()">
            <option value="">-- SELECIONE --</option>
            <option value="ADRIANO NASCIMENTO">ADRIANO NASCIMENTO</option>
            <option value="FRANCIVALDO COSTA">FRANCIVALDO COSTA</option>
            <option value="FRANCINILDO TEXEIRA">FRANCINILDO TEXEIRA</option>
            <option value="JOELCINEI GUIMARAES">JOELCINEI GUIMARAES</option>
            <option value="REGINALDO">REGINALDO</option>
            <option value="WALTER GONÇALVES">WALTER GONÇALVES</option>
            <option value="LAFAITE BATISTA">LAFAITE BATISTA</option>
            <option value="MIRIELLY">MIRIELLY</option>
            <option value="EZEQUIEL">EZEQUIEL</option>
        </select>

        <div id="alertaBloqueio">🔒 ACESSO RESTRITO: MOTORISTA NÃO AUTORIZADO PARA SKY MUNCK.</div>

        <label>Veículo (TAG)</label>
        <select id="tag" onchange="buscarDados()">
            <option value="">-- SELECIONE O MOTORISTA --</option>
        </select>
        
        <input type="text" id="veiculoInfo" class="readonly" readonly placeholder="Veículo | Placa">
        <input type="text" id="idMot" class="readonly" readonly placeholder="ID: CONDUTOR X">

        <label>KM Inicial</label>
        <input type="number" id="kmi" inputmode="numeric" placeholder="KM de Saída">

        <label>Próxima Troca Óleo (KM)</label>
        <input type="text" id="proxOleo" placeholder="Ex: 156.223 KM">

        <div style="display:flex; gap:5px">
            <div style="flex:1">
                <label>Cor do Selo</label>
                <select id="corSelo">
                    <option value="VERDE">VERDE</option>
                    <option value="VERMELHO">VERMELHO</option>
                </select>
            </div>
            <div style="flex:1">
                <label>Validade Selo</label>
                <input type="date" id="validadeSelo">
            </div>
        </div>

        <label>Tipo de Óleo</label>
        <select id="tipoOleo">
            <option value="15W40">15W40</option>
            <option value="5W30">5W30</option>
            <option value="10W40">10W40</option>
        </select>

        <label>Observações</label>
        <textarea id="obs" rows="2" placeholder="Observações..."></textarea>

        <button id="btnEnviarInicio" onclick="registrarEEnviar('inicio')" class="btn btn-inicio">✅ ENVIAR INÍCIO DE TRAJETO</button>
        <hr>
        <label>KM Final</label>
        <input type="number" id="kmf" inputmode="numeric" placeholder="KM de Chegada">
        <button id="btnEnviarFim" onclick="registrarEEnviar('final')" class="btn btn-final">🏁 ENVIAR FINAL DE TRAJETO</button>
    </div>
</div>

<script>
    const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbysx-IjZe54SWbmqwl2NYJEx_kiuVtakdtE-GFYE30UxwYYQhcvOuw5DViSwMixS_QIyQ/exec";
    const dataH = new Date().toLocaleDateString('pt-BR');
    let nTrajeto = "1º Trajeto";

    function chamarScript(params) {
        const s = document.createElement('script');
        const query = new URLSearchParams(params).toString();
        s.src = `${URL_SCRIPT}?${query}&_=${Date.now()}`;
        document.body.appendChild(s);
    }

    function sync() {
        chamarScript({ acao: "statusGeral", data: dataH, callback: "processarSync" });
    }

    window.processarSync = (res) => {
        const tags = ["TJUR 04", "TJUR 06", "TJUR 07", "TJUR 08", "TJUR 09", "TJUR 10", "TJUR 13"];
        const muncks = ["TJUR 04", "TJUR 07", "TJUR 09"];
        const autorizados = ["ADRIANO NASCIMENTO", "FRANCIVALDO COSTA"];
        
        const motorista = document.getElementById("nomeMot").value;
        const selectTag = document.getElementById('tag');
        const painel = document.getElementById('painel');
        const alerta = document.getElementById("alertaBloqueio");
        
        const isMunckAuth = autorizados.includes(motorista);
        
        selectTag.innerHTML = '<option value="">-- SELECIONE A TAG --</option>';
        painel.innerHTML = '';

        tags.forEach(t => {
            const isOcupado = !!res.ocupados[t];
            const isMunck = muncks.includes(t);
            const bloqueado = isMunck && !isMunckAuth && motorista !== "";
            const count = (res.contagem[t] || 0) + 1;

            const opt = document.createElement('option');
            opt.value = t;
            opt.setAttribute('data-count', count);
            
            if (bloqueado) {
                opt.text = `🔒 ${t} (RESTRITO)`;
                opt.disabled = true;
            } else {
                opt.text = t + (isOcupado ? " (🔴 EM USO)" : "");
                opt.disabled = isOcupado;
            }
            selectTag.appendChild(opt);

            let statusHTML = '';
            let classeCor = isOcupado ? 'ocupado' : 'livre';
            
            if (bloqueado) {
                classeCor = 'restrito';
                statusHTML = `🔒 RESTRITO`;
            } else if (isOcupado) {
                statusHTML = `🔴 ${res.ocupados[t].nome.split(' ')[0]}`;
            } else {
                statusHTML = `🟢 LIVRE`;
            }
            painel.innerHTML += `<div class="v-box ${classeCor}"><b>${t}</b>${statusHTML}</div>`;
        });

        alerta.style.display = (!isMunckAuth && motorista !== "") ? "block" : "none";
        document.getElementById('txtSync').innerText = "Última atualização: " + new Date().toLocaleTimeString();
    }

    function buscarDados() {
        const t = document.getElementById("tag"), n = document.getElementById("nomeMot").value;
        if(!t.value || !n) return;
        nTrajeto = t.options[t.selectedIndex].getAttribute('data-count') + "º Trajeto";
        window.processarMot = (d) => {
            document.getElementById("veiculoInfo").value = `${d.veiculo} | ${d.placa}`;
            document.getElementById("idMot").value = "ID: " + d.id;
        };
        chamarScript({ acao: "buscarDadosMotorista", tag: t.value, nome: n, callback: "processarMot" });
    }

    function registrarEEnviar(tipo) {
        const tagVal = document.getElementById("tag").value;
        if(!tagVal) { alert("Selecione um veículo!"); return; }

        const d = {
            data: dataH, tag: tagVal, id: document.getElementById("idMot").value,
            nome: document.getElementById("nomeMot").value, kmi: document.getElementById("kmi").value,
            oleo: document.getElementById("proxOleo").value, corSelo: document.getElementById("corSelo").value,
            tipoOleo: document.getElementById("tipoOleo").value, validadeSelo: document.getElementById("validadeSelo").value,
            obs: document.getElementById("obs").value || "Nenhuma", trajeto: nTrajeto,
            horaI: new Date().toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'})
        };

        if(tipo === 'inicio') {
            window.processarReg = (res) => {
                const msg = window.encodeURIComponent(`✅ *CHECKLIST CONCLUÍDO*\n---------------------------\n📅 *Data:* ${d.data}\n🏷️ *Tag:* ${d.tag}\n🆔 *${d.id}*\n👤 *Nome:* ${d.nome}\n🚚 *Veículo:* ${res.v}\n🔢 *Placa:* ${res.p}\n📍 *Trajeto:* ${d.trajeto}\n\n---------------------------\n📏 *KM Inicial:* ${d.kmi}\n🕒 *Hora Início:* ${d.horaI}\n🎨 *Cor do Selo:* ${d.corSelo}\n📜 *Validade Selo:* ${d.validadeSelo.split('-').reverse().join('/')}\n🧪 *Tipo Óleo:* ${d.tipoOleo}\n⌛ *Próxima Troca Óleo:* ${d.oleo}\n---------------------------\n📝 *Obs:* ${d.obs}`);
                window.open(`https://api.whatsapp.com/send?text=${msg}`);
                sync();
            };
            chamarScript({...d, acao: "registrar", callback: "processarReg"});
        } else {
            const kf = document.getElementById("kmf").value;
            if(!kf) { alert("Informe o KM Final!"); return; }
            const hf = new Date().toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'});
            window.processarFim = () => {
                const msg = window.encodeURIComponent(`🏁 *TRAJETO FINALIZADO*\n---------------------------\n📅 *Data:* ${d.data}\n🏷️ *Tag:* ${d.tag}\n🆔 *${d.id}*\n👤 *Nome:* ${d.nome}\n📍 *Trajeto:* ${d.trajeto}\n\n---------------------------\n📏 *KM Inicial:* ${d.kmi}\n📏 *KM Final:* ${kf}\n🕒 *Hora Chegada:* ${hf}\n📝 *Obs:* ${d.obs}\n---------------------------`);
                window.open(`https://api.whatsapp.com/send?text=${msg}`);
                location.reload();
            };
            chamarScript({acao: "finalizar", tag: d.tag, kmf: kf, horaF: hf, obs: d.obs, callback: "processarFim"});
        }
    }
    window.onload = sync;
</script>
</body>
</html>
