<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checklist TJUR Digital</title>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --success: #25D366; --admin: #e67e22; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; margin: 0; padding: 15px; display: flex; justify-content: center; }
        .container { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 500px; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 10px; border: none; cursor: pointer; border-radius: 5px; font-weight: bold; background: #ddd; }
        .tab-btn.active { background: var(--primary); color: white; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .form-group { margin-bottom: 12px; }
        .full-width { grid-column: span 2; }
        label { display: block; font-weight: bold; margin-bottom: 4px; color: var(--primary); font-size: 13px; }
        select, input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 15px; height: 45px; }
        input[readonly] { background-color: #f1f3f5; color: #555; }
        .btn-whatsapp { width: 100%; padding: 15px; background: var(--success); color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 15px; }
        .hidden { display: none; }
        .list-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>

<div class="container">
    <div class="tabs">
        <button class="tab-btn active" id="btn-chk" onclick="switchTab('checklist')">Checklist</button>
        <button class="tab-btn" id="btn-adm" onclick="switchTab('admin')">Admin</button>
    </div>

    <div id="tab-checklist">
        <div class="form-group">
            <label>Selecione a TAG do Veículo</label>
            <select id="selectTag" onchange="atualizarDadosVeiculo()">
                <option value="">-- Selecione --</option>
                <option value="TJUR 13">TJUR 13 (Caminhonete)</option>
                <option value="TJUR 04">TJUR 04 (Sky Munck)</option>
                <option value="TJUR 06">TJUR 06 (Saveiro)</option>
                <option value="TJUR 07">TJUR 07 (Sky Munck)</option>
                <option value="TJUR 08">TJUR 08 (Hilux)</option>
                <option value="TJUR 09">TJUR 09 (Sky Munck)</option>
                <option value="TJUR 10">TJUR 10 (Caminhonete)</option>
            </select>
        </div>

        <div class="form-grid">
            <div class="form-group">
                <label>Data Atual</label>
                <input type="text" id="data_hoje" readonly>
            </div>
            <div class="form-group">
                <label>Placa</label>
                <input type="text" id="placa" readonly>
            </div>
            
            <div class="form-group">
                <label>Próx. Troca Óleo (Data/Km)</label>
                <input type="date" id="prox_oleo">
            </div>
            <div class="form-group">
                <label>Tipo de Óleo</label>
                <select id="tipo_oleo">
                    <option value="15W40">15W40</option>
                    <option value="5W30">5W30</option>
                    <option value="10W40">10W40</option>
                </select>
            </div>

            <div class="form-group full-width">
                <label>Condutor 1 (Principal)</label>
                <select id="condutor1"></select>
            </div>
            <div class="form-group full-width">
                <label>Condutor 2</label>
                <input type="text" id="condutor2" placeholder="Nome completo do segundo condutor">
            </div>
            <div class="form-group full-width">
                <label>Condutor 3</label>
                <input type="text" id="condutor3" placeholder="Nome completo do terceiro condutor">
            </div>

            <div class="form-group">
                <label>KM Início</label>
                <input type="number" id="km_inicio">
            </div>
            <div class="form-group">
                <label>KM Final</label>
                <input type="number" id="km_final">
            </div>

            <div class="form-group">
                <label>Cor do Selo</label>
                <select id="cor_selo">
                    <option value="Verde">Verde</option>
                    <option value="Amarelo">Amarelo</option>
                    <option value="Azul">Azul</option>
                    <option value="Vermelho">Vermelho</option>
                </select>
            </div>
            <div class="form-group">
                <label>Validade Selo</label>
                <input type="date" id="val_selo">
            </div>
        </div>

        <button class="btn-whatsapp" onclick="enviarWhatsApp()">ENVIAR NO WHATSAPP</button>
    </div>

    <div id="tab-admin" class="hidden">
        <h3>Gerenciar Lista de Condutores</h3>
        <input type="text" id="novoNome" placeholder="Nome Completo">
        <button onclick="addCondutor()" style="width:100%; margin-top:10px; padding:12px; background:var(--primary); color:white; border:none; border-radius:6px;">Cadastrar Novo</button>
        <div id="listaCondutores" style="margin-top:20px;"></div>
    </div>
</div>

<script>
    const frota = {
        "TJUR 13": { placa: "QVD4I38", oleo: "15W40", km_ini: "166523", km_fin: "166541", cor: "Azul" },
        "TJUR 04": { placa: "QFA1I50", oleo: "15W40", km_ini: "", km_fin: "", cor: "Verde" },
        "TJUR 06": { placa: "QUJ3E02", oleo: "5W30", km_ini: "", km_fin: "", cor: "Amarelo" },
        "TJUR 07": { placa: "RWR3C75", oleo: "15W40", km_ini: "", km_fin: "", cor: "Azul" },
        "TJUR 08": { placa: "QVE5H48", oleo: "5W30", km_ini: "115000", km_fin: "", cor: "Verde" },
        "TJUR 09": { placa: "RXC6J04", oleo: "15W40", km_ini: "", km_fin: "", cor: "Vermelho" },
        "TJUR 10": { placa: "PHU1I37", oleo: "15W40", km_ini: "", km_fin: "", cor: "Verde" }
    };

    let condutores = JSON.parse(localStorage.getItem('condutores')) || ["Francivaldo Costa", "Joelcinei Guimarães", "Reginaldo Pereira", "Adriano Nascimento"];

    document.getElementById('data_hoje').value = new Date().toLocaleDateString('pt-BR');

    function atualizarDadosVeiculo() {
        const v = frota[document.getElementById('selectTag').value];
        if (v) {
            document.getElementById('placa').value = v.placa;
            document.getElementById('tipo_oleo').value = v.oleo;
            document.getElementById('km_inicio').value = v.km_ini;
            document.getElementById('km_final').value = v.km_fin;
            document.getElementById('cor_selo').value = v.cor;
        }
    }

    function switchTab(tab) {
        document.getElementById('tab-checklist').classList.toggle('hidden', tab !== 'checklist');
        document.getElementById('tab-admin').classList.toggle('hidden', tab !== 'admin');
        document.getElementById('btn-chk').classList.toggle('active', tab === 'checklist');
        document.getElementById('btn-adm').classList.toggle('active', tab === 'admin');
        renderCondutores();
    }

    function renderCondutores() {
        const c1 = document.getElementById('condutor1');
        const lista = document.getElementById('listaCondutores');
        c1.innerHTML = condutores.map(c => `<option value="${c}">${c}</option>`).join('');
        lista.innerHTML = condutores.map((c, i) => `<div class="list-item"><span>${c}</span> <b onclick="remover(${i})" style="color:red;cursor:pointer">Remover</b></div>`).join('');
    }

    function addCondutor() {
        const n = document.getElementById('novoNome').value.trim();
        if(n) { 
            condutores.push(n); 
            localStorage.setItem('condutores', JSON.stringify(condutores)); 
            renderCondutores(); 
            document.getElementById('novoNome').value = ""; 
        }
    }

    function remover(i) {
        if(confirm("Remover condutor da lista?")) {
            condutores.splice(i, 1); 
            localStorage.setItem('condutores', JSON.stringify(condutores)); 
            renderCondutores();
        }
    }

    function formatarData(dataISO) {
        if(!dataISO) return "Não informada";
        const [ano, mes, dia] = dataISO.split('-');
        return `${dia}/${mes}/${ano}`;
    }

    function enviarWhatsApp() {
        const tag = document.getElementById('selectTag').value;
        if(!tag) return alert("Por favor, selecione a TAG do veículo.");

        const msg = `*CHECKLIST ${tag}*%0A` +
                    `--------------------------------%0A` +
                    `📅 Data: ${document.getElementById('data_hoje').value}%0A` +
                    `🚗 Placa: ${document.getElementById('placa').value}%0A` +
                    `🛢️ Próx. Troca Óleo: ${formatarData(document.getElementById('prox_oleo').value)}%0A` +
                    `🧪 Tipo de Óleo: ${document.getElementById('tipo_oleo').value}%0A%0A` +
                    `👤 Condutor 1: ${document.getElementById('condutor1').value}%0A` +
                    `👤 Condutor 2: ${document.getElementById('condutor2').value || "---"}%0A` +
                    `👤 Condutor 3: ${document.getElementById('condutor3').value || "---"}%0A%0A` +
                    `🛣️ Km Início: ${document.getElementById('km_inicio').value || "0"}%0A` +
                    `🏁 Km Final: ${document.getElementById('km_final').value || "0"}%0A%0A` +
                    `🏷️ Cor do Selo: ${document.getElementById('cor_selo').value}%0A` +
                    `📅 Validade Selo: ${formatarData(document.getElementById('val_selo').value)}%0A` +
                    `--------------------------------`;

        window.open(`https://wa.me/?text=${msg}`, '_blank');
    }

    renderCondutores();
</script>
</body>
</html>
