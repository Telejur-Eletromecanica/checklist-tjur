<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frota V22</title>
    <style>
        body { background: #f0f2f5; font-family: sans-serif; padding: 10px; }
        .card { background: white; max-width: 420px; margin: auto; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #1a73e8; border-bottom: 2px solid #1a73e8; padding-bottom: 8px; }
        label { font-size: 0.7rem; font-weight: bold; color: #666; display: block; margin-top: 12px; }
        select, input { width: 100%; padding: 12px; margin-top: 5px; border-radius: 8px; border: 1px solid #ccc; font-size: 1rem; box-sizing: border-box; }
        input[readonly] { background: #f8f9fa; color: #999; }
        .editavel { border: 2px solid #1a73e8 !important; }
        .btn { width: 100%; padding: 16px; border-radius: 8px; border: none; font-weight: bold; margin-top: 15px; cursor: pointer; color: white; font-size: 1rem; }
        .btn-saida { background: #1a73e8; }
        .btn-chegada { background: #d93025; }
        #statusMsg { text-align: center; font-weight: bold; padding: 10px; border-radius: 6px; margin-bottom: 10px; }
        .error { background: #fce8e6; color: #d93025; }
        .success { background: #e6f4ea; color: #1e8e3e; }
    </style>
</head>
<body>
<div class="card">
    <h2>TELEJUR FROTA</h2>
    <div id="statusMsg"></div>
    <form id="formApp">
        <label>Motorista</label>
        <select name="nome" id="nome" onchange="sincronizar()" required>
            <option value="">-- Selecione --</option>
            <option value="ADRIANO NASCIMENTO">ADRIANO NASCIMENTO</option>
            <option value="FRACIVALDO COSTA">FRACIVALDO COSTA</option>
            <option value="REGINALDO">REGINALDO</option>
        </select>
        <div style="display:flex; gap:10px">
            <div style="flex:1"><label>TAG</label><select name="tag" id="tag" onchange="sincronizar()" required><option value="">--</option><option value="TJUR 04">TJUR 04</option><option value="TJUR 13">TJUR 13</option></select></div>
            <div style="flex:1"><label>ID</label><input type="text" name="condutorID" id="condutorID" readonly></div>
        </div>
        <div style="display:flex; gap:10px">
            <div style="flex:1"><label>KM Inicial</label><input type="number" name="kmi" id="kmi" readonly></div>
            <div style="flex:1"><label>KM Final</label><input type="number" name="kmf" id="kmf" class="editavel"></div>
        </div>
        <label>Observação</label><input type="text" name="obs" id="obs" class="editavel">
        
        <button type="button" id="btnS" onclick="salvar('SAIDA')" class="btn btn-saida">🚀 INICIAR SAÍDA</button>
        <button type="button" id="btnC" onclick="salvar('CHEGADA')" class="btn btn-chegada">🏁 FINALIZAR CHEGADA</button>
    </form>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbysx-IjZe54SWbmqwl2NYJEx_kiuVtakdtE-GFYE30UxwYYQhcvOuw5DViSwMixS_QIyQ/exec";

    function sincronizar() {
        const tag = document.getElementById('tag').value;
        const nome = document.getElementById('nome').value;
        if(tag && nome) {
            document.getElementById('statusMsg').className = "";
            document.getElementById('statusMsg').innerText = "🔄 Verificando fila...";
            const old = document.getElementById('scr-sync'); if(old) old.remove();
            const s = document.createElement('script'); s.id = 'scr-sync';
            s.src = `${SCRIPT_URL}?callback=cb&acao=buscarDadosVei&tag=${encodeURIComponent(tag)}&nome=${encodeURIComponent(nome)}&t=${Date.now()}`;
            document.body.appendChild(s);
        }
    }

    function cb(r) {
        const msg = document.getElementById('statusMsg');
        if(r.bloqueado) {
            msg.className = "error"; msg.innerText = r.msg;
            document.getElementById('btnS').disabled = true;
        } else {
            msg.className = "success"; msg.innerText = "✅ Disponível";
            document.getElementById('btnS').disabled = false;
        }
        document.getElementById('condutorID').value = r.condutorSugerido;
        document.getElementById('kmi').value = r.kmi;
    }

    function salvar(tipo) {
        if(tipo === 'CHEGADA' && !document.getElementById('kmf').value) return alert("KM Final vazio!");
        const btn = event.target; btn.disabled = true;
        const dados = Object.fromEntries(new FormData(document.getElementById('formApp')));
        dados.tipo = tipo; dados.data = new Date().toLocaleDateString('pt-BR');
        const hora = new Date().toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'});
        if(tipo === 'SAIDA') dados.horaInic = hora; else dados.horaFim = hora;

        fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(dados) })
        .then(() => {
            const fone = "5599999999999";
            const msg = `*TELEJUR FROTA*\nMotorista: ${dados.nome}\nCarro: ${dados.tag} (${dados.condutorID})\nKM: ${tipo==='SAIDA'?dados.kmi:dados.kmf}`;
            window.open(`https://api.whatsapp.com/send?phone=${fone}&text=${encodeURIComponent(msg)}`, '_blank');
            location.reload();
        });
    }
</script>
</body>
</html>
