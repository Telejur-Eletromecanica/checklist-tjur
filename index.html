<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TELEJUR - GESTÃO TOTAL</title>
    <style>
        :root { --primary: #1a237e; --success: #25D366; --bg: #f4f7f9; --warning: #ffc107; --danger: #d32f2f; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 10px; }
        .card { max-width: 450px; margin: auto; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border-top: 12px solid var(--primary); }
        .brand { font-size: 28px; font-weight: 900; color: var(--primary); text-align: center; margin: 0; }
        .subtitle { font-size: 11px; color: #666; font-weight: bold; text-align: center; margin-bottom: 20px; }

        label { font-weight: 700; font-size: 11px; color: #555; display: block; margin-top: 12px; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 14px; margin-top: 5px; border-radius: 10px; border: 2px solid #e0e0e0; font-size: 16px; box-sizing: border-box; }
        
        .readonly { background: #f0f2f5 !important; color: var(--primary); font-weight: bold; border: 1px dashed var(--primary); pointer-events: none; }
        .aviso-foto { background: #e3f2fd; color: #0d47a1; padding: 12px; border-radius: 10px; border: 2px solid #2196f3; margin-top: 10px; font-weight: bold; text-align: center; font-size: 13px; }
        .foto-obrigatoria { background: #fff3e0; color: #e65100; border-color: #ffb74d; }
        
        #msgRevisao { display: none; padding: 10px; border-radius: 10px; font-weight: bold; text-align: center; margin-top: 10px; font-size: 13px; }
        .rev-vencida { background: var(--danger); color: white; animation: blink 1s infinite; }
        .rev-proxima { background: var(--warning); color: black; }
        @keyframes blink { 50% { opacity: 0.8; } }

        .btn { width: 100%; padding: 18px; border: none; border-radius: 12px; font-size: 18px; color: white; font-weight: bold; cursor: pointer; margin-top: 15px; }
        .btn-azul { background: var(--primary); }
        .btn-verde { background: var(--success); }
        .btn-reset { background: #eee; color: #666; font-size: 10px; padding: 5px; margin-top: 5px; border-radius: 5px; border: 1px solid #ccc; width: auto; cursor: pointer; }

        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(26,35,126,0.95); z-index: 1000; color: white; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div id="overlay">
    <div style="font-size: 80px;">🔔</div>
    <h1>PROCESSANDO...</h1>
</div>

<div class="card">
    <div class="brand">TELEJUR</div>
    <div class="subtitle">CONTROLE DE FROTA E MANUTENÇÃO</div>

    <div id="formContainer">
        <form id="fleetForm">
            <div class="aviso-foto foto-obrigatoria">📸 FOTO 1: ETIQUETA DE ÓLEO DO CARRO</div>

            <label>VEÍCULO (TAG)</label>
            <select id="tag" onchange="autoFillVeiculo()">
                <option value="">SELECIONE A TAG</option>
                <option value="TJUR 03" data-v="HILUX" data-p="PHG0639">TJUR 03</option>
                <option value="TJUR 04" data-v="MUNCK" data-p="QFA1I50">TJUR 04</option>
                <option value="TJUR 06" data-v="SAVEIRO" data-p="QUJ3E02">TJUR 06</option>
                <option value="TJUR 07" data-v="MUNCK" data-p="RWR3C75">TJUR 07</option>
                <option value="TJUR 08" data-v="HILUX" data-p="QVE5H48">TJUR 08</option>
                <option value="TJUR 13" data-v="HILUX" data-p="QVD4I38">TJUR 13</option>
            </select>
            <input type="text" id="veiculoPlaca" class="readonly" readonly>

            <label>ID CONDUTOR (1-9)</label>
            <select id="idCondutor" onchange="localStorage.setItem('pref_id', this.value)">
                <option value="">ID</option>
                <option>1</option><option>2</option><option>3</option><option>4</option>
                <option>5</option><option>6</option><option>7</option><option>8</option><option>9</option>
            </select>

            <label>NOME DO MOTORISTA</label>
            <select id="condutor" onchange="localStorage.setItem('pref_moto', this.value)">
                <option value="">SELECIONE</option>
                <option>ADRIANO NASCIMENTO</option><option>FRANCIVALDO COSTA</option>
                <option>FRANCINILDO TEXEIRA</option><option>JOELCINEI GUIMARÃES</option>
                <option>LAFAITE BATISTA</option><option>REGINALDO</option>
            </select>

            <label>KM DA ÚLTIMA TROCA (ETIQUETA)</label>
            <input type="number" id="kmUltima" placeholder="Digite o KM da troca" oninput="calcRevisao()">
            <button type="button" class="btn-reset" onclick="resetEtiqueta()">🔄 Limpar Memória deste Veículo</button>

            <label>PRÓXIMA TROCA (+5.000 KM)</label>
            <input type="number" id="kmRev" class="readonly" style="background:#e8f5e9 !important" readonly>

            <label>KM ATUAL NO PAINEL</label>
            <input type="number" id="kmi" placeholder="Digite o KM agora" oninput="checkAlerts()">
            <div id="msgRevisao"></div>

            <div style="display: flex; gap: 10px;">
                <div style="flex:1"><label>SELO</label><select id="selo"><option value="">COR</option><option>VERDE</option><option>AMARELO</option><option>AZUL</option><option>VERMELHO</option></select></div>
                <div style="flex:1"><label>VALIDADE</label><input type="date" id="valSelo" onchange="calcCarencia()"></div>
            </div>

            <label>DATA LIMITE (+5 DIAS ÚTEIS)</label>
            <input type="text" id="limite" class="readonly" style="color: #827717" readonly>

            <div id="blocoFinal" class="hidden">
                <hr style="margin: 20px 0; border: 1px solid #eee;">
                <div class="aviso-foto foto-obrigatoria">📸 FOTO 2: CHECKLIST FÍSICO ASSINADO</div>
                <label style="color: var(--danger)">📍 KM FINAL (RETORNO)</label>
                <input type="number" id="kmf" style="border: 2px solid var(--danger)">
            </div>

            <button type="button" id="btnAcao" onclick="iniciarTrajeto()" class="btn btn-azul">SALVAR E INICIAR 🟢</button>
        </form>
    </div>

    <div id="esperaContainer" class="hidden">
        <div class="aviso-foto">🚀 TRAJETO EM ANDAMENTO</div>
        <div id="infoResumo" style="padding:15px; font-size:14px; line-height:1.6; background:#f8f9fa; border-radius:10px; margin:10px 0;"></div>
        <button onclick="enviarZap('INICIO')" class="btn btn-verde">NOTIFICAR INÍCIO (ZAP)</button>
        <button onclick="liberarFimUI()" class="btn btn-azul">CHEGUEI / FINALIZAR</button>
    </div>
</div>

<script>
    function autoFillVeiculo() {
        const sel = document.getElementById("tag");
        const opt = sel.options[sel.selectedIndex];
        if(!opt.value) { document.getElementById("veiculoPlaca").value = ""; return; }
        document.getElementById("veiculoPlaca").value = `${opt.getAttribute('data-v')} (${opt.getAttribute('data-p')})`;
        
        const salvo = localStorage.getItem(`km_troca_${opt.value}`);
        if(salvo) { document.getElementById("kmUltima").value = salvo; calcRevisao(); }
    }

    function calcRevisao() {
        const u = parseInt(document.getElementById("kmUltima").value);
        if(u) { document.getElementById("kmRev").value = u + 5000; checkAlerts(); }
    }

    function resetEtiqueta() {
        const tag = document.getElementById("tag").value;
        if(!tag) return alert("Selecione uma TAG primeiro.");
        if(confirm("Deseja apagar o KM salvo para este veículo?")) {
            localStorage.removeItem(`km_troca_${tag}`);
            document.getElementById("kmUltima").value = "";
            document.getElementById("kmRev").value = "";
            alert("Memória limpa!");
        }
    }

    function checkAlerts() {
        const kmi = parseInt(document.getElementById("kmi").value);
        const kmr = parseInt(document.getElementById("kmRev").value);
        const msg = document.getElementById("msgRevisao");
        if(!kmi || !kmr) { msg.style.display="none"; return; }
        msg.style.display = "block";
        const saldo = kmr - kmi;
        if(saldo <= 0) { msg.className = "rev-vencida"; msg.innerHTML = `🚨 REVISÃO VENCIDA EM ${Math.abs(saldo)} KM!`; }
        else if(saldo <= 500) { msg.className = "rev-proxima"; msg.innerHTML = `⚠️ ATENÇÃO: Revisão em ${saldo} KM!`; }
        else { msg.style.display="none"; }
    }

    function calcCarencia() {
        const v = document.getElementById("valSelo").value;
        if(!v) return;
        let d = new Date(v + "T12:00:00");
        let i = 0;
        while(i < 5) { d.setDate(d.getDate()+1); if(d.getDay()!==0 && d.getDay()!==6) i++; }
        document.getElementById("limite").value = d.toLocaleDateString('pt-BR');
    }

    function bip() {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        osc.connect(ctx.destination);
        osc.start(); osc.stop(ctx.currentTime + 0.15);
    }

    function iniciarTrajeto() {
        const d = {
            tag: document.getElementById("tag").value,
            id: document.getElementById("idCondutor").value,
            moto: document.getElementById("condutor").value,
            kmi: document.getElementById("kmi").value,
            kmr: document.getElementById("kmRev").value,
            kmu: document.getElementById("kmUltima").value,
            selo: document.getElementById("selo").value,
            lim: document.getElementById("limite").value,
            vp: document.getElementById("veiculoPlaca").value,
            hI: new Date().toLocaleTimeString('pt-BR'),
            data: new Date().toLocaleDateString('pt-BR')
        };
        if(!d.tag || !d.kmi || !d.id || !d.moto) return alert("Preencha todos os campos obrigatórios!");

        bip();
        document.getElementById("overlay").style.display = "flex";
        localStorage.setItem(`km_troca_${d.tag}`, d.kmu);
        localStorage.setItem("tjur_sessao", JSON.stringify(d));
        setTimeout(() => location.reload(), 1500);
    }

    function liberarFimUI() {
        const s = JSON.parse(localStorage.getItem("tjur_sessao"));
        document.getElementById("esperaContainer").classList.add("hidden");
        document.getElementById("formContainer").classList.remove("hidden");
        document.getElementById("blocoFinal").classList.remove("hidden");

        document.getElementById("tag").value = s.tag;
        document.getElementById("veiculoPlaca").value = s.vp;
        document.getElementById("idCondutor").value = s.id;
        document.getElementById("condutor").value = s.moto;
        document.getElementById("kmi").value = s.kmi;
        document.getElementById("kmUltima").value = s.kmu;
        document.getElementById("kmRev").value = s.kmr;
        document.getElementById("selo").value = s.selo;
        document.getElementById("limite").value = s.lim;

        ["tag", "idCondutor", "condutor", "kmi", "kmUltima", "selo", "valSelo"].forEach(id => {
            document.getElementById(id).classList.add("readonly");
        });

        const btn = document.getElementById("btnAcao");
        btn.innerText = "ENCERRAR E ENVIAR ✅";
        btn.className = "btn btn-verde";
        btn.onclick = () => enviarZap('FIM');
    }

    function enviarZap(tipo) {
        const s = JSON.parse(localStorage.getItem("tjur_sessao"));
        const kmf = document.getElementById("kmf").value;
        const hF = new Date().toLocaleTimeString('pt-BR');
        let txt = "";

        if(tipo === 'INICIO') {
            txt = `*TELEJUR - INÍCIO*\n📅 *DATA:* ${s.data}\n🆔 *ID:* ${s.id} - ${s.moto}\n🚗 *VEÍCULO:* ${s.vp}\n📍 *KM:* ${s.kmi}\n🛠️ *PRÓX. TROCA:* ${s.kmr}\n🛡️ *SELO:* ${s.selo}`;
        } else {
            if(!kmf) return alert("Digite o KM FINAL!");
            txt = `*TELEJUR - FINALIZADO*\n🆔 *ID:* ${s.id} - ${s.moto}\n🚗 *VEÍCULO:* ${s.vp}\n📍 *KM FINAL:* ${kmf}\n⏰ *FIM:* ${hF}`;
            localStorage.removeItem("tjur_sessao");
        }
        window.location.href = "whatsapp://send?text=" + encodeURIComponent(txt);
        if(tipo === 'FIM') setTimeout(() => location.reload(), 2000);
    }

    window.onload = () => {
        const s = localStorage.getItem("tjur_sessao");
        const pM = localStorage.getItem("pref_moto");
        const pI = localStorage.getItem("pref_id");
        if(pM) document.getElementById("condutor").value = pM;
        if(pI) document.getElementById("idCondutor").value = pI;
        if(s) {
            const d = JSON.parse(s);
            document.getElementById("formContainer").classList.add("hidden");
            document.getElementById("esperaContainer").classList.remove("hidden");
            document.getElementById("infoResumo").innerHTML = `<b>TAG:</b> ${d.tag}<br><b>MOTORISTA:</b> ${d.moto}<br><b>KM:</b> ${d.kmi}`;
        }
    };
</script>
</body>
</html>
