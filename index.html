<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TELEJUR - GESTÃO DE FROTA</title>
    <style>
        :root { --primary: #1a237e; --danger: #c62828; --success: #2e7d32; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; margin: 0; padding: 10px; }
        .card { max-width: 450px; margin: auto; background: white; padding: 20px; border-radius: 20px; border-top: 10px solid var(--primary); box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .grid-status { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 15px 0; }
        .v-box { padding: 10px; border-radius: 10px; text-align: center; font-size: 11px; font-weight: bold; border: 1px solid #ddd; }
        .livre { background: #e8f5e9; color: var(--success); }
        .ocupado { background: #ffebee; color: var(--danger); }
        label { font-weight: bold; font-size: 11px; color: #555; display: block; margin-top: 12px; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 12px; margin-top: 5px; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; box-sizing: border-box; }
        .readonly { background: #e8f5e9 !important; color: #333; pointer-events: none; }
        .btn { width: 100%; padding: 18px; border: none; border-radius: 15px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 15px; text-transform: uppercase; }
        .btn-azul { background: var(--primary); color: white; }
    </style>
</head>
<body>

<div class="card">
    <p style="text-align:center; font-weight:900; color:var(--primary); font-size:24px; margin:0">TELEJUR</p>
    <div id="painel" class="grid-status">Sincronizando...</div>

    <div id="formContainer">
        <label>TAG do Veículo</label>
        <select id="tag" onchange="verificarDonoID()">
            <option value="">-- SELECIONE --</option>
            <option value="TJUR 04">TJUR 04</option>
            <option value="TJUR 06">TJUR 06</option>
            <option value="TJUR 07">TJUR 07</option>
            <option value="TJUR 08">TJUR 08</option>
            <option value="TJUR 10">TJUR 10</option>
            <option value="TJUR 13">TJUR 13</option>
        </select>

        <label>ID do Condutor</label>
        <select id="idMot">
            <option value="ID 01">ID 01</option><option value="ID 02">ID 02</option><option value="ID 03">ID 03</option>
            <option value="ID 04">ID 04</option><option value="ID 05">ID 05</option><option value="ID 06">ID 06</option>
            <option value="ID 07">ID 07</option><option value="ID 08">ID 08</option><option value="ID 09">ID 09</option>
            <option value="ID 10">ID 10</option><option value="ID 11">ID 11</option><option value="ID 12">ID 12</option>
            <option value="ID 13">ID 13</option><option value="ID 14">ID 14</option><option value="ID 15">ID 15</option>
        </select>

        <label>Motorista</label>
        <select id="nomeMot">
            <option value="">-- SELECIONE --</option>
            <option value="ADRIANO NASCIMENTO">ADRIANO NASCIMENTO</option>
            <option value="FRANCIVALDO COSTA">FRANCIVALDO COSTA</option>
            <option value="FRANCINILDO TEXEIRA">FRANCINILDO TEXEIRA</option>
            <option value="JOELCINEI GUIMARAES">JOELCINEI GUIMARAES</option>
            <option value="MIRIELLY">MIRIELLY</option>
            <option value="REGINALDO">REGINALDO</option>
            <option value="WALTER GONÇALVES">WALTER GONÇALVES</option>
            <option value="LAFAITE BATISTA">LAFAITE BATISTA</option>
            <option value="EZEQUIEL">EZEQUIEL</option>
        </select>

        <label>Localização (Planta)</label>
        <select id="planta">
            <option value="PORTO">PORTO</option>
            <option value="BENEFICIAMENTO">BENEFICIAMENTO</option>
            <option value="FORA DA PLANTA">FORA DA PLANTA</option>
        </select>

        <label>KM Inicial</label>
        <input type="number" id="kmi">
        
        <label>Próxima Troca de Óleo (KM)</label>
        <input type="number" id="oleo">

        <div id="fimCampos" style="display:none">
            <hr style="margin:20px 0; border:0; border-top:1px dashed #ccc">
            <label style="color:var(--danger)">KM Final (Chegada)</label>
            <input type="number" id="kmf">
            <textarea id="obs" placeholder="Observações (Geolocalização ou detalhes)" style="margin-top:10px"></textarea>
        </div>

        <button id="btnAcao" onclick="salvarInicio()" class="btn btn-azul">Salvar Saída</button>
    </div>

    <div id="telaAtiva" style="display:none">
        <div id="statusTrip" style="background:#f8f9fa; padding:15px; border-radius:10px; border-left:5px solid var(--primary); margin-bottom:15px"></div>
        <button onclick="shareWhats(false)" class="btn" style="background:#25D366; color:white">WhatsApp Saída</button>
        <button onclick="liberarFim()" class="btn btn-azul" style="background:#444">Finalizar Trajeto</button>
    </div>
</div>

<script>
    const URL = "https://script.google.com/macros/s/AKfycbysx-IjZe54SWbmqwl2NYJEx_kiuVtakdtE-GFYE30UxwYYQhcvOuw5DViSwMixS_QIyQ/exec"; 
    const dataH = new Date().toLocaleDateString('pt-BR');

    async function verificarDonoID() {
        const tag = document.getElementById("tag").value;
        const selNome = document.getElementById("nomeMot");
        const selId = document.getElementById("idMot");
        if(!tag) return;

        const cb = "cb_dono";
        const s = document.createElement('script');
        window[cb] = (d) => {
            if(d.nome) {
                selNome.value = d.nome; selId.value = d.id;
                selNome.classList.add("readonly"); selId.classList.add("readonly");
            } else {
                selNome.classList.remove("readonly"); selId.classList.remove("readonly");
                selNome.value = "";
            }
        };
        s.src = `${URL}?acao=verificarDonoID&tag=${tag}&data=${dataH}&callback=${cb}`;
        document.body.appendChild(s);
    }

    async function sync() {
        const cb = "cb_sync";
        const s = document.createElement('script');
        window[cb] = (d) => {
            const tags = ["TJUR 04", "TJUR 06", "TJUR 07", "TJUR 08", "TJUR 10", "TJUR 13"];
            document.getElementById('painel').innerHTML = tags.map(t => {
                const info = d[t];
                return `<div class="v-box ${info ? 'ocupado' : 'livre'}">${t}<br>${info ? '🔴 ' + info.nome.split(' ')[0] : '🟢 LIVRE'}</div>`;
            }).join('');
        };
        s.src = `${URL}?acao=statusGeral&data=${dataH}&callback=${cb}`;
        document.body.appendChild(s);
    }

    function salvarInicio() {
        const d = {
            data: dataH, tag: document.getElementById("tag").value, 
            id: document.getElementById("idMot").value, nome: document.getElementById("nomeMot").value, 
            kmi: document.getElementById("kmi").value, planta: document.getElementById("planta").value,
            horaI: new Date().toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'}),
            oleo: document.getElementById("oleo").value, acao: "registrar", callback: "cb_reg"
        };
        if(!d.tag || !d.kmi || !d.nome) return alert("Preencha todos os campos!");
        const s = document.createElement('script');
        window.cb_reg = (res) => {
            if(res.res === "erro") return alert(res.msg);
            d.numTrajeto = res.n;
            localStorage.setItem("trip_telejur", JSON.stringify(d));
            location.reload();
        };
        s.src = `${URL}?${new URLSearchParams(d)}`;
        document.body.appendChild(s);
    }

    function liberarFim() {
        const d = JSON.parse(localStorage.getItem("trip_telejur"));
        document.getElementById("telaAtiva").style.display = "none";
        document.getElementById("formContainer").style.display = "block";
        document.getElementById("fimCampos").style.display = "block";
        ["tag", "idMot", "nomeMot", "kmi", "oleo", "planta"].forEach(f => {
            document.getElementById(f).value = d[f === "idMot" ? "id" : (f === "nomeMot" ? "nome" : f)];
            document.getElementById(f).classList.add("readonly");
        });
        document.getElementById("btnAcao").innerText = "Concluir Trajeto";
        document.getElementById("btnAcao").onclick = () => {
            const kmf = document.getElementById("kmf").value;
            const hF = new Date().toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'});
            if(!kmf) return alert("Informe o KM Final!");
            const s = document.createElement('script');
            window.cb_fin = () => { shareWhats(true, kmf, hF, document.getElementById("obs").value); };
            s.src = `${URL}?acao=finalizar&tag=${d.tag}&data=${dataH}&kmf=${kmf}&horaF=${hF}&obs=${document.getElementById("obs").value || 'Nenhuma'}&callback=cb_fin`;
            document.body.appendChild(s);
        };
    }

    function shareWhats(isFim, kmf, hF, obs) {
        const d = JSON.parse(localStorage.getItem("trip_telejur"));
        let msg = isFim ? `✅ *CHEGADA:* ${d.tag}\n` : `🚀 *SAÍDA:* ${d.tag}\n`;
        msg += `📍 *${d.numTrajeto}*\n👤 *${d.nome}* (${d.id})\n--------------------------------\n`;
        if (isFim) {
            msg += `🛫 *SAÍDA:* ${d.horaI} (KM ${d.kmi})\n🛬 *CHEGADA:* ${hF} (KM ${kmf})\n🛣️ *RODADO:* ${parseInt(kmf) - parseInt(d.kmi)} km\n📍 *LOCAL:* ${d.planta}\n📝 *OBS:* ${obs || "Nenhuma"}`;
            localStorage.removeItem("trip_telejur");
        } else {
            msg += `🛫 *HORA:* ${d.horaI}\n🛣️ *KM INICIAL:* ${d.kmi}\n📍 *LOCAL:* ${d.planta}\n🛢️ *ÓLEO:* ${d.oleo}`;
        }
        window.location.href = `https://wa.me/?text=${encodeURIComponent(msg)}`;
    }

    window.onload = () => {
        sync();
        const salvo = localStorage.getItem("trip_telejur");
        if(salvo) {
            const d = JSON.parse(salvo);
            document.getElementById("formContainer").style.display = "none";
            document.getElementById("telaAtiva").style.display = "block";
            document.getElementById("statusTrip").innerHTML = `<b>TRAJETO ATIVO</b><br>🚗 ${d.tag} | ${d.numTrajeto}<br>👤 ${d.nome}`;
        }
    };
</script>
</body>
</html>
