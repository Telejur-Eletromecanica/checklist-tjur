<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TELEJUR v32.2</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f9; margin: 0; padding: 20px; color: #1a237e; }
        .card { max-width: 400px; margin: auto; background: #fff; border-radius: 20px; padding: 25px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); border: 1px solid #e0e0e0; }
        h2 { text-align: center; font-size: 18px; color: #0d47a1; margin-bottom: 25px; }
        label { font-size: 12px; font-weight: bold; color: #0d47a1; display: block; margin-top: 15px; }
        select, input, textarea { width: 100%; padding: 12px; margin-top: 5px; border-radius: 8px; border: 2px solid #e0e0e0; font-size: 16px; box-sizing: border-box; background: #f9f9f9; transition: 0.3s; }
        select:focus, input:focus { border-color: #0d47a1; outline: none; background: #fff; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 12px; font-size: 16px; font-weight: bold; color: white; cursor: pointer; margin-top: 25px; transition: 0.3s; }
        .btn-start { background: #2e7d32; }
        .btn-start:hover { background: #1b5e20; }
        .btn-finish { background: #c62828; }
        #loading { display:none; text-align:center; font-size: 12px; color: #666; margin-top: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h2>TELEJUR JURUTI v32.2</h2>
    
    <div id="loading">⏳ Processando dados...</div>

    <div id="form-content">
        <label>Condutor</label>
        <select id="condutor" onchange="initApp()">
            <option value="">Selecione...</option>
            <option>ADRIANO NASCIMENTO</option><option>REGINALDO</option><option>LAFAITE BATISTA</option>
            <option>WALTER GONÇALVES</option><option>JOELCINEI GUIMARAES</option>
        </select>

        <label>TAG</label>
        <select id="tag" onchange="loadVehicle()">
            <option value="">Selecione...</option>
            <option>TJUR 04</option><option>TJUR 06</option><option>TJUR 07</option>
            <option>TJUR 08</option><option>TJUR 09</option><option>TJUR 10</option><option>TJUR 13</option>
        </select>

        <label>KM Inicial</label>
        <input type="number" id="kmi" placeholder="000.000">

        <label id="lblOleo">Próxima Troca (KM)</label>
        <div id="boxOleo"><input type="number" id="oleo" placeholder="000.000"></div>

        <label>Observação</label>
        <textarea id="obs" rows="2" placeholder="Opcional..."></textarea>

        <div id="finish-area" style="display:none; background:#fff1f0; padding:10px; border-radius:10px; margin-top:10px;">
            <label style="color:#c62828">KM Final (Chegada)</label>
            <input type="number" id="kmf" style="border-color:#ffa39e">
        </div>

        <button id="btnAcao" onclick="execute()" class="btn btn-start">🚀 INICIAR TRAJETO</button>
    </div>
</div>

<script>
    const SCRIPT_URL = "SUA_NOVA_URL_AQUI"; // Atualize após publicar o script acima
    const VEHICLES = {
        "TJUR 04":{v:"SKY MUNCK", p:"QFA1I50", t:"data"}, "TJUR 06":{v:"SAVEIRO", p:"QUJ3E02", t:"km"},
        "TJUR 07":{v:"SKY MUNCK", p:"RWR3C75", t:"data"}, "TJUR 08":{v:"HILUX", p:"QVE5H48", t:"km"},
        "TJUR 13":{v:"CAMINHONETE", p:"QVD4I38", t:"km"}
    };
    let state = { inProgress: {}, isFinishing: false, carData: {} };

    async function call(params) {
        document.getElementById('loading').style.display = 'block';
        return new Promise(r => {
            const cb = 'cb' + Date.now();
            window[cb] = (d) => { document.getElementById('loading').style.display = 'none'; r(d); };
            const s = document.createElement('script');
            s.src = `${SCRIPT_URL}?${new URLSearchParams(params)}&callback=${cb}`;
            document.body.appendChild(s);
        });
    }

    async function initApp() {
        const mot = document.getElementById('condutor').value;
        if(!mot) return;
        const res = await call({ acao: 'init' });
        state.inProgress = res.emAndamento;
        
        const selTag = document.getElementById('tag');
        Array.from(selTag.options).forEach(opt => {
            if(!opt.value) return;
            const emUso = res.emAndamento[opt.value];
            const lock = VEHICLES[opt.value]?.v === "SKY MUNCK" && !res.autorizados.includes(mot);
            opt.disabled = (emUso && emUso.nome !== mot) || lock;
            if(emUso && emUso.nome === mot) {
                selTag.value = opt.value;
                restoreSession(opt.value, emUso);
            }
        });
    }

    function restoreSession(tag, data) {
        state.isFinishing = true;
        document.getElementById('kmi').value = data.kmi;
        document.getElementById('kmi').readOnly = true;
        document.getElementById('finish-area').style.display = 'block';
        const btn = document.getElementById('btnAcao');
        btn.innerText = "🏁 FINALIZAR TRAJETO";
        btn.className = "btn btn-finish";
    }

    async function loadVehicle() {
        if(state.isFinishing) return;
        const tag = document.getElementById('tag').value;
        const d = await call({ acao: 'getCar', tag: tag });
        document.getElementById('kmi').value = d.kmi;
        state.carData = { ...VEHICLES[tag], n: d.n, tag: tag };
        
        const box = document.getElementById('boxOleo');
        box.innerHTML = `<input type="${state.carData.t === 'data'?'date':'number'}" id="oleo">`;
        document.getElementById('lblOleo').innerText = `Próxima Troca (${state.carData.t.toUpperCase()})`;
        document.getElementById('oleo').value = d.oleo;
    }

    async function execute() {
        const btn = document.getElementById('btnAcao');
        btn.disabled = true;

        if(!state.isFinishing) {
            // REGISTRAR INÍCIO
            const p = {
                acao: 'registrar', tag: document.getElementById('tag').value,
                nome: document.getElementById('condutor').value, kmi: document.getElementById('kmi').value,
                data: new Date().toLocaleDateString('pt-BR'), horaI: new Date().toLocaleTimeString('pt-BR'),
                id: "CONDUTOR", n: state.carData.n, oleo: document.getElementById('oleo').value,
                placa: state.carData.p, veic: state.carData.v, obs: document.getElementById('obs').value
            };
            await call(p);
            alert("Trajeto Iniciado!");
            location.reload();
        } else {
            // FINALIZAR
            const kf = document.getElementById('kmf').value;
            if(!kf) return alert("Informe o KM Final!");
            await call({
                acao: 'finalizar', tag: document.getElementById('tag').value,
                kmf: kf, horaF: new Date().toLocaleTimeString('pt-BR'),
                obs: document.getElementById('obs').value
            });
            alert("Trajeto Finalizado!");
            location.reload();
        }
    }
</script>
</body>
</html>
