<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Telejur Frota - Inteligente</title>
</head>
<body class="bg-slate-950 pb-10 font-sans text-slate-200">

    <div class="max-w-md mx-auto p-4">
        <header class="py-6 text-center border-b border-slate-800 mb-6">
            <h1 class="text-2xl font-black text-blue-500 italic uppercase">Telejur <span class="text-white">Frota</span></h1>
        </header>

        <main class="space-y-6">
            
            <section class="bg-slate-900 rounded-3xl p-5 border border-slate-800 shadow-xl space-y-4">
                <div>
                    <label class="text-[9px] font-bold text-slate-500 uppercase ml-1">Selecione a TAG</label>
                    <select id="tag_select" onchange="autocompletarVeiculo()" class="w-full bg-slate-800 border-2 border-blue-600 rounded-xl p-4 text-xl font-black text-white outline-none">
                        <option value="" disabled selected>ESCOLHA A TAG</option>
                        <option value="TJUR 04">TJUR 04</option>
                        <option value="TJUR 06">TJUR 06</option>
                        <option value="TJUR 07">TJUR 07</option>
                        <option value="TJUR 08">TJUR 08</option>
                        <option value="TJUR 09">TJUR 09</option>
                        <option value="TJUR 10">TJUR 10</option>
                        <option value="TJUR 13">TJUR 13</option>
                    </select>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div class="bg-slate-950/50 p-3 rounded-xl border border-slate-800">
                        <label class="text-[8px] font-bold text-slate-500 uppercase block">Veículo</label>
                        <input type="text" id="veiculo_auto" readonly class="bg-transparent w-full text-sm font-bold text-slate-300 outline-none" placeholder="---">
                    </div>
                    <div class="bg-slate-950/50 p-3 rounded-xl border border-slate-800">
                        <label class="text-[8px] font-bold text-slate-500 uppercase block">Placa</label>
                        <input type="text" id="placa_auto" readonly class="bg-transparent w-full text-sm font-black text-blue-400 outline-none uppercase" placeholder="---">
                    </div>
                </div>
            </section>

            <section class="bg-slate-900 rounded-3xl p-5 border border-slate-800 shadow-xl space-y-4">
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="text-[9px] font-bold text-slate-500 uppercase ml-1">Data</label>
                        <input type="date" id="data_ref" class="w-full bg-slate-800 border border-slate-700 rounded-xl p-3 text-sm font-bold text-white outline-none">
                    </div>
                    <div>
                        <label class="text-[9px] font-bold text-slate-500 uppercase ml-1">ID Fila</label>
                        <select id="id_condutor" class="w-full bg-slate-800 border border-slate-700 rounded-xl p-3 text-sm font-black text-blue-400 outline-none">
                            <option value="Condutor 1">Condutor 1</option>
                            <option value="Condutor 2">Condutor 2</option>
                            <option value="Condutor 3">Condutor 3</option>
                        </select>
                    </div>
                </div>
                <div>
                    <label class="text-[9px] font-bold text-slate-500 uppercase ml-1">Motorista Responsável</label>
                    <select id="motorista" class="w-full bg-slate-800 border border-slate-700 rounded-xl p-3 text-sm font-bold text-white outline-none">
                        <option value="" disabled selected>QUEM É VOCÊ?</option>
                        <option value="WALTER GONÇALVES">WALTER GONÇALVES</option>
                        <option value="LAFAIETE BATISTA">LAFAIETE BATISTA</option>
                        <option value="REGINALDO PEREIRA">REGINALDO PEREIRA</option>
                        <option value="FRACIVALDO">FRACIVALDO</option>
                    </select>
                </div>
            </section>

            <section class="bg-slate-900 rounded-3xl p-5 border border-slate-800 shadow-xl space-y-4">
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="text-[9px] font-bold text-slate-500 uppercase ml-1">KM Início</label>
                        <input type="tel" id="km_inicio" placeholder="000000" class="w-full bg-slate-800 border-2 border-slate-700 rounded-xl p-4 text-lg font-black text-white text-center outline-none focus:border-green-500">
                    </div>
                    <div>
                        <label class="text-[9px] font-bold text-slate-500 uppercase ml-1">KM Final</label>
                        <input type="tel" id="km_final" placeholder="000000" class="w-full bg-slate-800 border-2 border-slate-700 rounded-xl p-4 text-lg font-black text-white text-center outline-none focus:border-blue-500">
                    </div>
                </div>
                <div class="bg-slate-950/30 p-4 rounded-2xl border border-slate-800">
                    <label class="text-[9px] font-bold text-slate-500 uppercase block mb-2">Manutenção de Óleo (15W40)</label>
                    <input type="tel" id="km_troca" placeholder="Próxima Troca (KM)" class="w-full bg-slate-800 border border-slate-700 rounded-xl p-3 text-sm font-black text-orange-400 outline-none text-center">
                </div>
            </section>

            <button onclick="enviarRelatorio()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-5 rounded-2xl shadow-2xl uppercase tracking-widest transition-all">
                Enviar Relatório WhatsApp
            </button>
        </main>
    </div>

    <script>
        // BANCO DE DADOS BASEADO NA IMAGEM QUE VOCÊ ENVIOU
        const frota = {
            "TJUR 04": { veiculo: "SKY MUNCK", placa: "QFA1I50" },
            "TJUR 06": { veiculo: "SAVEIRO FURGÃO", placa: "QUJ3E02" },
            "TJUR 07": { veiculo: "SKY MUNCK", placa: "RWR3C75" },
            "TJUR 08": { veiculo: "CAMINHONETE HILUX", placa: "QVE5H48" },
            "TJUR 09": { veiculo: "SKY MUNCK", placa: "RXC6J04" },
            "TJUR 10": { veiculo: "CAMINHONETE", placa: "PHU1I37" },
            "TJUR 13": { veiculo: "CAMINHONETE", placa: "QVD4I38" }
        };

        function autocompletarVeiculo() {
            const tag = document.getElementById('tag_select').value;
            const info = frota[tag];

            if (info) {
                document.getElementById('veiculo_auto').value = info.veiculo;
                document.getElementById('placa_auto').value = info.placa;
            }
        }

        // Define a data de hoje automaticamente
        document.getElementById('data_ref').valueAsDate = new Date();

        function enviarRelatorio() {
            const tag = document.getElementById('tag_select').value;
            const veiculo = document.getElementById('veiculo_auto').value;
            const placa = document.getElementById('placa_auto').value;
            const motorista = document.getElementById('motorista').value;
            const kmIni = document.getElementById('km_inicio').value;
            const kmFim = document.getElementById('km_final').value;

            if(!tag || !motorista) return alert("Selecione a TAG e o Motorista!");

            const texto = encodeURIComponent(
                `*RELATÓRIO TELEJUR FROTA*\n\n` +
                `🚗 *Veículo:* ${veiculo} (${tag})\n` +
                `🔢 *Placa:* ${placa}\n` +
                `👤 *Motorista:* ${motorista}\n` +
                `🛣️ *KM Inicial:* ${kmIni}\n` +
                `🏁 *KM Final:* ${kmFim}`
            );
            window.open(`https://wa.me/?text=${texto}`, '_blank');
        }
    </script>
</body>
</html>
