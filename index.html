<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TELEJUR v10.3</title>
    <style>
        :root { --primary: #1a237e; --danger: #c62828; --success: #2e7d32; }
        body { font-family: sans-serif; background: #f0f4f8; padding: 10px; margin: 0; }
        .card { max-width: 450px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .grid-status { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-bottom: 15px; }
        .v-box { padding: 8px 2px; border-radius: 8px; text-align: center; font-size: 9px; font-weight: bold; border: 1px solid #ddd; }
        .livre { background: #e8f5e9; color: var(--success); border-color: var(--success); }
        .ocupado { background: #ffebee; color: var(--danger); border-color: var(--danger); }
        label { font-weight: bold; font-size: 11px; color: #555; display: block; margin-top: 12px; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 12px; margin-top: 4px; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; box-sizing: border-box; outline: none; }
        .btn { width: 100%; padding: 18px; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 15px; transition: 0.2s; }
        .btn-azul { background: var(--primary); color: white; }
        .readonly { background: #f1f1f1 !important; color: #444 !important; font-weight: bold; }
        #loader { display:none; text-align:center; font-size:12px; color:var(--primary); font-weight:bold; margin:10px 0; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="text-align:center; color:var(--primary); margin:0;">TELEJUR v10.3</h2>
    <p id="txtSync" style="text-align:center; font-size:10px; color:#888; margin-bottom:10px;">Sincronizando frotas...</p>
    
    <div id="painel" class="grid-status"></div>
    <div id="loader">⚙️ PROCESSANDO... AGUARDE</div>

    <div id="formEntrada">
        <label>Motorista</label>
        <select id="nomeMot" onchange="buscarDados()">
            <option value="">-- SELECIONE --</option>
            <option>ADRIANO NASCIMENTO</option>
            <option>FRANCIVALDO COSTA</option>
            <option>FRANCINILDO TEXEIRA</option>
            <option>REGINALDO</option>
            <option>WALTER GONÇALVES</option>
            <option>LAFAITE BATISTA</option>
        </select>

        <label>Veículo (TAG)</label>
        <select id="tag" onchange="buscarDados()">
            <option value="">-- SELECIONE --</option>
            <option value="TJUR 04">TJUR 04</option>
            <option value="TJUR 06">TJUR 06</option>
            <option value="TJUR 07">TJUR 07</option>
            <option value="TJUR 08">TJUR 08</option>
            <option value="TJUR 09">TJUR 09</option>
            <option value="TJUR 10">TJUR 10</option>
            <option value="TJUR 13">TJUR 13</option>
        </select>
        
        <input type="text" id="veiculoInfo" class="readonly" readonly placeholder="Dados do Veículo">

        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px">
            <div><label>Cor Selo</label><select id="corSelo"><option>VERDE</option><option>VERMELHO</option><option>AZUL</option><option>AMARELO</option></select></div>
            <div><label>Validade Selo</label><input type="date" id="validadeSelo"></div>
        </div>

        <label>KM Inicial</label>
        <input type="number" id="kmi">

        <label>Próx. troca óleo (KM)</label>
        <input type="number" id="proxOleo">

        <label>Tipo de Óleo</label>
        <select id="tipoOleo">
            <option>15W40</option>
            <option>5W30</option>
            <option>10W40</option>
            <option>OUTRO</option>
        </select>

        <button onclick="salvarSaida()" class="btn btn-azul">🚀 REGISTRAR SAÍDA</button>
    </div>

    <div id="telaAtiva" style="display:none">
        <div id="infoViagem" style="background:#f8f9fa; padding:15px; border-radius:10px; border-left:5px solid var(--primary); margin-bottom:15px"></div>
        
        <label style="color:var(--danger)">KM FINAL (CHEGADA)</label>
        <input type="number" id="kmf">
        
        <label>Observações</label>
        <textarea id="obs" placeholder="Ex: Pneu furado, barulho..."></textarea>

        <button onclick="finalizar()" class="btn" style="background:var(--danger); color:white">🏁 FINALIZAR E SALVAR</button>
        <button onclick="enviarWhats()" class="btn" style="background:#25D366; color:white">📲 NOTIFICAR WHATSAPP</button>
    </div>
</div>

<script>
    const URL = "https://script.google.com/macros/s/AKfycbysx-IjZe54SWbmqwl2NYJEx_kiuVtakdtE-GFYE30UxwYYQhcvOuw5DViSwMixS_QIyQ/exec"; 

    function bip() {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const g = ctx.createGain();
        osc.connect(g); g.connect(ctx.destination);
        osc.frequency.value = 880; g.gain.value = 0.1;
        osc.start(); osc.stop(ctx.currentTime + 0.15);
    }

    async function call(params) {
        document.getElementById('loader').style.display = 'block';
        return new Promise(resolve => {
            const callbackName = 'cb_' + Math.round(Math.random() * 1000000);
            window[callbackName] = (data) => {
                delete window[callbackName];
                document.getElementById('loader').style.display = 'none';
                resolve(data);
            };
            const script = document.createElement('script');
            script.src = `${URL}?${new URLSearchParams(params)}&callback=${callbackName}&_=${Date.now()}`;
            document.body.appendChild(script);
        });
    }

    async function sync() {
        const res = await call({acao: 'statusGeral'});
        const painel = document.getElementById('painel');
        painel.innerHTML = '';
        const tags = ["TJUR 04", "TJUR 06", "TJUR 07", "TJUR 08", "TJUR 09", "TJUR 10", "TJUR 13"];
        
        tags.forEach(t => {
            const ocup = res.ocupados[t];
            const classe = ocup ? 'ocupado' : 'livre';
            const statusTxt = ocup ? ocup.nome.split(' ')[0] : 'LIVRE';
            painel.innerHTML += `<div class="v-box ${classe}">${t}<br>${statusTxt}</div>`;
        });
        document.getElementById('txtSync').innerText = "Atualizado: " + new Date().toLocaleTimeString();
    }

    async function buscarDados() {
        const tag = document.getElementById('tag').value;
        if(!tag) return;
        const res = await call({acao: 'buscarDadosMotorista', tag: tag});
        document.getElementById('veiculoInfo').value = `${res.veiculo} | ${res.placa}`;
        document.getElementById('kmi').value = res.kmi;
        document.getElementById('proxOleo').value = res.oleo;
        window.veiAtual = res.veiculo;
        window.plaAtual = res.placa;
    }

    async function salvarSaida() {
        const d = {
            acao: 'registrar',
            tag: document.getElementById('tag').value,
            nome: document.getElementById('nomeMot').value,
            id: "ID-" + Math.floor(100 + Math.random() * 900),
            kmi: document.getElementById('kmi').value,
            oleo: document.getElementById('proxOleo').value,
            corSelo: document.getElementById('corSelo').value,
            validadeSelo: document.getElementById('validadeSelo').value,
            tipoOleo: document.getElementById('tipoOleo').value,
            veiculo: window.veiAtual,
            placa: window.plaAtual
        };

        if(!d.tag || !d.nome || !d.kmi) return alert("Preencha os campos obrigatórios!");
        
        const res = await call(d);
        localStorage.setItem("tjur_trip", JSON.stringify(d));
        location.reload();
    }

    async function finalizar() {
        const trip = JSON.parse(localStorage.getItem("tjur_trip"));
        const kmf = document.getElementById('kmf').value;
        if(!kmf || Number(kmf) <= Number(trip.kmi)) return alert("KM Final inválido!");

        const res = await call({
            acao: 'finalizar',
            tag: trip.tag,
            kmf: kmf,
            obs: document.getElementById('obs').value
        });

        if(res.res === "fim") {
            bip();
            localStorage.removeItem("tjur_trip");
            alert("Checklist Concluído!");
            location.reload();
        }
    }

    function enviarWhats() {
        const d = JSON.parse(localStorage.getItem("tjur_trip"));
        const m = `🚀 *SAÍDA REGISTRADA*\n📅 Data: ${new Date().toLocaleDateString()}\n👤 Mot: ${d.nome}\n🚗 Tag: ${d.tag}\n🔢 KM: ${d.kmi}`;
        window.location.href = `https://api.whatsapp.com/send?text=${encodeURIComponent(m)}`;
    }

    window.onload = () => {
        sync();
        const salva = localStorage.getItem("tjur_trip");
        if(salva) {
            const d = JSON.parse(salva);
            document.getElementById('formEntrada').style.display = 'none';
            document.getElementById('telaAtiva').style.display = 'block';
            document.getElementById('infoViagem').innerHTML = `<b>CHECKLIST ATIVO</b><br>🚗 ${d.tag}<br>👤 ${d.nome}`;
        }
    };
</script>
</body>
</html>
