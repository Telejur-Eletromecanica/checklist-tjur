<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TELEJUR v12.5</title>
    <style>
        :root { --primary: #1a237e; --danger: #c62828; --success: #2e7d32; --warning: #ef6c00; }
        body { font-family: sans-serif; background: #f0f4f8; padding: 10px; margin: 0; }
        .card { max-width: 450px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .grid-status { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 15px; }
        .v-box { padding: 8px; border-radius: 8px; text-align: center; font-size: 10px; font-weight: bold; border: 1px solid #ddd; }
        .livre { background: #e8f5e9; color: var(--success); }
        .ocupado { background: #ffebee; color: var(--danger); border-color: var(--danger); }
        #avisoRestricao { display: none; background: #ffebee; color: var(--danger); padding: 12px; border-radius: 8px; border: 1px solid var(--danger); font-size: 11px; font-weight: bold; margin-bottom: 15px; text-align: center; }
        label { font-weight: bold; font-size: 11px; color: #555; display: block; margin-top: 12px; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 12px; margin-top: 4px; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; box-sizing: border-box; }
        .btn { width: 100%; padding: 18px; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 15px; }
        .btn-azul { background: var(--primary); color: white; }
        .readonly { background: #f1f1f1 !important; color: #444 !important; font-weight: bold; }
        #msgSucesso { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 999; text-align: center; justify-content: center; align-items: center; flex-direction: column; padding: 20px; }
    </style>
</head>
<body>

<div id="msgSucesso">
    <h1 style="font-size:80px; margin:0">✔</h1>
    <h2 style="color:var(--success); text-transform: uppercase;">Checklist Concluído</h2>
    <h3 id="agradecimento" style="color:#555;"></h3>
    <p>Bip! Sincronizando com WhatsApp...</p>
</div>

<div class="card">
    <h2 style="text-align:center; color:var(--primary); margin:0;">TELEJUR v12.5</h2>
    <p id="txtSync" style="text-align:center; font-size:10px; color:#888; margin-bottom:10px;">Conectado à Planilha</p>
    
    <div id="painel" class="grid-status"></div>

    <div id="formContainer">
        <div id="avisoRestricao">⚠️ RESTRITO: APENAS WALTER, LAFAITE OU REGINALDO PODEM OPERAR ESTE SKY MUNCK.</div>

        <label>Motorista</label>
        <select id="nomeMot" onchange="validarAcesso(); buscarDados();">
            <option value="">-- SELECIONE --</option>
            <option value="ADRIANO NASCIMENTO">ADRIANO NASCIMENTO</option>
            <option value="FRANCIVALDO COSTA">FRANCIVALDO COSTA</option>
            <option value="FRANCINILDO TEXEIRA">FRANCINILDO TEXEIRA</option>
            <option value="JOELCINEI GUIMARAES">JOELCINEI GUIMARAES</option>
            <option value="MIRIELLY">MIRIELLY</option>
            <option value="REGINALDO">REGINALDO</option>
            <option value="WALTER GONÇALVES">WALTER GONÇALVES</option>
            <option value="LAFAITE BATISTA">LAFAITE BATISTA</option>
            <option value="EZEQUIEL">EZEQUIEL</option>
        </select>

        <label>Veículo (TAG)</label>
        <select id="tag" onchange="validarAcesso(); buscarDados();">
            <option value="">-- SELECIONE --</option>
            <option value="TJUR 04">TJUR 04 (SKY MUNCK)</option>
            <option value="TJUR 06">TJUR 06 (SAVEIRO)</option>
            <option value="TJUR 07">TJUR 07 (SKY MUNCK)</option>
            <option value="TJUR 08">TJUR 08 (HILUX)</option>
            <option value="TJUR 09">TJUR 09 (SKY MUNCK)</option>
            <option value="TJUR 10">TJUR 10 (CAMINHONETE)</option>
            <option value="TJUR 13">TJUR 13 (CAMINHONETE)</option>
        </select>
        <input type="text" id="veiculoInfo" class="readonly" readonly placeholder="Placa do Veículo">

        <label>ID Condutor (Fila)</label>
        <input type="text" id="idMot" class="readonly" readonly placeholder="Calculando...">

        <label>Cor do Selo</label>
        <select id="corSelo">
            <option value="">-- SELECIONE --</option>
            <option value="VERDE">VERDE</option><option value="VERMELHO">VERMELHO</option>
            <option value="AZUL">AZUL</option><option value="AMARELO">AMARELO</option>
        </select>

        <label>Validade Selo</label>
        <input type="date" id="validadeSelo">

        <label>KM Inicial</label>
        <input type="number" id="kmi">

        <label>Próxima Troca de Óleo</label>
        <input type="text" id="proxOleo" placeholder="Ex: 165.000">

        <label>Tipo de Óleo</label>
        <select id="tipoOleo">
            <option value="">-- SELECIONE --</option>
            <option value="15W40">15W40</option><option value="5W30">5W30</option>
            <option value="10W40">10W40</option><option value="20W50">20W50</option>
        </select>

        <div id="fimCampos" style="display:none">
            <hr><label style="color:var(--danger)">KM Chegada</label>
            <input type="number" id="kmf">
            <label>Observação</label>
            <textarea id="obs"></textarea>
        </div>

        <button id="btnAcao" onclick="salvarSaida()" class="btn btn-azul">Registrar Saída</button>
    </div>

    <div id="telaAtiva" style="display:none">
        <div id="infoViagem" style="background:#f8f9fa; padding:15px; border-radius:10px; border-left:5px solid var(--primary); margin-bottom:15px"></div>
        <button onclick="prepararFim()" class="btn" style="background:#444; color:white">Finalizar Trajeto</button>
    </div>
</div>

<script>
    const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbysx-IjZe54SWbmqwl2NYJEx_kiuVtakdtE-GFYE30UxwYYQhcvOuw5DViSwMixS_QIyQ/exec";
    const tagsSkyMunck = ["TJUR 04", "TJUR 07", "TJUR 09"];
    const autorizados = ["WALTER GONÇALVES", "LAFAITE BATISTA", "REGINALDO"];
    const dataH = new Date().toLocaleDateString('pt-BR');

    function validarAcesso() {
        const motorista = document.getElementById("nomeMot").value;
        const tag = document.getElementById("tag").value;
        const aviso = document.getElementById("avisoRestricao");
        const btn = document.getElementById("btnAcao");

        if (tagsSkyMunck.includes(tag) && motorista !== "" && !autorizados.includes(motorista)) {
            aviso.style.display = "block";
            btn.disabled = true; btn.style.background = "#ccc"; btn.innerText = "ACESSO NEGADO";
        } else {
            aviso.style.display = "none";
            btn.disabled = false; btn.style.background = "#1a237e"; btn.innerText = "Registrar Saída";
        }
    }

    function tocarBip() {
        try {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.frequency.setValueAtTime(880, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            osc.start(); osc.stop(audioCtx.currentTime + 0.15);
        } catch(e) {}
    }

    async function buscarDados() {
        const t = document.getElementById("tag").value, n = document.getElementById("nomeMot").value;
        if(!t || !n) return;
        const s = document.createElement('script');
        window.cb_mot = (d) => {
            document.getElementById("veiculoInfo").value = d.placa || "";
            document.getElementById("idMot").value = d.proxId || "01";
            if(s.parentNode) document.body.removeChild(s);
        };
        s.src = `${URL_SCRIPT}?acao=buscarDadosMotorista&tag=${encodeURIComponent(t)}&nome=${encodeURIComponent(n)}&callback=cb_mot`;
        document.body.appendChild(s);
    }

    async function salvarSaida() {
        const d = {
            data: dataH, tag: document.getElementById("tag").value, 
            nome: document.getElementById("nomeMot").value, kmi: document.getElementById("kmi").value,
            selo: document.getElementById("corSelo").value, val: document.getElementById("validadeSelo").value,
            oleo: document.getElementById("tipoOleo").value, id: document.getElementById("idMot").value,
            acao: "registrar", callback: "cb_reg"
        };
        if(!d.tag || !d.nome || !d.kmi) return alert("Preencha os campos obrigatórios!");
        const s = document.createElement('script');
        window.cb_reg = (res) => { localStorage.setItem("trip_v12_5", JSON.stringify(d)); location.reload(); };
        s.src = `${URL_SCRIPT}?${new URLSearchParams(d)}`;
        document.body.appendChild(s);
    }

    function prepararFim() {
        const d = JSON.parse(localStorage.getItem("trip_v12_5"));
        document.getElementById("formContainer").style.display = "none";
        document.getElementById("telaAtiva").style.display = "block";
        document.getElementById("infoViagem").innerHTML = `<b>Veículo:</b> ${d.tag}<br><b>Saída:</b> ${d.kmi} KM`;
        
        document.getElementById("btnAcao").onclick = () => {
            const kf = document.getElementById("kmf").value;
            const s = document.createElement('script');
            window.cb_fin = (res) => { 
                tocarBip();
                document.getElementById("msgSucesso").style.display = "flex";
                setTimeout(() => { localStorage.removeItem("trip_v12_5"); location.reload(); }, 2500);
            };
            s.src = `${URL_SCRIPT}?acao=finalizar&tag=${d.tag}&nome=${encodeURIComponent(d.nome)}&kmf=${kf}&callback=cb_fin`;
            document.body.appendChild(s);
        };
    }

    window.onload = () => { if(localStorage.getItem("trip_v12_5")) prepararFim(); };
</script>
</body>
</html>
