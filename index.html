<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TELEJUR v12.0</title>
    <style>
        :root { --primary: #1a237e; --danger: #c62828; --success: #2e7d32; }
        body { font-family: sans-serif; background: #f0f4f8; padding: 10px; margin: 0; }
        .card { max-width: 450px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .grid-status { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; margin-bottom: 15px; }
        .v-box { padding: 6px 2px; border-radius: 6px; text-align: center; font-size: 9px; font-weight: bold; border: 1px solid #ddd; }
        .livre { background: #e8f5e9; color: var(--success); }
        .ocupado { background: #ffebee; color: var(--danger); }
        .bloqueado { background: #f5f5f5; color: #999; border-style: dashed; }
        label { font-weight: bold; font-size: 11px; color: #555; display: block; margin-top: 12px; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 12px; margin-top: 4px; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; box-sizing: border-box; }
        .btn { width: 100%; padding: 18px; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 15px; }
        .btn-azul { background: var(--primary); color: white; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="text-align:center; color:var(--primary); margin:0 0 10px 0;">TELEJUR v12.0</h2>
    <div id="painel" class="grid-status"></div>

    <div id="formContainer">
        <label>Motorista</label>
        <select id="nomeMot" onchange="sync(); buscarDados();">
            <option value="">-- SELECIONE --</option>
            <option>ADRIANO NASCIMENTO</option><option>FRANCIVALDO COSTA</option>
            <option>FRANCINILDO TEXEIRA</option><option>JOELCINEI GUIMARAES</option>
            <option>MIRIELLY</option><option>REGINALDO</option>
            <option>WALTER GONÇALVES</option><option>LAFAITE BATISTA</option>
            <option>EZEQUIEL</option>
        </select>

        <label>Veículo (TAG)</label>
        <select id="tag" onchange="buscarDados()">
            <option value="">-- SELECIONE --</option>
            <option>TJUR 04</option><option>TJUR 06</option><option>TJUR 07</option>
            <option>TJUR 08</option><option>TJUR 09</option><option>TJUR 10</option><option>TJUR 13</option>
        </select>

        <div id="detalhesVeiculo" style="display:none">
            <input type="text" id="veiculoInfo" readonly style="background:#f0f0f0; font-weight:bold">
            <label>ID Trajeto</label>
            <input type="text" id="idMot" readonly style="background:#f0f0f0">

            <div style="display:flex; gap:10px">
                <div style="flex:1">
                    <label>Cor Selo</label>
                    <select id="corSelo">
                        <option>VERDE</option><option>VERMELHO</option><option>AZUL</option><option>AMARELO</option>
                    </select>
                </div>
                <div style="flex:1">
                    <label>Validade</label>
                    <input type="date" id="validadeSelo">
                </div>
            </div>

            <label>KM Inicial</label>
            <input type="number" id="kmi">

            <label id="labelOleo">Próx. troca óleo</label>
            <div id="containerOleo"></div>

            <label>Tipo Óleo</label>
            <select id="tipoOleo">
                <option>15W40</option><option>5W30</option><option>10W40</option><option>20W50</option>
            </select>

            <div id="fimCampos" style="display:none; background:#fff1f1; padding:10px; border-radius:10px; margin-top:10px">
                <label style="color:var(--danger)">KM FINAL (CHEGADA)</label>
                <input type="number" id="kmf">
                <label>Observação</label>
                <textarea id="obs"></textarea>
            </div>

            <button id="btnAcao" onclick="salvar()" class="btn btn-azul">Registrar Saída</button>
        </div>
    </div>

    <div id="telaAtiva" style="display:none; text-align:center">
        <div id="infoViagem" style="background:#e3f2fd; padding:15px; border-radius:10px; border-left:5px solid var(--primary); margin-bottom:15px"></div>
        <button onclick="enviarZap(false)" class="btn" style="background:#25D366; color:white">WhatsApp Saída</button>
        <button onclick="prepararFim()" class="btn" style="background:#444; color:white">Finalizar Trajeto</button>
    </div>
</div>

<script>
    const URL = "SUA_URL_DO_APPS_SCRIPT_AQUI";
    let dadosVeic = {};

    async function sync() {
        const mot = document.getElementById('nomeMot').value;
        const cb = 'cb'+Date.now();
        window[cb] = (res) => {
            const p = document.getElementById('painel');
            p.innerHTML = '';
            Object.keys(res.frota).sort().forEach(t => {
                const o = res.ocupados[t];
                const lock = res.frota[t].v === "SKY MUNCK" && !res.autorizados.includes(mot);
                p.innerHTML += `<div class="v-box ${o?'ocupado':(lock?'bloqueado':'livre')}">${t}<br>${o?o.nome.split(' ')[0]:(lock?'🔒':'LIVRE')}</div>`;
                const opt = Array.from(document.getElementById('tag').options).find(x => x.value === t);
                if(opt) opt.disabled = (o || lock);
            });
        };
        const s = document.createElement('script');
        s.src = `${URL}?acao=statusGeral&callback=${cb}`;
        document.body.appendChild(s);
    }

    async function buscarDados() {
        const t = document.getElementById('tag').value;
        if(!t) return;
        document.getElementById('detalhesVeiculo').style.display = 'block';
        const cb = 'cb'+Date.now();
        window[cb] = (d) => {
            document.getElementById('veiculoInfo').value = `${d.veiculo} | ${d.placa}`;
            document.getElementById('idMot').value = `${d.id} (${d.n})`;
            document.getElementById('kmi').value = d.ultimoKm;
            dadosVeic = { ...d, tag: t };
            const cont = document.getElementById('containerOleo');
            cont.innerHTML = `<input type="${d.tipoOleo==='data'?'date':'number'}" id="oleoVal">`;
            document.getElementById('oleoVal').value = d.oleo;
        };
        const s = document.createElement('script');
        s.src = `${URL}?acao=buscarDadosMotorista&tag=${t}&callback=${cb}`;
        document.body.appendChild(s);
    }

    async function salvar() {
        const btn = document.getElementById('btnAcao');
        btn.disabled = true;
        const d = {
            acao: 'registrar', data: new Date().toLocaleDateString('pt-BR'),
            tag: document.getElementById('tag').value, nome: document.getElementById('nomeMot').value,
            id: document.getElementById('idMot').value.split(' (')[0], numTrajeto: dadosVeic.n,
            kmi: document.getElementById('kmi').value, horaI: new Date().toLocaleTimeString('pt-BR'),
            corSelo: document.getElementById('corSelo').value, validadeSelo: document.getElementById('validadeSelo').value,
            oleo: document.getElementById('oleoVal').value, tipoOleo: dadosVeic.tipoOleo,
            veiculo: dadosVeic.veiculo, placa: dadosVeic.placa
        };
        
        const cb = 'cb'+Date.now();
        window[cb] = () => {
            localStorage.setItem('tjur_session', JSON.stringify(d));
            enviarZap(false, d);
        };
        const s = document.createElement('script');
        s.src = `${URL}?${new URLSearchParams(d)}&callback=${cb}`;
        document.body.appendChild(s);
    }

    function prepararFim() {
        const sess = JSON.parse(localStorage.getItem('tjur_session'));
        document.getElementById('telaAtiva').style.display = 'none';
        document.getElementById('formContainer').style.display = 'block';
        document.getElementById('fimCampos').style.display = 'block';
        document.getElementById('tag').value = sess.tag;
        document.getElementById('nomeMot').value = sess.nome;
        document.getElementById('kmi').value = sess.kmi;
        document.getElementById('idMot').value = sess.id + " (" + sess.numTrajeto + ")";
        const btn = document.getElementById('btnAcao');
        btn.innerText = "FINALIZAR TRAJETO";
        btn.onclick = async () => {
            const kf = document.getElementById('kmf').value;
            const cb = 'cb'+Date.now();
            window[cb] = () => {
                localStorage.removeItem('tjur_session');
                enviarZap(true, {...sess, kmf: kf, obs: document.getElementById('obs').value});
            };
            const s = document.createElement('script');
            s.src = `${URL}?acao=finalizar&tag=${sess.tag}&kmf=${kf}&horaF=${new Date().toLocaleTimeString('pt-BR')}&obs=${encodeURIComponent(document.getElementById('obs').value)}&callback=${cb}`;
            document.body.appendChild(s);
        };
    }

    function enviarZap(isF, data) {
        if(!data) data = JSON.parse(localStorage.getItem('tjur_session'));
        let m = (isF ? `✅ *FINALIZADO*` : `🚀 *INÍCIO*`) + `\n\nTAG: ${data.tag}\nMOT: ${data.nome}\nKM: ${isF ? data.kmf : data.kmi}\nHORA: ${new Date().toLocaleTimeString()}`;
        window.location.href = `https://wa.me/?text=${encodeURIComponent(m)}`;
        setTimeout(() => location.reload(), 1000);
    }

    window.onload = () => {
        const s = localStorage.getItem('tjur_session');
        if(s) {
            document.getElementById('formContainer').style.display = 'none';
            document.getElementById('telaAtiva').style.display = 'block';
            const d = JSON.parse(s);
            document.getElementById('infoViagem').innerHTML = `<b>TRAJETO ATIVO</b><br>${d.tag} - ${d.nome}`;
        } else { sync(); }
    };
</script>
</body>
</html>
