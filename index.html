<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checklist TJUR Digital</title>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --success: #25D366; --admin: #e67e22; --danger: #e74c3c; --finish: #9b59b6; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; margin: 0; padding: 15px; display: flex; justify-content: center; }
        .container { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 500px; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 10px; border: none; cursor: pointer; border-radius: 5px; font-weight: bold; background: #ddd; }
        .tab-btn.active { background: var(--primary); color: white; }
        .status-badge { text-align: center; padding: 8px; border-radius: 6px; margin-bottom: 15px; font-weight: bold; font-size: 14px; }
        .status-aberto { background: #fff3cd; color: #856404; border: 1px solid #ffeeba; }
        .status-novo { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .form-group { margin-bottom: 12px; }
        .full-width { grid-column: span 2; }
        label { display: block; font-weight: bold; margin-bottom: 4px; color: var(--primary); font-size: 13px; }
        select, input, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 15px; }
        textarea { resize: vertical; min-height: 60px; font-family: inherit; }
        input[readonly], select[disabled] { background-color: #f1f3f5; color: #777; }
        .btn-whatsapp { width: 100%; padding: 15px; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 10px; }
        .btn-inicio { background: var(--success); }
        .btn-fim { background: var(--finish); }
        
        /* Estilo para Foto */
        .foto-container { border: 2px dashed #ccc; padding: 10px; text-align: center; border-radius: 6px; cursor: pointer; position: relative; }
        #preview { max-width: 100%; max-height: 150px; border-radius: 5px; margin-top: 5px; display: none; }
        
        .reset-user { font-size: 11px; color: var(--danger); background: none; border: none; text-decoration: underline; cursor: pointer; display: block; margin-top: 5px; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="tabs">
        <button class="tab-btn active" id="btn-chk" onclick="switchTab('checklist')">Checklist</button>
        <button class="tab-btn" id="btn-adm" onclick="solicitarAcessoAdmin()">Admin</button>
    </div>

    <div id="tab-checklist">
        <div id="statusMensagem"></div>
        <form id="chkForm">
            <div class="form-group">
                <label>Veículo (TAG)</label>
                <select id="selectTag" required onchange="atualizarDadosVeiculo()">
                    <option value="">-- Selecione --</option>
                    <option value="TJUR 13">TJUR 13</option>
                    <option value="TJUR 04">TJUR 04</option>
                    <option value="TJUR 06">TJUR 06</option>
                    <option value="TJUR 07">TJUR 07</option>
                    <option value="TJUR 08">TJUR 08</option>
                    <option value="TJUR 09">TJUR 09</option>
                    <option value="TJUR 10">TJUR 10</option>
                </select>
            </div>

            <div class="form-grid">
                <div class="form-group"><label>Data</label><input type="text" id="data_hoje" readonly></div>
                <div class="form-group"><label>Placa</label><input type="text" id="placa" readonly></div>
                <div class="form-group"><label>Próx. Troca Óleo</label><input type="text" id="prox_oleo" required></div>
                <div class="form-group">
                    <label>Tipo de Óleo</label>
                    <select id="tipo_oleo" required>
                        <option value="15W40">15W40</option>
                        <option value="5W30">5W30</option>
                        <option value="10W40">10W40</option>
                    </select>
                </div>
                <div class="form-group full-width">
                    <label>Condutor 1</label>
                    <select id="condutor1" required onchange="salvarSomenteNome()"></select>
                    <button type="button" class="reset-user" onclick="limparNomeSalvo()">Resetar nome</button>
                </div>
                <div class="form-group full-width"><label>Condutor 2</label><input type="text" id="condutor2" placeholder="Opcional"></div>
                <div class="form-group full-width"><label>Condutor 3</label><input type="text" id="condutor3" placeholder="Opcional"></div>
                
                <div class="form-group"><label>KM Início</label><input type="text" id="km_inicio" required placeholder="Ex: 166.523"></div>
                <div class="form-group"><label>KM Final</label><input type="text" id="km_final" placeholder="Ex: 166.700"></div>
                
                <div class="form-group">
                    <label>Cor do Selo</label>
                    <select id="cor_selo" required>
                        <option value="Verde">Verde</option>
                        <option value="Amarelo">Amarelo</option>
                        <option value="Azul">Azul</option>
                        <option value="Vermelho">Vermelho</option>
                    </select>
                </div>
                <div class="form-group"><label>Validade Selo</label><input type="date" id="val_selo" required></div>
                
                <div class="form-group full-width">
                    <label>Observações</label>
                    <textarea id="obs" placeholder="Avarias ou observações"></textarea>
                </div>

                <div class="form-group full-width">
                    <label>📸 Anexar Foto (KM/Painel)</label>
                    <div class="foto-container" onclick="document.getElementById('inputFoto').click()">
                        <span id="fotoTxt">Clique para tirar foto ou anexar</span>
                        <input type="file" id="inputFoto" accept="image/*" capture="environment" style="display:none" onchange="previewImagem(event)">
                        <img id="preview" src="" alt="Preview">
                    </div>
                </div>
            </div>
            <div id="botoesAcao"></div>
            <button type="button" class="reset-user" style="margin: 15px auto; text-align: center; width: 100%;" onclick="limparTudo()">Resetar Tudo</button>
        </form>
    </div>

    <div id="tab-admin" class="hidden">
        <h3>Admin: Condutores</h3>
        <input type="text" id="novoNome" placeholder="Nome">
        <button onclick="addCondutor()" style="width:100%; margin:10px 0; padding:12px; background:var(--primary); color:white; border:none; border-radius:6px;">Adicionar</button>
        <div id="listaCondutores"></div>
        <button onclick="switchTab('checklist')" style="width:100%; margin-top:20px; padding:10px;">Voltar</button>
    </div>
</div>

<script>
    const SENHA_MESTRA = "1234";
    const frota = {
        "TJUR 13": { placa: "QVD4I38", oleo: "15W40", km_ini: "166.523", cor: "Azul", prox: "169.257", val: "2026-05-31" },
        "TJUR 08": { placa: "QVE5H48", oleo: "5W30", km_ini: "115.000", cor: "Verde", prox: "120.000", val: "2026-12-31" }
    };

    let condutores = JSON.parse(localStorage.getItem('condutores')) || ["Francivaldo Costa", "Joelcinei Guimarães", "Reginaldo Pereira", "Adriano Nascimento"];

    function previewImagem(event) {
        const input = event.target;
        const reader = new FileReader();
        reader.onload = function(){
            const dataURL = reader.result;
            const preview = document.getElementById('preview');
            preview.src = dataURL;
            preview.style.display = 'block';
            document.getElementById('fotoTxt').innerText = "✅ Foto carregada!";
        };
        if(input.files[0]) reader.readAsDataURL(input.files[0]);
    }

    function solicitarAcessoAdmin() {
        const pass = prompt("Senha Admin:");
        if (pass === SENHA_MESTRA) switchTab('admin');
        else if (pass !== null) alert("Senha incorreta!");
    }

    function limparKM(valor) {
        return Number(valor.toString().replace(/\./g, ''));
    }

    function atualizarDadosVeiculo() {
        if (localStorage.getItem('viagemAtiva')) return;
        const v = frota[document.getElementById('selectTag').value];
        if (v) {
            document.getElementById('placa').value = v.placa;
            document.getElementById('tipo_oleo').value = v.oleo;
            document.getElementById('km_inicio').value = v.km_ini;
            document.getElementById('cor_selo').value = v.cor;
            document.getElementById('prox_oleo').value = v.prox;
            document.getElementById('val_selo').value = v.val;
        }
    }

    function salvarSomenteNome() {
        const nome = document.getElementById('condutor1').value;
        if(nome) localStorage.setItem('nomeSalvo', nome);
    }

    function limparNomeSalvo() {
        localStorage.removeItem('nomeSalvo');
        document.getElementById('condutor1').value = "";
        alert("Motorista resetado!");
    }

    function renderInterface() {
        const viagem = JSON.parse(localStorage.getItem('viagemAtiva'));
        const containerBotoes = document.getElementById('botoesAcao');
        const statusMsg = document.getElementById('statusMensagem');
        renderCondutores();
        document.getElementById('data_hoje').value = new Date().toLocaleDateString('pt-BR');

        if (viagem) {
            Object.keys(viagem).forEach(id => {
                const el = document.getElementById(id);
                if(el && id !== 'inputFoto') {
                    el.value = viagem[id];
                    if(id !== 'km_final' && id !== 'obs') {
                        el.readOnly = true;
                        if(el.tagName === 'SELECT') el.disabled = true;
                    }
                }
            });
            statusMsg.innerHTML = `<div class="status-badge status-aberto">⚠️ TRAJETO EM ABERTO: ${viagem.selectTag}</div>`;
            containerBotoes.innerHTML = `<button type="button" class="btn-whatsapp btn-fim" onclick="enviarFim()">FINALIZAR TRAJETO (FIM)</button>`;
        } else {
            const nomeS = localStorage.getItem('nomeSalvo');
            if(nomeS) document.getElementById('condutor1').value = nomeS;
            statusMsg.innerHTML = `<div class="status-badge status-novo">✅ AGUARDANDO INÍCIO</div>`;
            containerBotoes.innerHTML = `<button type="button" class="btn-whatsapp btn-inicio" onclick="enviarInicio()">INICIAR TRAJETO (START)</button>`;
        }
    }

    function gerarTextoRelatorio(status, kmF_bruto = null) {
        const tag = document.getElementById('selectTag').value;
        const placa = document.getElementById('placa').value;
        const c1 = document.getElementById('condutor1').value;
        const c2 = document.getElementById('condutor2').value || "---";
        const c3 = document.getElementById('condutor3').value || "---";
        const kmI = document.getElementById('km_inicio').value;
        const prox = document.getElementById('prox_oleo').value;
        const tipo = document.getElementById('tipo_oleo').value;
        const cor = document.getElementById('cor_selo').value;
        const val = document.getElementById('val_selo').value.split('-').reverse().join('/');
        const obs = document.getElementById('obs').value || "Sem observações";

        let texto = `*${status === 'INI' ? '🟢 INÍCIO' : '🔴 FIM'} DE TRAJETO - ${tag}*%0A`;
        texto += `🚗 Placa: ${placa}%0A%0A`;
        texto += `👤 Condutor 1: ${c1}%0A`;
        texto += `👤 Condutor 2: ${c2}%0A`;
        texto += `👤 Condutor 3: ${c3}%0A%0A`;
        texto += `🛣️ KM Início: ${kmI}%0A`;
        
        if(status === 'FIM') {
            const perc = limparKM(kmF_bruto) - limparKM(kmI);
            texto += `🏁 KM Final: ${kmF_bruto}%0A`;
            texto += `📏 Percorrido: ${perc} km%0A%0A`;
        }

        texto += `🛢️ Próx. Troca: ${prox}%0A`;
        texto += `🧪 Tipo Óleo: ${tipo}%0A`;
        texto += `🏷️ Selo: ${cor} (${val})%0A%0A`;
        texto += `📝 Obs: ${obs}%0A`;
        if(document.getElementById('inputFoto').files[0]) texto += `%0A📸 *ANEXANDO FOTO DO PAINEL...*%0A`;
        return texto;
    }

    function enviarInicio() {
        if (!document.getElementById('chkForm').checkValidity()) return document.getElementById('chkForm').reportValidity();
        
        const dados = {
            selectTag: document.getElementById('selectTag').value,
            placa: document.getElementById('placa').value,
            prox_oleo: document.getElementById('prox_oleo').value,
            tipo_oleo: document.getElementById('tipo_oleo').value,
            condutor1: document.getElementById('condutor1').value,
            condutor2: document.getElementById('condutor2').value,
            condutor3: document.getElementById('condutor3').value,
            km_inicio: document.getElementById('km_inicio').value,
            cor_selo: document.getElementById('cor_selo').value,
            val_selo: document.getElementById('val_selo').value,
            obs: document.getElementById('obs').value
        };

        localStorage.setItem('viagemAtiva', JSON.stringify(dados));
        localStorage.setItem('nomeSalvo', dados.condutor1);
        
        window.open(`https://wa.me/?text=${gerarTextoRelatorio('INI')}`, '_blank');
        renderInterface();
    }

    function enviarFim() {
        const kmF_bruto = document.getElementById('km_final').value;
        const kmI_bruto = document.getElementById('km_inicio').value;

        if(!kmF_bruto) return alert("Informe o KM Final!");
        if(limparKM(kmF_bruto) < limparKM(kmI_bruto)) return alert("KM Final inválido!");

        window.open(`https://wa.me/?text=${gerarTextoRelatorio('FIM', kmF_bruto)}`, '_blank');
        
        setTimeout(() => {
            if(confirm("Lembre-se de anexar a foto no WhatsApp agora! Deseja finalizar o checklist?")) {
                localStorage.removeItem('viagemAtiva');
                location.reload();
            }
        }, 1000);
    }

    function limparTudo() {
        if(confirm("Resetar tudo?")) {
            localStorage.removeItem('viagemAtiva');
            location.reload();
        }
    }

    function renderCondutores() {
        const c1 = document.getElementById('condutor1');
        const lista = document.getElementById('listaCondutores');
        c1.innerHTML = '<option value="">-- Selecione --</option>' + condutores.map(c => `<option value="${c}">${c}</option>`).join('');
        lista.innerHTML = condutores.map((c, i) => `<div style="display:flex; justify-content:space-between; padding:8px; border-bottom:1px solid #eee">${c} <b style="color:red; cursor:pointer" onclick="remover(${i})">✕</b></div>`).join('');
    }
    function addCondutor() {
        const n = document.getElementById('novoNome').value;
        if(n) { condutores.push(n); localStorage.setItem('condutores', JSON.stringify(condutores)); renderInterface(); document.getElementById('novoNome').value=""; }
    }
    function remover(i) { condutores.splice(i,1); localStorage.setItem('condutores', JSON.stringify(condutores)); renderInterface(); }
    function switchTab(t) {
        document.getElementById('tab-checklist').className = t === 'checklist' ? '' : 'hidden';
        document.getElementById('tab-admin').className = t === 'admin' ? '' : 'hidden';
        document.getElementById('btn-chk').className = t === 'checklist' ? 'tab-btn active' : 'tab-btn';
        document.getElementById('btn-adm').className = t === 'admin' ? 'tab-btn active' : 'tab-btn';
    }

    renderInterface();
</script>
</body>
</html>
