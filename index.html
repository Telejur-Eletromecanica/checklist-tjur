<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telejur - Checklist Digital</title>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --success: #25D366; --admin: #e67e22; --danger: #e74c3c; --finish: #9b59b6; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; margin: 0; padding: 15px; display: flex; justify-content: center; }
        .container { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 500px; }
        
        .brand-header { text-align: center; margin-bottom: 20px; }
        .brand-header h1 { color: var(--primary); margin: 0; font-size: 28px; letter-spacing: 1px; text-transform: uppercase; }
        .brand-header p { color: var(--accent); margin: 0; font-size: 12px; font-weight: bold; }

        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 10px; border: none; cursor: pointer; border-radius: 5px; font-weight: bold; background: #ddd; }
        .tab-btn.active { background: var(--primary); color: white; }
        
        .admin-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; background: #f9f9f9; border-bottom: 1px solid #eee; margin-bottom: 5px; border-radius: 4px; }
        .btn-delete { background: var(--danger); color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; }
        
        .status-badge { text-align: center; padding: 8px; border-radius: 6px; margin-bottom: 15px; font-weight: bold; font-size: 14px; }
        .status-aberto { background: #fff3cd; color: #856404; border: 1px solid #ffeeba; }
        .status-novo { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .full-width { grid-column: span 2; }
        .form-group { margin-bottom: 12px; }
        label { display: block; font-weight: bold; margin-bottom: 4px; color: var(--primary); font-size: 13px; }
        select, input, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 15px; }
        
        .btn-whatsapp { width: 100%; padding: 15px; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 10px; }
        .btn-inicio { background: var(--success); }
        .btn-finish { background: var(--finish); }
        .reset-user { font-size: 11px; color: var(--danger); background: none; border: none; text-decoration: underline; cursor: pointer; display: block; margin-top: 5px; width: 100%; }
        
        .hidden { display: none; }
        .status-calc { font-size: 11px; font-weight: bold; margin-top: 4px; display: block; }
    </style>
</head>
<body>

<div class="container">
    <div class="brand-header">
        <h1>Telejur</h1>
        <p>SISTEMA DE CHECKLIST DIGITAL</p>
    </div>

    <div class="tabs">
        <button class="tab-btn active" id="btn-chk" onclick="switchTab('checklist')">Checklist</button>
        <button class="tab-btn" id="btn-adm" onclick="solicitarAcessoAdmin()">Admin</button>
    </div>

    <div id="tab-checklist">
        <div id="statusMensagem"></div>
        <form id="chkForm">
            <div class="form-group">
                <label>Veículo (TAG)</label>
                <select id="selectTag" required onchange="atualizarDadosVeiculo()">
                    <option value="">-- Selecione --</option>
                    <option value="TJUR 04">TJUR 04 (SKY MUNCK)</option>
                    <option value="TJUR 06">TJUR 06 (SAVEIRO)</option>
                    <option value="TJUR 07">TJUR 07 (SKY MUNCK)</option>
                    <option value="TJUR 08">TJUR 08 (HILUX)</option>
                    <option value="TJUR 09">TJUR 09 (SKY MUNCK)</option>
                    <option value="TJUR 10">TJUR 10 (CAMINHONETE)</option>
                    <option value="TJUR 13">TJUR 13 (CAMINHONETE)</option>
                </select>
            </div>

            <div class="form-grid">
                <div class="form-group"><label>Data Checklist</label><input type="text" id="data_hoje" readonly></div>
                <div class="form-group"><label>Placa</label><input type="text" id="placa" readonly></div>
                
                <div class="form-group">
                    <label id="labelProxOleo">Próx. Troca Óleo</label>
                    <input type="text" id="prox_oleo" required oninput="calcularTudo()">
                    <span id="calc_oleo" class="status-calc"></span>
                </div>

                <div class="form-group">
                    <label>Tipo de Óleo</label>
                    <select id="tipo_oleo" required>
                        <option value="15W40">15W40</option>
                        <option value="5W30">5W30</option>
                        <option value="10W40">10W40</option>
                    </select>
                </div>

                <div class="form-group full-width">
                    <label>Condutor 1</label>
                    <select id="condutor1" required onchange="salvarSomenteNome()"></select>
                </div>
                <div class="form-group full-width"><label>Condutor 2</label><input type="text" id="condutor2" placeholder="Opcional"></div>
                <div class="form-group full-width"><label>Condutor 3</label><input type="text" id="condutor3" placeholder="Opcional"></div>

                <div class="form-group"><label>KM Início</label><input type="text" id="km_inicio" required placeholder="KM" oninput="calcularTudo()"></div>
                <div class="form-group"><label>KM Final</label><input type="text" id="km_final" placeholder="KM" oninput="calcularTudo()"></div>
                
                <div class="form-group">
                    <label>Cor do Selo</label>
                    <select id="cor_selo" required>
                        <option value="Verde">Verde</option>
                        <option value="Amarelo">Amarelo</option>
                        <option value="Azul">Azul</option>
                        <option value="Vermelho">Vermelho</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Validade Selo</label>
                    <input type="date" id="val_selo" required onchange="calcularTudo()">
                    <span id="calc_selo" class="status-calc"></span>
                </div>
                
                <div class="form-group full-width">
                    <label>Observações</label>
                    <textarea id="obs" placeholder="Avarias ou observações"></textarea>
                </div>
            </div>
            <div id="botoesAcao"></div>
            <button type="button" class="reset-user" onclick="limparTudo()">Resetar Formulário</button>
        </form>
    </div>

    <div id="tab-admin" class="hidden">
        <h3>Gerenciar Condutores</h3>
        <div style="display: flex; gap: 5px; margin-bottom: 10px;">
            <input type="text" id="novoNome" placeholder="Nome Completo">
            <button onclick="addCondutor()" style="background: var(--success); color: white; border: none; padding: 10px; border-radius: 6px;">Add</button>
        </div>
        <div id="listaCondutoresAdmin"></div>
        <button onclick="switchTab('checklist')" style="width:100%; margin-top:20px; padding:12px;">Voltar</button>
    </div>
</div>

<script>
    const SENHA_MESTRA = "1234";
    const frota = {
        "TJUR 04": { placa: "QFA1I50", oleo: "15W40", cor: "Verde", tipoTroca: "data" },
        "TJUR 06": { placa: "QUJ3E02", oleo: "5W30", cor: "Verde", tipoTroca: "km" },
        "TJUR 07": { placa: "RWR3C75", oleo: "15W40", cor: "Verde", tipoTroca: "data" },
        "TJUR 08": { placa: "QVE5H48", oleo: "5W30", cor: "Verde", tipoTroca: "km" },
        "TJUR 09": { placa: "RXC6J04", oleo: "15W40", cor: "Verde", tipoTroca: "data" },
        "TJUR 10": { placa: "PHU1I37", oleo: "15W40", cor: "Verde", tipoTroca: "km" },
        "TJUR 13": { placa: "QVD4I38", oleo: "15W40", cor: "Azul", tipoTroca: "km" }
    };

    let condutores = JSON.parse(localStorage.getItem('condutores')) || ["Francivaldo Costa", "Joelcinei Guimarães", "Reginaldo Pereira", "Adriano Nascimento"];

    // FUNÇÃO PARA GERAR O SOM DE BIP
    function tocarBip() {
        try {
            const context = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = context.createOscillator();
            const gain = context.createGain();
            oscillator.connect(gain);
            gain.connect(context.destination);
            oscillator.type = "sine";
            oscillator.frequency.value = 880; // Lá (A5)
            gain.gain.setValueAtTime(0.1, context.currentTime);
            oscillator.start();
            oscillator.stop(context.currentTime + 0.15); // Duração de 150ms
        } catch (e) { console.log("Áudio não suportado"); }
    }

    function limparKM(v) { if(!v) return 0; return Number(v.toString().replace(/\./g, '').replace(',', '.')); }

    function calcularTudo() {
        const hoje = new Date(); hoje.setHours(0,0,0,0);
        const proxOleo = document.getElementById('prox_oleo');
        const kmIni = limparKM(document.getElementById('km_inicio').value);
        const kmFin = limparKM(document.getElementById('km_final').value);
        const displayOleo = document.getElementById('calc_oleo');
        const kmAtual = kmFin > 0 ? kmFin : kmIni;

        if (proxOleo.value) {
            if (proxOleo.type === 'date') {
                const dProx = new Date(proxOleo.value);
                const diff = Math.ceil((dProx - hoje) / (1000 * 60 * 60 * 24));
                displayOleo.innerText = diff < 0 ? `Vencido há ${Math.abs(diff)} dias` : `Faltam ${diff} dias`;
                displayOleo.style.color = diff < 0 ? "red" : "green";
            } else if (kmAtual > 0) {
                const saldo = limparKM(proxOleo.value) - kmAtual;
                displayOleo.innerText = saldo < 0 ? `Passou ${Math.abs(saldo)} KM` : `Faltam ${saldo} KM`;
                displayOleo.style.color = saldo < 0 ? "red" : "green";
            }
        }

        const valSelo = document.getElementById('val_selo').value;
        const displaySelo = document.getElementById('calc_selo');
        if (valSelo) {
            const dSelo = new Date(valSelo);
            const diffSelo = Math.ceil((dSelo - hoje) / (1000 * 60 * 60 * 24));
            displaySelo.innerText = diffSelo < 0 ? `SELO VENCIDO! (${Math.abs(diffSelo)}d)` : `Vence em ${diffSelo} dias`;
            displaySelo.style.color = diffSelo < 0 ? "red" : "green";
        }
    }

    function atualizarDadosVeiculo() {
        if (localStorage.getItem('viagemAtiva')) return;
        const v = frota[document.getElementById('selectTag').value];
        const prox = document.getElementById('prox_oleo');
        if (v) {
            document.getElementById('placa').value = v.placa;
            document.getElementById('tipo_oleo').value = v.oleo;
            document.getElementById('cor_selo').value = v.cor;
            document.getElementById('km_inicio').value = ""; 
            document.getElementById('km_final').value = "";
            document.getElementById('val_selo').value = "";
            prox.type = v.tipoTroca === "data" ? "date" : "text";
            document.getElementById('labelProxOleo').innerText = v.tipoTroca === "data" ? "Data Próx. Troca" : "Próx. Troca (KM)";
            prox.value = ""; calcularTudo();
        }
    }

    function salvarSomenteNome() { const n = document.getElementById('condutor1').value; if(n) localStorage.setItem('nomeSalvo', n); }

    function renderInterface() {
        const viagem = JSON.parse(localStorage.getItem('viagemAtiva'));
        const containerBotoes = document.getElementById('botoesAcao');
        const statusMsg = document.getElementById('statusMensagem');
        renderCondutoresChecklist(); renderCondutoresAdmin();
        document.getElementById('data_hoje').value = new Date().toLocaleDateString('pt-BR');

        if (viagem) {
            Object.keys(viagem).forEach(id => {
                const el = document.getElementById(id);
                if(el) { el.value = viagem[id]; if(id !== 'km_final' && id !== 'obs') { el.readOnly = true; if(el.tagName === 'SELECT') el.disabled = true; } }
            });
            statusMsg.innerHTML = `<div class="status-badge status-aberto">⚠️ TRAJETO EM ABERTO: ${viagem.selectTag}</div>`;
            containerBotoes.innerHTML = `<button type="button" class="btn-whatsapp btn-finish" onclick="enviarFim()">FINALIZAR TRAJETO (FIM)</button>`;
            calcularTudo();
        } else {
            const nomeS = localStorage.getItem('nomeSalvo'); if(nomeS) document.getElementById('condutor1').value = nomeS;
            statusMsg.innerHTML = `<div class="status-badge status-novo">✅ AGUARDANDO INÍCIO</div>`;
            containerBotoes.innerHTML = `<button type="button" class="btn-whatsapp btn-inicio" onclick="enviarInicio()">INICIAR TRAJETO (START)</button>`;
        }
    }

    function gerarTextoRelatorio(status, kmF_input = null) {
        const tag = document.getElementById('selectTag').value;
        const placa = document.getElementById('placa').value;
        const c1 = document.getElementById('condutor1').value;
        const c2 = document.getElementById('condutor2').value || "Não informado";
        const c3 = document.getElementById('condutor3').value || "Não informado";
        const kmI = document.getElementById('km_inicio').value;
        const tipoOleo = document.getElementById('tipo_oleo').value;
        let prox = document.getElementById('prox_oleo').value;
        if(document.getElementById('prox_oleo').type === 'date') prox = prox.split('-').reverse().join('/');
        const statusOleo = document.getElementById('calc_oleo').innerText;
        const corSelo = document.getElementById('cor_selo').value;
        const valSelo = document.getElementById('val_selo').value.split('-').reverse().join('/');
        const statusSelo = document.getElementById('calc_selo').innerText;
        const obs = document.getElementById('obs').value || "Sem observações";

        let t = `*${status === 'INI' ? '🟢 INÍCIO' : '🔴 FIM'} DE TRAJETO - ${tag}*%0A`;
        t += `🚗 Placa: ${placa}%0A%0A`;
        t += `👤 Condutor 1: ${c1}%0A👤 Condutor 2: ${c2}%0A👤 Condutor 3: ${c3}%0A%0A`;
        t += `🛣️ KM Início: ${kmI}%0A`;
        if(status === 'FIM') { t += `🏁 KM Final: ${kmF_input}%0A📏 Percorrido: ${limparKM(kmF_input) - limparKM(kmI)} km%0A%0A`; }
        t += `🛢️ Tipo Óleo: ${tipoOleo}%0A🔧 Próx. Troca: ${prox}%0A📊 Status Óleo: ${statusOleo}%0A%0A`;
        t += `🏷️ Cor do Selo: ${corSelo}%0A📅 Validade Selo: ${valSelo}%0A⚠️ Status Selo: ${statusSelo}%0A%0A`;
        t += `📝 Obs: ${obs}`;
        return t;
    }

    function enviarInicio() {
        if (!document.getElementById('chkForm').checkValidity()) return document.getElementById('chkForm').reportValidity();
        const nome = document.getElementById('condutor1').value;
        const dados = {};
        document.querySelectorAll('#chkForm input, #chkForm select, #chkForm textarea').forEach(i => { if(i.id) dados[i.id] = i.value; });
        localStorage.setItem('viagemAtiva', JSON.stringify(dados));
        
        tocarBip();
        alert(`Relatório Iniciado!\n\nObrigado, ${nome}! Tenha um ótimo dia de trabalho.`);
        
        window.open(`https://wa.me/?text=${gerarTextoRelatorio('INI')}`, '_blank');
        renderInterface();
    }

    function enviarFim() {
        const kmF = document.getElementById('km_final').value;
        const kmI = document.getElementById('km_inicio').value;
        const nome = document.getElementById('condutor1').value;
        
        if(!kmF) return alert("Informe o KM Final!");
        if(limparKM(kmF) < limparKM(kmI)) return alert("KM Final inválido!");
        
        tocarBip();
        alert(`Relatório de Finalização!\n\nObrigado, ${nome}! Excelente descanso.`);
        
        window.open(`https://wa.me/?text=${gerarTextoRelatorio('FIM', kmF)}`, '_blank');
        
        setTimeout(() => { if(confirm("Deseja encerrar este trajeto?")) { localStorage.removeItem('viagemAtiva'); location.reload(); } }, 1000);
    }

    function limparTudo() { if(confirm("Resetar?")) { localStorage.removeItem('viagemAtiva'); location.reload(); } }
    function renderCondutoresChecklist() { const select = document.getElementById('condutor1'); const v = select.value; select.innerHTML = '<option value="">-- Selecione --</option>' + condutores.map(c => `<option value="${c}">${c}</option>`).join(''); if(v) select.value = v; }
    function renderCondutoresAdmin() { document.getElementById('listaCondutoresAdmin').innerHTML = condutores.map((c, i) => `<div class="admin-item"><span>${c}</span><button class="btn-delete" onclick="removerCondutor(${i})">Excluir</button></div>`).join(''); }
    function addCondutor() { const input = document.getElementById('novoNome'); const n = input.value.trim(); if(n) { condutores.push(n); condutores.sort(); localStorage.setItem('condutores', JSON.stringify(condutores)); input.value = ""; renderInterface(); } }
    function removerCondutor(i) { if(confirm(`Excluir ${condutores[i]}?`)) { condutores.splice(i, 1); localStorage.setItem('condutores', JSON.stringify(condutores)); renderInterface(); } }
    function solicitarAcessoAdmin() { if (prompt("Senha Admin:") === SENHA_MESTRA) switchTab('admin'); }
    function switchTab(t) {
        document.getElementById('tab-checklist').className = t === 'checklist' ? '' : 'hidden';
        document.getElementById('tab-admin').className = t === 'admin' ? '' : 'hidden';
        document.getElementById('btn-chk').className = t === 'checklist' ? 'tab-btn active' : 'tab-btn';
        document.getElementById('btn-adm').className = t === 'admin' ? 'tab-btn active' : 'tab-btn';
    }

    renderInterface();
</script>
</body>
</html>
