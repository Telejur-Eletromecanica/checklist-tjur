<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TELEJUR v12.3</title>
    <style>
        :root { --primary: #1a237e; --danger: #c62828; --success: #2e7d32; --warning: #ef6c00; }
        body { font-family: sans-serif; background: #f0f4f8; padding: 10px; margin: 0; }
        .card { max-width: 450px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        
        /* Aviso de Restrição para SKY MUNCK */
        #avisoRestricao { 
            display: none; 
            background: #ffebee; 
            color: var(--danger); 
            padding: 12px; 
            border-radius: 8px; 
            border: 1px solid var(--danger); 
            font-size: 11px; 
            font-weight: bold; 
            margin-bottom: 15px;
            text-align: center;
        }

        label { font-weight: bold; font-size: 11px; color: #555; display: block; margin-top: 12px; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 12px; margin-top: 4px; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; box-sizing: border-box; }
        .btn { width: 100%; padding: 18px; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 15px; }
        .btn-azul { background: var(--primary); color: white; }
        .readonly { background: #f1f1f1 !important; color: #444 !important; font-weight: bold; }
        #msgSucesso { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 999; text-align: center; justify-content: center; align-items: center; flex-direction: column; padding: 20px; }
    </style>
</head>
<body>

<div id="msgSucesso">
    <h1 style="font-size:80px; margin:0">✔</h1>
    <h2 style="color:var(--success); text-transform: uppercase;">Checklist Concluído</h2>
    <h3 id="agradecimento" style="color:#555;"></h3>
    <p>Abrindo WhatsApp...</p>
</div>

<div class="card">
    <h2 style="text-align:center; color:var(--primary); margin:0;">TELEJUR v12.3</h2>
    
    <div id="formContainer">
        <div id="avisoRestricao">⚠️ RESTRITO: APENAS WALTER, LAFAITE OU REGINALDO PODEM OPERAR ESTE SKY MUNCK.</div>

        <label>Motorista</label>
        <select id="nomeMot" onchange="validarAcesso(); buscarDados();">
            <option value="">-- SELECIONE --</option>
            <option value="ADRIANO NASCIMENTO">ADRIANO NASCIMENTO</option>
            <option value="EZEQUIEL">EZEQUIEL</option>
            <option value="FRANCINILDO TEXEIRA">FRANCINILDO TEXEIRA</option>
            <option value="FRANCIVALDO COSTA">FRANCIVALDO COSTA</option>
            <option value="JOELCINEI GUIMARAES">JOELCINEI GUIMARAES</option>
            <option value="LAFAITE BATISTA">LAFAITE BATISTA</option>
            <option value="MIRIELLY">MIRIELLY</option>
            <option value="REGINALDO">REGINALDO</option>
            <option value="WALTER GONÇALVES">WALTER GONÇALVES</option>
        </select>

        <label>Veículo (TAG)</label>
        <select id="tag" onchange="validarAcesso(); buscarDados();">
            <option value="">-- SELECIONE --</option>
            <option value="TJUR 04">TJUR 04 (SKY MUNCK)</option>
            <option value="TJUR 06">TJUR 06 (SAVEIRO)</option>
            <option value="TJUR 07">TJUR 07 (SKY MUNCK)</option>
            <option value="TJUR 08">TJUR 08 (HILUX)</option>
            <option value="TJUR 09">TJUR 09 (SKY MUNCK)</option>
            <option value="TJUR 10">TJUR 10 (CAMINHONETE)</option>
            <option value="TJUR 13">TJUR 13 (CAMINHONETE)</option>
        </select>
        <input type="text" id="veiculoInfo" class="readonly" readonly placeholder="Dados do Veículo">

        <label>Número do Condutor (Fila)</label>
        <input type="text" id="idMot" class="readonly" readonly>

        <label>KM Inicial</label>
        <input type="number" id="kmi">

        <div id="fimCampos" style="display:none">
            <hr><label style="color:var(--danger)">KM Chegada</label>
            <input type="number" id="kmf">
        </div>

        <button id="btnAcao" onclick="salvarSaida()" class="btn btn-azul">Registrar Saída</button>
    </div>

    <div id="telaAtiva" style="display:none">
        <div id="infoViagem" style="background:#f8f9fa; padding:15px; border-radius:10px; border-left:5px solid var(--primary); margin-bottom:15px"></div>
        <button onclick="prepararFim()" class="btn" style="background:#444; color:white">Finalizar Trajeto</button>
    </div>
</div>

<script>
    const tagsSkyMunck = ["TJUR 04", "TJUR 07", "TJUR 09"];
    const autorizados = ["WALTER GONÇALVES", "LAFAITE BATISTA", "REGINALDO"];

    // --- VALIDAÇÃO DE ACESSO SKY MUNCK (v12.3) ---
    function validarAcesso() {
        const motorista = document.getElementById("nomeMot").value;
        const tagSelecionada = document.getElementById("tag").value;
        const aviso = document.getElementById("avisoRestricao");
        const btn = document.getElementById("btnAcao");

        if (tagsSkyMunck.includes(tagSelecionada) && motorista !== "" && !autorizados.includes(motorista)) {
            aviso.style.display = "block";
            btn.disabled = true;
            btn.style.background = "#ccc";
            btn.innerText = "ACESSO NEGADO";
        } else {
            aviso.style.display = "none";
            btn.disabled = false;
            btn.style.background = "#1a237e";
            btn.innerText = localStorage.getItem("trip_v12_3") ? "Concluir Checklist" : "Registrar Saída";
        }
    }

    function tocarBip() {
        try {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            osc.connect(audioCtx.destination);
            osc.frequency.setValueAtTime(880, audioCtx.currentTime);
            osc.start(); osc.stop(audioCtx.currentTime + 0.15);
        } catch(e) {}
    }

    // Integração com sua API do Google Sheets...
    async function buscarDados() {
        const t = document.getElementById("tag").value, n = document.getElementById("nomeMot").value;
        if(!t || !n) return;
        // Simulação da busca de placa baseada na sua imagem
        const placas = {"TJUR 04":"QFA1I50","TJUR 07":"RWR3C75","TJUR 09":"RXC6J04","TJUR 06":"QUJ3E02","TJUR 08":"QVE5H48","TJUR 10":"PHU1I37","TJUR 13":"QVD4I38"};
        document.getElementById("veiculoInfo").value = placas[t] || "";
    }

    // Funções de salvarSaida e finalizar permanecem com a lógica de envio para sua URL do Apps Script
</script>
</body>
</html>
