<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TELEJUR - FROTA INTELIGENTE</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; margin: 0; padding: 10px; }
        .card { max-width: 450px; margin: auto; background: white; padding: 20px; border-radius: 20px; border-top: 12px solid #1a237e; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .brand { font-size: 28px; font-weight: 900; color: #1a237e; text-align: center; margin: 0; }
        
        .painel-frota { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 20px; background: #f8f9fa; padding: 10px; border-radius: 12px; }
        .status-box { padding: 8px; border-radius: 8px; text-align: center; font-size: 10px; font-weight: bold; border: 1px solid #ddd; }
        .status-livre { background: #e8f5e9; color: #2e7d32; }
        .status-uso { background: #ffebee; color: #c62828; }

        .btn-gps { background: #6c757d; color: white; padding: 12px; border-radius: 10px; text-align: center; font-size: 13px; font-weight: bold; margin-bottom: 15px; width: 100%; border: none; }
        label { font-weight: bold; font-size: 12px; color: #444; display: block; margin-top: 12px; }
        input, select, textarea { width: 100%; padding: 12px; margin-top: 5px; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; box-sizing: border-box; }
        .readonly { background: #e9ecef; color: #1a237e; font-weight: bold; }
        
        .btn { width: 100%; padding: 16px; border: none; border-radius: 12px; font-size: 17px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        .btn-azul { background: #1a237e; color: white; }
        .btn-verde { background: #25D366; color: white; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="card">
    <div class="brand">TELEJUR</div>
    <div id="statusFrota" class="painel-frota">Sincronizando...</div>
    <button id="btnGps" class="btn-gps" onclick="obterGps()">⌛ Validando Localização...</button>

    <div id="formContainer">
        <label>DATA</label>
        <input type="text" id="data" class="readonly" readonly>

        <label>VEÍCULO (TAG)</label>
        <select id="tag" onchange="updateUI()">
            <option value="">SELECIONE</option>
            <option value="TJUR 04" data-p="QFA1I50">TJUR 04</option>
            <option value="TJUR 06" data-p="QUJ3E02">TJUR 06</option>
            <option value="TJUR 07" data-p="RWR3C75">TJUR 07</option>
            <option value="TJUR 08" data-p="QVE5H48">TJUR 08</option>
            <option value="TJUR 09" data-p="RXC6J04">TJUR 09</option>
            <option value="TJUR 10" data-p="PHU1I37">TJUR 10</option>
            <option value="TJUR 13" data-p="QVD4I38">TJUR 13</option>
        </select>

        <label>PLACA</label>
        <input type="text" id="placa" class="readonly" readonly>

        <label>MOTORISTA</label>
        <select id="nomeMot">
            <option value="">SELECIONE</option>
            <option>ADRIANO NASCIMENTO</option><option>FRANCIVALDO COSTA</option>
            <option>JOELCINEI GUIMARÃES</option><option>LAFAITE BATISTA</option>
            <option>CEZAR PRADO</option><option>RAFAEL GONÇALVES</option>
            <option>JEAN SOARES</option><option>MATHEUS COSTA</option>
        </select>

        <label>KM INICIAL</label>
        <input type="number" id="kmi" placeholder="KM do painel">

        <div id="finalSection" class="hidden">
            <hr>
            <label style="color:red">KM FINAL</label>
            <input type="number" id="kmf">
            <label>OBSERVAÇÃO</label>
            <textarea id="obs" rows="2"></textarea>
        </div>

        <button type="button" id="btnAcao" onclick="saveStart()" class="btn btn-azul">INICIAR TRAJETO</button>
    </div>
</div>

<script>
    const GOOGLE_URL = "SUA_URL_DO_SCRIPT_AQUI"; // COLOQUE SUA URL AQUI
    const dataH = new Date().toLocaleDateString('pt-BR');
    document.getElementById('data').value = dataH;
    let dadosLoc = { unidade: "FORA DA PLANTA" };
    let frotaAtual = {};

    async function sync() {
        const cb = "cb_"+Date.now();
        const s = document.createElement('script');
        window[cb] = (d) => { 
            frotaAtual = d;
            const tags = ["TJUR 04", "TJUR 06", "TJUR 07", "TJUR 08", "TJUR 09", "TJUR 10", "TJUR 13"];
            document.getElementById('statusFrota').innerHTML = tags.map(t => {
                const mot = d[t];
                return `<div class="status-box ${mot ? 'status-uso' : 'status-livre'}">${t}<br><span>${mot ? '🔴 '+mot.split(' ')[0] : '🟢 LIVRE'}</span></div>`;
            }).join('');
            document.body.removeChild(s);
        };
        s.src = `${GOOGLE_URL}?acao=statusGeral&data=${dataH}&callback=${cb}`;
        document.body.appendChild(s);
    }

    function obterGps() {
        navigator.geolocation.getCurrentPosition(pos => {
            const lat = pos.coords.latitude; const lon = pos.coords.longitude;
            const pontos = [{n:"ALCOA - PORTO", lat:-2.1677, lon:-56.1017},{n:"ALCOA - BENEFICIAMENTO", lat:-2.4488, lon:-56.1708}];
            let dentro = false;
            for(const p of pontos) {
                if(Math.sqrt(Math.pow(lat-p.lat,2) + Math.pow(lon-p.lon,2)) * 111320 <= 800) { dadosLoc.unidade = p.n; dentro = true; break; }
            }
            const btn = document.getElementById('btnGps');
            btn.innerHTML = dentro ? `✅ ${dadosLoc.unidade}` : `🛑 FORA DA PLANTA`;
            btn.style.background = dentro ? "#075E54" : "#d9534f";
        });
    }

    function updateUI() {
        const s = document.getElementById("tag");
        document.getElementById("placa").value = s.options[s.selectedIndex].getAttribute("data-p") || "";
    }

    function saveStart() {
        const d = {
            tag: document.getElementById("tag").value, placa: document.getElementById("placa").value,
            nome: document.getElementById("nomeMot").value, kmi: document.getElementById("kmi").value,
            data: dataH, horaI: new Date().toLocaleTimeString('pt-BR'), local: dadosLoc.unidade
        };
        if(!d.tag || !d.kmi) return alert("Preencha KM e Veículo!");
        fetch(`${GOOGLE_URL}?acao=registrar&${new URLSearchParams(d)}`, {mode:'no-cors'});
        localStorage.setItem("tjur_temp", JSON.stringify(d));
        location.reload();
    }

    function checkActive() {
        const s = localStorage.getItem("tjur_temp");
        if(s) {
            const d = JSON.parse(s);
            document.getElementById("tag").value = d.tag;
            document.getElementById("nomeMot").value = d.nome;
            document.getElementById("kmi").value = d.kmi;
            document.getElementById("placa").value = d.placa;
            document.getElementById("tag").disabled = true;
            document.getElementById("nomeMot").disabled = true;
            document.getElementById("kmi").classList.add("readonly");
            document.getElementById("finalSection").classList.remove("hidden");
            const btn = document.getElementById("btnAcao");
            btn.innerText = "ENCERRAR E ENVIAR"; btn.className = "btn btn-verde";
            btn.onclick = async function() {
                const kmf = document.getElementById("kmf").value;
                if(!kmf || Number(kmf) <= Number(d.kmi)) return alert("KM Final inválido!");
                await fetch(`${GOOGLE_URL}?acao=finalizar&tag=${d.tag}&data=${d.data}&kmf=${kmf}&obs=${document.getElementById("obs").value}`, {mode:'no-cors'});
                
                let resumo = `*FROTA TELEJUR*%0A✅ *MOT:* ${d.nome}%0A🚗 *TAG:* ${d.tag}%0A🛣️ *KM:* ${d.kmi} a ${kmf}%0A📍 *LOCAL:* ${d.local}`;
                localStorage.removeItem("tjur_temp");
                window.location.href = `https://api.whatsapp.com/send?text=${resumo}`;
            }
        }
    }

    window.onload = () => { sync(); obterGps(); checkActive(); };
</script>
</body>
</html>
