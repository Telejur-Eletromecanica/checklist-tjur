<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TELEJUR - GESTÃO DE FROTA</title>
    <style>
        :root { --tjur-azul: #1a237e; --tjur-verde: #25D366; --tjur-red: #d32f2f; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; padding: 10px; }
        .card { max-width: 480px; margin: auto; background: white; padding: 20px; border-radius: 25px; border-top: 15px solid var(--tjur-azul); box-shadow: 0 15px 35px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: var(--tjur-azul); margin: 5px 0; letter-spacing: 2px; }
        
        /* Painel Frota */
        .grid-frota { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin: 15px 0; }
        .veiculo-card { padding: 10px; border-radius: 12px; text-align: center; border: 1px solid #ddd; font-size: 11px; font-weight: bold; }
        .livre { background: #e8f5e9; color: #2e7d32; }
        .em-uso { background: #ffebee; color: #c62828; }

        /* Estilos de Input */
        label { font-size: 11px; font-weight: bold; color: #555; display: block; margin-top: 12px; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 14px; margin-top: 5px; border-radius: 10px; border: 1px solid #ccc; font-size: 16px; box-sizing: border-box; transition: 0.3s; }
        input:focus { border-color: var(--tjur-azul); outline: none; }
        .bloqueado { background: #e9ecef; color: #1a237e; pointer-events: none; border: 1px dashed #1a237e; }
        
        .btn { width: 100%; padding: 18px; border: none; border-radius: 15px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 20px; text-transform: uppercase; }
        .btn-iniciar { background: var(--tjur-azul); color: white; }
        .btn-encerrar { background: var(--tjur-verde); color: white; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="card">
    <h2>TELEJUR</h2>
    <p style="text-align:center; font-size: 10px; font-weight: bold; margin-bottom: 20px;">CONTROLE DE FROTA OPERACIONAL</p>

    <div id="painelFrota" class="grid-frota">Sincronizando frota...</div>
    
    <button id="btnGps" class="btn" style="background:#6c757d; color:white; font-size:12px; padding:10px; margin:0;" onclick="obterGps()">⌛ VALIDANDO LOCALIZAÇÃO...</button>

    <div id="formGeral">
        <label>Data</label>
        <input type="text" id="data" class="bloqueado" readonly>

        <label>Veículo (TAG)</label>
        <select id="tag" onchange="selecionarCarro()">
            <option value="">SELECIONE O VEÍCULO</option>
            <option value="TJUR 04" data-p="QFA1I50">TJUR 04 (SKY MUNCK)</option>
            <option value="TJUR 06" data-p="QUJ3E02">TJUR 06 (SAVEIRO)</option>
            <option value="TJUR 07" data-p="RWR3C75">TJUR 07 (SKY MUNCK)</option>
            <option value="TJUR 08" data-p="QVE5H48">TJUR 08 (HILUX)</option>
            <option value="TJUR 09" data-p="RXC6J04">TJUR 09 (SKY MUNCK)</option>
            <option value="TJUR 10" data-p="PHU1I37">TJUR 10 (CAMINHONETE)</option>
            <option value="TJUR 13" data-p="QVD4I38">TJUR 13 (HILUX)</option>
        </select>

        <label>Placa do Veículo</label>
        <input type="text" id="placa" class="bloqueado" readonly placeholder="Automático">

        <label>Motorista Responsável</label>
        <select id="nomeMot">
            <option value="">QUEM ESTÁ CONDUZINDO?</option>
            <option>ADRIANO NASCIMENTO</option>
            <option>FRANCIVALDO COSTA</option>
            <option>JOELCINEI GUIMARÃES</option>
            <option>LAFAITE BATISTA</option>
            <option>CEZAR PRADO</option>
            <option>RAFAEL GONÇALVES</option>
        </select>

        <label>KM Inicial (Saída)</label>
        <input type="number" id="kmi" placeholder="Digite o KM do painel">

        <div id="secaoFinal" class="hidden">
            <hr style="margin-top:20px; border: 0.5px solid #eee;">
            <label style="color:var(--tjur-red)">KM Final (Chegada)</label>
            <input type="number" id="kmf" placeholder="KM ao retornar">
            
            <label>Observações do Trajeto</label>
            <textarea id="obs" rows="2" placeholder="Ex: Veículo limpo, sem avarias."></textarea>
        </div>

        <button type="button" id="btnAcao" onclick="iniciarTrajeto()" class="btn btn-iniciar">INICIAR TRAJETO</button>
    </div>
</div>

<script>
    const SCRIPT_URL = "URL_DO_SEU_GOOGLE_SCRIPT"; // <--- COLOQUE SUA URL AQUI
    const DATA_ATUAL = new Date().toLocaleDateString('pt-BR');
    document.getElementById('data').value = DATA_ATUAL;

    let localizacao = { unidade: "FORA DA PLANTA", link: "" };
    let frotaOcupada = {};

    // 1. SINCRONIZAÇÃO INTELIGENTE
    async function syncFrota() {
        const cb = "callback_" + Math.floor(Math.random() * 1000000);
        const script = document.createElement('script');
        window[cb] = (data) => {
            frotaOcupada = data;
            const tags = ["TJUR 04", "TJUR 06", "TJUR 07", "TJUR 08", "TJUR 09", "TJUR 10", "TJUR 13"];
            document.getElementById('painelFrota').innerHTML = tags.map(t => {
                const mot = data[t];
                return `<div class="veiculo-card ${mot ? 'em-uso' : 'livre'}">${t}<br><span>${mot ? '🔴 '+mot.split(' ')[0] : '🟢 LIVRE'}</span></div>`;
            }).join('');
            delete window[cb];
            document.body.removeChild(script);
        };
        script.src = `${SCRIPT_URL}?acao=statusGeral&data=${DATA_ATUAL}&callback=${cb}`;
        document.body.appendChild(script);
    }

    // 2. GEOLOCALIZAÇÃO (PRECISÃO 800M)
    function obterGps() {
        navigator.geolocation.getCurrentPosition(pos => {
            const lat = pos.coords.latitude, lon = pos.coords.longitude;
            localizacao.link = `https://www.google.com/maps?q=${lat},${lon}`;
            const pontos = [{n:"ALCOA - PORTO", lat:-2.1677, lon:-56.1017}, {n:"ALCOA - BENEFICIAMENTO", lat:-2.4488, lon:-56.1708}];
            let pIdent = "FORA DA PLANTA";
            for(const p of pontos) {
                let dist = Math.sqrt(Math.pow(lat-p.lat,2) + Math.pow(lon-p.lon,2)) * 111320;
                if(dist <= 800) { pIdent = p.n; break; }
            }
            localizacao.unidade = pIdent;
            const b = document.getElementById('btnGps');
            b.innerHTML = (pIdent === "FORA DA PLANTA") ? "🛑 FORA DA PLANTA" : `✅ ${pIdent}`;
            b.style.background = (pIdent === "FORA DA PLANTA") ? "#d32f2f" : "#2e7d32";
        });
    }

    function selecionarCarro() {
        const s = document.getElementById("tag");
        document.getElementById("placa").value = s.options[s.selectedIndex].getAttribute("data-p") || "";
    }

    // 3. LÓGICA DE TRAJETO
    function iniciarTrajeto() {
        const d = {
            data: DATA_ATUAL, tag: document.getElementById("tag").value,
            placa: document.getElementById("placa").value, nome: document.getElementById("nomeMot").value,
            kmi: document.getElementById("kmi").value, horaI: new Date().toLocaleTimeString('pt-BR'),
            local: localizacao.unidade
        };

        if(!d.tag || !d.nome || !d.kmi) return alert("Preencha todos os campos!");
        
        fetch(`${SCRIPT_URL}?acao=registrar&${new URLSearchParams(d)}`, {mode:'no-cors'});
        localStorage.setItem("sessao_tjur", JSON.stringify(d));
        location.reload();
    }

    function gerenciarSessao() {
        const sessao = localStorage.getItem("sessao_tjur");
        if(sessao) {
            const d = JSON.parse(sessao);
            // Preencher e bloquear campos
            document.getElementById("tag").innerHTML = `<option>${d.tag}</option>`;
            document.getElementById("nomeMot").innerHTML = `<option>${d.nome}</option>`;
            document.getElementById("placa").value = d.placa;
            document.getElementById("kmi").value = d.kmi;
            document.getElementById("kmi").classList.add("bloqueado");
            
            document.getElementById("secaoFinal").classList.remove("hidden");
            const btn = document.getElementById("btnAcao");
            btn.innerText = "FINALIZAR TRAJETO";
            btn.className = "btn btn-encerrar";

            btn.onclick = async function() {
                const kmf = document.getElementById("kmf").value;
                if(!kmf || Number(kmf) <= Number(d.kmi)) return alert("Erro: KM Final deve ser maior que o Inicial!");
                
                await fetch(`${SCRIPT_URL}?acao=finalizar&tag=${d.tag}&data=${d.data}&kmf=${kmf}&obs=${document.getElementById("obs").value}`, {mode:'no-cors'});
                
                const msg = `*TELEJUR - RESUMO DE VIAGEM*%0A✅ *Status:* Finalizado%0A👤 *Mot:* ${d.nome}%0A🚗 *Carro:* ${d.tag} (${d.placa})%0A🛣️ *KM:* ${d.kmi} ➔ ${kmf} (${kmf - d.kmi}km rodados)%0A📍 *Origem:* ${d.local}`;
                
                localStorage.removeItem("sessao_tjur");
                window.location.href = `https://api.whatsapp.com/send?text=${msg}`;
            };
        }
    }

    window.onload = () => { syncFrota(); obterGps(); gerenciarSessao(); };
</script>

</body>
</html>
