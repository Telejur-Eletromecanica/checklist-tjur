<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TELEJUR - CHECKLIST</title>
    <style>
        body { font-family: sans-serif; background: #e3f2fd; margin: 0; padding: 10px; }
        .card { max-width: 400px; margin: auto; background: white; padding: 20px; border-radius: 15px; border-top: 10px solid #1a237e; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .header-text { text-align: center; margin-bottom: 20px; }
        .brand { font-size: 28px; font-weight: bold; color: #1a237e; letter-spacing: 2px; margin: 0; }
        .subtitle { font-size: 14px; color: #1a237e; font-weight: bold; margin: 0; text-transform: uppercase; }
        h2 { text-align: center; color: #333; font-size: 18px; margin-top: 20px; border-bottom: 2px solid #1a237e; padding-bottom: 10px; }
        label { font-weight: bold; font-size: 12px; color: #555; display: block; margin-top: 15px; }
        input, select, textarea { width: 100%; padding: 12px; margin-top: 5px; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; box-sizing: border-box; }
        input[readonly] { background: #f1f3f4; color: #666; }
        
        .btn-azul { width: 100%; padding: 16px; background: #1a237e; border: none; border-radius: 10px; font-size: 18px; color: white; font-weight: bold; cursor: pointer; margin-top: 25px; }
        .btn-verde { width: 100%; padding: 16px; background: #25D366; border: none; border-radius: 10px; font-size: 18px; color: white; font-weight: bold; cursor: pointer; margin-top: 25px; }
        .btn-bloqueado { background: #9e9e9e !important; cursor: not-allowed !important; opacity: 0.6; }
        
        .hidden { display: none; }
        .alerta-erro { font-size: 13px; font-weight: bold; margin-top: 10px; text-align: center; color: #d32f2f; background: #ffebee; padding: 10px; border-radius: 8px; border: 1px solid #ef9a9a; display: none; }

        /* TELA ESTÁTICA DE ESPERA */
        #telaEspera { text-align: center; padding: 20px; display: none; }
        .status-badge { background: #e3f2fd; color: #1a237e; padding: 10px; border-radius: 50px; font-weight: bold; font-size: 12px; text-transform: uppercase; display: inline-block; margin-bottom: 15px; border: 1px solid #1a237e; }
        .info-trajeto { background: #f8f9fa; border-radius: 10px; padding: 15px; margin: 15px 0; border-left: 5px solid #1a237e; text-align: left; font-size: 14px; }
    </style>
</head>
<body>

<div class="card">
    <div class="header-text">
        <p class="brand">TELEJUR</p>
        <p class="subtitle">ELETROMECÂNICA</p>
    </div>

    <div id="containerForm">
        <h2 id="tituloAcao">CHECKLIST DE VEÍCULO</h2>
        <form id="formChecklist">
            <label>TAG DO VEÍCULO</label>
            <select id="tag" onchange="completar()" required>
                <option value="">SELECIONE A TAG</option>
                <option value="TJUR 04" data-v="SKY MUNCK" data-p="QFA1I50">TJUR 04</option>
                <option value="TJUR 06" data-v="SAVEIRO FURGÃO" data-p="QUJ3E02">TJUR 06</option>
                <option value="TJUR 07" data-v="SKY MUNCK" data-p="RWR3C75">TJUR 07</option>
                <option value="TJUR 08" data-v="CAMINHONETE HILUX" data-p="QVE5H48">TJUR 08</option>
                <option value="TJUR 09" data-v="SKY MUNCK" data-p="RXC6J04">TJUR 09</option>
                <option value="TJUR 10" data-v="CAMINHONETE" data-p="PHU1I37">TJUR 10</option>
                <option value="TJUR 13" data-v="CAMINHONETE HILUX" data-p="QVD4I38">TJUR 13</option>
            </select>

            <div id="msgTrava" class="alerta-erro"></div>

            <label>IDENTIFICAÇÃO</label>
            <select id="numCondutor" onchange="validarDono()" required>
                <option value="">SELECIONE O NÚMERO</option>
                <option>CONDUTOR 1</option><option>CONDUTOR 2</option><option>CONDUTOR 3</option>
                <option>CONDUTOR 4</option><option>CONDUTOR 5</option><option>CONDUTOR 6</option>
                <option>CONDUTOR 7</option><option>CONDUTOR 8</option><option>CONDUTOR 9</option>
            </select>
            
            <label>NOME DO CONDUTOR</label>
            <select id="nomeCondutor" onchange="validarDono()" required>
                <option value="">SELECIONE O NOME</option>
                <option>ADRIANO NASCIMENTO</option>
                <option>FRANCIVALDO COSTA</option>
                <option>JOELCINEI GUIMARÃES</option>
                <option>REGINALDO</option>
                <option>LAFAITE BATISTA</option>
                <option>FRANCINILDO TEXEIRA</option>
                <option>MIRIELLY</option>
                <option>RAIMUNDO WALTER</option>
            </select>

            <div id="camposSempreVisiveis">
                <label>KM INICIAL</label>
                <input type="text" id="kmi" inputmode="numeric" placeholder="0.0" oninput="mascaraKM(this)" required>

                <label>COR DO SELO</label>
                <select id="corSelo" required>
                    <option value="">SELECIONE A COR</option>
                    <option value="VERDE">VERDE</option>
                    <option value="AMARELO">AMARELO</option>
                    <option value="AZUL">AZUL</option>
                    <option value="VERMELHO">VERMELHO</option>
                </select>

                <div id="campoFim" class="hidden">
                    <label>KM FINAL</label>
                    <input type="text" id="kmf" inputmode="numeric" placeholder="0.0" oninput="mascaraKM(this)">
                </div>

                <label>TIPO DE ÓLEO</label>
                <input type="text" id="tipoOleo" placeholder="Ex: 15W40">

                <label>OBSERVAÇÃO</label>
                <textarea id="obs" rows="3" placeholder="Descreva problemas se houver..."></textarea>
            </div>

            <button type="button" id="btnAcao" onclick="processar()" class="btn-azul">SALVAR INÍCIO DE TRAJETO</button>
        </form>
    </div>

    <div id="telaEspera">
        <div class="status-badge">● Veículo em Trajeto</div>
        <h3 style="color: #1a237e; margin: 0;">AGUARDANDO FINALIZAÇÃO</h3>
        <p style="font-size: 13px; color: #666;">O trajeto inicial foi registrado. Não feche esta aba se possível.</p>
        
        <div id="resumoTrajeto" class="info-trajeto"></div>

        <button type="button" onclick="irParaFinalizar()" class="btn-verde">FINALIZAR TRAJETO AGORA</button>
    </div>
</div>

<script>
    function getHoraAtual() {
        const agora = new Date();
        return String(agora.getHours()).padStart(2, '0') + ":" + String(agora.getMinutes()).padStart(2, '0');
    }

    function mascaraKM(input) {
        let value = input.value.replace(/\D/g, "");
        if (value.length > 0) {
            value = (parseInt(value) / 10).toFixed(1);
            input.value = value;
        } else { input.value = ""; }
    }

    // Verifica se já existe um trajeto salvo ao abrir a página
    window.onload = function() {
        const tags = ["TJUR 04", "TJUR 06", "TJUR 07", "TJUR 08", "TJUR 09", "TJUR 10", "TJUR 13"];
        tags.forEach(t => {
            if(localStorage.getItem("tjur_temp_" + t)) {
                exibirTelaEspera(t);
            }
        });
    };

    function validarDono() {
        const tag = document.getElementById("tag").value;
        const hoje = new Date().toISOString().split('T')[0];
        const nome = document.getElementById("nomeCondutor").value;
        const idAtual = document.getElementById("numCondutor").value;
        const msg = document.getElementById("msgTrava");
        const btn = document.getElementById("btnAcao");

        if (!tag || !nome || !idAtual) return;

        const idRegistrado = localStorage.getItem(`dono_${tag}_${hoje}_${nome}`);

        if (idRegistrado && idRegistrado !== idAtual) {
            msg.innerText = `⚠ ${nome}, você já é ${idRegistrado} neste veículo hoje!`;
            msg.style.display = "block";
            btn.disabled = true;
            btn.classList.add("btn-bloqueado");
        } else {
            msg.style.display = "none";
            btn.disabled = false;
            btn.classList.remove("btn-bloqueado");
        }
    }

    function completar() {
        var s = document.getElementById("tag");
        var sel = s.options[s.selectedIndex];
        validarDono();
        // Se selecionar uma tag que já tem trajeto salvo, pula para espera
        if(localStorage.getItem("tjur_temp_" + s.value)) exibirTelaEspera(s.value);
    }

    function salvarInicio() {
        const tag = document.getElementById("tag").value;
        const nome = document.getElementById("nomeCondutor").value;
        const idNum = document.getElementById("numCondutor").value;
        const hoje = new Date().toISOString().split('T')[0];

        if(!tag || !idNum || !nome || !document.getElementById("kmi").value) {
            alert("Preencha os campos obrigatórios!"); return;
        }

        localStorage.setItem(`dono_${tag}_${hoje}_${nome}`, idNum);

        const dados = {
            num: idNum, nome: nome,
            kmi: document.getElementById("kmi").value,
            selo: document.getElementById("corSelo").value,
            oleo: document.getElementById("tipoOleo").value,
            obs: document.getElementById("obs").value,
            horaI: getHoraAtual(),
            data: hoje
        };
        localStorage.setItem("tjur_temp_" + tag, JSON.stringify(dados));
        exibirTelaEspera(tag);
    }

    function exibirTelaEspera(tag) {
        const salvo = JSON.parse(localStorage.getItem("tjur_temp_" + tag));
        document.getElementById("containerForm").style.display = "none";
        document.getElementById("telaEspera").style.display = "block";
        
        document.getElementById("resumoTrajeto").innerHTML = `
            <b>VEÍCULO:</b> ${tag}<br>
            <b>CONDUTOR:</b> ${salvo.nome} (${salvo.num})<br>
            <b>KM INICIAL:</b> ${salvo.kmi}<br>
            <b>INICIADO ÀS:</b> ${salvo.horaI}
        `;
        // Guarda a tag ativa para finalizar depois
        document.getElementById("telaEspera").setAttribute("data-tag-ativa", tag);
    }

    function irParaFinalizar() {
        const tag = document.getElementById("telaEspera").getAttribute("data-tag-ativa");
        const salvo = JSON.parse(localStorage.getItem("tjur_temp_" + tag));
        
        document.getElementById("telaEspera").style.display = "none";
        document.getElementById("containerForm").style.display = "block";
        
        // Ajusta interface para modo FIM
        document.getElementById("tituloAcao").innerText = "FINALIZAR TRAJETO";
        document.getElementById("tag").value = tag;
        document.getElementById("numCondutor").value = salvo.num;
        document.getElementById("nomeCondutor").value = salvo.nome;
        document.getElementById("kmi").value = salvo.kmi;
        document.getElementById("corSelo").value = salvo.selo;
        document.getElementById("tipoOleo").value = salvo.oleo;
        document.getElementById("obs").value = salvo.obs;
        
        document.getElementById("campoFim").classList.remove("hidden");
        document.getElementById("btnAcao").innerText = "ENVIAR RELATÓRIO";
        document.getElementById("btnAcao").className = "btn-verde";
        document.getElementById("btnAcao").setAttribute("onclick", "enviarFinal()");
    }

    function processar() {
        salvarInicio();
    }

    function enviarFinal() {
        const tag = document.getElementById("tag").value;
        const salvo = JSON.parse(localStorage.getItem("tjur_temp_" + tag));
        const kf = document.getElementById("kmf").value;

        if(!kf) { alert("Informe o KM Final!"); return; }

        const percorrido = (parseFloat(kf) - parseFloat(salvo.kmi)).toFixed(1);
        const dataF = salvo.data.split('-').reverse().join('/');

        const texto = `*CHECKLIST VEÍCULOS - TELEJUR*\n\n` +
                      `*DATA:* ${dataF}\n` +
                      `*INÍCIO:* ${salvo.horaI} | *FIM:* ${getHoraAtual()}\n` +
                      `__________\n\n` +
                      `*ID:* ${salvo.num}\n` +
                      `*CONDUTOR:* ${salvo.nome}\n` +
                      `__________\n\n` +
                      `*TAG:* ${tag}\n` +
                      `__________\n\n` +
                      `*COR DO SELO:* ${document.getElementById("corSelo").value}\n` +
                      `*KM INICIAL:* ${salvo.kmi}\n` +
                      `*KM FINAL:* ${kf}\n` +
                      `*TOTAL:* ${percorrido} KM\n` +
                      `__________\n\n` +
                      `*ÓLEO:* ${document.getElementById("tipoOleo").value || "NÃO INFORMADO"}\n` +
                      `*OBSERVAÇÃO:* ${document.getElementById("obs").value || "SEM OBSERVAÇÃO"}`;

        window.location.href = "https://api.whatsapp.com/send?text=" + encodeURIComponent(texto);
        localStorage.removeItem("tjur_temp_" + tag);
        location.reload(); // Reseta para o estado inicial
    }
</script>
</body>
</html>
