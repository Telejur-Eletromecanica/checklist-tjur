<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TELEJUR v4.3 - OFICIAL</title>
    <style>
        :root { --primary: #1a237e; --success: #25d366; --bg: #f0f4f8; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 10px; font-size: 14px; }
        .card { max-width: 500px; margin: auto; background: white; padding: 15px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h3 { font-size: 11px; color: var(--primary); border-bottom: 1px solid #ddd; padding-bottom: 5px; margin: 15px 0 5px 0; text-transform: uppercase; }
        label { display: block; font-weight: bold; font-size: 10px; margin-top: 8px; color: #666; }
        input, select, textarea { width: 100%; padding: 12px; margin-top: 3px; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; box-sizing: border-box; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .btn { width: 100%; padding: 18px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 15px; color: white; background: var(--success); }
        .hidden { display: none; }
        input[readonly] { background: #f8f9fa; color: #1a237e; font-weight: bold; }
        #restaTroca { font-size: 18px; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="text-align:center; margin:0 0 10px 0; color:var(--primary)">📋 CHECKLIST TELEJUR</h2>
    
    <div id="secaoInicial">
        <h3>👤 IDENTIFICAÇÃO</h3>
        <label>Motorista</label>
        <select id="nomeMot">
            <option value="">-- SELECIONE --</option>
            <option>FRANCIVALDO COSTA</option><option>ADRIANO NASCIMENTO</option>
            <option>REGINALDO</option><option>WALTER GONÇALVES</option><option>LAFAITE BATISTA</option>
        </select>

        <div class="grid-2">
            <div>
                <label>TAG</label>
                <select id="tag" onchange="autoPreencher()">
                    <option value="">--</option>
                    <option>TJUR 04</option><option>TJUR 06</option><option>TJUR 07</option>
                    <option>TJUR 08</option><option>TJUR 09</option><option>TJUR 10</option><option>TJUR 13</option>
                </select>
            </div>
            <div><label>ID DO DIA</label><input type="text" id="condutorID" readonly></div>
        </div>

        <div class="grid-2">
            <div><label>Veículo</label><input type="text" id="veiculoNome" readonly></div>
            <div><label>Placa</label><input type="text" id="placa" readonly></div>
        </div>

        <div class="grid-2">
            <div><label>KM Inicial</label><input type="text" id="kmi" inputmode="numeric"></div>
            <div><label>Próx. Troca (KM)</label><input type="text" id="proxOleo" inputmode="numeric"></div>
        </div>

        <button onclick="processarEnvio('SAIDA')" class="btn" id="btnAcao">📲 INICIAR SAÍDA</button>
    </div>

    <div id="secaoFinal" class="hidden">
        <div id="resumoSaida" style="background:#fff9c4; padding:12px; border-radius:8px; font-size:13px; margin-bottom:15px; border:1px solid #fbc02d"></div>
        <h3>🏁 FINALIZAÇÃO</h3>
        <div class="grid-2">
            <div><label>Hora Chegada</label><input type="text" id="horaFim" readonly></div>
            <div><label>KM Final</label><input type="text" id="kmf" inputmode="numeric" oninput="calcularResta()"></div>
        </div>
        <label>RESTA PARA TROCA DE ÓLEO</label>
        <input type="text" id="restaTroca" readonly value="---">
        <button onclick="processarEnvio('CHEGADA')" class="btn" id="btnAcaoFim" style="background:#075e54">🏁 CONCLUIR CHEGADA</button>
    </div>
</div>

<script>
    const URL_API = "https://script.google.com/macros/s/AKfycbysx-IjZe54SWbmqwl2NYJEx_kiuVtakdtE-GFYE30UxwYYQhcvOuw5DViSwMixS_QIyQ/exec"; 

    function limparNum(v) { 
        if(!v) return 0;
        return Math.round(Number(v.toString().replace(/\D/g, ''))) || 0; 
    }

    function autoPreencher() {
        const tag = document.getElementById('tag').value;
        if(!tag) return;
        const script = document.createElement('script');
        script.src = `${URL_API}?acao=buscarDadosVei&tag=${encodeURIComponent(tag)}&callback=retornoPlanilha&t=${Date.now()}`;
        document.body.appendChild(script);
        script.onload = () => script.remove();
    }

    function retornoPlanilha(data) {
        document.getElementById('veiculoNome').value = data.veiculo || "";
        document.getElementById('placa').value = data.placa || "";
        document.getElementById('kmi').value = data.kmi || "";
        document.getElementById('condutorID').value = data.condutorSugerido || "CONDUTOR 1";
    }

    function calcularResta() {
        const salvo = localStorage.getItem("tjur_v43");
        if(!salvo) return;
        const d = JSON.parse(salvo);
        const kmFinal = limparNum(document.getElementById('kmf').value);
        const kmTroca = limparNum(d.proxOleo);
        const campo = document.getElementById('restaTroca');
        
        if (kmFinal > 0 && kmTroca > 0) {
            const diff = kmTroca - kmFinal;
            campo.value = diff >= 0 ? diff + " KM" : "EXCEDIDO " + Math.abs(diff) + " KM";
            campo.style.color = diff >= 0 ? "green" : "red";
        }
    }

    async function processarEnvio(tipo) {
        const btn = tipo === 'SAIDA' ? document.getElementById('btnAcao') : document.getElementById('btnAcaoFim');
        btn.disabled = true; btn.innerText = "⏳...";
        
        const agora = new Date();
        const dataH = agora.toLocaleDateString('pt-BR');
        const horaH = agora.toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'});
        let payload = {};

        if(tipo === 'SAIDA') {
            payload = {
                tipo: 'SAIDA', data: dataH, tag: document.getElementById('tag').value,
                condutorID: document.getElementById('condutorID').value,
                nome: document.getElementById('nomeMot').value, kmi: limparNum(document.getElementById('kmi').value),
                placa: document.getElementById('placa').value, veiculo: document.getElementById('veiculoNome').value,
                proxOleo: limparNum(document.getElementById('proxOleo').value), horaInic: horaH
            };
            localStorage.setItem("tjur_v43", JSON.stringify(payload));
        } else {
            const d = JSON.parse(localStorage.getItem("tjur_v43"));
            payload = { ...d, tipo: 'CHEGADA', kmf: limparNum(document.getElementById('kmf').value), horaFim: horaH, restaTroca: document.getElementById('restaTroca').value };
        }

        try {
            await fetch(URL_API, { method: 'POST', mode: 'no-cors', body: new Blob([JSON.stringify(payload)]) });
            let tZap = `*TELEJUR (${payload.condutorID})*%0A*TAG:* ${payload.tag}%0A*Mot:* ${payload.nome}%0A*KM:* ${tipo === 'SAIDA' ? payload.kmi : payload.kmf}`;
            window.open(`https://api.whatsapp.com/send?text=${tZap}`, '_blank');
            if(tipo === 'CHEGADA') localStorage.removeItem("tjur_v43");
            location.reload();
        } catch (e) { alert("Erro!"); btn.disabled = false; }
    }

    window.onload = () => {
        const salvo = localStorage.getItem("tjur_v43");
        if(salvo) {
            const d = JSON.parse(salvo);
            document.getElementById('secaoInicial').classList.add('hidden');
            document.getElementById('secaoFinal').classList.remove('hidden');
            document.getElementById('resumoSaida').innerHTML = `🚗 <b>${d.tag}</b> (${d.condutorID})<br>👤 ${d.nome} | 🕒 ${d.horaInic}`;
            document.getElementById('horaFim').value = new Date().toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'});
        }
    };
</script>
</body>
</html>
