<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checklist Completo - Telejur V22</title>
    <style>
        body { background: #f4f7f6; color: #333; font-family: sans-serif; padding: 10px; margin: 0; }
        .container { background: white; max-width: 500px; margin: auto; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #004080; font-size: 1.2rem; margin-bottom: 20px; border-bottom: 2px solid #004080; padding-bottom: 10px; }
        
        .section-title { background: #e9ecef; padding: 5px 10px; font-weight: bold; font-size: 0.8rem; margin-top: 15px; border-radius: 4px; color: #495057; }
        
        label { font-size: 0.7rem; font-weight: bold; color: #666; display: block; margin-top: 10px; text-transform: uppercase; }
        select, input { width: 100%; padding: 12px; margin-top: 4px; border-radius: 6px; border: 1px solid #ccc; font-size: 1rem; box-sizing: border-box; }
        input[readonly] { background: #f8f9fa; color: #212529; font-weight: bold; }
        
        .grid { display: flex; gap: 8px; }
        .col { flex: 1; }
        
        .btn { width: 100%; padding: 15px; border-radius: 8px; border: none; font-weight: bold; margin-top: 10px; cursor: pointer; font-size: 1rem; color: white; }
        .btn-saida { background: #0056b3; margin-top: 20px; }
        .btn-chegada { background: #bd2130; }
        
        #msgBusca { text-align: center; font-size: 0.8rem; color: #0056b3; margin-top: 5px; height: 1rem; }
    </style>
</head>
<body>

<div class="container">
    <h2>CHECKLIST DE TRAJETO</h2>
    <div id="msgBusca"></div>

    <form id="formTelejur">
        <div class="section-title">IDENTIFICAÇÃO</div>
        <label>Motorista (Nome)</label>
        <select name="nome" id="nome" onchange="chamarBusca()" required>
            <option value="">-- Selecione o Condutor --</option>
            <option value="Adriano Nascimento">Adriano Nascimento</option>
            <option value="Fracivaldo Costa">Fracivaldo Costa</option>
            <option value="Lafaiete Batista">Lafaiete Batista</option>
            <option value="Reginaldo">Reginaldo</option>
            <option value="Walter Gonçalves">Walter Gonçalves</option>
            <option value="Ezequeil Silva">Ezequeil Silva</option>
        </select>

        <div class="grid">
            <div class="col">
                <label>TagID (Veículo)</label>
                <select name="tag" id="tag" onchange="chamarBusca()" required>
                    <option value="">-- Selecione --</option>
                    <option value="TJUR 04">TJUR 04</option>
                    <option value="TJUR 06">TJUR 06</option>
                    <option value="TJUR 07">TJUR 07</option>
                    <option value="TJUR 08">TJUR 08</option>
                    <option value="TJUR 09">TJUR 09</option>
                    <option value="TJUR 10">TJUR 10</option>
                    <option value="TJUR 13">TJUR 13</option>
                </select>
            </div>
            <div class="col">
                <label>ID (Sequência)</label>
                <input type="text" name="condutorID" id="condutorID" readonly placeholder="Auto">
            </div>
        </div>

        <div class="section-title">DADOS DO VEÍCULO</div>
        <div class="grid">
            <div class="col">
                <label>Veículo</label>
                <input type="text" name="veiculo" id="veiculo" readonly>
            </div>
            <div class="col">
                <label>Placa</label>
                <input type="text" name="placa" id="placa" readonly>
            </div>
        </div>

        <div class="grid">
            <div class="col">
                <label>Cor do Selo</label>
                <input type="text" name="corSelo" id="corSelo" readonly>
            </div>
            <div class="col">
                <label>Validade Selo</label>
                <input type="text" name="validadeSelo" id="validadeSelo" readonly>
            </div>
        </div>

        <div class="section-title">KM E MANUTENÇÃO</div>
        <div class="grid">
            <div class="col">
                <label>KM Inicial</label>
                <input type="number" name="kmi" id="kmi" readonly>
            </div>
            <div class="col">
                <label>KM Final</label>
                <input type="number" name="kmf" id="kmf" placeholder="Só na chegada">
            </div>
        </div>

        <div class="grid">
            <div class="col">
                <label>Próx. Troca Óleo</label>
                <input type="number" name="proxOleo" id="proxOleo" readonly>
            </div>
            <div class="col">
                <label>Tipo de Óleo</label>
                <input type="text" name="tipoOleo" id="tipoOleo" readonly>
            </div>
        </div>

        <label>Resta para a troca (KM)</label>
        <input type="text" name="restaTroca" id="restaTroca" readonly>

        <div class="section-title">STATUS DO TRAJETO</div>
        <div class="grid">
            <div class="col">
                <label>Status Geral</label>
                <select name="status" id="status">
                    <option value="Tudo OK">Tudo OK</option>
                    <option value="Pneu Baixo">Pneu Baixo</option>
                    <option value="Limpeza Necessária">Limpeza Necessária</option>
                    <option value="Avaria Encontrada">Avaria Encontrada</option>
                </select>
            </div>
            <div class="col">
                <label>Nº Trajeto</label>
                <input type="number" name="numT" id="numT" readonly>
            </div>
        </div>

        <label>Observação</label>
        <input type="text" name="obs" id="obs" placeholder="Descreva aqui se houver algo...">

        <input type="hidden" name="data" id="data">
        <input type="hidden" name="horaInic" id="horaInic">
        <input type="hidden" name="horaFim" id="horaFim">

        <button type="button" onclick="enviar('SAIDA')" class="btn btn-saida">🚀 SALVAR SAÍDA</button>
        <button type="button" onclick="enviar('CHEGADA')" class="btn btn-chegada">🏁 SALVAR CHEGADA</button>
    </form>
</div>

<script>
    const URL_SCRIPT = "SUA_URL_AQUI"; // COLOQUE SUA URL DE IMPLANTAÇÃO AQUI

    function chamarBusca() {
        const tag = document.getElementById('tag').value;
        const nome = document.getElementById('nome').value;
        if(tag && nome) {
            document.getElementById('msgBusca').innerText = "Buscando dados na planilha...";
            const script = document.createElement('script');
            script.src = `${URL_SCRIPT}?callback=preencher&acao=buscarDadosVei&tag=${encodeURIComponent(tag)}&nome=${encodeURIComponent(nome)}`;
            document.body.appendChild(script);
        }
    }

    function preencher(r) {
        document.getElementById('msgBusca').innerText = "";
        if(r.erro) { alert("Erro: " + r.erro); return; }

        // Preenchimento dos campos com base no seu doGet
        document.getElementById('condutorID').value = r.condutorSugerido || "";
        document.getElementById('kmi').value = r.kmi || 0;
        document.getElementById('veiculo').value = r.veiculo || "";
        document.getElementById('placa').value = r.placa || "";
        document.getElementById('proxOleo').value = r.proxOleo || 0;
        document.getElementById('numT').value = r.numT || 1;
        
        // Campos adicionais (se o seu GS buscar eles, eles aparecem aqui)
        document.getElementById('corSelo').value = r.corSelo || "Verificar";
        document.getElementById('validadeSelo').value = r.validadeSelo || "Verificar";
        document.getElementById('tipoOleo').value = r.tipoOleo || "Padrão";
        
        // Cálculo rápido do resta para troca
        const resta = r.proxOleo - r.kmi;
        document.getElementById('restaTroca').value = resta + " KM";
    }

    function enviar(tipo) {
        const form = document.getElementById('formTelejur');
        const btn = event.target;
        const originalText = btn.innerText;

        if(!document.getElementById('tag').value || !document.getElementById('nome').value) {
            alert("Selecione TAG e Motorista!"); return;
        }

        btn.innerText = "GRAVANDO...";
        btn.disabled = true;

        const dados = Object.fromEntries(new FormData(form));
        const agora = new Date();
        
        dados.tipo = tipo;
        dados.data = agora.toLocaleDateString('pt-BR');
        const hora = agora.getHours().toString().padStart(2,'0') + ":" + agora.getMinutes().toString().padStart(2,'0');
        
        if(tipo === "SAIDA") dados.horaInic = hora;
        else dados.horaFim = hora;

        fetch(URL_SCRIPT, { method: 'POST', body: JSON.stringify(dados) })
        .then(() => {
            alert(tipo + " salvo com sucesso!");
            location.reload();
        })
        .catch(() => {
            alert("Erro ao salvar!");
            btn.innerText = originalText;
            btn.disabled = false;
        });
    }
</script>

</body>
</html>
