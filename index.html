<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TELEJUR - V2</title>
    <style>
        body { font-family: sans-serif; background: #e3f2fd; margin: 0; padding: 10px; }
        .card { max-width: 400px; margin: auto; background: white; padding: 20px; border-radius: 15px; border-top: 10px solid #1a237e; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .header-text { text-align: center; margin-bottom: 20px; }
        .brand { font-size: 28px; font-weight: bold; color: #1a237e; letter-spacing: 2px; margin: 0; }
        .subtitle { font-size: 14px; color: #1a237e; font-weight: bold; margin: 0; text-transform: uppercase; }
        h2 { text-align: center; color: #333; font-size: 18px; margin-top: 20px; border-bottom: 2px solid #1a237e; padding-bottom: 10px; }
        label { font-weight: bold; font-size: 11px; color: #555; display: block; margin-top: 12px; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 12px; margin-top: 5px; border-radius: 8px; border: 1px solid #ccc; font-size: 15px; box-sizing: border-box; background: #f9f9f9; }
        .readonly-field { background: #f0f0f0; color: #1a237e; font-weight: bold; border: 1px dashed #1a237e; }
        .btn-azul { width: 100%; padding: 16px; background: #1a237e; border: none; border-radius: 10px; font-size: 18px; color: white; font-weight: bold; cursor: pointer; margin-top: 20px; }
        .btn-verde { width: 100%; padding: 16px; background: #25D366; border: none; border-radius: 10px; font-size: 18px; color: white; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .alerta-erro { background: #fff3cd; color: #856404; padding: 12px; border-radius: 8px; font-size: 13px; font-weight: bold; margin-top: 15px; border: 1px solid #ffeeba; display: none; text-align: center; }
        #telaEspera { text-align: center; padding: 20px; display: none; }
        .info-trajeto { background: #f8f9fa; border-radius: 10px; padding: 15px; margin: 15px 0; border-left: 5px solid #1a237e; text-align: left; font-size: 13px; line-height: 1.6; }
    </style>
</head>
<body>

<div class="card">
    <div class="header-text">
        <p class="brand">TELEJUR</p>
        <p class="subtitle">ELETROMECÂNICA</p>
    </div>

    <div id="containerForm">
        <h2>CHECKLIST DE VEÍCULO</h2>
        <form id="formChecklist">
            <label>DATA DO CHECKLIST</label>
            <input type="text" id="dataAuto" class="readonly-field" readonly>

            <label>TAG DO VEÍCULO</label>
            <select id="tag" onchange="validarVinculoFixo()">
                <option value="">SELECIONE A TAG</option>
                <option value="TJUR 04">TJUR 04</option>
                <option value="TJUR 06">TJUR 06</option>
                <option value="TJUR 07">TJUR 07</option>
                <option value="TJUR 08">TJUR 08</option>
                <option value="TJUR 09">TJUR 09</option>
                <option value="TJUR 10">TJUR 10</option>
                <option value="TJUR 13">TJUR 13</option>
            </select>

            <div id="msgErroVinc" class="alerta-erro"></div>

            <label>NOME DO CONDUTOR</label>
            <select id="nomeCondutor" onchange="validarVinculoFixo()">
                <option value="">SELECIONE</option>
                <option>ADRIANO NASCIMENTO</option>
                <option>FRANCIVALDO COSTA</option>
                <option>JOELCINEI GUIMARÃES</option>
                <option>REGINALDO</option>
                <option>LAFAITE BATISTA</option>
                <option>FRANCINILDO TEXEIRA</option>
                <option>MIRIELLY</option>
                <option>RAIMUNDO WALTER</option>
            </select>

            <label>IDENTIFICAÇÃO (ID)</label>
            <select id="numCondutor" onchange="validarVinculoFixo()">
                <option value="">SELECIONE</option>
                <option value="CONDUTOR 1">CONDUTOR 1</option>
                <option value="CONDUTOR 2">CONDUTOR 2</option>
            </select>

            <label>KM INICIAL</label>
            <input type="text" id="kmi" placeholder="Ex: 100.500,5">

            <button type="button" id="btnAcao" onclick="iniciarTrajeto()" class="btn-azul">SALVAR E INICIAR</button>
        </form>
    </div>

    <div id="telaEspera">
        <h3>TRAJETO EM ANDAMENTO</h3>
        <div id="resumoTrajeto" class="info-trajeto"></div>
        <button type="button" onclick="location.reload()" class="btn-azul">ATUALIZAR STATUS</button>
    </div>
</div>

<script>
    // COLE ABAIXO O LINK QUE VOCÊ COPIOU DO GOOGLE
    const URL_PLANILHA = "SUA_URL_AQUI_DO_GOOGLE";
    
    const dataHojeStr = new Date().toLocaleDateString('pt-BR');
    document.getElementById('dataAuto').value = dataHojeStr;

    async function validarVinculoFixo() {
        const tag = document.getElementById("tag").value;
        const nome = document.getElementById("nomeCondutor").value;
        const btn = document.getElementById("btnAcao");
        const msg = document.getElementById("msgErroVinc");

        if(!tag || !nome) return;

        msg.style.display = "block";
        msg.innerHTML = "Verificando disponibilidade...";
        btn.disabled = true;

        try {
            const response = await fetch(`${URL_PLANILHA}?acao=verificar&tag=${encodeURIComponent(tag)}&data=${dataHojeStr}`);
            const dono = await response.text();

            if(dono !== "livre" && dono !== nome && dono !== "") {
                msg.innerHTML = `⚠ BLOQUEIO: TAG já ocupada por ${dono} hoje!`;
                btn.disabled = true;
            } else {
                msg.style.display = "none";
                btn.disabled = false;
            }
        } catch (e) {
            msg.style.display = "none";
            btn.disabled = false;
        }
    }

    async function iniciarTrajeto() {
        const dados = {
            tag: document.getElementById("tag").value,
            id: document.getElementById("numCondutor").value,
            nome: document.getElementById("nomeCondutor").value,
            kmi: document.getElementById("kmi").value,
            data: dataHojeStr,
            horaI: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
        };

        if(!dados.tag || !dados.nome || !dados.kmi) return alert("Preencha tudo!");

        const urlFinal = `${URL_PLANILHA}?acao=registrar&tag=${encodeURIComponent(dados.tag)}&id=${encodeURIComponent(dados.id)}&nome=${encodeURIComponent(dados.nome)}&data=${encodeURIComponent(dados.data)}&kmi=${encodeURIComponent(dados.kmi)}&horaI=${encodeURIComponent(dados.horaI)}`;
        
        try {
            await fetch(urlFinal, { mode: 'no-cors' });
            localStorage.setItem("tjur_checklist_ativo", JSON.stringify(dados));
            alert("Registrado com sucesso na planilha!");
            location.reload();
        } catch (e) {
            alert("Erro ao conectar!");
        }
    }

    window.onload = function() {
        const salvo = localStorage.getItem("tjur_checklist_ativo");
        if(salvo) {
            const d = JSON.parse(salvo);
            document.getElementById("containerForm").style.display = "none";
            document.getElementById("telaEspera").style.display = "block";
            document.getElementById("resumoTrajeto").innerHTML = `<b>TAG:</b> ${d.tag}<br><b>CONDUTOR:</b> ${d.nome}<br><b>KM INICIAL:</b> ${d.kmi}`;
        }
    };
</script>
</body>
</html>
