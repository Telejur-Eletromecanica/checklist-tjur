<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Frota Telejur Pro</title>
</head>
<body class="bg-slate-950 pb-10 font-sans text-slate-200">

    <div class="max-w-md mx-auto p-4">
        <header class="py-8 text-center">
            <h1 class="text-3xl font-black tracking-tighter text-blue-500 italic uppercase">Telejur <span class="text-white">Frota</span></h1>
            <p class="text-[10px] text-slate-500 font-mono mt-2" id="live-clock"></p>
        </header>

        <main class="bg-slate-900 rounded-[2.5rem] p-6 shadow-2xl border border-slate-800 space-y-6">
            
            <div class="space-y-2">
                <label class="text-[10px] font-bold text-slate-500 uppercase ml-2">Veículo Ativo (TAG)</label>
                <select id="tag_select" onchange="consultarPlanilha()" class="w-full bg-slate-800 border-2 border-slate-700 rounded-2xl p-4 font-black text-xl text-white outline-none focus:border-blue-600 transition-all appearance-none">
                    <option value="" disabled selected>---</option>
                    <option value="TJUR 04">TJUR 04</option><option value="TJUR 06">TJUR 06</option>
                    <option value="TJUR 07">TJUR 07</option><option value="TJUR 08">TJUR 08</option>
                    <option value="TJUR 09">TJUR 09</option><option value="TJUR 10">TJUR 10</option>
                    <option value="TJUR 13">TJUR 13</option>
                </select>
            </div>

            <div id="status-container" class="grid grid-cols-2 gap-3 hidden">
                <div class="bg-slate-800/50 p-4 rounded-2xl border border-slate-700 text-center">
                    <span class="text-[9px] font-bold text-slate-500 uppercase">Sua Vez</span>
                    <input type="text" id="id_condutor" readonly class="bg-transparent w-full text-center font-black text-blue-400 outline-none text-sm" value="---">
                </div>
                <div class="bg-slate-800/50 p-4 rounded-2xl border border-slate-700 text-center">
                    <span class="text-[9px] font-bold text-slate-500 uppercase">Disponibilidade</span>
                    <div id="status_label" class="font-black text-[10px] mt-1 uppercase">...</div>
                </div>
            </div>

            <div class="space-y-2">
                <label class="text-[10px] font-bold text-slate-500 uppercase ml-2">Motorista Responsável</label>
                <select id="motorista" class="w-full bg-slate-800 border-2 border-slate-700 rounded-2xl p-4 font-bold text-white outline-none focus:border-blue-600 appearance-none">
                    <option value="" disabled selected>SELECIONE...</option>
                    <option value="ADRIANO NASCIMENTO">ADRIANO NASCIMENTO</option>
                    <option value="FRACIVALDO COSTA">FRACIVALDO COSTA</option>
                    <option value="JOELCINEI GUIMARÃES">JOELCINEI GUIMARÃES</option>
                    <option value="FRACINILDO TEIXEIRA">FRACINILDO TEIXEIRA</option>
                </select>
            </div>

            <div class="grid grid-cols-2 gap-3 pt-4 border-t border-slate-800">
                <div class="space-y-1">
                    <label class="text-[9px] font-bold text-slate-500 uppercase ml-2">KM Atual</label>
                    <input type="tel" id="km_atual" oninput="atualizarOleo()" placeholder="0" class="w-full bg-slate-800 border-2 border-slate-700 rounded-2xl p-4 font-black text-white outline-none focus:border-green-600">
                </div>
                <div class="space-y-1">
                    <label class="text-[9px] font-bold text-slate-500 uppercase ml-2">Troca Óleo</label>
                    <input type="tel" id="km_troca" oninput="atualizarOleo()" placeholder="0" class="w-full bg-slate-800 border-2 border-slate-700 rounded-2xl p-4 font-black text-white outline-none focus:border-orange-600">
                </div>
            </div>

            <div class="bg-blue-600/10 border border-blue-500/20 p-4 rounded-2xl text-center">
                <span class="text-[9px] font-bold text-blue-500 uppercase tracking-widest">Saldo de Quilometragem</span>
                <div id="km_restante" class="text-2xl font-black text-white">--- KM</div>
            </div>

            <div class="grid grid-cols-1 gap-3 pt-2">
                <button id="btn_saida" onclick="registrar('EM TRÂNSITO')" disabled class="w-full bg-green-600 hover:bg-green-500 disabled:bg-slate-800 disabled:text-slate-600 font-black py-5 rounded-2xl shadow-xl uppercase transition-all">Iniciar Trajeto</button>
                <button id="btn_chegada" onclick="registrar('CONCLUÍDO')" disabled class="w-full bg-blue-600 hover:bg-blue-500 disabled:bg-slate-800 disabled:text-slate-600 font-black py-5 rounded-2xl shadow-xl uppercase transition-all">Finalizar Trajeto</button>
            </div>
        </main>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbysx-IjZe54SWbmqwl2NYJEx_kiuVtakdtE-GFYE30UxwYYQhcvOuw5DViSwMixS_QIyQ/exec";

        async function consultarPlanilha() {
            const tag = document.getElementById('tag_select').value;
            const label = document.getElementById('status_label');
            const container = document.getElementById('status-container');
            
            container.classList.remove('hidden');
            label.innerText = "VERIFICANDO...";
            label.className = "font-black text-[10px] mt-1 text-slate-500";

            try {
                const res = await fetch(`${API_URL}?acao=checarStatus&tag=${tag}`);
                const data = await res.json();

                document.getElementById('id_condutor').value = data.proximoID;

                if (data.bloqueado) {
                    label.innerText = "OCUPADO (" + data.quem + ")";
                    label.className = "font-black text-[10px] mt-1 text-red-500 animate-pulse";
                    document.getElementById('btn_saida').disabled = true;
                    document.getElementById('btn_chegada').disabled = false;
                } else {
                    label.innerText = "LIBERADO";
                    label.className = "font-black text-[10px] mt-1 text-green-500";
                    document.getElementById('btn_saida').disabled = false;
                    document.getElementById('btn_chegada').disabled = true;
                }
            } catch (e) { alert("Erro ao ler dados. Verifique a URL do Script."); }
        }

        function atualizarOleo() {
            const atual = parseInt(document.getElementById('km_atual').value) || 0;
            const troca = parseInt(document.getElementById('km_troca').value) || 0;
            const resta = troca - atual;
            const display = document.getElementById('km_restante');
            
            if (troca > 0) {
                display.innerText = resta <= 0 ? "VENCIDO!" : resta.toLocaleString() + " KM";
                display.className = resta <= 0 ? "text-2xl font-black text-red-500" : "text-2xl font-black text-white";
            }
        }

        async function registrar(status) {
            const tag = document.getElementById('tag_select').value;
            const motorista = document.getElementById('motorista').value;
            const km = document.getElementById('km_atual').value;
            if (!tag || !motorista || !km) return alert("Preencha todos os campos!");

            const btn = event.target;
            btn.innerText = "GRAVANDO...";
            btn.disabled = true;

            const payload = {
                data: new Date().toLocaleDateString('pt-BR'),
                tag: tag,
                id_motorista: document.getElementById('id_condutor').value,
                nome: motorista,
                km: km,
                hora: new Date().toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'}),
                resta_troca: document.getElementById('km_restante').innerText,
                status: status,
                obs: status === "CONCLUÍDO" ? "Fim do trajeto" : "Início do trajeto"
            };

            try {
                await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload)});
                alert("Registro efetuado!");
                location.reload();
            } catch (e) { alert("Erro ao salvar."); btn.disabled = false; }
        }

        setInterval(() => {
            document.getElementById('live-clock').innerText = new Date().toLocaleString('pt-BR');
        }, 1000);
    </script>
</body>
</html>
