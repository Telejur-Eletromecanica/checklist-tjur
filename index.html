<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checklist Telejur V22</title>
    <style>
        body { background: #f4f7f6; font-family: sans-serif; padding: 10px; }
        .card { background: white; max-width: 450px; margin: auto; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #1a73e8; font-size: 1.2rem; border-bottom: 2px solid #1a73e8; padding-bottom: 10px; margin-bottom: 20px; }
        .sec { background: #f8f9fa; padding: 6px 10px; font-size: 0.7rem; font-weight: bold; color: #666; margin: 15px 0 8px 0; border-radius: 4px; }
        label { font-size: 0.75rem; font-weight: bold; color: #444; display: block; margin-top: 10px; }
        input, select { width: 100%; padding: 12px; margin-top: 5px; border-radius: 8px; border: 1px solid #ccc; font-size: 1rem; box-sizing: border-box; }
        input[readonly] { background: #f0f0f0; color: #666; cursor: not-allowed; }
        .active { border: 2px solid #1a73e8 !important; background: #fff !important; }
        .btn { width: 100%; padding: 16px; border-radius: 8px; border: none; font-weight: bold; margin-top: 20px; cursor: pointer; color: white; font-size: 1rem; }
        .btn-s { background: #1a73e8; } .btn-c { background: #d93025; }
        #msg { text-align: center; font-weight: bold; padding: 10px; border-radius: 8px; margin-bottom: 10px; display: none; }
    </style>
</head>
<body>
<div class="card">
    <h2>CHECKLIST TELEJUR V22</h2>
    <div id="msg"></div>
    <form id="f">
        <div class="sec">IDENTIFICAÇÃO</div>
        <label>Motorista</label>
        <select name="nome" id="nome" onchange="sync()" required>
            <option value="">-- Selecione --</option>
            <option value="ADRIANO NASCIMENTO">ADRIANO NASCIMENTO</option>
            <option value="FRACIVALDO COSTA">FRACIVALDO COSTA</option>
            <option value="REGINALDO">REGINALDO</option>
            <option value="WALTER GONÇALVES">WALTER GONÇALVES</option>
        </select>
        <div style="display:flex; gap:10px">
            <div style="flex:1"><label>TAG</label><select name="tag" id="tag" onchange="sync()" required><option value="">--</option><option value="TJUR 04">TJUR 04</option><option value="TJUR 06">TJUR 06</option><option value="TJUR 13">TJUR 13</option></select></div>
            <div style="flex:1"><label>ID</label><input type="text" name="condutorID" id="condutorID" readonly></div>
        </div>
        <div style="display:flex; gap:10px">
            <div style="flex:1"><label>Placa</label><input type="text" name="placa" id="placa" readonly></div>
            <div style="flex:1"><label>Nº Trajeto</label><input type="text" name="numTrajeto" id="numTrajeto" readonly></div>
        </div>

        <div class="sec">VEÍCULO E MANUTENÇÃO</div>
        <label>Veículo</label><input type="text" name="veiculo" id="veiculo" readonly>
        
        <div style="display:flex; gap:10px">
            <div style="flex:1"><label>KM Inicial</label><input type="number" name="kmi" id="kmi" readonly></div>
            <div style="flex:1"><label>KM Final</label><input type="number" name="kmf" id="kmf" class="active" placeholder="000000"></div>
        </div>
        
        <div style="display:flex; gap:10px">
            <div style="flex:1"><label>Próx. Troca Óleo</label><input type="text" name="proxOleo" id="proxOleo" readonly></div>
            <div style="flex:1"><label>Tipo de Óleo</label><input type="text" name="tipoOleo" id="tipoOleo" readonly></div>
        </div>
        
        <label>Observação / Status</label>
        <input type="text" name="obs" id="obs" class="active" value="S/O">

        <input type="hidden" name="valSelo" id="valSelo"><input type="hidden" name="corSelo" id="corSelo">

        <button type="button" id="bs" onclick="enviar('SAIDA')" class="btn btn-s">🚀 REGISTRAR SAÍDA</button>
        <button type="button" id="bc" onclick="enviar('CHEGADA')" class="btn btn-c">🏁 REGISTRAR CHEGADA</button>
    </form>
</div>

<script>
    const URL = "https://script.google.com/macros/s/AKfycbysx-IjZe54SWbmqwl2NYJEx_kiuVtakdtE-GFYE30UxwYYQhcvOuw5DViSwMixS_QIyQ/exec";

    function sync() {
        const t = document.getElementById('tag').value, n = document.getElementById('nome').value;
        if(t && n) {
            const m = document.getElementById('msg'); m.style.display = "block"; m.innerText = "Sincronizando..."; m.style.background = "#eee";
            const old = document.getElementById('s-script'); if(old) old.remove();
            const s = document.createElement('script'); s.id = 's-script';
            s.src = `${URL}?callback=cb&acao=buscarDadosVei&tag=${encodeURIComponent(t)}&nome=${encodeURIComponent(n)}&t=${Date.now()}`;
            document.body.appendChild(s);
        }
    }

    function cb(r) {
        const m = document.getElementById('msg');
        if(r.bloqueado) { m.style.background = "#fce8e6"; m.innerText = r.msg; document.getElementById('bs').disabled = true; } 
        else { m.style.background = "#e6f4ea"; m.innerText = "✅ Disponível"; document.getElementById('bs').disabled = false; }
        document.getElementById('condutorID').value = r.condutorSugerido;
        document.getElementById('kmi').value = r.kmi;
        document.getElementById('veiculo').value = r.veiculo;
        document.getElementById('placa').value = r.placa;
        document.getElementById('proxOleo').value = r.proxOleo;
        document.getElementById('tipoOleo').value = r.tipoOleo;
        document.getElementById('numTrajeto').value = r.numTrajeto;
        document.getElementById('valSelo').value = r.valSelo;
        document.getElementById('corSelo').value = r.corSelo;
    }

    function enviar(tipo) {
        if(tipo === 'CHEGADA' && !document.getElementById('kmf').value) return alert("KM Final obrigatório!");
        const b = event.target; b.disabled = true; b.innerText = "PROCESSANDO...";
        const d = Object.fromEntries(new FormData(document.getElementById('f')));
        d.tipo = tipo; d.data = new Date().toLocaleDateString('pt-BR');
        const h = new Date().toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'});
        if(tipo === 'SAIDA') d.horaInic = h; else d.horaFim = h;

        fetch(URL, { method: 'POST', body: JSON.stringify(d) }).then(() => {
            const fone = "5593981162453";
            const kmAtual = tipo === 'SAIDA' ? d.kmi : d.kmf;
            const resta = parseInt(d.proxOleo.replace(/\D/g,'')) - kmAtual;
            
            let txt = `📋 *CHECKLIST TELEJUR - ${tipo}*\n---\n`;
            txt += `🗓️ *Data:* ${d.data}\n`;
            txt += `🚗 *Veículo:* ${d.veiculo}\n`;
            txt += `🔢 *Placa:* ${d.placa}\n`;
            txt += `🏷️ *Tag:* ${d.tag}\n`;
            txt += `🆔 *ID:* ${d.condutorID}\n`;
            txt += `👤 *Motorista:* ${d.nome}\n`;
            txt += `🔢 *Nº Trajeto:* ${d.numTrajeto}\n---\n`;
            txt += `🛣️ *KM ${tipo === 'SAIDA' ? 'Inicial' : 'Final'}:* ${kmAtual}\n`;
            txt += `🔧 *Próxima Troca:* ${d.proxOleo} KM\n`;
            txt += `🪛 *Resta para a troca:* ${resta} KM\n---\n`;
            txt += `💬 *Obs:* ${d.obs}`;

            window.open(`https://api.whatsapp.com/send?phone=${fone}&text=${encodeURIComponent(txt)}`, '_blank');
            location.reload();
        });
    }
</script>
</body>
</html>
