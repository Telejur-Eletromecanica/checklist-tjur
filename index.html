<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TELEJUR - GESTÃO COMPLETA</title>
    <style>
        :root { --primary: #1a237e; --success: #25D366; --bg: #f4f7f9; --warning: #ffc107; --danger: #d32f2f; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 10px; }
        .card { max-width: 450px; margin: auto; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border-top: 12px solid var(--primary); }
        
        .brand { font-size: 28px; font-weight: 900; color: var(--primary); text-align: center; margin: 0; }
        .subtitle { font-size: 11px; color: #666; font-weight: bold; text-align: center; margin-bottom: 20px; }

        label { font-weight: 700; font-size: 11px; color: #555; display: block; margin-top: 12px; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 14px; margin-top: 5px; border-radius: 10px; border: 2px solid #e0e0e0; font-size: 16px; box-sizing: border-box; }
        
        /* Estados de Campos */
        .readonly { background: #f0f2f5 !important; color: var(--primary); font-weight: bold; border: 1px dashed var(--primary); pointer-events: none; }
        .campo-alerta { background: #fff9c4 !important; border: 2px solid #fbc02d !important; font-weight: bold; }
        
        /* Alertas e Mensagens */
        .aviso-foto { background: #e8f5e9; color: #2e7d32; padding: 15px; border-radius: 10px; border: 2px solid #c8e6c9; margin-top: 15px; font-weight: bold; text-align: center; }
        #msgRevisao { display: none; padding: 12px; border-radius: 10px; font-weight: bold; text-align: center; margin-top: 10px; }
        .rev-vencida { background: var(--danger); color: white; animation: blink 1s infinite; }
        .rev-proxima { background: var(--warning); color: black; }
        @keyframes blink { 50% { opacity: 0.8; } }

        /* Botões */
        .btn { width: 100%; padding: 18px; border: none; border-radius: 12px; font-size: 18px; color: white; font-weight: bold; cursor: pointer; margin-top: 15px; }
        .btn-azul { background: var(--primary); }
        .btn-verde { background: var(--success); }

        /* Overlays */
        #overlaySalvo { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(26,35,126,0.95); z-index: 1000; color: white; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div id="overlaySalvo">
    <div style="font-size: 80px;">✅</div>
    <h1>DADOS REGISTRADOS!</h1>
    <p>O sistema salvou as informações com sucesso.</p>
</div>

<div class="card">
    <div class="brand">TELEJUR</div>
    <div class="subtitle">ELETROMECÂNICA - FROTA</div>

    <div id="containerForm">
        <form id="checklist">
            <label>VEÍCULO (TAG)</label>
            <select id="tag" onchange="carregarHistoricoVeiculo()">
                <option value="">SELECIONE</option>
                <option value="TJUR 03" data-v="HILUX" data-p="PHG0639">TJUR 03 (HILUX)</option>
                <option value="TJUR 04" data-v="MUNCK" data-p="QFA1I50">TJUR 04 (MUNCK)</option>
                <option value="TJUR 06" data-v="SAVEIRO" data-p="QUJ3E02">TJUR 06 (SAVEIRO)</option>
                <option value="TJUR 07" data-v="MUNCK" data-p="RWR3C75">TJUR 07 (MUNCK)</option>
                <option value="TJUR 08" data-v="HILUX" data-p="QVE5H48">TJUR 08 (HILUX)</option>
                <option value="TJUR 13" data-v="HILUX" data-p="QVD4I38">TJUR 13 (HILUX)</option>
            </select>

            <label>KM DA ÚLTIMA TROCA (ETIQUETA)</label>
            <input type="number" id="kmUltima" placeholder="KM escrito na etiqueta" oninput="calcularTroca()">

            <label>PRÓXIMA TROCA (+5.000 KM)</label>
            <input type="number" id="kmRev" class="readonly" readonly>

            <label>KM ATUAL NO PAINEL</label>
            <input type="number" id="kmi" placeholder="KM agora" oninput="alertasRevisao()">
            <div id="msgRevisao"></div>

            <label>CONDUTOR</label>
            <select id="condutor" onchange="localStorage.setItem('pref_moto', this.value)">
                <option value="">QUEM É O MOTORISTA?</option>
                <option>ADRIANO NASCIMENTO</option><option>FRANCIVALDO COSTA</option>
                <option>FRANCINILDO TEXEIRA</option><option>JOELCINEI GUIMARÃES</option>
                <option>LAFAITE BATISTA</option><option>REGINALDO</option>
            </select>

            <div style="display: flex; gap: 10px;">
                <div style="flex:1"><label>COR SELO</label><select id="selo"><option value="">COR</option><option>VERDE</option><option>AMARELO</option><option>AZUL</option><option>VERMELHO</option></select></div>
                <div style="flex:1"><label>VALIDADE</label><input type="date" id="valSelo" onchange="carencia()"></div>
            </div>

            <label>DATA LIMITE (+5 DIAS ÚTEIS)</label>
            <input type="text" id="limite" class="readonly campo-alerta" readonly>

            <div id="blocoFim" class="hidden">
                <hr style="margin-top:20px">
                <label style="color:var(--danger)">📍 KM FINAL (AO CHEGAR)</label>
                <input type="number" id="kmf" style="border: 2px solid var(--danger)">
                <div class="aviso-foto">📸 TIRE FOTO DA ETIQUETA E DO CHECKLIST!</div>
            </div>

            <button type="button" id="btnPrincipal" onclick="salvarInicio()" class="btn btn-azul">INICIAR TRAJETO 🟢</button>
        </form>
    </div>

    <div id="containerEspera" class="hidden">
        <div class="aviso-foto" style="background:#e3f2fd; border-color:#2196f3; color:#0d47a1">🚀 TRAJETO EM ANDAMENTO</div>
        <div id="resumoAtivo" style="padding:15px; font-size:14px; line-height:1.6"></div>
        <button onclick="enviarWhatsapp('INICIO')" class="btn btn-verde">ENVIAR NO WHATSAPP</button>
        <button onclick="liberarFim()" class="btn btn-azul">CHEGUEI NA EMPRESA</button>
    </div>
</div>

<script>
    // 1. BIP E TELA DE CONFIRMAÇÃO
    function acaoConfirmada() {
        const audio = new (window.AudioContext || window.webkitAudioContext)();
        const osc = audio.createOscillator();
        osc.connect(audio.destination);
        osc.start(); osc.stop(audio.currentTime + 0.15);
        
        document.getElementById("overlaySalvo").style.display = "flex";
    }

    // 2. MEMÓRIA E CÁLCULOS
    function carregarHistoricoVeiculo() {
        const tag = document.getElementById("tag").value;
        if(!tag) return;
        const ultimoKM = localStorage.getItem(`km_troca_${tag}`);
        if(ultimoKM) {
            document.getElementById("kmUltima").value = ultimoKM;
            calcularTroca();
        }
    }

    function calcularTroca() {
        const u = parseInt(document.getElementById("kmUltima").value);
        if(u) {
            document.getElementById("kmRev").value = u + 5000;
            alertasRevisao();
        }
    }

    function alertasRevisao() {
        const atual = parseInt(document.getElementById("kmi").value);
        const alvo = parseInt(document.getElementById("kmRev").value);
        const msg = document.getElementById("msgRevisao");
        if(!atual || !alvo) { msg.style.display="none"; return; }
        
        msg.style.display = "block";
        const saldo = alvo - atual;
        if(saldo <= 0) {
            msg.className = "rev-vencida";
            msg.innerHTML = `🚨 REVISÃO VENCIDA EM ${Math.abs(saldo)} KM!`;
        } else if(saldo <= 500) {
            msg.className = "rev-proxima";
            msg.innerHTML = `⚠️ REVISÃO EM ${saldo} KM!`;
        } else { msg.style.display="none"; }
    }

    function carencia() {
        const v = document.getElementById("valSelo").value;
        if(!v) return;
        let d = new Date(v + "T12:00:00");
        let i = 0;
        while(i < 5) { d.setDate(d.getDate()+1); if(d.getDay()!==0 && d.getDay()!==6) i++; }
        document.getElementById("limite").value = d.toLocaleDateString('pt-BR');
    }

    // 3. SALVAMENTO E TRAVAMENTO
    function salvarInicio() {
        const d = {
            tag: document.getElementById("tag").value,
            moto: document.getElementById("condutor").value,
            kmi: document.getElementById("kmi").value,
            kmr: document.getElementById("kmRev").value,
            kmu: document.getElementById("kmUltima").value,
            selo: document.getElementById("selo").value,
            lim: document.getElementById("limite").value,
            hI: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})
        };
        if(!d.tag || !d.kmi || !d.moto) return alert("Preencha todos os campos!");

        acaoConfirmada();
        localStorage.setItem(`km_troca_${d.tag}`, d.kmu); // Salva histórico da TAG
        localStorage.setItem("trajeto_telejur", JSON.stringify(d)); // Salva trajeto ativo
        
        setTimeout(() => location.reload(), 1500);
    }

    function liberarFim() {
        const s = JSON.parse(localStorage.getItem("trajeto_telejur"));
        document.getElementById("containerEspera").classList.add("hidden");
        document.getElementById("containerForm").classList.remove("hidden");
        document.getElementById("blocoFim").classList.remove("hidden");

        // Preenche e TRAVA campos (Readonly)
        const f = document.getElementById("checklist").elements;
        document.getElementById("tag").value = s.tag;
        document.getElementById("condutor").value = s.moto;
        document.getElementById("kmi").value = s.kmi;
        document.getElementById("kmUltima").value = s.kmu;
        document.getElementById("kmRev").value = s.kmr;
        document.getElementById("selo").value = s.selo;
        document.getElementById("limite").value = s.lim;

        ["tag", "condutor", "kmi", "kmUltima", "selo", "valSelo"].forEach(id => {
            document.getElementById(id).classList.add("readonly");
        });

        const btn = document.getElementById("btnPrincipal");
        btn.innerText = "FINALIZAR TUDO ✅";
        btn.className = "btn btn-verde";
        btn.onclick = () => enviarWhatsapp('FIM');
    }

    function enviarWhatsapp(tipo) {
        const s = JSON.parse(localStorage.getItem("trajeto_telejur"));
        const kmf = document.getElementById("kmf").value;
        let msg = "";

        if(tipo === 'INICIO') {
            msg = `*TELEJUR - INÍCIO*\n🚗 *TAG:* ${s.tag}\n👤 *MOTORISTA:* ${s.moto}\n📍 *KM:* ${s.kmi}\n🛠️ *PRÓX. TROCA:* ${s.kmr}\n🛡️ *SELO:* ${s.selo}`;
        } else {
            if(!kmf) return alert("Digite o KM FINAL!");
            msg = `*TELEJUR - FINALIZADO*\n🚗 *TAG:* ${s.tag}\n👤 *MOTORISTA:* ${s.moto}\n📍 *KM FINAL:* ${kmf}\n⏰ *HORA:* ${new Date().toLocaleTimeString()}`;
            localStorage.removeItem("trajeto_telejur");
        }
        window.location.href = "whatsapp://send?text=" + encodeURIComponent(msg);
        if(tipo === 'FIM') setTimeout(() => location.reload(), 2000);
    }

    window.onload = () => {
        const s = localStorage.getItem("trajeto_telejur");
        const m = localStorage.getItem("pref_moto");
        if(m) document.getElementById("condutor").value = m;
        if(s) {
            const d = JSON.parse(s);
            document.getElementById("containerForm").classList.add("hidden");
            document.getElementById("containerEspera").classList.remove("hidden");
            document.getElementById("resumoAtivo").innerHTML = `<b>TAG:</b> ${d.tag}<br><b>SAÍDA:</b> ${d.hI}<br><b>KM INICIAL:</b> ${d.kmi}`;
        }
    };
</script>
</body>
</html>
