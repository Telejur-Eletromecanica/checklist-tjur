<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TELEJUR v32.2</title>
    <style>
        :root { --navy: #0d47a1; --red: #c62828; --green: #2e7d32; }
        body { font-family: sans-serif; background: #f0f4f8; padding: 10px; margin: 0; }
        .card { max-width: 450px; margin: auto; background: white; padding: 15px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        input, select, textarea { width: 100%; padding: 12px; margin-top: 5px; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; box-sizing: border-box; }
        label { display: block; margin-top: 10px; font-size: 12px; font-weight: bold; color: var(--navy); }
        .status-oleo { margin-top: 10px; padding: 10px; border-radius: 8px; font-weight: bold; text-align: center; font-size: 14px; }
        .btn { width: 100%; padding: 18px; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; color: white; cursor: pointer; margin-top: 15px; }
        #msg { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:white; z-index:100; flex-direction:column; align-items:center; justify-content:center; }
    </style>
</head>
<body>

<div id="msg"><h1>⏳</h1><h3>PROCESSANDO...</h3></div>

<div class="card" id="app">
    <h3 style="text-align:center; color:var(--navy); margin:0 0 15px 0;">TELEJUR JURUTI v32.2</h3>
    
    <div id="formContainer">
        <label>Condutor</label>
        <select id="nomeMot" onchange="sync()">
            <option value="">-- SELECIONE --</option>
            <option>ADRIANO NASCIMENTO</option><option>FRANCIVALDO COSTA</option>
            <option>FRANCINILDO TEXEIRA</option><option>JOELCINEI GUIMARAES</option>
            <option>MIRIELLY</option><option>REGINALDO</option>
            <option>WALTER GONÇALVES</option><option>LAFAITE BATISTA</option>
            <option>EZEQUIEL</option>
        </select>

        <label>TAG</label>
        <select id="tag" onchange="setupVeiculo()"></select>

        <label id="lblKmi">KM Inicial</label>
        <input type="number" id="kmi" oninput="calcularOleo()">

        <label id="lblProx">Próxima Troca (KM)</label>
        <div id="divOleo"><input type="number" id="oleoVal" oninput="calcularOleo()"></div>

        <div id="statusOleo" class="status-oleo" style="display:none"></div>
        
        <label>Observação</label>
        <textarea id="obs" rows="2"></textarea>

        <button type="button" class="btn" style="background:var(--green)" onclick="salvar(false)">🚀 INICIAR TRAJETO</button>
    </div>
</div>

<script>
    const URL_GAS = "SUA_URL_AQUI"; // <--- COLOQUE SUA URL AQUI
    let DB = {};

    function sync() {
        const cb = 'cb' + Date.now();
        window[cb] = (res) => {
            DB = res;
            const sel = document.getElementById('tag');
            sel.innerHTML = '<option value="">-- SELECIONE --</option>';
            Object.keys(DB.frota).sort().forEach(t => {
                const o = DB.ocupados[t];
                let opt = new Option(t + (o ? ' (OCUPADO)' : ''), t);
                opt.disabled = !!o;
                sel.add(opt);
            });
        };
        const s = document.createElement('script');
        s.src = `${URL_GAS}?acao=statusGeral&callback=${cb}`;
        document.body.appendChild(s);
    }

    function setupVeiculo() {
        const t = document.getElementById('tag').value;
        const f = DB.frota[t];
        const isData = f.t === 'data';
        document.getElementById('lblKmi').innerText = isData ? "Horímetro Inicial" : "KM Inicial";
        document.getElementById('lblProx').innerText = isData ? "Data Próx. Troca" : "Próx. Troca (KM)";
        document.getElementById('divOleo').innerHTML = isData ? `<input type="date" id="oleoVal">` : `<input type="number" id="oleoVal" oninput="calcularOleo()">`;
    }

    function calcularOleo() {
        const kmi = parseFloat(document.getElementById('kmi').value);
        const prox = parseFloat(document.getElementById('oleoVal').value);
        const st = document.getElementById('statusOleo');
        
        if (isNaN(kmi) || isNaN(prox)) { st.style.display = 'none'; return; }
        
        const resta = prox - kmi;
        st.style.display = 'block';
        st.style.background = resta <= 0 ? '#ffebee' : '#e8f5e9';
        st.style.color = resta <= 0 ? 'red' : 'green';
        st.innerText = resta <= 0 ? "🚨 ÓLEO VENCIDO!" : "✅ RESTAM " + resta.toLocaleString() + " KM";
        return resta + " KM";
    }

    function salvar(isFinal) {
        const mot = document.getElementById('nomeMot').value;
        const tag = document.getElementById('tag').value;
        if(!mot || !tag) return alert("Selecione Motorista e TAG");

        document.getElementById('msg').style.display = 'flex';
        const kmiVal = document.getElementById('kmi').value;
        const nTraj = DB.contagem ? (DB.contagem[tag] || 0) + 1 : 1;

        const p = {
            acao: isFinal ? 'finalizar' : 'registrar',
            data: new Date().toLocaleDateString('pt-BR'),
            tag: tag,
            nome: mot,
            kmi: kmiVal,
            kmf: isFinal ? kmiVal : "",
            horaI: new Date().toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'}),
            horaF: isFinal ? new Date().toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'}) : "",
            oleo: document.getElementById('oleoVal').value,
            resta: calcularOleo() || "---",
            nTrajeto: nTraj + "º",
            id: "CONDUTOR " + nTraj,
            veiculo: DB.frota[tag].v,
            placa: DB.frota[tag].p,
            obs: document.getElementById('obs').value
        };

        const cb = 'cb' + Date.now();
        window[cb] = () => {
            if(!isFinal) localStorage.setItem('ativo_tj', JSON.stringify(p));
            else localStorage.removeItem('ativo_tj');
            location.reload();
        };
        const s = document.createElement('script');
        s.src = `${URL_GAS}?${new URLSearchParams(p)}&callback=${cb}`;
        document.body.appendChild(s);
    }

    // Lógica para carregar tela de finalização
    const salvo = localStorage.getItem('ativo_tj');
    if(salvo) {
        const d = JSON.parse(salvo);
        document.getElementById('formContainer').innerHTML = `
            <div style="background:#fff3e0; padding:10px; border-radius:10px; text-align:center; margin-bottom:10px">
                <b>TRAJETO EM CURSO: ${d.tag}</b>
            </div>
            <label>KM / Horímetro Final</label>
            <input type="number" id="kmi">
            <label>Observação Final</label>
            <textarea id="obs"></textarea>
            <input type="hidden" id="tag" value="${d.tag}">
            <input type="hidden" id="nomeMot" value="${d.nome}">
            <input type="hidden" id="oleoVal" value="${d.oleo}">
            <button class="btn" style="background:var(--red)" onclick="salvar(true)">🏁 FINALIZAR TRAJETO</button>
        `;
    }
</script>
</body>
</html>
