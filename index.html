<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TELEJUR CHECKLIST V16</title>
    <style>
        :root { --primary: #1a237e; --bg: #f4f7f9; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 10px; }
        .card { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        label { display: block; font-weight: bold; font-size: 11px; margin-top: 10px; color: #555; }
        input, select, textarea { width: 100%; padding: 12px; margin-top: 4px; border-radius: 6px; border: 1px solid #ccc; font-size: 16px; box-sizing: border-box; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn { width: 100%; padding: 16px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; color: white; margin-top: 20px; cursor: pointer; transition: 0.3s; }
        .btn:disabled { background: #ccc !important; }
        .resta-box { background: #e8eaf6; padding: 12px; border-radius: 6px; text-align: center; margin-top: 15px; font-weight: bold; color: var(--primary); border: 1px solid var(--primary); }
        .hidden { display: none; }
        input[readonly] { background: #f0f0f0; color: #777; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="text-align:center; color:var(--primary); margin-top:0">📋 CHECKLIST TELEJUR</h2>

    <div id="secaoSaida">
        <label>Motorista Responsável</label>
        <select id="nomeMot" onchange="puxarDados()">
            <option value="">-- SELECIONE --</option>
            <option>ADRIANO NASCIMENTO</option>
            <option>FRANCIVALDO COSTA</option>
            <option>REGINALDO</option>
            <option>WALTER GONÇALVES</option>
            <option>LAFAITE BATISTA</option>
        </select>

        <div class="grid">
            <div>
                <label>TAG</label>
                <select id="tag" onchange="puxarDados()">
                    <option value="">--</option>
                    <option>TJUR 04</option><option>TJUR 06</option>
                    <option>TJUR 07</option><option>TJUR 08</option>
                    <option>TJUR 09</option><option>TJUR 10</option>
                    <option>TJUR 13</option>
                </select>
            </div>
            <div><label>ID DO DIA</label><input type="text" id="condID" readonly placeholder="Buscando..."></div>
        </div>

        <div class="grid">
            <div><label>KM Inicial</label><input type="text" id="kmi" inputmode="numeric" oninput="calc()"></div>
            <div><label>Próx. Troca (KM)</label><input type="text" id="pxO" inputmode="numeric" oninput="calc()"></div>
        </div>
        
        <div id="restaAviso" class="resta-box">Resta para a troca: -</div>

        <div class="grid">
            <div><label>Veículo</label><input type="text" id="vei" readonly></div>
            <div><label>Placa</label><input type="text" id="pla" readonly></div>
        </div>

        <div class="grid">
            <div><label>Nº Trajeto</label><input type="text" id="numT" value="1" inputmode="numeric"></div>
            <div><label>Tipo Óleo</label>
                <select id="tpO">
                    <option>5W30</option><option>10W40</option><option>15W40</option>
                </select>
            </div>
        </div>

        <div class="grid">
            <div><label>Cor Selo</label>
                <select id="corS">
                    <option>VERDE</option><option>AZUL</option><option>AMARELO</option><option>VERMELHO</option>
                </select>
            </div>
            <div><label>Validade Selo</label><input type="date" id="valS"></div>
        </div>

        <label>Observações</label><textarea id="obs" rows="2" placeholder="Ex: Batida, Pneu murcho..."></textarea>
        
        <button onclick="enviar('SAIDA')" class="btn" style="background:var(--primary)" id="btnS">🚀 INICIAR SAÍDA</button>
    </div>

    <div id="secaoChegada" class="hidden">
        <div id="resumo" style="background:#fff9c4; padding:15px; border-radius:8px; margin-bottom:15px; border:1px solid #fbc02d; font-size: 14px;"></div>
        <label>KM Final de Chegada</label>
        <input type="text" id="kmf" inputmode="numeric">
        <button onclick="enviar('CHEGADA')" class="btn" style="background:#075e54" id="btnC">🏁 CONCLUIR CHEGADA</button>
    </div>
</div>

<script>
    const URL_API = "https://script.google.com/macros/s/AKfycbysx-IjZe54SWbmqwl2NYJEx_kiuVtakdtE-GFYE30UxwYYQhcvOuw5DViSwMixS_QIyQ/exec";

    // Função para limpar pontos e vírgulas e evitar cálculos fracionados
    function limparNum(v) { 
        if(!v) return 0;
        return parseInt(v.toString().replace(/[\.\,]/g, '')) || 0; 
    }

    function puxarDados() {
        const tag = document.getElementById('tag').value;
        const nome = document.getElementById('nomeMot').value;
        if(!tag || !nome) return;
        
        document.getElementById('condID').value = "Buscando...";
        const s = document.createElement('script');
        s.src = `${URL_API}?acao=buscarDadosVei&tag=${encodeURIComponent(tag)}&nome=${encodeURIComponent(nome)}&callback=preencher&t=${Date.now()}`;
        document.body.appendChild(s);
    }

    function preencher(d) {
        document.getElementById('vei').value = d.veiculo || "";
        document.getElementById('pla').value = d.placa || "";
        document.getElementById('kmi').value = d.kmi || "";
        document.getElementById('pxO').value = d.proxOleo || "";
        document.getElementById('condID').value = d.condutorSugerido || "CONDUTOR 1";
        calc();
    }

    function calc() {
        const k = limparNum(document.getElementById('kmi').value);
        const p = limparNum(document.getElementById('pxO').value);
        if(k > 0 && p > 0) {
            document.getElementById('restaAviso').innerText = "Resta para a troca: " + (p - k) + " KM";
        }
    }

    async function enviar(tipo) {
        const btn = tipo === 'SAIDA' ? document.getElementById('btnS') : document.getElementById('btnC');
        btn.disabled = true;
        btn.innerText = "GRAVANDO...";

        const agora = new Date();
        const dataH = agora.toLocaleDateString('pt-BR');
        const horaH = agora.toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'});
        
        let p = {};
        if(tipo === 'SAIDA') {
            p = {
                tipo: 'SAIDA', data: dataH, horaInic: horaH,
                tag: document.getElementById('tag').value,
                condutorID: document.getElementById('condID').value,
                nome: document.getElementById('nomeMot').value,
                kmi: document.getElementById('kmi').value,
                veiculo: document.getElementById('vei').value,
                placa: document.getElementById('pla').value,
                numT: document.getElementById('numT').value,
                proxOleo: document.getElementById('pxO').value,
                tipoOleo: document.getElementById('tpO').value,
                corSelo: document.getElementById('corS').value,
                valSelo: document.getElementById('valS').value,
                obs: document.getElementById('obs').value || "S/O"
            };
            localStorage.setItem('tjur_v16', JSON.stringify(p));
        } else {
            const d = JSON.parse(localStorage.getItem('tjur_v16'));
            p = { ...d, tipo: 'CHEGADA', kmf: document.getElementById('kmf').value, horaFim: horaH };
        }

        // Envia para a planilha
        await fetch(URL_API, { method: 'POST', mode: 'no-cors', body: JSON.stringify(p) });

        // Prepara dados para WhatsApp profissional
        const kmInic = limparNum(p.kmi);
        const kmFim = limparNum(p.kmf || 0);
        const kmTroca = limparNum(p.proxOleo);
        const restaTroca = kmTroca - (tipo === 'SAIDA' ? kmInic : kmFim);

        let msg = `*📋 CHECKLIST TELEJUR - ${tipo}*%0A` +
                  `*----------------------------------*%0A` +
                  `*🗓️ Data:* ${p.data}%0A` +
                  `*🚗 Veículo:* ${p.veiculo} (${p.tag})%0A` +
                  `*🆔 ID:* ${p.condutorID}%0A` +
                  `*👤 Motorista:* ${p.nome}%0A` +
                  `*🔢 Nº Trajeto:* ${p.numT}%0A` +
                  `*----------------------------------*%0A` +
                  `*🛣️ KM Inicial:* ${kmInic}%0A` +
                  (tipo === 'CHEGADA' ? `*🏁 KM Final:* ${kmFim}%0A` : '') +
                  `*🔧 Resta para a troca:* ${restaTroca} KM%0A` +
                  `*----------------------------------*%0A` +
                  `*💬 Obs:* ${p.obs}`;

        window.open(`https://api.whatsapp.com/send?text=${msg}`, '_blank');
        
        if(tipo === 'CHEGADA') localStorage.removeItem('tjur_v16');
        setTimeout(() => location.reload(), 1500);
    }

    window.onload = () => {
        const salvo = localStorage.getItem('tjur_v16');
        if(salvo) {
            const d = JSON.parse(salvo);
            document.getElementById('secaoSaida').classList.add('hidden');
            document.getElementById('secaoChegada').classList.remove('hidden');
            document.getElementById('resumo').innerHTML = `🚗 <b>${d.tag}</b> (${d.condutorID})<br>👤 <b>Motorista:</b> ${d.nome}<br>🕒 <b>Saída:</b> ${d.horaInic}<br>🛣️ <b>KM Saída:</b> ${d.kmi}`;
        }
    };
</script>
</body>
</html>
