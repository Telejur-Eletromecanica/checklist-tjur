<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TELEJUR ELETROMECÂNICA v16.5</title>
    <style>
        :root { --navy: #1a237e; --green: #2e7d32; --red: #c62828; --gray: #90a4ae; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', Roboto, sans-serif; background: var(--bg); margin: 0; padding: 12px; }
        .container { max-width: 480px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 8px 25px rgba(0,0,0,0.1); }
        
        .header { text-align: center; border-bottom: 3px solid var(--navy); margin-bottom: 15px; padding-bottom: 8px; }
        .header h1 { font-size: 19px; color: var(--navy); margin: 0; text-transform: uppercase; }
        .header p { font-size: 13px; color: #666; margin: 4px 0; font-weight: bold; }
        #syncStatus { font-size: 11px; color: var(--gray); display: block; margin-top: 5px; cursor: pointer; text-decoration: underline; }

        .frota-monitor { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin: 15px 0; }
        .v-tag { padding: 10px 2px; border-radius: 8px; text-align: center; font-size: 9px; font-weight: bold; border: 2px solid #eee; transition: 0.3s; }
        .v-livre { background: #e8f5e9; color: var(--green); border-color: #c8e6c9; }
        .v-trajeto { background: #ffebee; color: var(--red); border-color: #ffcdd2; animation: pulse 2s infinite; }
        .v-bloqueio { background: #f5f5f5; color: #bdbdbd; border-color: #e0e0e0; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }

        label { font-size: 10px; font-weight: bold; display: block; margin-top: 12px; color: var(--navy); text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 12px; margin-top: 4px; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; box-sizing: border-box; font-weight: 500; }
        input:read-only { background: #f1f3f5; color: #555; border-color: #e9ecef; }
        
        .btn-box { display: grid; grid-template-columns: 1fr; gap: 10px; margin-top: 20px; }
        .btn { padding: 18px; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; color: white; cursor: pointer; transition: 0.2s; text-transform: uppercase; }
        .btn-ini { background: var(--green); box-shadow: 0 4px 10px rgba(46,125,50,0.2); }
        .btn-fim { background: var(--navy); box-shadow: 0 4px 10px rgba(26,35,126,0.2); }
        .btn:disabled { background: #dee2e6 !important; color: #adb5bd; cursor: not-allowed; box-shadow: none; }

        #calcOleo { margin-top: 8px; padding: 10px; border-radius: 6px; font-size: 12px; font-weight: bold; text-align: center; display: none; border: 1px solid transparent; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>TELEJUR ELETROMECÂNICA</h1>
        <p>Checklist de Veículos | Unidade Juruti</p>
        <span id="syncStatus" onclick="location.reload()">⏳ Sincronizando Frota... (Toque para atualizar)</span>
    </div>

    <div id="frotaGrid" class="frota-monitor"></div>

    <label>Condutor</label>
    <select id="nomeMot" onchange="processarRegras()">
        <option value="">-- SELECIONE SEU NOME --</option>
        <option value="ADRIANO NASCIMENTO">ADRIANO NASCIMENTO</option>
        <option value="FRANCIVALDO COSTA">FRANCIVALDO COSTA</option>
        <option value="FRANCINILDO TEXEIRA">FRANCINILDO TEXEIRA</option>
        <option value="JOELCINEI GUIMARAES">JOELCINEI GUIMARAES</option>
        <option value="REGINALDO">REGINALDO</option>
        <option value="WALTER GONÇALVES">WALTER GONÇALVES</option>
        <option value="LAFAITE BATISTA">LAFAITE BATISTA</option>
        <option value="MIRIELLY">MIRIELLY</option>
        <option value="EZEQUIEL">EZEQUIEL</option>
    </select>

    <label>TAG do Veículo</label>
    <select id="tagSel" onchange="definirVeiculo()">
        <option value="">-- SELECIONE --</option>
    </select>

    <div style="display: flex; gap: 8px;">
        <div style="flex: 2;"><label>Veículo</label><input type="text" id="v_nome" readonly></div>
        <div style="flex: 1;"><label>Placa</label><input type="text" id="v_placa" readonly></div>
    </div>

    <label>ID Operação (Sequencial)</label>
    <input type="text" id="idCond" readonly>

    <label id="lblKm">KM Inicial / Horas</label>
    <input type="number" id="kmInput" placeholder="0" oninput="alertarOleo()">

    <label id="lblOleo">Próxima Revisão</label>
    <input type="text" id="oleoInput" oninput="alertarOleo()">
    <div id="calcOleo"></div>

    <div style="display: flex; gap: 8px;">
        <div style="flex: 1;"><label>Cor Selo</label><select id="corSelo"><option>VERDE</option><option>VERMELHO</option></select></div>
        <div style="flex: 1;"><label>Validade Selo</label><input type="date" id="valSelo"></div>
    </div>

    <label>Observações</label>
    <textarea id="obs" rows="2" placeholder="Descreva problemas ou estado do veículo"></textarea>

    <div class="btn-box">
        <button id="btnIni" onclick="registrar('registrar')" class="btn btn-ini" disabled>▶ Iniciar Trajeto</button>
        <button id="btnFim" onclick="registrar('finalizar')" class="btn btn-fim" disabled>🏁 Finalizar Trajeto</button>
    </div>
</div>

<script>
    const API = "https://script.google.com/macros/s/AKfycbysx-IjZe54SWbmqwl2NYJEx_kiuVtakdtE-GFYE30UxwYYQhcvOuw5DViSwMixS_QIyQ/exec";
    const HOJE = new Date().toLocaleDateString('pt-BR');
    let DB = { ocupados: {}, frota: {}, proximoID: "" };

    function chamar(p) {
        const s = document.createElement('script');
        s.src = `${API}?${new URLSearchParams(p).toString()}`;
        document.body.appendChild(s);
    }

    function refresh() {
        chamar({ acao: "statusGeral", data: HOJE, callback: "onRefresh" });
    }

    window.onRefresh = (r) => {
        DB = r;
        document.getElementById('syncStatus').innerText = "✅ Frota em Sincronia: " + new Date().toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'});
        processarRegras();
    }

    function processarRegras() {
        const mot = document.getElementById('nomeMot').value;
        const sel = document.getElementById('tagSel');
        const grid = document.getElementById('frotaGrid');
        const muncks = ["TJUR 04", "TJUR 07", "TJUR 09"];
        const autorizados = ["LAFAITE BATISTA", "WALTER GONÇALVES", "REGINALDO"];
        
        const lastVal = sel.value;
        sel.innerHTML = '<option value="">-- SELECIONE --</option>';
        grid.innerHTML = '';

        Object.keys(DB.frota).forEach(t => {
            const ocup = DB.ocupados[t];
            const isRestrito = muncks.includes(t) && !autorizados.includes(mot) && mot !== "";
            
            let statusCls = ocup ? "v-trajeto" : (isRestrito ? "v-bloqueio" : "v-livre");
            let labelStat = ocup ? "TRAJETO" : (isRestrito ? "RESTRITO" : "LIVRE");
            grid.innerHTML += `<div class="v-tag ${statusCls}">${t}<br>${labelStat}</div>`;

            const opt = document.createElement('option');
            opt.value = t;
            opt.text = (isRestrito ? "🔒 BLOQUEADO - " : (ocup ? "🚩 EM USO - " : "✅ ")) + t;
            opt.disabled = isRestrito || (ocup && ocup.nome !== mot && mot !== "");
            sel.appendChild(opt);
        });
        sel.value = lastVal;
        definirVeiculo();
    }

    function definirVeiculo() {
        const t = document.getElementById('tagSel').value;
        const btnI = document.getElementById('btnIni');
        const btnF = document.getElementById('btnFim');
        if(!t) return;

        const info = DB.frota[t];
        const ocup = DB.ocupados[t];
        const oleoField = document.getElementById('oleoInput');

        document.getElementById('v_nome').value = info.v;
        document.getElementById('v_placa').value = info.p;
        oleoField.type = info.tipo === "DATA" ? "date" : "number";
        document.getElementById('lblOleo').innerText = "Próxima Revisão (" + info.tipo + ")";

        if(ocup) {
            document.getElementById('idCond').value = ocup.id;
            oleoField.value = ocup.oleo;
            document.getElementById('lblKm').innerText = "KM / HORAS FINAL";
            btnI.disabled = true; btnF.disabled = false;
        } else {
            document.getElementById('idCond').value = DB.proximoID;
            oleoField.value = DB.ultimosOleos[t] || "";
            document.getElementById('lblKm').innerText = "KM / HORAS INICIAL";
            btnI.disabled = false; btnF.disabled = true;
        }
        alertarOleo();
    }

    function alertarOleo() {
        const t = document.getElementById('tagSel').value;
        if(!t || DB.frota[t].tipo !== "KM") { document.getElementById('calcOleo').style.display="none"; return; }
        const km = parseInt(document.getElementById('kmInput').value) || 0;
        const limite = parseInt(document.getElementById('oleoInput').value) || 0;
        const alertBox = document.getElementById('calcOleo');
        if(!limite || !km) { alertBox.style.display="none"; return; }
        
        const saldo = limite - km;
        alertBox.style.display = "block";
        alertBox.style.background = saldo > 0 ? "#e8f5e9" : "#ffebee";
        alertBox.style.borderColor = saldo > 0 ? "#c8e6c9" : "#ffcdd2";
        alertBox.style.color = saldo > 0 ? "green" : "red";
        alertBox.innerText = saldo > 0 ? `Restam ${saldo.toLocaleString()} KM para revisão` : `ALERTA: VENCIDO HÁ ${Math.abs(saldo).toLocaleString()} KM`;
    }

    function registrar(acao) {
        const t = document.getElementById('tagSel').value;
        const m = document.getElementById('nomeMot').value;
        const k = document.getElementById('kmInput').value;
        if(!t || !m || !k) return alert("Erro: Motorista, TAG e KM são obrigatórios!");

        const btn = document.getElementById(acao === 'registrar' ? 'btnIni' : 'btnFim');
        btn.disabled = true; btn.innerText = "⏳ PROCESSANDO...";

        const payload = {
            acao: acao, tag: t, nome: m, id: document.getElementById('idCond').value,
            kmi: k, kmf: k, oleo: document.getElementById('oleoInput').value,
            corSelo: document.getElementById('corSelo').value,
            validadeSelo: document.getElementById('valSelo').value,
            obs: document.getElementById('obs').value || "Checklist OK",
            data: HOJE, trajeto: DB.ocupados[t] ? DB.ocupados[t].trajetoNum : ((DB.contagem[t] || 0) + 1 + "º Trajeto"),
            horaI: new Date().toLocaleTimeString('pt-BR'), horaF: new Date().toLocaleTimeString('pt-BR'),
            callback: "onFinish"
        };

        window.onFinish = (res) => {
            const whats = `*TELEJUR JURUTI - ${acao.toUpperCase()}*\n` +
                         `📌 *Trajeto:* ${payload.trajeto}\n` +
                         `🆔 *ID:* ${payload.id} | 🏷️ *TAG:* ${t}\n` +
                         `👤 *Condutor:* ${m}\n` +
                         `🚛 *Veículo:* ${document.getElementById('v_nome').value}\n` +
                         `📏 *Leitura:* ${k}\n` +
                         `⌛ *Revisão:* ${payload.oleo}\n` +
                         `📝 *Obs:* ${payload.obs}`;
            window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(whats)}`);
            location.reload();
        };
        chamar(payload);
    }
    window.onload = refresh;
</script>
</body>
</html>
