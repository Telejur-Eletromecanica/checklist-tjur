<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telejur V22 - Checklist</title>
    <style>
        body { background: #ffffff; color: #333; font-family: sans-serif; padding: 10px; margin: 0; }
        .card { background: white; max-width: 500px; margin: auto; padding: 15px; border: 1px solid #ddd; border-radius: 10px; }
        h2 { text-align: center; color: #1a73e8; font-size: 1.1rem; border-bottom: 2px solid #1a73e8; padding-bottom: 8px; }
        .section { background: #f8f9fa; padding: 8px; margin-top: 10px; border-radius: 5px; font-weight: bold; font-size: 0.7rem; color: #555; text-transform: uppercase; }
        label { font-size: 0.65rem; font-weight: bold; color: #777; display: block; margin-top: 8px; }
        select, input { width: 100%; padding: 12px; margin-top: 3px; border-radius: 5px; border: 1px solid #ccc; font-size: 0.95rem; box-sizing: border-box; }
        input[readonly] { background: #eee; color: #555; }
        .grid { display: flex; gap: 8px; }
        .col { flex: 1; }
        .btn { width: 100%; padding: 15px; border-radius: 8px; border: none; font-weight: bold; margin-top: 10px; cursor: pointer; color: white; font-size: 1rem; }
        .btn-saida { background: #1a73e8; margin-top: 20px; }
        .btn-chegada { background: #d93025; }
        #statusMsg { text-align: center; color: #1a73e8; font-weight: bold; font-size: 0.8rem; margin-top: 5px; height: 1.2rem; }
    </style>
</head>
<body>

<div class="card">
    <h2>CHECKLIST TELEJUR V22</h2>
    <div id="statusMsg"></div>

    <form id="formApp">
        <div class="section">Identificação</div>
        <label>Motorista</label>
        <select name="nome" id="nome" onchange="sincronizar()" required>
            <option value="">-- Selecione o Condutor --</option>
            <option value="ADRIANO NASCIMENTO">ADRIANO NASCIMENTO</option>
            <option value="FRACIVALDO COSTA">FRACIVALDO COSTA</option>
            <option value="LAFAIETE BATISTA">LAFAIETE BATISTA</option>
            <option value="REGINALDO">REGINALDO</option>
            <option value="WALTER GONÇALVES">WALTER GONÇALVES</option>
            <option value="EZEQUEIL SILVA">EZEQUEIL SILVA</option>
        </select>

        <div class="grid">
            <div class="col">
                <label>TAG</label>
                <select name="tag" id="tag" onchange="sincronizar()" required>
                    <option value="">--</option>
                    <option value="TJUR 04">TJUR 04</option>
                    <option value="TJUR 06">TJUR 06</option>
                    <option value="TJUR 07">TJUR 07</option>
                    <option value="TJUR 08">TJUR 08</option>
                    <option value="TJUR 09">TJUR 09</option>
                    <option value="TJUR 10">TJUR 10</option>
                    <option value="TJUR 13">TJUR 13</option>
                </select>
            </div>
            <div class="col">
                <label>ID Sequência</label>
                <input type="text" name="condutorID" id="condutorID" readonly>
            </div>
        </div>

        <div class="section">Veículo e Manutenção</div>
        <div class="grid">
            <div class="col">
                <label>Veículo</label>
                <input type="text" name="veiculo" id="veiculo" readonly>
            </div>
            <div class="col">
                <label>Placa</label>
                <input type="text" name="placa" id="placa" readonly>
            </div>
        </div>

        <div class="grid">
            <div class="col">
                <label>Validade Selo</label>
                <input type="text" name="valSelo" id="valSelo" readonly>
            </div>
            <div class="col">
                <label>Cor do Selo</label>
                <input type="text" name="corSelo" id="corSelo" readonly>
            </div>
        </div>

        <div class="grid">
            <div class="col">
                <label>KM Inicial</label>
                <input type="number" name="kmi" id="kmi" readonly>
            </div>
            <div class="col">
                <label>KM Final</label>
                <input type="number" name="kmf" id="kmf" placeholder="000000">
            </div>
        </div>

        <div class="grid">
            <div class="col">
                <label>Próx. Troca Óleo</label>
                <input type="number" name="proxOleo" id="proxOleo" readonly>
            </div>
            <div class="col">
                <label>Tipo de Óleo</label>
                <input type="text" name="tipoOleo" id="tipoOleo" readonly>
            </div>
        </div>

        <label>Observação / Status</label>
        <input type="text" name="obs" id="obs" placeholder="Ex: Pneu baixo, luz acesa...">

        <input type="hidden" name="numT" id="numT">

        <button type="button" onclick="salvar('SAIDA')" class="btn btn-saida">🚀 REGISTRAR SAÍDA</button>
        <button type="button" onclick="salvar('CHEGADA')" class="btn btn-chegada">🏁 REGISTRAR CHEGADA</button>
    </form>
</div>

<script>
    const SCRIPT_URL = "SUA_URL_DA_IMPLANTACAO_AQUI";

    function sincronizar() {
        const tag = document.getElementById('tag').value;
        const nome = document.getElementById('nome').value;
        if(tag && nome) {
            document.getElementById('statusMsg').innerText = "Sincronizando dados...";
            const script = document.createElement('script');
            script.src = `${SCRIPT_URL}?callback=callbackAuto&acao=buscarDadosVei&tag=${encodeURIComponent(tag)}&nome=${encodeURIComponent(nome)}`;
            document.body.appendChild(script);
        }
    }

    function callbackAuto(r) {
        document.getElementById('statusMsg').innerText = "✅ Sincronizado";
        document.getElementById('condutorID').value = r.condutorSugerido;
        document.getElementById('veiculo').value = r.veiculo;
        document.getElementById('placa').value = r.placa;
        document.getElementById('kmi').value = r.kmi;
        document.getElementById('proxOleo').value = r.proxOleo;
        document.getElementById('tipoOleo').value = r.tipoOleo;
        document.getElementById('valSelo').value = r.valSelo;
        document.getElementById('corSelo').value = r.corSelo;
        document.getElementById('numT').value = r.numT;
        setTimeout(() => document.getElementById('statusMsg').innerText = "", 2000);
    }

    function salvar(tipo) {
        const btn = event.target;
        if(tipo === 'CHEGADA' && !document.getElementById('kmf').value) {
            alert("Informe o KM Final!"); return;
        }
        
        btn.disabled = true;
        btn.innerText = "GRAVANDO...";

        const dados = Object.fromEntries(new FormData(document.getElementById('formApp')));
        dados.tipo = tipo;
        dados.data = new Date().toLocaleDateString('pt-BR');
        const hora = new Date().toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'});
        
        if(tipo === 'SAIDA') dados.horaInic = hora;
        else dados.horaFim = hora;

        fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(dados) })
        .then(() => {
            alert("Sucesso!");
            location.reload();
        }).catch(() => {
            alert("Erro ao salvar!");
            btn.disabled = false;
        });
    }
</script>
</body>
</html>
