<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TELEJUR - V19 FIX</title>
    <style>
        body { font-family: sans-serif; background: #e3f2fd; margin: 0; padding: 10px; }
        .card { max-width: 400px; margin: auto; background: white; padding: 20px; border-radius: 15px; border-top: 10px solid #1a237e; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .header-text { text-align: center; margin-bottom: 15px; }
        .brand { font-size: 28px; font-weight: bold; color: #1a237e; margin: 0; }
        .subtitle { font-size: 14px; color: #1a237e; font-weight: bold; margin: 0; }
        h2 { text-align: center; font-size: 16px; border-bottom: 2px solid #1a237e; padding-bottom: 8px; }
        label { font-weight: bold; font-size: 11px; color: #555; display: block; margin-top: 12px; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 12px; margin-top: 5px; border-radius: 8px; border: 1px solid #ccc; font-size: 15px; box-sizing: border-box; background: #f9f9f9; }
        .readonly-field { background: #f0f0f0 !important; color: #1a237e; font-weight: bold; border: 1px dashed #1a237e; }
        .btn-azul { width: 100%; padding: 16px; background: #1a237e; border: none; border-radius: 10px; font-size: 18px; color: white; font-weight: bold; cursor: pointer; margin-top: 20px; }
        .btn-azul:disabled { background: #ccc; opacity: 0.6; }
        .btn-verde { width: 100%; padding: 16px; background: #25D366; border: none; border-radius: 10px; font-size: 18px; color: white; font-weight: bold; cursor: pointer; margin-top: 10px; }
        #msgErroVinc { display:none; padding:12px; border-radius:8px; margin-top:10px; text-align:center; font-weight:bold; font-size: 13px; border: 2px solid; }
        .hidden { display: none; }
        #telaEspera { text-align: center; display: none; }
        .info-trajeto { background: #f8f9fa; border-radius: 10px; padding: 15px; margin: 15px 0; border-left: 5px solid #1a237e; text-align: left; font-size: 13px; }
    </style>
</head>
<body>

<div class="card">
    <div class="header-text">
        <p class="brand">TELEJUR</p>
        <p class="subtitle">ELETROMECÂNICA</p>
    </div>

    <div id="containerForm">
        <h2 id="tituloAcao">CHECKLIST DE VEÍCULO</h2>
        <form id="formChecklist">
            <label>DATA</label>
            <input type="text" id="dataAuto" class="readonly-field" readonly>

            <label>TAG DO VEÍCULO</label>
            <select id="tag" onchange="atualizarInterfacePorTag(); validarVinculoFixo();">
                <option value="">SELECIONE A TAG</option>
                <option value="TJUR 03" data-v="CAMINHONETE HILUX" data-p="PHG0639">TJUR 03</option>
                <option value="TJUR 04" data-v="SKY MUNCK" data-p="QFA1I50">TJUR 04</option>
                <option value="TJUR 06" data-v="SAVEIRO FURGÃO" data-p="QUJ3E02">TJUR 06</option>
                <option value="TJUR 07" data-v="SKY MUNCK" data-p="RWR3C75">TJUR 07</option>
                <option value="TJUR 08" data-v="CAMINHONETE HILUX" data-p="QVE5H48">TJUR 08</option>
                <option value="TJUR 09" data-v="SKY MUNCK" data-p="RXC6J04">TJUR 09</option>
                <option value="TJUR 10" data-v="CAMINHONETE" data-p="PHU1I37">TJUR 10</option>
                <option value="TJUR 13" data-v="CAMINHONETE" data-p="QVD4I38">TJUR 13</option>
            </select>

            <label>VEÍCULO / PLACA</label>
            <div style="display: flex; gap: 5px;">
                <input type="text" id="displayVeiculo" class="readonly-field" readonly>
                <input type="text" id="displayPlaca" class="readonly-field" readonly>
            </div>

            <div id="msgErroVinc"></div>

            <label>IDENTIFICAÇÃO (ID)</label>
            <select id="numCondutor" onchange="validarVinculoFixo()">
                <option value="">SELECIONE</option>
                <option value="CONDUTOR 1">CONDUTOR 1</option><option value="CONDUTOR 2">CONDUTOR 2</option>
                <option value="CONDUTOR 3">CONDUTOR 3</option><option value="CONDUTOR 4">CONDUTOR 4</option>
                <option value="CONDUTOR 5">CONDUTOR 5</option><option value="CONDUTOR 6">CONDUTOR 6</option>
                <option value="CONDUTOR 7">CONDUTOR 7</option><option value="CONDUTOR 8">CONDUTOR 8</option>
                <option value="CONDUTOR 9">CONDUTOR 9</option>
            </select>

            <label>NOME DO CONDUTOR</label>
            <select id="nomeCondutor" onchange="validarVinculoFixo()">
                <option value="">SELECIONE</option>
                <option>ADRIANO NASCIMENTO</option><option>FRANCIVALDO COSTA</option>
                <option>FRANCINILDO TEXEIRA</option><option>JOELCINEI GUIMARÃES</option>
                <option>LAFAITE BATISTA</option><option>MIRIELLY</option>
                <option>RAIMUNDO WALTER</option><option>REGINALDO</option>
            </select>

            <label>KM INICIAL</label>
            <input type="number" id="kmi" placeholder="000000">

            <div id="campoFim" class="hidden">
                <label style="color: #d32f2f;">KM FINAL (RETORNO)</label>
                <input type="number" id="kmf" placeholder="Digite o KM de chegada">
            </div>

            <label>COR DO SELO</label>
            <select id="corSelo">
                <option value="">SELECIONE</option>
                <option value="VERDE">VERDE</option><option value="AMARELO">AMARELO</option>
                <option value="AZUL">AZUL</option><option value="VERMELHO">VERMELHO</option>
            </select>

            <label id="labelTrocaOleo">PRÓXIMA TROCA DE ÓLEO</label>
            <input type="number" id="proximaTrocaKM" placeholder="KM">
            <input type="date" id="proximaTrocaData" class="hidden">

            <label>OBSERVAÇÃO</label>
            <textarea id="obs" rows="2"></textarea>

            <button type="button" id="btnAcao" onclick="iniciarTrajeto()" class="btn-azul">SALVAR INÍCIO</button>
        </form>
    </div>

    <div id="telaEspera">
        <h3>TRAJETO ATIVO</h3>
        <div id="resumoTrajeto" class="info-trajeto"></div>
        <button type="button" onclick="irParaFinalizar()" class="btn-azul">FINALIZAR TRAJETO</button>
    </div>
</div>

<script>
    // COLE SUA URL NOVA ABAIXO
    const URL_PLANILHA = "SUA_URL_DA_PLANILHA_AQUI";
    const dataHojeStr = new Date().toLocaleDateString('pt-BR');
    document.getElementById('dataAuto').value = dataHojeStr;

    function atualizarInterfacePorTag() {
        const select = document.getElementById("tag");
        const opt = select.options[select.selectedIndex];
        if(!opt.value) return;
        document.getElementById("displayVeiculo").value = opt.getAttribute("data-v");
        document.getElementById("displayPlaca").value = opt.getAttribute("data-p");
        const isMunck = opt.getAttribute("data-v").includes("MUNCK");
        document.getElementById("proximaTrocaKM").classList.toggle("hidden", isMunck);
        document.getElementById("proximaTrocaData").classList.toggle("hidden", !isMunck);
    }

    async function validarVinculoFixo() {
        const tag = document.getElementById("tag").value;
        const nomeS = document.getElementById("nomeCondutor").value;
        const idC = document.getElementById("numCondutor").value;
        const btn = document.getElementById("btnAcao");
        const msg = document.getElementById("msgErroVinc");

        if(!tag || !nomeS || !idC) return;

        btn.disabled = true;
        msg.style.display = "block";
        msg.style.background = "#fff3cd"; msg.style.color = "#856404";
        msg.innerHTML = "🔍 Verificando disponibilidade...";

        try {
            const res = await fetch(`${URL_PLANILHA}?acao=verificar&tag=${tag}&id=${idC}&data=${dataHojeStr}`);
            const dono = await res.text();

            if(dono !== "livre" && dono.trim().toUpperCase() !== nomeS.trim().toUpperCase() && dono !== "") {
                msg.style.background = "#f8d7da"; msg.style.color = "#721c24";
                msg.innerHTML = `🚫 BLOQUEADO: ${tag}/${idC} em uso por ${dono}!`;
                btn.disabled = true;
            } else {
                msg.style.display = "none";
                btn.disabled = false;
            }
        } catch(e) { btn.disabled = false; }
    }

    async function iniciarTrajeto() {
        const tag = document.getElementById("tag").value;
        const kmi = document.getElementById("kmi").value;
        if(!tag || !kmi) return alert("Preencha TAG e KM Inicial!");

        const d = {
            tag, kmi,
            veiculo: document.getElementById("displayVeiculo").value,
            placa: document.getElementById("displayPlaca").value,
            num: document.getElementById("numCondutor").value,
            nome: document.getElementById("nomeCondutor").value,
            selo: document.getElementById("corSelo").value,
            obs: document.getElementById("obs").value,
            horaI: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}),
            data: dataHojeStr
        };

        try {
            await fetch(`${URL_PLANILHA}?acao=registrar&` + new URLSearchParams(d), { mode: 'no-cors' });
            localStorage.setItem("tjur_checklist_ativo", JSON.stringify(d));
            location.reload();
        } catch (e) { alert("Erro ao salvar início!"); }
    }

    function irParaFinalizar() {
        const d = JSON.parse(localStorage.getItem("tjur_checklist_ativo"));
        document.getElementById("telaEspera").style.display = "none";
        document.getElementById("containerForm").style.display = "block";
        document.getElementById("campoFim").classList.remove("hidden");
        document.getElementById("btnAcao").innerText = "FINALIZAR E ENVIAR WHATSAPP";
        document.getElementById("btnAcao").className = "btn-verde";
        
        ["tag", "numCondutor", "nomeCondutor", "kmi"].forEach(id => {
            const el = document.getElementById(id);
            el.value = d[id] || (id === "numCondutor" ? d.num : "");
            el.classList.add("readonly-field");
            el.style.pointerEvents = "none";
        });

        document.getElementById("btnAcao").onclick = async function() {
            const kmf = document.getElementById("kmf").value;
            if(!kmf) return alert("Informe o KM Final!");
            const hF = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            const q = new URLSearchParams({ acao: "finalizar", data: d.data, tag: d.tag, id: d.num, horaF: hF, kmf: kmf, obs: document.getElementById("obs").value });
            await fetch(`${URL_PLANILHA}?${q.toString()}`, { mode: 'no-cors' });
            localStorage.removeItem("tjur_checklist_ativo");
            window.location.href = "whatsapp://send?text=Checklist Finalizado: " + d.tag + " - KM: " + kmf;
        };
    }

    window.onload = function() {
        const salvo = localStorage.getItem("tjur_checklist_ativo");
        if(salvo) {
            const d = JSON.parse(salvo);
            document.getElementById("containerForm").style.display = "none";
            document.getElementById("telaEspera").style.display = "block";
            document.getElementById("resumoTrajeto").innerHTML = `<b>TAG:</b> ${d.tag}<br><b>CONDUTOR:</b> ${d.nome}<br><b>INÍCIO:</b> ${d.horaI}`;
        }
    };
</script>
</body>
</html>
