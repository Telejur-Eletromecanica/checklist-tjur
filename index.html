<script>
    const URL = "https://script.google.com/macros/s/AKfycbysx-IjZe54SWbmqwl2NYJEx_kiuVtakdtE-GFYE30UxwYYQhcvOuw5DViSwMixS_QIyQ/exec";
    let dadosTemporarios = {};

    async function buscarDados() {
        const t = document.getElementById("tag").value, n = document.getElementById("nomeMot").value;
        if(!t || !n) return;
        const cb = 'cb' + Date.now();
        window[cb] = (d) => {
            document.getElementById("veiculoInfo").value = `${d.veiculo} | ${d.placa}`;
            document.getElementById("idMot").value = d.id + " (" + d.n + ")";
            dadosTemporarios.numTrajeto = d.n;
            dadosTemporarios.placa = d.placa;
            dadosTemporarios.veiculo = d.veiculo;
            
            const container = document.getElementById("containerOleo");
            container.innerHTML = `<input type="${d.tipoOleo === 'data' ? 'date' : 'number'}" id="proxOleo">`;
            document.getElementById("labelOleo").innerText = `Próx. troca óleo (${d.tipoOleo.toUpperCase()})`;
            document.getElementById("proxOleo").value = d.oleo;
        };
        const s = document.createElement('script');
        s.src = `${URL}?acao=buscarDadosMotorista&tag=${encodeURIComponent(t)}&callback=${cb}`;
        document.body.appendChild(s);
    }

    function salvarSaida() {
        const d = {
            data: new Date().toLocaleDateString('pt-BR'),
            tag: document.getElementById("tag").value,
            id: document.getElementById("idMot").value.split(' (')[0],
            nome: document.getElementById("nomeMot").value,
            kmi: document.getElementById("kmi").value,
            oleo: document.getElementById("proxOleo").value,
            corSelo: document.getElementById("corSelo").value,
            tipoOleo: document.getElementById("tipoOleo").value,
            numTrajeto: dadosTemporarios.numTrajeto,
            horaI: new Date().toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'}),
            validadeSelo: document.getElementById("validadeSelo").value,
            acao: "registrar"
        };

        if(!d.tag || !d.kmi || !d.nome) return alert("Preencha os campos!");

        const cb = 'cb' + Date.now();
        window[cb] = (res) => {
            // SALVAMENTO ROBUSTO PARA FINALIZAÇÃO
            const storageData = {...d, placa: dadosTemporarios.placa, veiculo: dadosTemporarios.veiculo};
            localStorage.setItem("trip_active_v10", JSON.stringify(storageData));
            enviarWhats(false, storageData);
        };
        const s = document.createElement('script');
        s.src = `${URL}?${new URLSearchParams(d)}&callback=${cb}`;
        document.body.appendChild(s);
    }

    function prepararFim() {
        const d = JSON.parse(localStorage.getItem("trip_active_v10"));
        document.getElementById("telaAtiva").style.display = "none";
        document.getElementById("formContainer").style.display = "block";
        document.getElementById("fimCampos").style.display = "block";
        
        // Preenchimento Automático na Volta
        document.getElementById("tag").value = d.tag;
        document.getElementById("nomeMot").value = d.nome;
        document.getElementById("kmi").value = d.kmi;
        document.getElementById("idMot").value = d.id;
        
        document.getElementById("btnAcao").innerText = "Concluir Trajeto";
        document.getElementById("btnAcao").onclick = () => {
            const kf = document.getElementById("kmf").value;
            const hF = new Date().toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'});
            const obs = document.getElementById("obs").value || "Nenhuma";
            
            const cb = 'cb' + Date.now();
            window[cb] = () => {
                const finalData = {...d, kmf: kf, horaF: hF, obs: obs};
                localStorage.removeItem("trip_active_v10");
                enviarWhats(true, finalData);
            };
            const s = document.createElement('script');
            s.src = `${URL}?acao=finalizar&tag=${d.tag}&kmf=${kf}&horaF=${hF}&obs=${encodeURIComponent(obs)}&callback=${cb}`;
            document.body.appendChild(s);
        };
    }

    function enviarWhats(isF, data) {
        let m = isF ? `✅ *CHECKLIST CONCLUÍDO*` : `🚀 *INÍCIO DE TRAJETO*`;
        m += `\n\n📅 *Data:* ${data.data}\n🏷️ *Tag:* ${data.tag}\n👤 *Motorista:* ${data.nome}\n🚛 *Veículo:* ${data.veiculo}\n🔢 *Placa:* ${data.placa}\n📍 *Trajeto:* ${data.numTrajeto}`;
        m += `\n\n🏁 *KM Inicial:* ${data.kmi}\n🕒 *Hora Início:* ${data.horaI}`;
        
        if(isF) {
            m += `\n🏁 *KM Final:* ${data.kmf}\n🕒 *Hora Fim:* ${data.horaF}\n📝 *Obs:* ${data.obs}`;
        }
        
        window.location.href = `https://wa.me/?text=${encodeURIComponent(m)}`;
        setTimeout(() => location.reload(), 1000);
    }
</script>
