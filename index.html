<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checklist TJUR Digital</title>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --success: #25D366; --admin: #e67e22; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; margin: 0; padding: 15px; display: flex; justify-content: center; }
        .container { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 500px; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 10px; border: none; cursor: pointer; border-radius: 5px; font-weight: bold; background: #ddd; }
        .tab-btn.active { background: var(--primary); color: white; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .form-group { margin-bottom: 12px; }
        .full-width { grid-column: span 2; }
        label { display: block; font-weight: bold; margin-bottom: 4px; color: var(--primary); font-size: 13px; }
        select, input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 15px; }
        input[readonly] { background-color: #f1f3f5; color: #555; border-left: 3px solid var(--accent); }
        .btn-whatsapp { width: 100%; padding: 15px; background: var(--success); color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 15px; }
        .hidden { display: none; }
        .list-item { display: flex; justify-content: space-between; padding: 8px; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>

<div class="container">
    <div class="tabs">
        <button class="tab-btn active" id="btn-chk" onclick="switchTab('checklist')">Checklist</button>
        <button class="tab-btn" id="btn-adm" onclick="switchTab('admin')">Admin</button>
    </div>

    <div id="tab-checklist">
        <div class="form-group">
            <label>Selecione a TAG do Veículo</label>
            <select id="selectTag" onchange="atualizarDadosVeiculo()">
                <option value="">-- Selecione --</option>
                <option value="TJUR 13">TJUR 13</option>
                <option value="TJUR 04">TJUR 04</option>
                <option value="TJUR 06">TJUR 06</option>
                <option value="TJUR 07">TJUR 07</option>
                <option value="TJUR 08">TJUR 08</option>
                <option value="TJUR 09">TJUR 09</option>
                <option value="TJUR 10">TJUR 10</option>
            </select>
        </div>

        <div class="form-grid">
            <div class="form-group">
                <label>Data</label>
                <input type="text" id="data_hoje">
            </div>
            <div class="form-group">
                <label>Placa</label>
                <input type="text" id="placa" readonly>
            </div>
            
            <div class="form-group">
                <label>Próx. Troca Óleo</label>
                <input type="text" id="prox_oleo" readonly>
            </div>
            <div class="form-group">
                <label>Tipo de Óleo</label>
                <input type="text" id="tipo_oleo" readonly>
            </div>

            <div class="form-group full-width">
                <label>Condutor 1</label>
                <select id="condutor1" class="sel-cond"></select>
            </div>
            <div class="form-group">
                <label>Condutor 2</label>
                <input type="text" id="condutor2" placeholder="Nome">
            </div>
            <div class="form-group">
                <label>Condutor 3</label>
                <input type="text" id="condutor3" placeholder="Nome">
            </div>

            <div class="form-group">
                <label>KM Início</label>
                <input type="number" id="km_inicio">
            </div>
            <div class="form-group">
                <label>KM Final</label>
                <input type="number" id="km_final">
            </div>

            <div class="form-group">
                <label>Cor do Selo</label>
                <select id="cor_selo">
                    <option value="Verde">Verde</option>
                    <option value="Amarelo">Amarelo</option>
                    <option value="Azul">Azul</option>
                    <option value="Vermelho">Vermelho</option>
                </select>
            </div>
            <div class="form-group">
                <label>Validade Selo</label>
                <input type="text" id="val_selo" readonly>
            </div>
        </div>

        <button class="btn-whatsapp" onclick="enviarWhatsApp()">ENVIAR NO WHATSAPP</button>
    </div>

    <div id="tab-admin" class="hidden">
        <h3>Gerenciar Condutores</h3>
        <input type="text" id="novoNome" placeholder="Nome do Condutor">
        <button onclick="addCondutor()" style="width:100%; margin-top:5px; padding:10px;">Adicionar</button>
        <div id="listaCondutores" style="margin-top:15px;"></div>
    </div>
</div>

<script>
    const frota = {
        "TJUR 13": { placa: "QVD4I38", prox_oleo: "169.257", tipo_oleo: "15W40", km_ini: "166523", km_fin: "166541", cor: "Azul", validade: "31/05/2026" },
        "TJUR 08": { placa: "QVE5H48", prox_oleo: "120.000", tipo_oleo: "5W30", km_ini: "115000", km_fin: "", cor: "Verde", validade: "20/12/2026" },
        "TJUR 04": { placa: "QFA1I50", prox_oleo: "---", tipo_oleo: "---", km_ini: "", km_fin: "", cor: "Verde", validade: "---" },
        "TJUR 06": { placa: "QUJ3E02", prox_oleo: "---", tipo_oleo: "---", km_ini: "", km_fin: "", cor: "Amarelo", validade: "---" }
    };

    let condutores = JSON.parse(localStorage.getItem('condutores')) || ["Francivaldo Costa", "Joelcinei Guimarães", "Reginaldo Pereira", "Adriano Nascimento"];

    document.getElementById('data_hoje').value = new Date().toLocaleDateString('pt-BR').substring(0, 5);

    function atualizarDadosVeiculo() {
        const v = frota[document.getElementById('selectTag').value];
        if (v) {
            document.getElementById('placa').value = v.placa;
            document.getElementById('prox_oleo').value = v.prox_oleo;
            document.getElementById('tipo_oleo').value = v.tipo_oleo;
            document.getElementById('km_inicio').value = v.km_ini;
            document.getElementById('km_final').value = v.km_fin;
            document.getElementById('cor_selo').value = v.cor;
            document.getElementById('val_selo').value = v.validade;
        }
    }

    function switchTab(tab) {
        document.getElementById('tab-checklist').classList.toggle('hidden', tab !== 'checklist');
        document.getElementById('tab-admin').classList.toggle('hidden', tab !== 'admin');
        document.getElementById('btn-chk').classList.toggle('active', tab === 'checklist');
        document.getElementById('btn-adm').classList.toggle('active', tab === 'admin');
        renderCondutores();
    }

    function renderCondutores() {
        const c1 = document.getElementById('condutor1');
        const lista = document.getElementById('listaCondutores');
        c1.innerHTML = condutores.map(c => `<option value="${c}">${c}</option>`).join('');
        lista.innerHTML = condutores.map((c, i) => `<div class="list-item">${c} <span onclick="remover(${i})" style="color:red;cursor:pointer">✕</span></div>`).join('');
    }

    function addCondutor() {
        const n = document.getElementById('novoNome').value;
        if(n) { condutores.push(n); localStorage.setItem('condutores', JSON.stringify(condutores)); renderCondutores(); document.getElementById('novoNome').value = ""; }
    }

    function remover(i) {
        condutores.splice(i, 1); localStorage.setItem('condutores', JSON.stringify(condutores)); renderCondutores();
    }

    function enviarWhatsApp() {
        const msg = `*CHECKLIST ${document.getElementById('selectTag').value}*%0A` +
                    `📅 Data: ${document.getElementById('data_hoje').value}%0A` +
                    `🚗 Placa: ${document.getElementById('placa').value}%0A` +
                    `🛢️ Próx. Troca Óleo: ${document.getElementById('prox_oleo').value}%0A` +
                    `🧪 Tipo de Óleo: ${document.getElementById('tipo_oleo').value}%0A%0A` +
                    `👤 Condutor 1: ${document.getElementById('condutor1').value}%0A` +
                    `👤 Condutor 2: ${document.getElementById('condutor2').value || "---"}%0A` +
                    `👤 Condutor 3: ${document.getElementById('condutor3').value || "---"}%0A%0A` +
                    `🛣️ Km Início: ${document.getElementById('km_inicio').value}%0A` +
                    `🏁 Km Final: ${document.getElementById('km_final').value}%0A%0A` +
                    `🏷️ Cor do Selo: ${document.getElementById('cor_selo').value}%0A` +
                    `📅 Validade Selo: ${document.getElementById('val_selo').value}`;

        window.open(`https://wa.me/?text=${msg}`, '_blank');
    }

    renderCondutores();
</script>
</body>
</html>
