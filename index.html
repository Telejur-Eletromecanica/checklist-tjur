<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Checklist de Frota - Telejur</title>
</head>
<body class="bg-gray-100 pb-10">

    <header class="bg-blue-600 p-4 text-white text-center shadow-md sticky top-0 z-10">
        <h1 class="font-bold text-lg">Checklist de Veículo</h1>
        <p class="text-xs opacity-80">Preenchimento de Rotina</p>
    </header>

    <div class="max-w-md mx-auto p-4 space-y-4">
        
        <section class="bg-white rounded-xl shadow-sm p-4 border-t-4 border-blue-500">
            <h2 class="text-blue-600 font-bold mb-3 flex items-center gap-2">
                👤 Identificação
            </h2>
            <div class="grid grid-cols-2 gap-3">
                <div class="col-span-1">
                    <label class="block text-xs text-gray-500 uppercase font-bold">Data</label>
                    <input type="date" id="data_input" readonly class="w-full bg-gray-100 border border-gray-200 rounded p-2 text-sm text-gray-600 outline-none">
                </div>
                <div class="col-span-1">
                    <label class="block text-xs text-gray-500 uppercase font-bold">ID Condutor</label>
                    <input type="text" placeholder="Ex: CONDUTOR 1" class="w-full bg-gray-50 border border-gray-200 rounded p-2 text-sm focus:ring-2 focus:ring-blue-400 outline-none">
                </div>

                <div class="col-span-2">
                    <label class="block text-xs text-gray-500 uppercase font-bold">Nome Completo</label>
                    <select class="w-full bg-gray-50 border border-gray-200 rounded p-2 text-sm focus:ring-2 focus:ring-blue-400 outline-none">
                        <option value="" disabled selected>Selecione o motorista</option>
                        <option>Adriano Nascimento</option>
                        <option>Francivaldo Costa</option>
                        <option>Joelcinei Guimarães</option>
                        <option>Fracinildo Teixera</option>
                        <option>Ezequeiel Silva</option>
                        <option>Reginaldo Pereira</option>
                        <option>Lafaiete Batista</option>
                        <option>Walter Gonçalvez</option>
                    </select>
                </div>

                <div class="col-span-2">
                    <label class="block text-xs text-gray-500 uppercase font-bold">Tag (Identificação)</label>
                    <select id="tag_select" onchange="preencherVeiculoPlaca()" class="w-full bg-gray-50 border border-gray-200 rounded p-2 text-sm focus:ring-2 focus:ring-blue-400 outline-none font-bold text-blue-700">
                        <option value="" disabled selected>Selecione a TAG</option>
                        <option value="tjur04">TJUR 04</option>
                        <option value="tjur06">TJUR 06</option>
                        <option value="tjur07">TJUR 07</option>
                        <option value="tjur08">TJUR 08</option>
                        <option value="tjur09">TJUR 09</option>
                        <option value="tjur10">TJUR 10</option>
                        <option value="tjur13">TJUR 13</option>
                    </select>
                </div>

                <div class="col-span-1">
                    <label class="block text-xs text-gray-500 uppercase font-bold">Veículo</label>
                    <input type="text" id="veiculo_input" readonly placeholder="TAG" class="w-full bg-gray-100 border border-gray-200 rounded p-2 text-sm text-gray-600 outline-none">
                </div>
                <div class="col-span-1">
                    <label class="block text-xs text-gray-500 uppercase font-bold">Placa</label>
                    <input type="text" id="placa_input" readonly placeholder="TAG" class="w-full bg-gray-100 border border-gray-200 rounded p-2 text-sm text-gray-600 outline-none uppercase font-mono">
                </div>
            </div>
        </section>

        <section class="bg-white rounded-xl shadow-sm p-4 border-t-4 border-green-500">
            <h2 class="text-green-600 font-bold mb-3 flex items-center gap-2">
                🛣️ Trajeto e KM
            </h2>
            <div class="grid grid-cols-2 gap-3">
                <div class="col-span-2">
                    <label class="block text-xs text-gray-500 uppercase font-bold">Número do Trajeto</label>
                    <input type="number" placeholder="00" class="w-full bg-gray-50 border border-gray-200 rounded p-2 text-sm focus:ring-2 focus:ring-green-400 outline-none">
                </div>
                <div>
                    <label class="block text-xs text-gray-500 uppercase font-bold">Hora Início</label>
                    <input type="time" id="hora_inicio_input" class="w-full bg-gray-50 border border-gray-200 rounded p-2 text-sm focus:ring-2 focus:ring-green-400 outline-none">
                </div>
                <div>
                    <label class="block text-xs text-gray-500 uppercase font-bold">Hora Fim</label>
                    <input type="time" class="w-full bg-gray-50 border border-gray-200 rounded p-2 text-sm focus:ring-2 focus:ring-green-400 outline-none">
                </div>
                <div>
                    <label class="block text-xs text-gray-500 uppercase font-bold">KM Inicial</label>
                    <input type="number" id="km_inicial_input" oninput="calcularTrocaOleo()" placeholder="0" class="w-full bg-gray-50 border border-gray-200 rounded p-2 text-sm focus:ring-2 focus:ring-green-400 outline-none font-mono font-bold">
                </div>
                <div>
                    <label class="block text-xs text-gray-500 uppercase font-bold">KM Final</label>
                    <input type="number" placeholder="0" class="w-full bg-gray-50 border border-gray-200 rounded p-2 text-sm focus:ring-2 focus:ring-green-400 outline-none font-mono">
                </div>
                <div class="col-span-2">
                    <label class="block text-xs text-gray-500 uppercase font-bold text-center">Status da Operação</label>
                    <select class="w-full bg-gray-50 border border-gray-200 rounded p-3 text-sm font-bold focus:ring-2 focus:ring-green-400 outline-none">
                        <option>EM ANDAMENTO</option>
                        <option>CONCLUÍDO</option>
                        <option>PENDENTE</option>
                    </select>
                </div>
            </div>
        </section>

        <section class="bg-white rounded-xl shadow-sm p-4 border-t-4 border-orange-500">
            <h2 class="text-orange-600 font-bold mb-3 flex items-center gap-2">
                🔧 Manutenção e Selos
            </h2>
            <div class="grid grid-cols-2 gap-3">
                <div class="col-span-1">
                    <label class="block text-xs text-gray-500 uppercase font-bold">Tipo de Óleo</label>
                    <input type="text" placeholder="Ex: 5W30" class="w-full bg-gray-50 border border-gray-200 rounded p-2 text-sm focus:ring-2 focus:ring-orange-400 outline-none">
                </div>
                <div class="col-span-1">
                    <label class="block text-xs text-gray-500 uppercase font-bold">Próx. Troca Óleo</label>
                    <input type="number" id="km_troca_input" oninput="calcularTrocaOleo()" placeholder="Ex: 55000" class="w-full bg-gray-50 border border-gray-200 rounded p-2 text-sm focus:ring-2 focus:ring-orange-400 outline-none font-mono font-bold">
                </div>
                
                <div id="container_resta" class="col-span-2 bg-gray-50 p-3 rounded-lg border border-gray-200 transition-colors duration-300">
                    <label class="block text-[10px] text-gray-500 uppercase font-black">Resta para a troca</label>
                    <span id="resta_valor" class="text-xl font-black text-gray-400">--- KM</span>
                </div>

                <div>
                    <label class="block text-xs text-gray-500 uppercase font-bold">Cor do Selo</label>
                    <select class="w-full bg-gray-50 border border-gray-200 rounded p-2 text-sm focus:ring-2 focus:ring-orange-400 outline-none">
                        <option>AZUL</option>
                        <option>VERDE</option>
                        <option>AMARELO</option>
                        <option>VERMELHO</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs text-gray-500 uppercase font-bold">Validade Selo</label>
                    <input type="date" class="w-full bg-gray-50 border border-gray-200 rounded p-2 text-sm focus:ring-2 focus:ring-orange-400 outline-none">
                </div>
                <div class="col-span-2">
                    <label class="block text-xs text-gray-500 uppercase font-bold">Observação</label>
                    <textarea rows="2" placeholder="S/O" class="w-full bg-gray-50 border border-gray-200 rounded p-2 text-sm focus:ring-2 focus:ring-orange-400 outline-none"></textarea>
                </div>
            </div>
        </section>

        <button class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl shadow-lg transition-transform active:scale-95">
            FINALIZAR CHECKLIST
        </button>

    </div>

    <script>
        const bancoDadosVeiculos = {
            "tjur04": { veiculo: "SKY MUNCK", placa: "QFA1I50" },
            "tjur06": { veiculo: "SAVEIRO FURGÃO", placa: "QUJ3E02" },
            "tjur07": { veiculo: "SKY MUNCK", placa: "RWR3C75" },
            "tjur08": { veiculo: "CAMINHONETE HILUX", placa: "QVE5H48" },
            "tjur09": { veiculo: "SKY MUNCK", placa: "RXC6J04" },
            "tjur10": { veiculo: "CAMINHONETE", placa: "PHU1I37" },
            "tjur13": { veiculo: "CAMINHONETE", placa: "QVD4I38" }
        };

        function configurarDataHoraAtual() {
            const agora = new Date();
            document.getElementById('data_input').value = agora.toISOString().split('T')[0];
            const inputHora = document.getElementById('hora_inicio_input');
            const horas = String(agora.getHours()).padStart(2, '0');
            const minutos = String(agora.getMinutes()).padStart(2, '0');
            inputHora.value = `${horas}:${minutos}`;
        }

        function preencherVeiculoPlaca() {
            const selectTag = document.getElementById('tag_select');
            const inputVeiculo = document.getElementById('veiculo_input');
            const inputPlaca = document.getElementById('placa_input');
            const tagSelecionada = selectTag.value;

            if (tagSelecionada && bancoDadosVeiculos[tagSelecionada]) {
                const dados = bancoDadosVeiculos[tagSelecionada];
                inputVeiculo.value = dados.veiculo;
                inputPlaca.value = dados.placa;
            }
        }

        // NOVA FUNÇÃO: CÁLCULO DE TROCA DE ÓLEO
        function calcularTrocaOleo() {
            const kmInicial = parseInt(document.getElementById('km_inicial_input').value);
            const kmTroca = parseInt(document.getElementById('km_troca_input').value);
            const displayResta = document
