<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { background: #121212; color: white; font-family: Arial; padding: 15px; }
    input, select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 5px; border: 1px solid #444; background: #222; color: white; box-sizing: border-box; }
    label { font-size: 12px; color: #888; text-transform: uppercase; }
    .btn { background: #1a1a3a; color: #aaa; border: 1px solid #333; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; }
    .id-display { color: #ff00ff; font-weight: bold; text-align: center; background: #1a1a1a; }
  </style>
</head>
<body>
  <h3 style="text-align:center; color:#ccc;">TELEJUR V22</h3>
  
  <form id="formCheck">
    <label>Motorista</label>
    <select name="nome" id="nome" onchange="buscar()" required>
      <option value="">-- SELECIONE --</option>
      <option value="Adriano Nascimento">Adriano Nascimento</option>
      <option value="Fracivaldo Costa">Fracivaldo Costa</option>
      <option value="Lafaiete Batista">Lafaiete Batista</option>
      <option value="Reginaldo">Reginaldo</option>
      <option value="Walter Gonçalves">Walter Gonçalves</option>
      <option value="Ezequeil Silva">Ezequeil Silva</option>
    </select>

    <div style="display: flex; gap: 10px;">
      <div style="flex:1">
        <label>TAG</label>
        <select name="tag" id="tag" onchange="buscar()" required>
          <option value="">--</option>
          <option value="TJUR 04">04</option>
          <option value="TJUR 06">06</option>
          <option value="TJUR 07">07</option>
          <option value="TJUR 08">08</option>
          <option value="TJUR 09">09</option>
          <option value="TJUR 10">10</option>
          <option value="TJUR 13">13</option>
        </select>
      </div>
      <div style="flex:1">
        <label>ID</label>
        <input type="text" id="condutorID" class="id-display" readonly>
      </div>
    </div>

    <div style="display: flex; gap: 10px;">
      <div style="flex:1">
        <label>KM Inicial</label>
        <input type="number" name="kmi" id="kmi" required>
      </div>
      <div style="flex:1">
        <label>Nº Trajeto</label>
        <input type="text" name="numT" id="numT" style="color:yellow; text-align:center" readonly>
      </div>
    </div>

    <label>Observação</label>
    <input type="text" name="obs">

    <input type="hidden" name="proxOleo" id="proxOleo">
    <input type="hidden" name="placa" id="placa">
    <input type="hidden" name="veiculo" id="veiculo">

    <button type="submit" id="btn" class="btn">🚀 INICIAR SAÍDA</button>
  </form>

  <script>
    const SCRIPT_URL = "SUA_URL_DA_IMPLANTACAO_AQUI";

    function buscar() {
      const tag = document.getElementById('tag').value;
      const nome = document.getElementById('nome').value;
      if(tag && nome) {
        const s = document.createElement('script');
        s.src = `${SCRIPT_URL}?callback=retorno&acao=buscarDadosVei&tag=${tag}&nome=${nome}`;
        document.body.appendChild(s);
      }
    }

    function retorno(r) {
      document.getElementById('condutorID').value = r.condutorSugerido;
      document.getElementById('kmi').value = r.kmi;
      document.getElementById('numT').value = r.numT;
      document.getElementById('proxOleo').value = r.proxOleo;
      document.getElementById('placa').value = r.placa;
      document.getElementById('veiculo').value = r.veiculo;
    }

    document.getElementById('formCheck').onsubmit = function(e) {
      e.preventDefault();
      const b = document.getElementById('btn');
      b.innerText = "ENVIANDO..."; b.disabled = true;

      const dados = Object.fromEntries(new FormData(this));
      dados.data = new Date().toLocaleDateString('pt-BR');
      dados.horaInic = new Date().getHours() + ":" + new Date().getMinutes();

      fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(dados) })
      .then(() => {
        alert("Salvo!");
        location.reload();
      }).catch(() => {
        alert("Erro no envio!");
        b.disabled = false;
      });
    };
  </script>
</body>
</html>
