<script>

    function calcularOleo() {
        const campoProx = document.getElementById('proxOleo');
        const statusDiv = document.getElementById('statusOleo');
        if(!campoProx || !campoProx.value) return;

        let mensagem = "";
        let corFundo = "";
        let corTexto = "";
        let borda = "";

        // --- LÓGICA PARA DATA ---
        if (campoProx.type === "date" || campoProx.value.includes('-') || campoProx.value.includes('/')) {
            let dataMeta;
            if(campoProx.value.includes('/')) {
                const partes = campoProx.value.split('/');
                dataMeta = new Date(partes[2], partes[1] - 1, partes[0]);
            } else {
                dataMeta = new Date(campoProx.value + "T12:00:00");
            }
            
            const hoje = new Date();
            hoje.setHours(0,0,0,0);
            const diffTempo = dataMeta - hoje;
            const diffDias = Math.ceil(diffTempo / (1000 * 60 * 60 * 24));

            if (diffDias < 0) {
                mensagem = `⚠️ ÓLEO VENCIDO<br><small>Vencido há ${Math.abs(diffDias)} dia(s)</small>`;
                corFundo = "#ffebee"; corTexto = "#c62828"; borda = "2px solid #c62828";
            } else {
                mensagem = `✅ ÓLEO EM DIA<br><small>Faltam ${diffDias} dia(s) para a troca</small>`;
                corFundo = "#e8f5e9"; corTexto = "#2e7d32"; borda = "2px solid #2e7d32";
            }
        } 
        // --- LÓGICA PARA QUILOMETRAGEM (KM) ---
        else {
            const proxKM = parseFloat(campoProx.value.replace(/[^\d]/g, ''));
            const kmInicial = parseFloat(document.getElementById('kmi').value) || 0;
            const kmFinal = parseFloat(document.getElementById('kmf').value) || 0;
            
            // Usa o KM Final se estiver preenchido, senão usa o Inicial
            const kmAtual = (kmFinal > 0) ? kmFinal : kmInicial;

            if (isNaN(proxKM) || kmAtual === 0) {
                statusDiv.style.display = "none";
                return;
            }

            const resta = proxKM - kmAtual;

            if (resta <= 0) {
                mensagem = `⚠️ ÓLEO VENCIDO<br><small>Excedido em ${Math.abs(resta)} KM</small>`;
                corFundo = "#ffebee"; corTexto = "#c62828"; borda = "2px solid #c62828";
            } else {
                mensagem = `✅ ÓLEO EM DIA<br><small>Faltam ${resta} KM para a troca</small>`;
                corFundo = "#e8f5e9"; corTexto = "#2e7d32"; borda = "2px solid #2e7d32";
            }
        }

        statusDiv.style.display = "block";
        statusDiv.innerHTML = mensagem;
        statusDiv.style.background = corFundo;
        statusDiv.style.color = corTexto;
        statusDiv.style.border = borda;
    }

    // Função buscarDados atualizada para garantir o disparo do cálculo
    async function buscarDados() {
        const t = document.getElementById("tag").value, n = document.getElementById("nomeMot").value;
        if(!t || !n) return;
        const s = document.createElement('script');
        window.cb_mot = (d) => {
            document.getElementById("veiculoInfo").value = `${d.veiculo} | ${d.placa}`;
            
            // Lógica de ID Condutor Sequencial
            let proximoId = 1;
            while(idsOcupadosNoDia.includes(proximoId)) { proximoId++; }
            document.getElementById("idMot").value = `CONDUTOR ${proximoId}`;

            const container = document.getElementById("containerOleo");
            if(d.tipoOleo === "data") {
                container.innerHTML = `<input type="date" id="proxOleo" oninput="calcularOleo()">`;
            } else {
                container.innerHTML = `<input type="text" id="proxOleo" oninput="calcularOleo()" placeholder="KM Troca">`;
            }
            document.getElementById("proxOleo").value = d.oleo;
            if(d.tipoLubrificante) document.getElementById("tipoOleo").value = d.tipoLubrificante;
            
            calcularOleo();
        };
        s.src = `${URL}?acao=buscarDadosMotorista&tag=${encodeURIComponent(t)}&nome=${encodeURIComponent(n)}&callback=cb_mot`;
        document.body.appendChild(s);
    }
