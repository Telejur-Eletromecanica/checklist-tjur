<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Frota Telejur</title>
</head>
<body class="bg-slate-100 pb-10 font-sans text-slate-800">

    <header class="bg-blue-800 text-white shadow-lg sticky top-0 z-50">
        <div class="p-4 text-center border-b border-blue-700">
            <h1 class="font-bold text-lg uppercase tracking-wider">Frota Telejur</h1>
        </div>
        <div class="flex justify-around bg-blue-900">
            <button onclick="mudarTela('saida')" id="btn-saida" class="w-1/2 py-3 font-bold uppercase text-[10px] border-b-4 border-white opacity-100">1. SAÍDA</button>
            <button onclick="mudarTela('retorno')" id="btn-retorno" class="w-1/2 py-3 font-bold uppercase text-[10px] opacity-60">2. CHEGADA</button>
        </div>
    </header>

    <div class="max-w-md mx-auto p-4 space-y-4">
        <div id="tela-saida" class="space-y-4">
            <section class="bg-white rounded-2xl shadow-sm border p-5 space-y-4">
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">VEÍCULO (TAG)</label>
                    <select id="tag_select" onchange="preencherVeiculoPlaca()" class="w-full border-2 border-blue-50 rounded-xl p-4 font-black text-blue-700 bg-blue-50 outline-none text-lg">
                        <option value="" disabled selected>ESCOLHA A TAG...</option>
                        <option value="TJUR 04">TJUR 04</option><option value="TJUR 06">TJUR 06</option>
                        <option value="TJUR 07">TJUR 07</option><option value="TJUR 08">TJUR 08</option>
                        <option value="TJUR 09">TJUR 09</option><option value="TJUR 10">TJUR 10</option>
                        <option value="TJUR 13">TJUR 13</option>
                    </select>
                </div>

                <div class="grid grid-cols-2 gap-2">
                    <input type="text" id="veiculo_input" readonly placeholder="VEÍCULO" class="bg-slate-50 border p-3 rounded-lg text-xs font-bold text-slate-500 text-center uppercase">
                    <input type="text" id="placa_input" readonly placeholder="PLACA" class="bg-slate-50 border p-3 rounded-lg text-xs font-bold text-slate-500 text-center uppercase">
                </div>

                <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">IDENTIFICAÇÃO (AUTOMÁTICA)</label>
                    <input type="text" id="id_condutor" readonly value="AGUARDANDO MOTORISTA" class="w-full border-2 border-slate-100 rounded-xl p-3 text-sm font-black bg-slate-50 text-blue-600 text-center outline-none">
                </div>

                <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">MOTORISTA</label>
                    <select id="nome_condutor" onchange="validarMotorista()" class="w-full border-2 border-slate-100 rounded-xl p-3 text-sm font-bold bg-white outline-none">
                        <option value="" disabled selected>Selecione o motorista...</option>
                        <option value="ADRIANO NASCIMENTO">Adriano Nascimento</option>
                        <option value="FRACIVALDO COSTA">Fracivaldo Costa</option>
                        <option value="JOELCINEI GUIMARÃES">Joelcinei Guimarães</option>
                        <option value="FRACINILDO TEIXEIRA">Fracinildo Teixeira</option>
                        <option value="EZEQUIEL SILVA">Ezequiel Silva</option>
                        <option value="REGINALDO PEREIRA">Reginaldo Pereira</option>
                        <option value="LAFAIETE BATISTA">Lafaiete Batista</option>
                        <option value="WALTER GONÇALVES">Walter Gonçalves</option>
                    </select>
                </div>

                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="block text-[10px] font-bold text-green-600 uppercase mb-1">KM SAÍDA</label>
                        <input type="tel" id="km_inicial" oninput="calcularTroca()" placeholder="000000" class="w-full border-2 border-green-100 rounded-xl p-3 text-xl font-black text-green-700 text-center outline-none">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">TIPO DE ÓLEO</label>
                        <select id="tipo_oleo" class="w-full border-2 border-slate-100 rounded-xl p-3 text-sm font-bold uppercase outline-none">
                            <option value="5w30">5w30</option><option value="5w40">5w40</option><option value="10w40">10w40</option>
                            <option value="15w40" selected>15w40</option> <option value="20w50">20w50</option>
                        </select>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-2 border-t pt-4">
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">PRÓX. TROCA KM</label>
                        <input type="tel" id="km_troca" oninput="calcularTroca()" placeholder="000000" class="w-full border-2 border-slate-100 rounded-xl p-3 text-xl font-bold text-center outline-none">
                    </div>
                    <div class="flex flex-col justify-end">
                        <label class="block text-[10px] font-bold text-blue-900 uppercase mb-1">RESTA</label>
                        <div id="res_resta" class="bg-blue-50 border border-blue-100 rounded-xl p-3 text-center text-xs font-black text-blue-500 uppercase">--- KM</div>
                    </div>
                </div>

                <button id="btn_enviar" onclick="enviarDados('inicio')" class="w-full bg-green-600 text-white font-black py-5 rounded-xl shadow-lg uppercase text-lg">Registrar Saída</button>
            </section>
        </div>
        </div>

    <script>
        const scriptURL = "SUA_URL_DO_SCRIPT";
        const frota = { "TJUR 04": { v: "Sky munck", p: "QFA1I50" }, "TJUR 06": { v: "Saveiro furgão", p: "QUJ3E02" }, "TJUR 07": { v: "Sky munck", p: "RWR3C75" }, "TJUR 08": { v: "Caminhonete hilux", p: "QVE5H48" }, "TJUR 09": { v: "Sky munck", p: "RXC6J04" }, "TJUR 10": { v: "Caminhonete", p: "PHU1I37" }, "TJUR 13": { v: "Caminhonete", p: "QVD4I38" } };

        function preencherVeiculoPlaca() { 
            const f = frota[document.getElementById('tag_select').value]; 
            if(f) { 
                document.getElementById('veiculo_input').value = f.v; 
                document.getElementById('placa_input').value = f.p; 
                validarMotorista(); // Revalida se mudar a tag
            } 
        }

        async function validarMotorista() {
            const tag = document.getElementById('tag_select').value;
            const motorista = document.getElementById('nome_condutor').value;
            const campoID = document.getElementById('id_condutor');
            
            if (!tag || !motorista) return;

            campoID.value = "VERIFICANDO...";
            
            try {
                // Faz uma chamada GET para o script pedindo o próximo ID para essa TAG hoje
                const response = await fetch(`${scriptURL}?acao=verificarID&tag=${tag}&motorista=${motorista}`);
                const data = await response.json();
                
                // O script deve retornar algo como { proximoID: "Condutor 2" }
                campoID.value = data.proximoID;
            } catch (e) {
                campoID.value = "Condutor 1"; // Fallback caso dê erro
            }
        }

        // Funções de calcularTroca e enviarDados permanecem as mesmas...
    </script>
</body>
</html>
