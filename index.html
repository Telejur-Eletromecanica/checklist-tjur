<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checklist Telejur Automático</title>
    <style>
        :root { --blue: #1a73e8; --red: #d93025; --gray: #f1f3f4; }
        body { background: #f8f9fa; font-family: sans-serif; padding: 10px; margin: 0; }
        .card { background: white; max-width: 450px; margin: auto; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: var(--blue); border-bottom: 2px solid var(--blue); padding-bottom: 10px; font-size: 1.1rem; }
        .sec { background: var(--gray); padding: 8px; font-size: 0.75rem; font-weight: bold; color: #666; margin: 15px 0 5px; border-radius: 4px; }
        label { font-size: 0.7rem; font-weight: bold; color: #444; display: block; margin-top: 10px; }
        input, select { width: 100%; padding: 12px; margin-top: 4px; border-radius: 8px; border: 1px solid #ccc; font-size: 1rem; box-sizing: border-box; }
        input[readonly] { background: #f9f9f9; color: #777; }
        .btn { width: 100%; padding: 16px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; color: white; font-size: 1rem; margin-top: 15px; }
        .btn-s { background: var(--blue); } .btn-c { background: var(--red); }
        .resumo { background: #e8f0fe; padding: 12px; border-radius: 8px; margin-top: 15px; font-size: 0.85rem; border-left: 4px solid var(--blue); }
        #msg { text-align: center; font-weight: bold; padding: 10px; border-radius: 8px; margin-bottom: 10px; display: none; }
        .hidden { display: none; }
    </style>
</head>
<body>
<div class="card">
    <h2>CHECKLIST TELEJUR V22</h2>
    <div id="msg"></div>
    <form id="f">
        <div class="sec">IDENTIFICAÇÃO</div>
        <label>Motorista</label>
        <select name="nome" id="nome" onchange="sync()" required>
            <option value="">-- Selecione --</option>
            <option value="ADRIANO NASCIMENTO">ADRIANO NASCIMENTO</option>
            <option value="FRACIVALDO COSTA">FRACIVALDO COSTA</option>
            <option value="REGINALDO">REGINALDO</option>
        </select>
        <div style="display:flex; gap:10px">
            <div style="flex:1"><label>TAG</label><select name="tag" id="tag" onchange="sync()" required><option value="">--</option><option value="TJUR 04">TJUR 04</option><option value="TJUR 13">TJUR 13</option></select></div>
            <div style="flex:1"><label>ID Sequência</label><input type="text" name="condutorID" id="condutorID" readonly></div>
        </div>

        <div id="areaDados" class="hidden">
            <div class="sec">RESUMO DO TRAJETO</div>
            <div id="infoResumo" class="resumo"></div>
            
            <div id="telaSaida" class="hidden">
                <label>KM Inicial</label><input type="number" name="kmi" id="kmi" readonly>
                <label>Observação de Saída</label><input type="text" name="obs" id="obs" value="S/O">
                <button type="button" onclick="enviar('SAIDA')" class="btn btn-s">🚀 REGISTRAR SAÍDA</button>
            </div>

            <div id="telaChegada" class="hidden">
                <label>KM Inicial (Saída)</label><input type="number" id="kmiShow" readonly>
                <label>KM Final (Chegada)</label><input type="number" name="kmf" id="kmf" placeholder="000000">
                <label>Observação de Chegada</label><input type="text" id="obsFim" placeholder="Ocorrências no trajeto?">
                <button type="button" onclick="enviar('CHEGADA')" class="btn btn-c">🏁 REGISTRAR CHEGADA</button>
            </div>
        </div>
        
        <button type="button" onclick="location.reload()" class="btn" style="background:#666; font-size:0.8rem">♻️ LIMPAR / REINICIAR</button>

        <input type="hidden" name="veiculo" id="veiculo"><input type="hidden" name="placa" id="placa">
        <input type="hidden" name="proxOleo" id="proxOleo"><input type="hidden" name="numTrajeto" id="numTrajeto">
        <input type="hidden" name="valSelo" id="valSelo"><input type="hidden" name="corSelo" id="corSelo"><input type="hidden" name="tipoOleo" id="tipoOleo">
    </form>
</div>

<script>
    const URL = "https://script.google.com/macros/s/SUA_URL_AQUI/exec";

    function sync() {
        const t = document.getElementById('tag').value, n = document.getElementById('nome').value;
        if(t && n) {
            document.getElementById('msg').style.display = "block";
            document.getElementById('msg').innerText = "Sincronizando...";
            const s = document.createElement('script');
            s.src = `${URL}?callback=cb&acao=buscarDadosVei&tag=${encodeURIComponent(t)}&nome=${encodeURIComponent(n)}&t=${Date.now()}`;
            document.body.appendChild(s);
        }
    }

    function cb(r) {
        const m = document.getElementById('msg');
        if(r.bloqueado) { m.style.background="#fce8e6"; m.innerText=r.msg; return; }
        
        m.style.background="#e6f4ea"; m.innerText = `Modo: ${r.modo} Identificado`;
        document.getElementById('areaDados').classList.remove('hidden');
        
        // Preenche campos
        document.getElementById('condutorID').value = r.condutorID;
        document.getElementById('kmi').value = r.kmi;
        document.getElementById('kmiShow').value = r.kmi;
        document.getElementById('veiculo').value = r.veiculo;
        document.getElementById('placa').value = r.placa;
        document.getElementById('numTrajeto').value = r.numTrajeto;
        document.getElementById('proxOleo').value = r.proxOleo;
        document.getElementById('tipoOleo').value = r.tipoOleo;

        // Alterna Telas Automaticamente
        if(r.modo === "SAIDA") {
            document.getElementById('telaSaida').classList.remove('hidden');
            document.getElementById('telaChegada').classList.add('hidden');
            document.getElementById('infoResumo').innerHTML = `🚙 <b>${r.veiculo}</b> (${r.placa})<br>📍 Início do Trajeto <b>Nº ${r.numTrajeto}</b> do dia.`;
        } else {
            document.getElementById('telaChegada').classList.remove('hidden');
            document.getElementById('telaSaida').classList.add('hidden');
            document.getElementById('infoResumo').innerHTML = `🏁 Finalizando Trajeto <b>Nº ${r.numTrajeto}</b>.<br>⚠️ Verifique o KM Final no painel.`;
        }
    }

    function enviar(tipo) {
        const b = event.target; b.disabled = true; b.innerText = "GRAVANDO...";
        const d = Object.fromEntries(new FormData(document.getElementById('f')));
        d.tipo = tipo; d.data = new Date().toLocaleDateString('pt-BR');
        const h = new Date().toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'});
        if(tipo === 'SAIDA') d.horaInic = h; else { d.horaFim = h; d.obs = document.getElementById('obsFim').value; }

        fetch(URL, { method: 'POST', body: JSON.stringify(d) }).then(() => {
            const fone = "5593981162453";
            const km = tipo === 'SAIDA' ? d.kmi : d.kmf;
            const resta = parseInt(d.proxOleo.replace(/\D/g,'')) - km;
            let txt = `📋 *CHECKLIST TELEJUR - ${tipo}*\n---\n👤 *Motorista:* ${d.nome}\n🚗 *Veículo:* ${d.veiculo}\n🏷️ *Tag:* ${d.tag} | 🆔 *ID:* ${d.condutorID}\n🔢 *Trajeto:* ${d.numTrajeto}\n---\n🛣️ *KM:* ${km}\n🛢️ *Resta Troca:* ${resta} KM\n💬 *Obs:* ${d.obs}`;
            window.open(`https://api.whatsapp.com/send?phone=${fone}&text=${encodeURIComponent(txt)}`, '_blank');
            location.reload();
        });
    }
</script>
</body>
</html>
