<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Controle de Frota</title>

<style>
body {
  font-family: Arial;
  background: #f4f6fb;
  padding: 20px;
}
.container {
  max-width: 400px;
  margin: auto;
  background: white;
  padding: 20px;
  border-radius: 10px;
}
input, select, button {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
}
button {
  background: #1d4ed8;
  color: white;
  border: none;
}
.status {
  margin: 10px 0;
  color: green;
}
</style>
</head>

<body>

<div class="container">
  <h2>🚗 Controle de Frota</h2>

  <div id="status">🔄 Carregando...</div>

  <input id="tag" placeholder="TAG Veículo">
  <input id="id" placeholder="ID Motorista">
  <input id="nome" placeholder="Nome">
  <input id="kmi" placeholder="KM Inicial">

  <button onclick="registrar()">INICIAR USO</button>

  <input id="kmf" placeholder="KM Final">
  <button onclick="finalizar()">FINALIZAR</button>
</div>

<script>
const URL = "https://script.google.com/macros/s/AKfycbysx-IjZe54SWbmqwl2NYJEx_kiuVtakdtE-GFYE30UxwYYQhcvOuw5DViSwMixS_QIyQ/exec";

function call(params, cb) {
  const s = document.createElement("script");
  const q = new URLSearchParams(params);
  q.append("callback", cb);
  s.src = URL + "?" + q.toString();
  document.body.appendChild(s);
}

function carregarStatus() {
  call({ acao: "status" }, "resStatus");
}

function resStatus(res) {
  let html = "";

  for (let v in res) {
    html += "🚫 " + v + " em uso por " + res[v] + "<br>";
  }

  document.getElementById("status").innerHTML = html || "✅ Todos livres";
}

function registrar() {
  call({
    acao: "registrar",
    tag: tag.value,
    id: id.value,
    nome: nome.value,
    kmi: kmi.value
  }, "resRegistrar");
}

function resRegistrar(r) {
  if (r.erro === "veiculo") {
    alert("🚫 Veículo ocupado por " + r.por);
    return;
  }
  if (r.erro === "motorista") {
    alert("🚫 Motorista já em uso");
    return;
  }
  alert("✅ OK");
  carregarStatus();
}

function finalizar() {
  call({
    acao: "finalizar",
    tag: tag.value,
    kmf: kmf.value
  }, "resFinalizar");
}

function resFinalizar(r) {
  if (r.erro === "km") {
    alert("KM inválido");
    return;
  }
  alert("Finalizado");
  carregarStatus();
}

carregarStatus();
</script>

</body>
</html>
