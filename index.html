<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TELEJUR v11.1</title>
    <style>
        :root { --primary: #1a237e; --danger: #c62828; --success: #2e7d32; --warning: #ef6c00; }
        body { font-family: sans-serif; background: #f0f4f8; padding: 10px; margin: 0; }
        .card { max-width: 450px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .grid-status { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 15px; }
        .v-box { padding: 8px; border-radius: 8px; text-align: center; font-size: 10px; font-weight: bold; border: 1px solid #ddd; }
        .livre { background: #e8f5e9; color: var(--success); }
        .ocupado { background: #ffebee; color: var(--danger); border-color: var(--danger); }
        .bloqueado { background: #f5f5f5; color: #999; border-style: dashed; }
        label { font-weight: bold; font-size: 11px; color: #555; display: block; margin-top: 12px; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 12px; margin-top: 4px; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; box-sizing: border-box; }
        
        #statusOleo { margin-top: 10px; font-size: 15px; font-weight: bold; padding: 12px; border-radius: 8px; display: none; text-align: center; border: 2px solid transparent; }
        .btn { width: 100%; padding: 18px; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 15px; }
        .btn-azul { background: var(--primary); color: white; }
        .btn-refresh { background: #555; color: white; padding: 6px 10px; font-size: 10px; border-radius: 5px; cursor: pointer; border:none; float: right; margin-left: 5px; }
        .readonly { background: #f1f1f1 !important; color: #444 !important; font-weight: bold; }
        #msgSucesso { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 999; text-align: center; justify-content: center; align-items: center; flex-direction: column; padding: 20px; }
    </style>
</head>
<body>

<div id="msgSucesso">
    <h1 style="font-size:80px; margin:0">✔</h1>
    <h2 style="color:var(--success); text-transform: uppercase; margin-bottom: 5px;">Checklist Concluído</h2>
    <h3 id="agradecimento" style="color:#555; margin-top: 0;"></h3>
    <p>Abrindo WhatsApp...</p>
</div>

<div class="card">
    <button class="btn-refresh" onclick="sync()">🔄 Atualizar</button>
    <button class="btn-refresh" style="background:var(--danger)" onclick="if(confirm('Resetar App?')){localStorage.removeItem('trip_v11_1');location.reload();}">🗑️ Reset</button>
    
    <h2 style="text-align:center; color:var(--primary); margin:0;">TELEJUR v11.1</h2>
    <p id="txtSync" style="text-align:center; font-size:10px; color:#888; margin-bottom:10px;">Iniciando...</p>
    
    <div id="painel" class="grid-status"></div>

    <div id="formContainer">
        <label>Motorista</label>
        <select id="nomeMot" onchange="sync(); buscarDados();">
            <option value="">-- SELECIONE --</option>
            <option value="ADRIANO NASCIMENTO">ADRIANO NASCIMENTO</option>
            <option value="FRANCIVALDO COSTA">FRANCIVALDO COSTA</option>
            <option value="FRANCINILDO TEXEIRA">FRANCINILDO TEXEIRA</option>
            <option value="JOELCINEI GUIMARAES">JOELCINEI GUIMARAES</option>
            <option value="MIRIELLY">MIRIELLY</option>
            <option value="REGINALDO">REGINALDO</option>
            <option value="WALTER GONÇALVES">WALTER GONÇALVES</option>
            <option value="LAFAITE BATISTA">LAFAITE BATISTA</option>
            <option value="EZEQUIEL">EZEQUIEL</option>
        </select>

        <label>Veículo (TAG)</label>
        <select id="tag" onchange="buscarDados()">
            <option value="">-- SELECIONE --</option>
            <option value="TJUR 04">TJUR 04</option><option value="TJUR 06">TJUR 06</option>
            <option value="TJUR 07">TJUR 07</option><option value="TJUR 08">TJUR 08</option>
            <option value="TJUR 09">TJUR 09</option><option value="TJUR 10">TJUR 10</option>
            <option value="TJUR 13">TJUR 13</option>
        </select>
        <input type="text" id="veiculoInfo" class="readonly" readonly placeholder="Dados do Veículo">

        <label>ID Condutor</label>
        <input type="text" id="idMot" class="readonly" readonly>

        <label>Cor do Selo</label>
        <select id="corSelo">
            <option value="">-- SELECIONE --</option>
            <option value="VERDE">VERDE</option>
            <option value="VERMELHO">VERMELHO</option>
            <option value="AZUL">AZUL</option>
            <option value="AMARELO">AMARELO</option>
        </select>

        <label>Validade Selo</label>
        <input type="date" id="validadeSelo">

        <label>KM Inicial</label>
        <input type="number" id="kmi" oninput="calcularOleo()">

        <label id="labelOleo">Próx. troca óleo</label>
        <div id="containerOleo">
            <input type="text" id="proxOleo" oninput="calcularOleo()" placeholder="Carregando...">
        </div>
        <div id="statusOleo"></div>
        <input type="hidden" id="statusOleoTexto">

        <label>Tipo de Óleo</label>
        <select id="tipoOleo">
            <option value="">-- SELECIONE --</option>
            <option value="15W40">15W40</option>
            <option value="5W30">5W30</option>
            <option value="10W40">10W40</option>
            <option value="20W50">20W50</option>
            <option value="OUTRO">OUTRO / NÃO INFORMADO</option>
        </select>

        <div id="fimCampos" style="display:none">
            <hr><label style="color:var(--danger)">KM Chegada</label>
            <input type="number" id="kmf" oninput="calcularOleo()">
            <label>Observação</label>
            <textarea id="obs"></textarea>
        </div>

        <button id="btnAcao" onclick="salvarSaida()" class="btn btn-azul">Registrar Saída</button>
    </div>

    <div id="telaAtiva" style="display:none">
        <div id="infoViagem" style="background:#f8f9fa; padding:15px; border-radius:10px; border-left:5px solid var(--primary); margin-bottom:15px"></div>
        <button onclick="enviarWhats(false)" class="btn" style="background:#25D366; color:white">WhatsApp Saída</button>
        <button onclick="prepararFim()" class="btn" style="background:#444; color:white">Finalizar Trajeto</button>
    </div>
</div>

<script>
    const URL = "https://script.google.com/macros/s/AKfycbysx-IjZe54SWbmwl2NYJEx_kiuVtakdtE-GFYE30UxwYYQhcvOuw5DViSwMixS_QIyQ/exec";
    const dataH = new Date().toLocaleDateString('pt-BR');
    let idsOcupadosNoDia = [];

    function emitirBip() {
        try {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.type = 'sine'; osc.frequency.setValueAtTime(880, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            osc.start(); osc.stop(audioCtx.currentTime + 0.15);
        } catch(e) {}
    }

    function calcularOleo() {
        const campoProx = document.getElementById('proxOleo');
        const statusDiv = document.getElementById('statusOleo');
        const hiddenStatus = document.getElementById('statusOleoTexto');
        if(!campoProx || !campoProx.value) return;

        let txtInfo = ""; let cor = ""; let txtWhats = "";

        if (campoProx.type === "date" || campoProx.value.includes('-') || campoProx.value.includes('/')) {
            let dataMeta = campoProx.value.includes('/') ? new Date(campoProx.value.split('/').reverse().join('-') + "T12:00:00") : new Date(campoProx.value + "T12:00:00");
            const hoje = new Date(); hoje.setHours(0,0,0,0);
            const diffDias = Math.ceil((dataMeta - hoje) / (1000 * 60 * 60 * 24));
            if (diffDias < 0) {
                txtInfo = `⚠️ VENCIDO HÁ ${Math.abs(diffDias)} DIAS`; cor = "#ffebee"; txtWhats = `🚨 VENCIDO (${Math.abs(diffDias)} dias atrás)`;
            } else {
                txtInfo = `✅ EM DIA: FALTAM ${diffDias} DIAS`; cor = "#e8f5e9"; txtWhats = `✅ EM DIA (Faltam ${diffDias} dias)`;
            }
        } else {
            const proxKM = parseFloat(campoProx.value.replace(/[^\d]/g, ''));
            const kmInicial = parseFloat(document.getElementById('kmi').value) || 0;
            const kmFinal = parseFloat(document.getElementById('kmf').value) || 0;
            const kmAtual = (kmFinal > 0) ? kmFinal : kmInicial;
            if (isNaN(proxKM) || kmAtual === 0) { statusDiv.style.display = "none"; return; }
            const resta = proxKM - kmAtual;
            if (resta <= 0) {
                txtInfo = `⚠️ VENCIDO EM ${Math.abs(resta)} KM`; cor = "#ffebee"; txtWhats = `🚨 VENCIDO (Excedido em ${Math.abs(resta)} KM)`;
            } else {
                txtInfo = `✅ EM DIA: FALTAM ${resta} KM`; cor = "#e8f5e9"; txtWhats = `✅ EM DIA (Faltam ${resta} KM)`;
            }
        }
        statusDiv.style.display = "block"; statusDiv.innerHTML = txtInfo; statusDiv.style.background = cor;
        hiddenStatus.value = txtWhats;
    }

    async function sync() {
        const s = document.createElement('script');
        const motSel = document.getElementById('nomeMot').value;
        const autorizadosSky = ["REGINALDO", "LAFAITE BATISTA", "WALTER GONÇALVES"];
        window.cb_sync = (res) => {
            idsOcupadosNoDia = res.idsOcupados || [];
            const tags = ["TJUR 04", "TJUR 06", "TJUR 07", "TJUR 08", "TJUR 09", "TJUR 10", "TJUR 13"];
            const selT = document.getElementById('tag'), painel = document.getElementById('painel');
            painel.innerHTML = '';
            tags.forEach(t => {
                const infoOcupado = res.ocupados[t], infoFrota = res.frota[t];
                const isSky = infoFrota.veiculo === "SKY MUNCK", bloqueado = (isSky && !autorizadosSky.includes(motSel));
                const opt = Array.from(selT.options).find(o => o.value === t);
                if(opt) {
                    if(infoOcupado) { opt.disabled = true; opt.text = t + " (EM USO)"; }
                    else if(bloqueado) { opt.disabled = true; opt.text = t + " (RESTRITO)"; }
                    else { opt.disabled = false; opt.text = t; }
                }
                let classe = infoOcupado ? 'ocupado' : (bloqueado ? 'bloqueado' : 'livre');
                let statusTxt = infoOcupado ? '🔴 '+infoOcupado.nome.split(' ')[0] : (bloqueado ? '🔒 RESTRITO' : '🟢 LIVRE');
                painel.innerHTML += `<div class="v-box ${classe}">${t}<br>${statusTxt}</div>`;
            });
            document.getElementById('txtSync').innerText = "Sincronizado: " + new Date().toLocaleTimeString();
            if(s.parentNode)
