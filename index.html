<script>
    const URL = "https://script.google.com/macros/s/AKfycbysx-IjZe54SWbmqwl2NYJEx_kiuVtakdtE-GFYE30UxwYYQhcvOuw5DViSwMixS_QIyQ/exec"; 
    const skyTags = ["TJUR 04", "TJUR 07", "TJUR 09"];
    const autorizadosSky = ["REGINALDO", "WALTER GONÇALVES", "LAFAITE BATISTA"];
    const todasTags = ["TJUR 04", "TJUR 06", "TJUR 07", "TJUR 08", "TJUR 09", "TJUR 10", "TJUR 13"];
    let frota = { ocupados: {} };

    async function call(p) {
        document.getElementById('loader').style.display = 'block';
        return new Promise((resolve) => {
            const n = 'cb_'+Math.round(Math.random()*1e6);
            window[n] = (d) => { delete window[n]; document.getElementById('loader').style.display='none'; resolve(d); };
            const s = document.createElement('script');
            s.src = `${URL}?${new URLSearchParams(p)}&callback=${n}&_=${Date.now()}`;
            document.body.appendChild(s);
        });
    }

    async function sync() { const res = await call({acao: 'statusGeral'}); if(res) { frota = res; validarAcesso(); } }

    function validarAcesso() {
        const mot = document.getElementById('nomeMot').value.toUpperCase().trim();
        const ehAutorizado = autorizadosSky.includes(mot);
        const p = document.getElementById('painel'); p.innerHTML = '';
        todasTags.forEach(t => {
            const o = frota.ocupados[t];
            let c = o ? 'ocupado' : 'livre';
            let s = o ? o.nome.split(' ')[0] : 'LIVRE';
            if (skyTags.includes(t) && !ehAutorizado && mot !== "") { c = 'bloqueado'; s = 'RESTRITO'; }
            p.innerHTML += `<div class="v-box ${c}">${t}<br>${s}</div>`;
        });
        const sel = document.getElementById('tag');
        sel.innerHTML = '<option value="">-- SELECIONE --</option>';
        todasTags.forEach(t => {
            const opt = document.createElement('option'); opt.value = t;
            const o = frota.ocupados[t];
            if (o) { opt.text = `🚫 ${t} (OCUPADO)`; opt.disabled = true; }
            else if (skyTags.includes(t) && !ehAutorizado && mot !== "") { opt.text = `🔒 ${t} (RESTRITO)`; opt.disabled = true; } 
            else { opt.text = t; } sel.add(opt);
        });
    }

    async function carregarDadosVei() {
        const tag = document.getElementById('tag').value; if(!tag) return;
        const res = await call({acao: 'buscarDadosMotorista', tag: tag});
        if(res){
            document.getElementById('veiculoInfo').value = `${res.veiculo || "N/A"} | ${res.placa || "N/A"}`;
            document.getElementById('kmi').value = res.kmi || 0;
            const cont = document.getElementById('containerOleo');
            if(skyTags.includes(tag)) {
                cont.innerHTML = `<input type="date" id="proxOleo" onchange="calcOleo()">`;
                document.getElementById('lblOleo').innerText = "Vencimento Óleo (Data)";
                document.getElementById('proxOleo').value = res.oleo ? new Date(res.oleo).toISOString().split('T')[0] : "";
            } else {
                cont.innerHTML = `<input type="number" id="proxOleo" onchange="calcOleo()">`;
                document.getElementById('proxOleo').value = res.oleo || (Number(res.kmi || 0) + 5000);
                document.getElementById('lblOleo').innerText = "Próxima Troca (KM)";
            }
            window.v = res.veiculo; window.p = res.placa; calcOleo();
        }
    }

    function calcOleo() {
        const tag = document.getElementById('tag').value;
        const val = document.getElementById('proxOleo').value;
        const calc = document.getElementById('calculoOleo');
        if(!val) return;
        if(skyTags.includes(tag)) {
            const dias = Math.ceil((new Date(val) - new Date()) / 86400000);
            calc.innerText = dias > 0 ? `Restam ${dias} dias.` : `⚠️ VENCIDO!`;
        } else {
            const falta = Number(val) - Number(document.getElementById('kmi').value);
            calc.innerText = falta > 0 ? `Restam ${falta} KM.` : `⚠️ TROCAR!`;
        }
    }

    async function salvarSaida() {
        const mot = document.getElementById('nomeMot').value;
        const tag = document.getElementById('tag').value;
        if(!tag || !mot || !document.getElementById('validadeSelo').value) return alert("Preencha Motorista, TAG e Validade!");
        
        // Busca contagem de Condutor e Trajeto
        const contagem = await call({acao: 'gerarDadosContagem', tag: tag, nome: mot});
        
        const d = {
            acao: 'registrar', tag: tag, nome: mot,
            kmi: document.getElementById('kmi').value, oleo: document.getElementById('proxOleo').value,
            veiculo: window.v, placa: window.p, corSelo: document.getElementById('corSelo').value,
            validadeSelo: document.getElementById('validadeSelo').value, tipoOleo: document.getElementById('tipoOleo').value,
            idCondutor: contagem.idCondutor, trajetoNum: contagem.trajetoNum
        };

        const res = await call(d);
        if(res && res.error) return alert(res.error);
        localStorage.setItem("tjur_trip", JSON.stringify(d));
        location.reload();
    }

    function enviarWhatsInicial() {
        const d = JSON.parse(localStorage.getItem("tjur_trip"));
        const agora = new Date();
        const infoFinal = `CONDUTOR ${d.idCondutor} | ${d.trajetoNum}º TRAJETO`;
        let resta = skyTags.includes(d.tag) ? Math.ceil((new Date(d.oleo) - agora) / 86400000) + " dias" : (Number(d.oleo) - Number(d.kmi)) + " KM";
        const msg = `🚀 *SAÍDA REGISTRADA*\n--------------------------------\n📅 *Data:* ${agora.toLocaleDateString('pt-BR')}\n🏷️ *Tag:* ${d.tag}\n👤 *Nome:* ${d.nome.toUpperCase()}\n🆔 *Cargo:* ${infoFinal}\n--------------------------------\n🛣️ *KM:* ${d.kmi}\n🕒 *Hora:* ${agora.getHours().toString().padStart(2, '0')}:${agora.getMinutes().toString().padStart(2, '0')}\n🎨 *Selo:* ${d.corSelo}\n🛠️ *Próx. Troca:* ${d.oleo}\n⏳ *Resta:* ${resta}`;
        window.location.href = `https://api.whatsapp.com/send?text=${encodeURIComponent(msg)}`;
    }

    async function finalizarETransmitir() {
        const t = JSON.parse(localStorage.getItem("tjur_trip"));
        const kf = document.getElementById('kmf').value;
        const obs = document.getElementById('obs').value || "NENHUMA";
        const agora = new Date();
        const infoFinal = `CONDUTOR ${t.idCondutor} | ${t.trajetoNum}º TRAJETO`;
        if(!kf || Number(kf) <= Number(t.kmi)) return alert("KM Final inválido!");
        await call({ acao: 'finalizar', tag: t.tag, kmf: kf, obs: obs.toUpperCase() });
        let restaFinal = skyTags.includes(t.tag) ? Math.ceil((new Date(t.oleo) - agora) / 86400000) + " dias" : (Number(t.oleo) - Number(kf)) + " KM";
        const msg = `✅ *CHECKLIST CONCLUÍDO*\n--------------------------------\n📅 *Data:* ${agora.toLocaleDateString('pt-BR')}\n🏷️ *Tag:* ${t.tag}\n👤 *Nome:* ${t.nome.toUpperCase()}\n🆔 *Cargo:* ${infoFinal}\n--------------------------------\n🛣️ *KM:* ${kf}\n🕒 *Hora:* ${agora.getHours().toString().padStart(2, '0')}:${agora.getMinutes().toString().padStart(2, '0')}\n🎨 *Selo:* ${t.corSelo}\n📝 *Obs:* ${obs.toUpperCase()}\n⏳ *Resta:* ${restaFinal}`;
        localStorage.removeItem("tjur_trip");
        window.location.href = `https://api.whatsapp.com/send?text=${encodeURIComponent(msg)}`;
        setTimeout(() => location.reload(), 1200);
    }

    window.onload = () => { sync(); const s = localStorage.getItem("tjur_trip"); if(s) { const d = JSON.parse(s); document.getElementById('formEntrada').style.display = 'none'; document.getElementById('telaAtiva').style.display = 'block'; document.getElementById('infoViagem').innerHTML = `<b>TRAJETO EM CURSO</b><br>🚗 ${d.tag}<br>👤 ${d.nome}<br>🆔 CONDUTOR ${d.idCondutor} | ${d.trajetoNum}º TRAJETO`; } };
</script>
