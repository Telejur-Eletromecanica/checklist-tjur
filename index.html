<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TELEJUR - FROTA INTELIGENTE</title>
    <style>
        :root { --primary: #1a237e; --danger: #d32f2f; --success: #388e3c; }
        body { font-family: sans-serif; background: #f4f7f9; padding: 10px; margin: 0; }
        .card { max-width: 450px; margin: auto; background: #fff; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-top: 8px solid var(--primary); }
        .brand { text-align: center; color: var(--primary); font-size: 24px; font-weight: bold; margin-bottom: 20px; }
        .grid-status { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .v-box { padding: 10px; border-radius: 8px; text-align: center; font-size: 12px; font-weight: bold; border: 1px solid #ddd; }
        .livre { background: #e8f5e9; color: var(--success); }
        .ocupado { background: #ffebee; color: var(--danger); }
        label { display: block; margin-top: 15px; font-size: 12px; color: #666; font-weight: bold; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 12px; margin-top: 5px; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; box-sizing: border-box; }
        .readonly { background: #f0f0f0; color: #333; pointer-events: none; }
        .btn { width: 100%; padding: 18px; border: none; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        .btn-salvar { background: var(--primary); color: white; }
        .btn-whats { background: #25D366; color: white; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="card">
    <div class="brand">TELEJUR</div>
    <div id="painel" class="grid-status">Validando Frota...</div>

    <div id="formContainer">
        <label>Data</label>
        <input type="text" id="dataAtu" class="readonly" readonly>

        <label>Veículo (TAG)</label>
        <select id="tag" onchange="getPlaca()">
            <option value="">-- SELECIONE --</option>
            <option value="TJUR 04" data-p="QFA1I50 | SKY MUNCK">TJUR 04</option>
            <option value="TJUR 06" data-p="QUJ3E02 | SAVEIRO">TJUR 06</option>
            <option value="TJUR 07" data-p="RWR3C75 | SKY MUNCK">TJUR 07</option>
            <option value="TJUR 08" data-p="QVE5H48 | HILUX">TJUR 08</option>
            <option value="TJUR 10" data-p="PHU1I37 | CAMINHONETE">TJUR 10</option>
            <option value="TJUR 13" data-p="QVD4I38 | HILUX">TJUR 13</option>
        </select>
        <input type="text" id="placa" class="readonly" readonly placeholder="Placa do Veículo">

        <label>ID do Condutor</label>
        <select id="idMot">
            <option value="ID 01">ID 01</option>
            <option value="ID 02">ID 02</option>
        </select>

        <label>Nome do Motorista</label>
        <select id="nomeMot">
            <option value="ADRIANO NASCIMENTO">ADRIANO NASCIMENTO</option>
            <option value="FRANCIVALDO COSTA">FRANCIVALDO COSTA</option>
        </select>

        <label>KM Inicial</label>
        <input type="number" id="kmi" placeholder="Ex: 15420">

        <label>Próxima Troca de Óleo</label>
        <input type="number" id="oleo" placeholder="KM da próxima troca">

        <div id="areaFim" class="hidden">
            <hr style="margin:20px 0; border:0; border-top:1px dashed #ccc">
            <label style="color:var(--danger)">KM Final (Chegada)</label>
            <input type="number" id="kmf">
            <label>Observações</label>
            <textarea id="obs" rows="2"></textarea>
        </div>

        <button id="btnPrincipal" onclick="salvarInicio()" class="btn btn-salvar">REGISTRAR SAÍDA</button>
    </div>

    <div id="areaAtiva" class="hidden">
        <div id="statusResumo" style="background:#f9f9f9; padding:15px; border-radius:10px; border-left:5px solid var(--primary); margin-bottom:15px"></div>
        <button onclick="enviarZap(false)" class="btn btn-whats">COMPARTILHAR SAÍDA</button>
        <button onclick="prepararFim()" class="btn" style="background:#555; color:white">FINALIZAR TRAJETO</button>
    </div>
</div>

<script>
    const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbysx-IjZe54SWbmqwl2NYJEx_kiuVtakdtE-GFYE30UxwYYQhcvOuw5DViSwMixS_QIyQ/exec";
    const hoje = new Date().toLocaleDateString('pt-BR');
    document.getElementById("dataAtu").value = hoje;

    function getPlaca() {
        const opt = document.getElementById("tag").options[document.getElementById("tag").selectedIndex];
        document.getElementById("placa").value = opt.getAttribute("data-p") || "";
    }

    async function sync() {
        const cb = "cb_" + Date.now();
        const s = document.createElement('script');
        window[cb] = (dados) => {
            const frota = ["TJUR 04", "TJUR 06", "TJUR 07", "TJUR 08", "TJUR 10", "TJUR 13"];
            document.getElementById('painel').innerHTML = frota.map(t => {
                const motorista = dados[t];
                if (motorista) document.querySelector(`#tag option[value="${t}"]`).disabled = true;
                return `<div class="v-box ${motorista ? 'ocupado' : 'livre'}">${t}<br>${motorista ? '🔴 ' + motorista.split(' ')[0] : '🟢 LIVRE'}</div>`;
            }).join('');
        };
        s.src = `${URL_SCRIPT}?acao=statusGeral&data=${hoje}&callback=${cb}`;
        document.body.appendChild(s);
    }

    function salvarInicio() {
        const dados = {
            data: hoje, tag: document.getElementById("tag").value, 
            placa: document.getElementById("placa").value,
            id: document.getElementById("idMot").value, nome: document.getElementById("nomeMot").value, 
            kmi: document.getElementById("kmi").value,
            horaI: new Date().toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'}),
            oleo: document.getElementById("oleo").value, acao: "registrar", callback: "cb_reg"
        };
        if(!dados.tag || !dados.kmi) return alert("Preencha a TAG e o KM Inicial!");

        const s = document.createElement('script');
        window.cb_reg = (res) => {
            if(res.res === "erro") return alert("BLOQUEIO: " + res.msg);
            localStorage.setItem("trip_telejur", JSON.stringify(dados));
            location.reload();
        };
        s.src = `${URL_SCRIPT}?${new URLSearchParams(dados)}`;
        document.body.appendChild(s);
    }

    function prepararFim() {
        const salvo = JSON.parse(localStorage.getItem("trip_telejur"));
        document.getElementById("areaAtiva").classList.add("hidden");
        document.getElementById("formContainer").classList.remove("hidden");
        document.getElementById("areaFim").classList.remove("hidden");
        
        ["tag", "idMot", "nomeMot", "kmi", "oleo"].forEach(f => {
            document.getElementById(f).value = salvo[f === "idMot" ? "id" : (f === "nomeMot" ? "nome" : f)];
            document.getElementById(f).classList.add("readonly");
        });

        document.getElementById("btnPrincipal").innerText = "CONCLUIR E ENVIAR";
        document.getElementById("btnPrincipal").onclick = () => {
            const kmf = document.getElementById("kmf").value;
            const hF = new Date().toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'});
            if(!kmf) return alert("Informe o KM de Chegada!");

            const s = document.createElement('script');
            window.cb_fim = () => { enviarZap(true, kmf, hF, document.getElementById("obs").value); };
            s.src = `${URL_SCRIPT}?acao=finalizar&tag=${salvo.tag}&data=${salvo.data}&kmf=${kmf}&horaF=${hF}&obs=${document.getElementById("obs").value || 'Nenhuma'}&callback=cb_fim`;
            document.body.appendChild(s);
        };
    }

    function enviarZap(isFim, kmf, hF, obs) {
        const d = JSON.parse(localStorage.getItem("trip_telejur"));
        const condutorFormat = `CONDUTOR ${d.id.replace(/\D/g, "")}`;
        
        let msg = isFim ? `✅ *CHECKLIST CONCLUÍDO - TELEJUR*\n\n` : `🚀 *SAÍDA DE VEÍCULO - TELEJUR*\n\n`;
        msg += `📅 *Data:* ${d.data}\n🚗 *Veículo:* ${d.tag}\n👤 *Motorista:* ${d.nome}\n🆔 *ID:* ${condutorFormat}\n`;
        
        if(isFim) {
            msg += `⏱️ *Horário:* ${d.horaI} às ${hF}\n🛣️ *KM:* ${d.kmi} ➔ ${kmf}\n🔧 *Próx. Óleo:* ${d.oleo} KM\n📝 *Obs:* ${obs}`;
            localStorage.removeItem("trip_telejur");
        } else {
            msg += `🛣️ *KM Inicial:* ${d.kmi}\n⏱️ *Hora Saída:* ${d.horaI}`;
        }
        window.location.href = `https://wa.me/?text=${encodeURIComponent(msg)}`;
    }

    window.onload = () => {
        sync();
        const salvo = localStorage.getItem("trip_telejur");
        if(salvo) {
            const d = JSON.parse(salvo);
            document.getElementById("formContainer").classList.add("hidden");
            document.getElementById("areaAtiva").classList.remove("hidden");
            document.getElementById("statusResumo").innerHTML = `<b>TRAJETO EM CURSO</b><br>🚗 ${d.tag}<br>👤 ${d.nome}<br>⏱️ Início: ${d.horaI}`;
        }
    };
</script>
</body>
</html>
