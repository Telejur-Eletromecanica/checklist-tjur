<script>
    // ... (Funções auxiliares permanecem iguais) ...

    function irParaFinalizar() {
        const salvo = JSON.parse(localStorage.getItem("tjur_checklist_ativo"));
        document.getElementById("telaEspera").style.display = "none";
        document.getElementById("containerForm").style.display = "block";
        document.getElementById("campoFim").classList.remove("hidden");
        document.getElementById("avisoFoto").innerHTML = "📸 <b>AVISO DE FOTO:</b><br>Finalize o trajeto e anexe a foto do checklist físico no WhatsApp.";

        // CAMPOS QUE FICARÃO VISÍVEIS MAS BLOQUEADOS (Somente Leitura)
        const camposTravados = ["tag", "numCondutor", "nomeCondutor", "corSelo", "kmi", "validadeSelo"];
        camposTravados.forEach(id => {
            const el = document.getElementById(id);
            if(id === "numCondutor") el.value = salvo.num;
            else if(id === "nomeCondutor") el.value = salvo.nome;
            else if(id === "validadeSelo") el.value = salvo.valSeloRaw;
            else if(id === "corSelo") el.value = salvo.selo;
            else el.value = salvo[id];

            if(id === "tag") atualizarInterfacePorTag();
            el.classList.add("readonly-field");
            el.style.pointerEvents = "none";
        });

        // MANTER O ÓLEO VISÍVEL E EDITÁVEL (Caso precise corrigir no fim)
        const campoKM = document.getElementById("proximaTrocaKM");
        const campoData = document.getElementById("proximaTrocaData");
        
        if (salvo.oleo.includes("KM")) {
            campoKM.value = salvo.oleo.replace(" KM", "");
            campoKM.classList.remove("hidden");
            campoData.classList.add("hidden");
        } else if (salvo.oleo !== "Não informado") {
            campoData.value = salvo.oleo.split('/').reverse().join('-');
            campoData.classList.remove("hidden");
            campoKM.classList.add("hidden");
        }
        
        document.getElementById("dataLimiteSelo").value = salvo.dataLimite;
        document.getElementById("obs").value = salvo.obs;

        const btn = document.getElementById("btnAcao");
        btn.innerText = "FINALIZAR E ENVIAR WHATSAPP";
        btn.className = "btn-verde";
        btn.onclick = async function() {
            const kmf = document.getElementById("kmf").value;
            const obsFinal = document.getElementById("obs").value;
            
            // Recaptura o óleo caso tenha sido alterado na finalização
            let oleoFinal = "";
            if (!campoKM.classList.contains("hidden")) {
                oleoFinal = campoKM.value + " KM";
            } else {
                oleoFinal = campoData.value ? campoData.value.split('-').reverse().join('/') : "Não informado";
            }

            if(!kmf) { alert("Informe o KM Final!"); return; }
            
            const hF = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            
            const urlFinalizar = `${URL_PLANILHA}?acao=finalizar` +
                `&data=${encodeURIComponent(salvo.data)}` +
                `&tag=${encodeURIComponent(salvo.tag)}` +
                `&id=${encodeURIComponent(salvo.num)}` +
                `&horaF=${encodeURIComponent(hF)}` +
                `&kmf=${encodeURIComponent(kmf)}` +
                `&oleo=${encodeURIComponent(oleoFinal)}` + // Garante o envio do óleo atualizado
                `&obs=${encodeURIComponent(obsFinal)}`;

            const msgF = `*CHECKLIST VEÍCULOS - TELEJUR*\n==========================\n\n*STATUS:* ✅ FINALIZADO\n\n*DATA:* ${salvo.data}\n*HORA INÍCIO:* ${salvo.horaI}\n*HORA FIM:* ${hF}\n--------------------------\n*CONDUTOR:* ${salvo.nome}\n*ID:* ${salvo.num}\n--------------------------\n*VEÍCULO:* ${salvo.veiculo}\n*TAG:* ${salvo.tag}\n*PLACA:* ${salvo.placa}\n*KM INICIAL:* ${salvo.kmi}\n*KM FINAL:* ${kmf}\n--------------------------\n*COR DO SELO:* ${salvo.selo}\n*VALIDADE:* ${salvo.valSeloF}\n*LIMITE (+5D ÚTEIS):* ${salvo.dataLimite}\n*PRÓX. ÓLEO:* ${oleoFinal}\n--------------------------\n*OBS:* ${obsFinal || "Nenhuma"}`;
            
            try {
                await fetch(urlFinalizar, { mode: 'no-cors' });
                mostrarSucesso("Finalizado com Sucesso!", () => {
                    localStorage.removeItem("tjur_checklist_ativo");
                    window.location.href = "whatsapp://send?text=" + encodeURIComponent(msgF);
                });
            } catch(e) { alert("Erro ao finalizar!"); }
        };
    }
    // ...
</script>
