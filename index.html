<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CHECKLIST TELEJUR V7.0</title>
    <style>
        :root { --primary: #1a237e; --bg: #f4f7f9; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 10px; }
        .card { max-width: 480px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h3 { font-size: 11px; color: var(--primary); border-bottom: 1px solid #ddd; padding-bottom: 5px; text-transform: uppercase; margin-top: 15px; }
        label { display: block; font-weight: bold; font-size: 10px; margin-top: 8px; color: #555; }
        input, select, textarea { width: 100%; padding: 12px; margin-top: 3px; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; box-sizing: border-box; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn { width: 100%; padding: 18px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 20px; color: white; }
        .btn-saida { background: var(--primary); }
        .btn-chegada { background: #075e54; }
        .hidden { display: none; }
        input[readonly] { background: #f8f9fa; color: var(--primary); font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="text-align:center; color:var(--primary); margin-top:0">📋 CHECKLIST</h2>

    <div id="secaoSaida">
        <label>Motorista Responsável</label>
        <select id="nomeMot">
            <option value="">-- SELECIONE --</option>
            <option>FRANCIVALDO COSTA</option><option>ADRIANO NASCIMENTO</option>
            <option>REGINALDO</option><option>WALTER GONÇALVES</option><option>LAFAITE BATISTA</option>
        </select>

        <div class="grid">
            <div>
                <label>TAG</label>
                <select id="tag" onchange="puxarDados()">
                    <option value="">--</option>
                    <option>TJUR 04</option><option>TJUR 06</option><option>TJUR 07</option>
                    <option>TJUR 08</option><option>TJUR 09</option><option>TJUR 10</option><option>TJUR 13</option>
                </select>
            </div>
            <div><label>ID DO DIA</label><input type="text" id="condID" readonly placeholder="..."></div>
        </div>

        <div class="grid">
            <div><label>Veículo</label><input type="text" id="vei" readonly></div>
            <div><label>Placa</label><input type="text" id="pla" readonly></div>
        </div>

        <div class="grid">
            <div><label>KM Inicial</label><input type="number" id="kmi"></div>
            <div><label>Nº Trajeto</label><input type="number" id="numT" value="1"></div>
        </div>

        <h3>🛠️ MANUTENÇÃO / SELO</h3>
        <div class="grid">
            <div><label>Próx. Troca (KM)</label><input type="number" id="pxO"></div>
            <div><label>Tipo Óleo</label><select id="tpO"><option>5W30</option><option>10W40</option><option>15W40</option></select></div>
        </div>

        <div class="grid">
            <div><label>Cor Selo</label><select id="corS"><option>VERDE</option><option>AZUL</option><option>AMARELO</option><option>VERMELHO</option></select></div>
            <div><label>Validade Selo</label><input type="date" id="valS"></div>
        </div>

        <label>Observações</label>
        <textarea id="obs" rows="2"></textarea>

        <button onclick="enviar('SAIDA')" class="btn btn-saida" id="btnS">🚀 INICIAR SAÍDA</button>
    </div>

    <div id="secaoChegada" class="hidden">
        <div id="resumo" style="background:#fff9c4; padding:12px; border-radius:8px; font-size:13px; margin-bottom:15px; border:1px solid #fbc02d"></div>
        <label>KM Final de Chegada</label>
        <input type="number" id="kmf">
        <button onclick="enviar('CHEGADA')" class="btn btn-chegada" id="btnC">🏁 CONCLUIR CHEGADA</button>
    </div>
</div>

<script>
    const URL_API = "https://script.google.com/macros/s/AKfycbysx-IjZe54SWbmqwl2NYJEx_kiuVtakdtE-GFYE30UxwYYQhcvOuw5DViSwMixS_QIyQ/exec";

    function puxarDados() {
        const tag = document.getElementById('tag').value;
        if(!tag) return;
        document.getElementById('condID').value = "Buscando...";
        const s = document.createElement('script');
        s.src = `${URL_API}?acao=buscarDadosVei&tag=${encodeURIComponent(tag)}&callback=preencherCampos&t=${Date.now()}`;
        document.body.appendChild(s);
    }

    function preencherCampos(d) {
        document.getElementById('vei').value = d.veiculo || "";
        document.getElementById('pla').value = d.placa || "";
        document.getElementById('kmi').value = d.kmi || "";
        document.getElementById('condID').value = d.condutorSugerido || "CONDUTOR 1";
    }

    async function enviar(tipo) {
        const btn = tipo === 'SAIDA' ? document.getElementById('btnS') : document.getElementById('btnC');
        btn.disabled = true; btn.innerText = "⏳ GRAVANDO...";
        const agora = new Date();
        const dataH = agora.toLocaleDateString('pt-BR');
        const horaH = agora.toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'});
        let p = {};

        if(tipo === 'SAIDA') {
            p = {
                tipo: 'SAIDA', data: dataH, horaInic: horaH,
                tag: document.getElementById('tag').value,
                condutorID: document.getElementById('condID').value,
                nome: document.getElementById('nomeMot').value,
                kmi: document.getElementById('kmi').value,
                veiculo: document.getElementById('vei').value,
                placa: document.getElementById('pla').value,
                numT: document.getElementById('numT').value,
                proxOleo: document.getElementById('pxO').value,
                tipoOleo: document.getElementById('tpO').value,
                corSelo: document.getElementById('corS').value,
                valSelo: document.getElementById('valS').value,
                obs: document.getElementById('obs').value || "SEM OBS"
            };
            localStorage.setItem('tjur_v7', JSON.stringify(p));
        } else {
            const d = JSON.parse(localStorage.getItem('tjur_v7'));
            p = { ...d, tipo: 'CHEGADA', kmf: document.getElementById('kmf').value, horaFim: horaH };
        }

        await fetch(URL_API, { method: 'POST', mode: 'no-cors', body: JSON.stringify(p) });

        // MENSAGEM WHATSAPP COMPLETA CONFORME SOLICITADO
        let textoZap = "";
        if(tipo === 'SAIDA') {
            textoZap = `🚀 *SAÍDA TELEJUR*%0A*Data:* ${p.data}%0A*Tag:* ${p.tag}%0A*ID:* ${p.condutorID}%0A*Nome:* ${p.nome}%0A*KM Inicial:* ${p.kmi}%0A*Hora Início:* ${p.horaInic}%0A*Veículo:* ${p.veiculo}%0A*Placa:* ${p.placa}%0A*Nº Trajeto:* ${p.numT}%0A*Próx. Óleo:* ${p.proxOleo}%0A*Tipo Óleo:* ${p.tipoOleo}%0A*Selo:* ${p.corSelo} (${p.valSelo})%0A*Obs:* ${p.obs}`;
        } else {
            textoZap = `🏁 *CHEGADA TELEJUR*%0A*Tag:* ${p.tag}%0A*ID:* ${p.condutorID}%0A*KM Final:* ${p.kmf}%0A*Hora Fim:* ${p.horaFim}%0A*Status:* CONCLUÍDO`;
        }

        window.open(`https://api.whatsapp.com/send?text=${textoZap}`, '_blank');
        if(tipo === 'CHEGADA') localStorage.removeItem('tjur_v7');
        setTimeout(() => location.reload(), 1500);
    }

    window.onload = () => {
        const salvo = localStorage.getItem('tjur_v7');
        if(salvo) {
            const d = JSON.parse(salvo);
            document.getElementById('secaoSaida').classList.add('hidden');
            document.getElementById('secaoChegada').classList.remove('hidden');
            document.getElementById('resumo').innerHTML = `🚗 <b>${d.tag}</b> (${d.condutorID})<br>👤 ${d.nome} | 🕒 ${d.horaInic}`;
        }
    };
</script>
</body>
</html>
