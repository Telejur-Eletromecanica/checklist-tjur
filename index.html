<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Frota Telejur</title>
</head>
<body class="bg-slate-100 pb-10 font-sans text-slate-800">

    <header class="bg-blue-800 text-white shadow-lg sticky top-0 z-50">
        <div class="p-4 text-center border-b border-blue-700">
            <h1 class="font-bold text-lg uppercase tracking-wider">Frota Telejur</h1>
        </div>
        <div class="flex justify-around bg-blue-900">
            <button onclick="mudarTela('saida')" id="btn-saida" class="w-1/2 py-3 font-bold uppercase text-[10px] border-b-4 border-white opacity-100">1. SAÍDA</button>
            <button onclick="mudarTela('retorno')" id="btn-retorno" class="w-1/2 py-3 font-bold uppercase text-[10px] opacity-60">2. CHEGADA</button>
        </div>
    </header>

    <div class="max-w-md mx-auto p-4 space-y-4">
        
        <div id="tela-saida" class="space-y-4">
            <section class="bg-white rounded-2xl shadow-sm border p-4 space-y-4">
                
                <div class="grid grid-cols-3 gap-2">
                    <div class="col-span-1">
                        <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">TAG</label>
                        <select id="tag_select" onchange="preencherVeiculoPlaca()" class="w-full border-2 border-blue-50 rounded-xl p-3 font-black text-blue-700 bg-blue-50 outline-none">
                            <option value="" disabled selected>...</option>
                            <option value="TJUR 04">TJUR 04</option><option value="TJUR 06">TJUR 06</option>
                            <option value="TJUR 07">TJUR 07</option><option value="TJUR 08">TJUR 08</option>
                            <option value="TJUR 09">TJUR 09</option><option value="TJUR 10">TJUR 10</option>
                            <option value="TJUR 13">TJUR 13</option>
                        </select>
                    </div>
                    <div class="col-span-2">
                        <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">VEÍCULO / PLACA</label>
                        <input type="text" id="veiculo_resumo" readonly class="w-full bg-slate-50 border p-3 rounded-xl text-[10px] font-bold text-slate-500 uppercase">
                    </div>
                </div>

                <div class="grid grid-cols-4 gap-2">
                    <div class="col-span-1">
                        <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">ID</label>
                        <input type="text" id="id_visual" readonly placeholder="---" class="w-full border-2 border-slate-100 rounded-xl p-3 text-sm font-black text-center bg-slate-50 text-blue-800">
                    </div>
                    <div class="col-span-3">
                        <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">MOTORISTA</label>
                        <select id="motorista_select" onchange="atualizarID()" class="w-full border-2 border-slate-100 rounded-xl p-3 text-sm font-bold bg-white outline-none">
                            <option value="" disabled selected>Escolha o motorista...</option>
                            <option data-id="1" value="ADRIANO NASCIMENTO">Adriano Nascimento</option>
                            <option data-id="2" value="FRACIVALDO COSTA">Fracivaldo Costa</option>
                            <option data-id="3" value="JOELCINEI GUIMARÃES">Joelcinei Guimarães</option>
                            <option data-id="4" value="FRACINILDO TEIXEIRA">Fracinildo Teixeira</option>
                            <option data-id="5" value="EZEQUIEL SILVA">Ezequiel Silva</option>
                            <option data-id="6" value="REGINALDO PEREIRA">Reginaldo Pereira</option>
                            <option data-id="7" value="LAFAIETE BATISTA">Lafaiete Batista</option>
                            <option data-id="8" value="WALTER GONÇALVES">Walter Gonçalves</option>
                        </select>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="block text-[10px] font-bold text-green-600 uppercase mb-1">KM SAÍDA</label>
                        <input type="tel" id="km_inicial" oninput="calcularTroca()" placeholder="000.000" class="w-full border-2 border-green-100 rounded-xl p-3 text-xl font-black text-green-700 text-center outline-none">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">TIPO DE ÓLEO</label>
                        <select id="tipo_oleo" class="w-full border-2 border-slate-100 rounded-xl p-3 text-[10px] font-bold">
                            <option>5w30 (Sintético)</option><option>10w40 (Semi-sint)</option><option>15w40 (Mineral)</option>
                        </select>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">PRÓX. TROCA</label>
                        <input type="tel" id="km_troca" oninput="calcularTroca()" placeholder="000.000" class="w-full border-2 border-slate-100 rounded-xl p-3 text-xl font-bold text-center">
                    </div>
                    <div class="flex flex-col justify-end">
                        <label class="block text-[10px] font-bold text-blue-900 uppercase mb-1">RESTA</label>
                        <div id="resta_box" class="bg-blue-50 border border-blue-100 rounded-xl p-3 text-center text-xs font-black text-blue-300">--- KM</div>
                    </div>
                </div>

                <button onclick="enviarDados('inicio')" class="w-full bg-green-600 text-white font-black py-4 rounded-xl shadow-lg uppercase">Registrar Saída</button>
            </section>
        </div>

        <div id="tela-retorno" class="hidden space-y-4">
            <section class="bg-white rounded-2xl shadow-md border p-4 space-y-4">
                <label class="block text-[10px] font-bold text-blue-700 uppercase text-center">KM CHEGADA</label>
                <input type="tel" id="km_final" oninput="calcularTroca()" placeholder="000.000" class="w-full border-2 border-blue-100 rounded-xl p-3 text-3xl font-black text-blue-800 text-center outline-none">
                <textarea id="obs" placeholder="Observações..." class="w-full border rounded-xl p-3 text-sm h-24 bg-slate-50 uppercase"></textarea>
                <button onclick="enviarDados('fim')" class="w-full bg-blue-800 text-white font-black py-5 rounded-2xl shadow-xl uppercase">Finalizar Trajeto</button>
            </section>
        </div>
    </div>

    <script>
        const scriptURL = "https://script.google.com/macros/s/AKfycbysx-IjZe54SWbmqwl2NYJEx_kiuVtakdtE-GFYE30UxwYYQhcvOuw5DViSwMixS_QIyQ/exec";
        const frota = { "TJUR 04": { v: "Sky munck", p: "QFA1I50" }, "TJUR 06": { v: "Saveiro furgão", p: "QUJ3E02" }, "TJUR 07": { v: "Sky munck", p: "RWR3C75" }, "TJUR 08": { v: "Caminhonete hilux", p: "QVE5H48" }, "TJUR 09": { v: "Sky munck", p: "RXC6J04" }, "TJUR 10": { v: "Caminhonete", p: "PHU1I37" }, "TJUR 13": { v: "Caminhonete", p: "QVD4I38" } };

        function formatarTexto(t) { return t ? t.toLowerCase().split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ') : "S/o"; }
        
        function preencherVeiculoPlaca() { 
            const f = frota[document.getElementById('tag_select').value]; 
            if(f) document.getElementById('veiculo_resumo').value = `${f.v} | ${f.p}`.toUpperCase(); 
        }

        function atualizarID() {
            const opt = document.getElementById('motorista_select').options[document.getElementById('motorista_select').selectedIndex];
            document.getElementById('id_visual').value = opt.getAttribute('data-id');
        }

        function mudarTela(t) {
            document.getElementById('tela-saida').classList.toggle('hidden', t !== 'saida');
            document.getElementById('tela-retorno').classList.toggle('hidden', t !== 'retorno');
            document.getElementById('btn-saida').className = t === 'saida' ? "w-1/2 py-3 font-bold uppercase text-[10px] border-b-4 border-white opacity-100" : "w-1/2 py-3 font-bold uppercase text-[10px] opacity-60";
            document.getElementById('btn-retorno').className = t === 'retorno' ? "w-1/2 py-3 font-bold uppercase text-[10px] border-b-4 border-white opacity-100" : "w-1/2 py-3 font-bold uppercase text-[10px] opacity-60";
        }

        function calcularTroca() {
            const ini = parseFloat(document.getElementById('km_inicial').value) || 0, 
                  fim = parseFloat(document.getElementById('km_final').value) || 0, 
                  tro = parseFloat(document.getElementById('km_troca').value) || 0;
            const ref = fim > 0 ? fim : ini;
            if (ref > 0 && tro > 0) {
                const r = tro - ref;
                document.getElementById('resta_box').innerText = r <= 0 ? "Vencido!" : r + " KM";
            }
        }

        async function enviarDados(tipo) {
            const btn = event.target; btn.disabled = true; btn.innerText = "GRAVANDO...";
            const opt = document.getElementById('motorista_select').options[document.getElementById('motorista_select').selectedIndex];
            const agora = new Date();
            const hora = agora.toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'});

            const dados = {
                tipo: tipo,
                tag: document.getElementById('tag_select').value,
                id_motorista: "Condutor " + opt.getAttribute('data-id'),
                nome: formatarTexto(opt.value),
                km_inicial: document.getElementById('km_inicial').value,
                km_final: document.getElementById('km_final').value,
                veiculo: formatarTexto(document.getElementById('veiculo_resumo').value.split('|')[0].trim()),
                placa: document.getElementById('veiculo_resumo').value.split('|')[1]?.trim() || "",
                tipo_oleo: formatarTexto(document.getElementById('tipo_oleo').value),
                prox_oleo: document.getElementById('km_troca').value,
                resta_troca: document.getElementById('resta_box').innerText,
                obs: formatarTexto(document.getElementById('obs').value),
                data: agora.toLocaleDateString('pt-BR'),
                hora_inicio: tipo === 'inicio' ? hora : "",
                hora_fim: tipo === 'fim' ? hora : ""
            };

            try {
                await fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(dados)});
                const sep = "--------------------------";
                const zap = `${tipo === 'inicio' ? '🚀 *SAÍDA*' : '🏁 *CHEGADA*'}\n${sep}\n🆔 *ID:* ${dados.id_motorista}\n👤 *MOTORISTA:* ${dados.nome}\n🚘 *VEÍCULO:* ${dados.veiculo} (${dados.tag})\n🆔 *PLACA:* ${dados.placa}\n\n${sep}\n📍 *INFO*\n🕒 *HORA:* ${hora}\n*KM:* ${tipo === 'inicio' ? dados.km_inicial : dados.km_final}\n\n${sep}\n🛠️ *MANUTENÇÃO*\n🛢️ *ÓLEO:* ${dados.tipo_oleo}\n⚠️ *RESTA:* ${dados.resta_troca}\n\n${sep}\n📝 *OBS:* ${dados.obs}`;
                window.open(`https://wa.me/5593981162453?text=${encodeURIComponent(zap)}`);
                if(tipo === 'fim') location.reload(); else mudarTela('retorno');
            } catch(e) { alert("Erro!"); btn.disabled = false; }
        }
    </script>
</body>
</html>
