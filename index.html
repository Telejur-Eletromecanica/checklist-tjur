<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TELEJUR v10.8.2</title>
    <style>
        :root { --primary: #1a237e; --danger: #c62828; --success: #2e7d32; }
        body { font-family: sans-serif; background: #f0f4f8; padding: 10px; margin: 0; }
        .card { max-width: 450px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .grid-status { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 15px; }
        .v-box { padding: 8px; border-radius: 8px; text-align: center; font-size: 11px; font-weight: bold; border: 1px solid #ddd; min-height: 45px; display: flex; flex-direction: column; justify-content: center; }
        .livre { background: #e8f5e9; color: var(--success); }
        .ocupado { background: #ffebee; color: var(--danger); }
        .bloqueado { background: #f5f5f5; color: #999; border-style: dashed; }
        label { font-weight: bold; font-size: 11px; color: #555; display: block; margin-top: 12px; text-transform: uppercase; }
        input, select { width: 100%; padding: 12px; margin-top: 4px; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; box-sizing: border-box; }
        .btn { width: 100%; padding: 18px; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 15px; background: var(--primary); color: white; }
        .readonly { background: #f1f1f1 !important; color: #444; font-weight: bold; }
        .status-oleo { font-size: 13px; padding: 10px; border-radius: 8px; margin-top: 8px; font-weight: bold; text-align: center; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="text-align:center; color:var(--primary); margin:0;">TELEJUR v10.8.2</h2>
    <p id="txtSync" style="text-align:center; font-size:10px; color:#888;">Conectando...</p>
    
    <div id="painel" class="grid-status"></div>

    <div id="formContainer">
        <label>Motorista</label>
        <select id="nomeMot" onchange="sync();">
            <option value="">-- SELECIONE --</option>
            <option value="ADRIANO NASCIMENTO">ADRIANO NASCIMENTO</option>
            <option value="FRANCIVALDO COSTA">FRANCIVALDO COSTA</option>
            <option value="FRANCINILDO TEXEIRA">FRANCINILDO TEXEIRA</option>
            <option value="JOELCINEI GUIMARAES">JOELCINEI GUIMARAES</option>
            <option value="REGINALDO">REGINALDO</option>
            <option value="WALTER GONÇALVES">WALTER GONÇALVES</option>
            <option value="LAFAITE BATISTA">LAFAITE BATISTA</option>
            <option value="MIRIELLY">MIRIELLY</option>
            <option value="EZEQUIEL">EZEQUIEL</option>
        </select>

        <label>Veículo (TAG)</label>
        <select id="tag" onchange="buscarDados()">
            <option value="">-- SELECIONE --</option>
            <option value="TJUR 04">TJUR 04</option><option value="TJUR 06">TJUR 06</option>
            <option value="TJUR 07">TJUR 07</option><option value="TJUR 08">TJUR 08</option>
            <option value="TJUR 09">TJUR 09</option><option value="TJUR 10">TJUR 10</option>
            <option value="TJUR 13">TJUR 13</option>
        </select>
        
        <input type="text" id="veiculoInfo" class="readonly" readonly placeholder="Veículo | Placa">
        <input type="text" id="idMot" class="readonly" readonly placeholder="ID Condutor">

        <label>Cor do Selo / Validade</label>
        <div style="display:flex; gap:5px;">
            <select id="corSelo"><option value="VERDE">VERDE</option><option value="VERMELHO">VERMELHO</option><option value="AZUL">AZUL</option><option value="AMARELO">AMARELO</option></select>
            <input type="date" id="validadeSelo">
        </div>

        <label>KM Inicial</label>
        <input type="number" id="kmi" inputmode="numeric" oninput="calcOleo()" placeholder="KM Atual">

        <label id="labelOleo">Próxima Troca Óleo</label>
        <input type="text" id="proxOleo" oninput="calcOleo()" placeholder="KM ou Data">
        <div id="statusOleoVisual" class="status-oleo" style="display:none"></div>

        <label>Tipo de Óleo</label>
        <select id="tipoOleo">
            <option value="15W40">15W40</option><option value="5W30">5W30</option><option value="10W40">10W40</option><option value="OUTRO">OUTRO</option>
        </select>

        <button onclick="registrarEEnviar()" class="btn">Registrar e Enviar WhatsApp</button>
    </div>

    <div id="telaAtiva" style="display:none">
        <div id="infoViagem" style="background:#e8f5e9; padding:15px; border-radius:10px; border-left:5px solid var(--success); margin-bottom:15px"></div>
        <label>KM Final</label>
        <input type="number" id="kmf" inputmode="numeric" placeholder="Digite o KM de chegada">
        <button onclick="finalizar()" class="btn" style="background:#444">Finalizar Trajeto</button>
    </div>
</div>

<script>
    const URL = "https://script.google.com/macros/s/AKfycbysx-IjZe54SWbmqwl2NYJEx_kiuVtakdtE-GFYE30UxwYYQhcvOuw5DViSwMixS_QIyQ/exec";
    const dataH = new Date().toLocaleDateString('pt-BR');
    const limpar = (v) => Number(v.toString().replace(/\D/g, ''));

    function calcOleo() {
        const k = limpar(document.getElementById("kmi").value), p = limpar(document.getElementById("proxOleo").value);
        const div = document.getElementById("statusOleoVisual");
        if(!p) { div.style.display="none"; return; }
        div.style.display="block";
        const r = p - k;
        div.innerText = r < 0 ? "🚨 VENCIDO!" : `✅ FALTAM ${r} KM`;
        div.className = "status-oleo " + (r <= 500 ? "status-danger" : "status-ok");
    }

    async function sync() {
        window.cb_sync = (res) => {
            const tags = ["TJUR 04", "TJUR 06", "TJUR 07", "TJUR 08", "TJUR 09", "TJUR 10", "TJUR 13"];
            const mot = document.getElementById('nomeMot').value;
            const skyAuth = ["REGINALDO", "LAFAITE BATISTA", "WALTER GONÇALVES"];
            document.getElementById('painel').innerHTML = tags.map(t => {
                const o = res.ocupados[t], isSky = ["TJUR 04", "TJUR 07", "TJUR 09"].includes(t);
                const block = (isSky && !skyAuth.includes(mot));
                return `<div class="v-box ${o?'ocupado':(block?'bloqueado':'livre')}"><b>${t}</b>${o?'🔴 '+o.nome.split(' ')[0]:(block?'🔒 BLOQ':'🟢 LIVRE')}</div>`;
            }).join('');
            document.getElementById('txtSync').innerText = "Sincronizado: " + new Date().toLocaleTimeString();
        };
        const s = document.createElement('script'); s.src = `${URL}?acao=statusGeral&data=${dataH}&callback=cb_sync&_=${Date.now()}`;
        document.body.appendChild(s);
    }

    async function buscarDados() {
        const t = document.getElementById("tag").value, n = document.getElementById("nomeMot").value;
        if(!t || !n) return;
        window.cb_mot = (d) => {
            document.getElementById("veiculoInfo").value = `${d.veiculo} | ${d.placa}`;
            document.getElementById("idMot").value = d.id;
            const campo = document.getElementById("proxOleo");
            campo.type = d.veiculo.includes("SKY") ? "date" : "number";
            campo.value = "";
        };
        const s = document.createElement('script'); s.src = `${URL}?acao=buscarDadosMotorista&tag=${t}&nome=${n}&callback=cb_mot`;
        document.body.appendChild(s);
    }

    function registrarEEnviar() {
        const d = {
            data: dataH, tag: document.getElementById("tag").value, id: document.getElementById("idMot").value,
            nome: document.getElementById("nomeMot").value, kmi: document.getElementById("kmi").value,
            oleo: document.getElementById("proxOleo").value, corSelo: document.getElementById("corSelo").value,
            tipoOleo: document.getElementById("tipoOleo").value, validadeSelo: document.getElementById("validadeSelo").value,
            horaI: new Date().toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'}), acao: "registrar", callback: "cb_reg"
        };
        if(!d.tag || !d.kmi || !d.nome || !d.oleo) return alert("Preencha tudo!");
        
        window.cb_reg = (res) => {
            d.n = res.n; d.placa = res.placa; d.v = res.v;
            localStorage.setItem("jornada_TJUR", JSON.stringify(d));
            const msg = window.encodeURIComponent(`📌 *INÍCIO DE TRAJETO*\n🚗 *Veículo:* ${d.tag} (${d.v})\n🆔 *Motorista:* ${d.nome}\n🔢 *KM Inicial:* ${d.kmi}\n🕒 *Saída:* ${d.horaI}\n📅 *Data:* ${d.data}`);
            window.open(`https://api.whatsapp.com/send?text=${msg}`);
            location.reload();
        };
        const s = document.createElement('script'); s.src = `${URL}?${new URLSearchParams(d)}`;
        document.body.appendChild(s);
    }

    function finalizar() {
        const d = JSON.parse(localStorage.getItem("jornada_TJUR")), kf = document.getElementById("kmf").value;
        if(!kf) return alert("Digite o KM Final!");
        const hf = new Date().toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'});
        window.cb_fin = () => {
            const msg = window.encodeURIComponent(`🏁 *FIM DE TRAJETO*\n🚗 *Veículo:* ${d.tag}\n🆔 *Motorista:* ${d.nome}\n🔢 *KM Final:* ${kf}\n🕒 *Chegada:* ${hf}`);
            localStorage.removeItem("jornada_TJUR");
            window.open(`https://api.whatsapp.com/send?text=${msg}`);
            location.reload();
        };
        const s = document.createElement('script'); s.src = `${URL}?acao=finalizar&tag=${d.tag}&kmf=${limpar(kf)}&horaF=${hf}&callback=cb_fin`;
        document.body.appendChild(s);
    }

    window.onload = () => { 
        sync(); 
        const trip = localStorage.getItem("jornada_TJUR");
        if(trip) {
            document.getElementById("formContainer").style.display = "none";
            document.getElementById("telaAtiva").style.display = "block";
            const d = JSON.parse(trip);
            document.getElementById("infoViagem").innerHTML = `<b>TRAJETO EM CURSO</b><br>🚗 ${d.tag} - ${d.nome}<br>🕒 Saída: ${d.horaI}`;
        }
    };
</script>
</body>
</html>
