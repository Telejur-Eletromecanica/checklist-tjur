<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TELEJUR JURUTI v17.0</title>
    <style>
        :root { --navy: #0d47a1; --green: #1b5e20; --red: #b71c1c; --orange: #e65100; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; padding: 10px; }
        .container { max-width: 480px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.15); }
        .header { text-align: center; border-bottom: 3px solid var(--navy); margin-bottom: 15px; padding-bottom: 10px; }
        .header h1 { font-size: 18px; color: var(--navy); margin: 0; }
        #syncStatus { font-size: 11px; color: #7f8c8d; display: block; margin-top: 5px; cursor: pointer; }
        
        .frota-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; margin: 15px 0; }
        .v-tag { padding: 8px 2px; border-radius: 6px; text-align: center; font-size: 10px; font-weight: bold; border: 1px solid #ddd; }
        .v-livre { background: #e8f5e9; color: var(--green); }
        .v-trajeto { background: #ffebee; color: var(--red); border-color: #ffcdd2; }
        .v-block { background: #f5f5f5; color: #bdc3c7; }

        label { font-size: 11px; font-weight: bold; display: block; margin-top: 10px; color: var(--navy); }
        input, select, textarea { width: 100%; padding: 12px; margin-top: 5px; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; box-sizing: border-box; }
        input:read-only { background: #eee; color: #777; }

        .btn { width: 100%; padding: 18px; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; color: white; margin-top: 15px; cursor: pointer; }
        .btn-ini { background: var(--green); }
        .btn-fim { background: var(--navy); }
        .btn:disabled { background: #ccc !important; cursor: not-allowed; }

        #alertaOleo { margin-top: 10px; padding: 10px; border-radius: 8px; font-size: 13px; font-weight: bold; text-align: center; display: none; border: 1px solid; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>TELEJUR ELETROMECÂNICA</h1>
        <p style="margin:0; font-size:12px; font-weight:bold;">Checklist Unidade Juruti</p>
        <span id="syncStatus" onclick="location.reload()">⏳ Sincronizando...</span>
    </div>

    <div id="grid" class="frota-grid"></div>

    <label>Condutor</label>
    <select id="mot" onchange="regras()">
        <option value="">-- SELECIONE --</option>
        <option value="ADRIANO NASCIMENTO">ADRIANO NASCIMENTO</option>
        <option value="FRANCIVALDO COSTA">FRANCIVALDO COSTA</option>
        <option value="FRANCINILDO TEXEIRA">FRANCINILDO TEXEIRA</option>
        <option value="JOELCINEI GUIMARAES">JOELCINEI GUIMARAES</option>
        <option value="REGINALDO">REGINALDO</option>
        <option value="WALTER GONÇALVES">WALTER GONÇALVES</option>
        <option value="LAFAITE BATISTA">LAFAITE BATISTA</option>
        <option value="MIRIELLY">MIRIELLY</option>
        <option value="EZEQUIEL">EZEQUIEL</option>
    </select>

    <label>TAG do Veículo</label>
    <select id="tag" onchange="carregar()"></select>

    <div style="display:flex; gap:8px;">
        <div style="flex:2"><label>Veículo</label><input id="v_n" readonly></div>
        <div style="flex:1"><label>Placa</label><input id="v_p" readonly></div>
    </div>

    <label>ID Operação (Dia)</label><input id="idC" readonly>
    
    <label id="lKm">KM/Horas</label>
    <input type="text" id="km" placeholder="Ex: 12500" oninput="validarNumero(this); alertarOleo()">

    <label id="lOl">Próxima Revisão</label>
    <input id="oleo" oninput="alertarOleo()">
    <div id="alertaOleo"></div>

    <div style="display:flex; gap:8px;">
        <div style="flex:1"><label>Selo</label><select id="cor"><option>VERDE</option><option>VERMELHO</option></select></div>
        <div style="flex:1"><label>Validade</label><input type="date" id="val"></div>
    </div>

    <label>Observações</label><textarea id="obs" rows="2"></textarea>

    <button id="bI" onclick="enviar('registrar')" class="btn btn-ini" disabled>INICIAR TRAJETO</button>
    <button id="bF" onclick="enviar('finalizar')" class="btn btn-fim" disabled>FINALIZAR TRAJETO</button>
</div>

<script>
    const API = "https://script.google.com/macros/s/AKfycbysx-IjZe54SWbmqwl2NYJEx_kiuVtakdtE-GFYE30UxwYYQhcvOuw5DViSwMixS_QIyQ/exec";
    const HOJE = new Date().toLocaleDateString('pt-BR');
    let DB = { ocupados: {}, frota: {}, proximoID: "" };

    function chamar(p) {
        const s = document.createElement('script');
        s.src = `${API}?${new URLSearchParams(p).toString()}`;
        document.body.appendChild(s);
    }

    function validarNumero(input) {
        // Remove pontos e vírgulas para o cálculo não quebrar
        input.value = input.value.replace(/[.,]/g, "");
    }

    window.onload = () => chamar({ acao: "statusGeral", data: HOJE, callback: "onSync" });

    window.onSync = (r) => {
        DB = r;
        document.getElementById('syncStatus').innerText = "✅ Conectado: " + new Date().toLocaleTimeString();
        regras();
    };

    function regras() {
        const m = document.getElementById('mot').value;
        const sel = document.getElementById('tag');
        const g = document.getElementById('grid');
        const muncks = ["TJUR 04", "TJUR 07", "TJUR 09"];
        const auth = ["LAFAITE BATISTA", "WALTER GONÇALVES", "REGINALDO"];
        
        sel.innerHTML = '<option value="">-- SELECIONE --</option>';
        g.innerHTML = '';

        Object.keys(DB.frota).forEach(t => {
            const ocup = DB.ocupados[t];
            const lock = muncks.includes(t) && !auth.includes(m) && m !== "";
            g.innerHTML += `<div class="v-tag ${ocup?'v-trajeto':(lock?'v-block':'v-livre')}">${t}<br>${ocup?'EM USO':(lock?'BLOQUEIO':'LIVRE')}</div>`;
            const o = document.createElement('option');
            o.value = t; o.text = (lock?"🔒 ":(ocup?"🚩 ":"")) + t;
            o.disabled = lock || (ocup && ocup.nome !== m && m !== "");
            sel.appendChild(o);
        });
    }

    function carregar() {
        const t = document.getElementById('tag').value;
        if(!t) return;
        const info = DB.frota[t];
        const ocup = DB.ocupados[t];
        
        document.getElementById('v_n').value = info.v;
        document.getElementById('v_p').value = info.p;
        document.getElementById('oleo').type = info.tipo === "DATA" ? "date" : "text";
        document.getElementById('lOl').innerText = "Próxima Revisão (" + info.tipo + ")";

        if(ocup) {
            document.getElementById('idC').value = ocup.id;
            document.getElementById('oleo').value = ocup.oleo;
            document.getElementById('lKm').innerText = "KM/HORAS FINAL";
            document.getElementById('bI').disabled = true;
            document.getElementById('bF').disabled = false;
        } else {
            document.getElementById('idC').value = DB.proximoID;
            document.getElementById('oleo').value = DB.ultimosOleos[t] || "";
            document.getElementById('lKm').innerText = "KM/HORAS INICIAL";
            document.getElementById('bI').disabled = false;
            document.getElementById('bF').disabled = true;
        }
    }

    function alertarOleo() {
        const t = document.getElementById('tag').value;
        if(!t || DB.frota[t].tipo !== "KM") return document.getElementById('alertaOleo').style.display="none";
        
        const kmVal = parseInt(document.getElementById('km').value) || 0;
        const oleoVal = parseInt(document.getElementById('oleo').value.replace(/[.,]/g, "")) || 0;
        const alertBox = document.getElementById('alertaOleo');

        if(kmVal > 0 && oleoVal > 0) {
            const saldo = oleoVal - kmVal;
            alertBox.style.display = "block";
            alertBox.style.background = saldo > 0 ? "#e8f5e9" : "#ffebee";
            alertBox.style.color = saldo > 0 ? "green" : "red";
            alertBox.innerText = saldo > 0 ? `Faltam ${saldo} KM para revisão` : `ALERTA: Revisão vencida há ${Math.abs(saldo)} KM`;
        }
    }

    function enviar(a) {
        const t = document.getElementById('tag').value;
        const m = document.getElementById('mot').value;
        const k = document.getElementById('km').value;
        if(!t || !m || !k) return alert("Preencha Motorista, TAG e KM!");

        const btn = document.getElementById(a === 'registrar' ? 'bI' : 'bF');
        btn.disabled = true; btn.innerText = "⏳ PROCESSANDO...";

        const dados = {
            acao: a, tag: t, nome: m, id: document.getElementById('idC').value,
            kmi: k, kmf: k, oleo: document.getElementById('oleo').value,
            corSelo: document.getElementById('cor').value, valSelo: document.getElementById('val').value,
            obs: document.getElementById('obs').value || "Checklist OK",
            data: HOJE, trajeto: DB.ocupados[t] ? DB.ocupados[t].trajetoNum : ((DB.contagem[t] || 0) + 1 + "º Trajeto"),
            horaI: new Date().toLocaleTimeString(), horaF: new Date().toLocaleTimeString(), callback: "onFim"
        };

        window.onFim = (r) => {
            if(r.res === "erro") { alert("Erro ao salvar!"); btn.disabled = false; return; }
            
            // FORMATO WHATSAPP MELHORADO
            const msg = `*TELEJUR JURUTI - CHECKLIST*\n` +
                        `--------------------------------\n` +
                        `📌 *STATUS:* ${a.toUpperCase()}\n` +
                        `👤 *CONDUTOR:* ${m}\n` +
                        `🆔 *OPERAÇÃO:* ${dados.id}\n` +
                        `🏷️ *TAG:* ${t} (${document.getElementById('v_n').value})\n` +
                        `🔢 *KM/HORAS:* ${k}\n` +
                        `⌛ *REVISÃO:* ${dados.oleo}\n` +
                        `📝 *OBS:* ${dados.obs}\n` +
                        `--------------------------------`;
            
            window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(msg)}`);
            location.reload();
        };
        chamar(dados);
    }
</script>
</body>
</html>
