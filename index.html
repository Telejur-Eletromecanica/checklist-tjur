<fieldset>
  <legend>Dados do Veículo</legend>
  <div class="grid-2">
    <div><label>TAG</label><select id="tagSel" onchange="atualizarInterface()"></select></div>
    <div><label>ID Operação</label><input id="idOp" readonly></div>
  </div>
  <div class="grid-2">
    <div><label>Placa</label><input id="v_placa" readonly></div>
    <div><label>Veículo</label><input id="v_nome" readonly></div>
  </div>
</fieldset>

<fieldset id="secaoSaida">
  <legend>Registro de Saída</legend>
  <label>Condutor</label>
  <select id="nomeMot">...</select>
  
  <div class="grid-2">
    <div><label>KM Inicial / Horas</label><input type="number" id="kmi"></div>
    <div><label>Hora Início</label><input id="horaI" readonly></div>
  </div>
  
  <label>Número do Trajeto / Destino</label>
  <input id="trajeto" placeholder="Ex: Mina, Porto, Alcoa...">
</fieldset>

<fieldset>
  <legend>Manutenção e Selos</legend>
  <label>Próxima Troca de Óleo / Revisão</label>
  <input id="oleoInput">
  
  <div class="grid-2">
    <div><label>Validade Selo</label><input id="valSelo" placeholder="MM/AAAA"></div>
    <div><label>Cor do Selo</label><input id="corSelo" placeholder="Verde, Azul..."></div>
  </div>
  <label>Tipo de Óleo Sugerido</label>
  <input id="tipoOleo" readonly>
</fieldset>

<fieldset id="secaoRetorno" class="hidden">
  <legend>Registro de Retorno</legend>
  <div class="grid-2">
    <div><label>KM Final</label><input type="number" id="kmf"></div>
    <div><label>Hora Fim</label><input id="horaF" readonly></div>
  </div>
  <label>Observações</label>
  <textarea id="obs" rows="2"></textarea>
</fieldset>
