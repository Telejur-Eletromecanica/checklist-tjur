<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TELEJUR ELETROMECÂNICA</title>

<style>
body {
    font-family: Arial;
    background:#0d1117;
    color:white;
    margin:0;
}

header {
    text-align:center;
    padding:15px;
    background:#161b22;
}

.topbar {
    display:flex;
    justify-content:space-around;
    background:#161b22;
    padding:10px;
}

button {
    padding:10px;
    border:none;
    border-radius:8px;
    background:#238636;
    color:white;
    font-weight:bold;
}

.page { display:none; padding:10px; }
.active { display:block; }

.grid {
 display:grid;
 grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
 gap:10px;
}

.card {
 background:#161b22;
 padding:10px;
 border-radius:10px;
 border-left:5px solid #2ecc71;
}

.ocupado { border-left-color:red; }

input, select {
 width:100%;
 padding:8px;
 margin-top:5px;
 margin-bottom:10px;
 border-radius:8px;
 border:none;
}
</style>
</head>

<body>

<header>
<h2>TELEJUR ELETROMECÂNICA</h2>
<p>Checklist de Veículos - Unidade Juruti</p>
</header>

<div class="topbar">
  <button onclick="show('checklist')">📋 Checklist</button>
  <button onclick="show('dashboard')">📊 Dashboard</button>
  <button onclick="show('uso')">🚗 Em Uso</button>
</div>

<!-- CHECKLIST -->
<div id="checklist" class="page active">

<h3>📋 Checklist</h3>

<input id="motorista" placeholder="Nome do Motorista">
<input id="id" placeholder="ID Condutor">

<select id="tag" onchange="autoPreencher()">
<option value="">Selecione Tag</option>
<option>TJUR 04</option>
<option>TJUR 06</option>
<option>TJUR 07</option>
<option>TJUR 08</option>
<option>TJUR 09</option>
<option>TJUR 10</option>
<option>TJUR 13</option>
</select>

<input id="veiculo" placeholder="Veículo" readonly>
<input id="placa" placeholder="Placa" readonly>

<input id="trajeto" placeholder="Número do Trajeto">
<input id="km" placeholder="KM Inicial">

<input id="oleo" placeholder="Próxima troca óleo">
<input id="tipo_oleo" placeholder="Tipo óleo">
<input id="selo" placeholder="Cor selo">
<input id="validade" type="date">
<input id="obs" placeholder="Observação">

<button onclick="registrar()">🚀 Iniciar Trajeto</button>
<button onclick="finalizar()">✅ Finalizar Trajeto</button>

</div>

<!-- DASHBOARD -->
<div id="dashboard" class="page">
<h3>📊 Dashboard</h3>
<div class="grid" id="cards"></div>
</div>

<!-- EM USO -->
<div id="uso" class="page">
<h3>🚗 Veículos em Uso</h3>
<div id="lista"></div>
</div>

<script>

const URL = "https://script.google.com/macros/s/AKfycbysx-IjZe54SWbmqwl2NYJEx_kiuVtakdtE-GFYE30UxwYYQhcvOuw5DViSwMixS_QIyQ/exec";

// 🚗 VEÍCULOS
const frota = {
 "TJUR 04":{v:"SKY MUNCK",p:"QFA1I50"},
 "TJUR 06":{v:"SAVEIRO FURGÃO",p:"QUJ3E02"},
 "TJUR 07":{v:"SKY MUNCK",p:"RWR3C75"},
 "TJUR 08":{v:"HILUX",p:"QVE5H48"},
 "TJUR 09":{v:"SKY MUNCK",p:"RXC6J04"},
 "TJUR 10":{v:"CAMINHONETE",p:"PHU1I37"},
 "TJUR 13":{v:"CAMINHONETE",p:"QVD4I38"}
};

// AUTO PREENCHER
function autoPreencher(){
 let tag = document.getElementById("tag").value;
 document.getElementById("veiculo").value = frota[tag]?.v || "";
 document.getElementById("placa").value = frota[tag]?.p || "";
}

// TROCA DE TELA
function show(p){
 document.querySelectorAll(".page").forEach(el=>el.classList.remove("active"));
 document.getElementById(p).classList.add("active");
}

// 🚀 INICIAR
function registrar(){

 let data = new Date().toLocaleDateString();
 let hora = new Date().toLocaleTimeString();

 let params = new URLSearchParams({
  acao:"registrar",
  data,
  horaI:hora,
  tag:tag.value,
  nome:motorista.value,
  id:id.value,
  kmi:km.value
 });

 fetch(URL + "?" + params);

 alert("Trajeto iniciado!");
 enviarWhatsApp("inicio");
}

// ✅ FINALIZAR
function finalizar(){

 let hora = new Date().toLocaleTimeString();

 let params = new URLSearchParams({
  acao:"finalizar",
  tag:tag.value,
  kmf:km.value,
  horaF:hora
 });

 fetch(URL + "?" + params);

 alert("Trajeto finalizado!");
 enviarWhatsApp("fim");
}

// 📱 WHATSAPP
function enviarWhatsApp(tipo){

 let msg = "";

 if(tipo=="inicio"){
  msg = `CHECKLIST INICIAL
👤 ${motorista.value}
🏷️ ${tag.value}
🚚 ${veiculo.value} (${placa.value})
📏 KM: ${km.value}`;
 }

 if(tipo=="fim"){
  msg = `CHECKLIST FINALIZADO
🏷️ ${tag.value}
👤 ${motorista.value}
📏 KM Final: ${km.value}`;
 }

 let texto = encodeURIComponent(msg);

 window.open(`https://wa.me/5593981162453?text=${texto}`);
}

// DASHBOARD
function loadDash(){
 fetch(URL+"?acao=statusGeral")
 .then(r=>r.json())
 .then(res=>{
  let div=document.getElementById("cards");
  div.innerHTML="";

  Object.keys(frota).forEach(tag=>{
   let o=res.ocupados[tag];
   let classe=o?"ocupado":"";
   let status=o?"🔴 EM USO":"🟢 LIVRE";

   div.innerHTML+=`
   <div class="card ${classe}">
   <b>${tag}</b><br>
   ${frota[tag].v}<br>
   ${frota[tag].p}<hr>
   ${status}
   </div>`;
  });
 });
}

// EM USO
function loadUso(){
 fetch(URL+"?acao=statusGeral")
 .then(r=>r.json())
 .then(res=>{
  let div=document.getElementById("lista");
  div.innerHTML="";

  Object.keys(res.ocupados).forEach(tag=>{
   let o=res.ocupados[tag];

   div.innerHTML+=`
   <div class="card ocupado">
   <b>${tag}</b><br>
   👤 ${o.nome}<br>
   📏 ${o.kmi}
   </div>`;
  });
 });
}

setInterval(()=>{
 loadDash();
 loadUso();
},5000);

loadDash();
loadUso();

</script>

</body>
</html>
