<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TELEJUR v4.0 - COMPLETO</title>
    <style>
        :root { --primary: #1a237e; --success: #25d366; --bg: #f0f4f8; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 10px; font-size: 14px; }
        .card { max-width: 500px; margin: auto; background: white; padding: 15px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h3 { font-size: 13px; color: var(--primary); border-bottom: 1px solid #ddd; padding-bottom: 5px; margin: 15px 0 5px 0; text-transform: uppercase; }
        label { display: block; font-weight: bold; font-size: 10px; margin-top: 8px; color: #666; }
        input, select, textarea { width: 100%; padding: 10px; margin-top: 3px; border-radius: 6px; border: 1px solid #ccc; font-size: 15px; box-sizing: border-box; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .btn { width: 100%; padding: 16px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 15px; color: white; background: var(--success); }
        .hidden { display: none; }
        input[readonly] { background: #f1f3f4; color: #555; }
        #restaTroca { font-size: 20px; color: red; text-align: center; border: 2px solid red; background: #fff1f1; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="text-align:center; margin:0 0 10px 0; color:var(--primary)">📋 CHECKLIST SISTEMA</h2>
    
    <div id="secaoInicial">
        <h3>👤 MOTORISTA E VEÍCULO</h3>
        <label>Motorista Responsável</label>
        <select id="nomeMot">
            <option value="">-- SELECIONE --</option>
            <option>FRANCIVALDO COSTA</option><option>ADRIANO NASCIMENTO</option>
            <option>REGINALDO</option><option>WALTER GONÇALVES</option><option>LAFAITE BATISTA</option>
        </select>

        <div class="grid-2">
            <div>
                <label>TAG</label>
                <select id="tag" onchange="autoPreencher()">
                    <option value="">--</option>
                    <option>TJUR 04</option><option>TJUR 06</option><option>TJUR 07</option>
                    <option>TJUR 08</option><option>TJUR 09</option><option>TJUR 10</option><option>TJUR 13</option>
                </select>
            </div>
            <div><label>Último Condutor</label><input type="text" id="condutor" readonly></div>
        </div>

        <div class="grid-2">
            <div><label>Veículo</label><input type="text" id="veiculoNome" readonly></div>
            <div><label>Placa</label><input type="text" id="placa" readonly></div>
        </div>

        <div class="grid-2">
            <div><label>KM Inicial</label><input type="text" id="kmi" inputmode="numeric"></div>
            <div><label>Nº Trajeto</label><input type="number" id="numTrajeto" value="1"></div>
        </div>

        <h3>🛠️ MANUTENÇÃO E SELO</h3>
        <div class="grid-2">
            <div>
                <label>Cor do Selo</label>
                <select id="corSelo">
                    <option>VERDE</option><option>AZUL</option><option>AMARELO</option><option>VERMELHO</option>
                </select>
            </div>
            <div><label>Validade Selo</label><input type="date" id="validadeSelo"></div>
        </div>

        <div class="grid-2">
            <div><label>Próx. Troca Óleo (KM)</label><input type="text" id="proxOleo" inputmode="numeric"></div>
            <div>
                <label>Tipo de Óleo</label>
                <select id="tipoOleo">
                    <option>5W30</option><option>10W40</option><option>15W40</option>
                </select>
            </div>
        </div>

        <label>Observações de Saída</label>
        <textarea id="obs" rows="2" placeholder="Ex: Pneu reserva murcho..."></textarea>

        <button onclick="processarEnvio('SAIDA')" class="btn" id="btnAcao">📲 INICIAR E ENVIAR ZAP</button>
    </div>

    <div id="secaoFinal" class="hidden">
        <div id="resumoSaida" style="background:#fff9c4; padding:10px; border-radius:8px; font-size:12px; margin-bottom:10px; border:1px dashed #fbc02d"></div>
        
        <h3>🏁 FINALIZAÇÃO DO TRAJETO</h3>
        <div class="grid-2">
            <div><label>Hora Chegada</label><input type="text" id="horaFim" readonly></div>
            <div><label>KM Final</label><input type="text" id="kmf" inputmode="numeric" oninput="calcularResta()"></div>
        </div>
        
        <label>RESTA PARA TROCA DE ÓLEO</label>
        <input type="text" id="restaTroca" readonly>

        <button onclick="processarEnvio('CHEGADA')" class="btn" id="btnAcaoFim" style="background:#075e54">🏁 CONCLUIR E ENVIAR ZAP</button>
    </div>
</div>

<script>
    const URL_API = "https://script.google.com/macros/s/AKfycbysx-IjZe54SWbmqwl2NYJEx_kiuVtakdtE-GFYE30UxwYYQhcvOuw5DViSwMixS_QIyQ/exec"; 

    function limparNum(v) { return Math.round(Number(v.toString().replace(/[\.\,]/g, ''))) || 0; }

    function autoPreencher() {
        const tag = document.getElementById('tag').value;
        if(!tag) return;
        const script = document.createElement('script');
        script.src = `${URL_API}?acao=buscarDadosVei&tag=${encodeURIComponent(tag)}&callback=retornoPlanilha&t=${Date.now()}`;
        document.body.appendChild(script);
        script.onload = () => script.remove();
    }

    function retornoPlanilha(data) {
        document.getElementById('veiculoNome').value = data.veiculo || "";
        document.getElementById('placa').value = data.placa || "";
        document.getElementById('kmi').value = data.kmi || "";
        document.getElementById('condutor').value = data.condutorSugerido || "1º DO DIA";
    }

    async function processarEnvio(tipo) {
        const btn = tipo === 'SAIDA' ? document.getElementById('btnAcao') : document.getElementById('btnAcaoFim');
        btn.disabled = true; btn.innerText = "⏳...";
        
        const agora = new Date();
        const dataH = agora.toLocaleDateString('pt-BR');
        const horaH = agora.toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'});
        let payload = {};

        if(tipo === 'SAIDA') {
            payload = {
                tipo: 'SAIDA', data: dataH, tag: document.getElementById('tag').value,
                nome: document.getElementById('nomeMot').value, kmi: limparNum(document.getElementById('kmi').value),
                placa: document.getElementById('placa').value, veiculo: document.getElementById('veiculoNome').value,
                numT: document.getElementById('numTrajeto').value, proxOleo: limparNum(document.getElementById('proxOleo').value),
                corSelo: document.getElementById('corSelo').value, validadeSelo: document.getElementById('validadeSelo').value,
                tipoOleo: document.getElementById('tipoOleo').value, obs: document.getElementById('obs').value, horaInic: horaH
            };
            localStorage.setItem("tjur_final", JSON.stringify(payload));
        } else {
            const d = JSON.parse(localStorage.getItem("tjur_final"));
            payload = { ...d, tipo: 'CHEGADA', kmf: limparNum(document.getElementById('kmf').value), horaFim: horaH, restaTroca: document.getElementById('restaTroca').value };
        }

        try {
            await fetch(URL_API, { method: 'POST', mode: 'no-cors', body: new Blob([JSON.stringify(payload)]) });
            
            let textoZap = tipo === 'SAIDA' ? 
                `*🚀 SAÍDA TELEJUR*%0A-----------------------%0A*TAG:* ${payload.tag}%0A*Vei:* ${payload.veiculo}%0A*Placa:* ${payload.placa}%0A*Mot:* ${payload.nome}%0A*KM:* ${payload.kmi}%0A*Selo:* ${payload.corSelo} (${payload.validadeSelo})%0A*Óleo:* ${payload.tipoOleo}%0A*Obs:* ${payload.obs}` :
                `*🏁 CHEGADA TELEJUR*%0A-----------------------%0A*TAG:* ${payload.tag}%0A*Mot:* ${payload.nome}%0A*KM Final:* ${payload.kmf}%0A*Resta Óleo:* ${payload.restaTroca}`;
            
            window.open(`https://api.whatsapp.com/send?text=${textoZap}`, '_blank');
            if(tipo === 'CHEGADA') localStorage.removeItem("tjur_final");
            location.reload();
        } catch (e) { alert("Erro de conexão!"); btn.disabled = false; }
    }

    function calcularResta() {
        const d = JSON.parse(localStorage.getItem("tjur_final"));
        const kmf = limparNum(document.getElementById('kmf').value);
        const prox = limparNum(d.proxOleo);
        const diff = prox - kmf;
        document.getElementById('restaTroca').value = diff > 0 ? `${diff} KM` : `EXCEDIDO ${Math.abs(diff)} KM`;
    }

    window.onload = () => {
        const salvo = localStorage.getItem("tjur_final");
        if(salvo) {
            const d = JSON.parse(salvo);
            document.getElementById('secaoInicial').classList.add('hidden');
            document.getElementById('secaoFinal').classList.remove('hidden');
            document.getElementById('resumoSaida').innerHTML = `<b>${d.tag}</b> - ${d.veiculo}<br>👤 ${d.nome} | 🕒 ${d.horaInic}`;
            document.getElementById('horaFim').value = new Date().toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'});
        }
    };
</script>
</body>
</html>
