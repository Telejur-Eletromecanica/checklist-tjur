<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TELEJUR - V23 COMPLETA</title>
    <style>
        body { font-family: sans-serif; background: #e3f2fd; margin: 0; padding: 10px; }
        .card { max-width: 400px; margin: auto; background: white; padding: 20px; border-radius: 15px; border-top: 10px solid #1a237e; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .brand { font-size: 28px; font-weight: bold; color: #1a237e; letter-spacing: 2px; text-align: center; margin: 0; }
        .subtitle { font-size: 14px; color: #1a237e; font-weight: bold; text-align: center; margin: 0 0 15px 0; text-transform: uppercase; }
        label { font-weight: bold; font-size: 11px; color: #555; display: block; margin-top: 12px; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 12px; margin-top: 5px; border-radius: 8px; border: 1px solid #ccc; font-size: 15px; box-sizing: border-box; background: #f9f9f9; }
        .readonly-field { background: #f0f0f0 !important; color: #1a237e; font-weight: bold; border: 1px dashed #1a237e; }
        .btn-azul { width: 100%; padding: 16px; background: #1a237e; border: none; border-radius: 10px; font-size: 18px; color: white; font-weight: bold; cursor: pointer; margin-top: 20px; }
        .btn-verde { width: 100%; padding: 16px; background: #25D366; border: none; border-radius: 10px; font-size: 18px; color: white; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .hidden { display: none; }
        .resumo-box { background: #e1f5fe; padding: 15px; border-radius: 10px; border-left: 5px solid #0288d1; margin-bottom: 15px; font-size: 13px; line-height: 1.6; }
    </style>
</head>
<body>

<div class="card">
    <p class="brand">TELEJUR</p>
    <p class="subtitle">ELETROMECÂNICA</p>

    <div id="telaEspera" class="hidden">
        <div class="resumo-box" id="infoRapida"></div>
        <button type="button" onclick="irParaFinalizacao()" class="btn-azul">FINALIZAR TRAJETO</button>
    </div>

    <div id="containerForm">
        <form id="formChecklist">
            <label>DATA E HORA DE INÍCIO</label>
            <input type="text" id="dataHoraI" class="readonly-field" readonly>

            <label>TAG DO VEÍCULO</label>
            <select id="tag" required>
                <option value="">SELECIONE</option>
                <option value="TJUR 04">TJUR 04</option><option value="TJUR 06">TJUR 06</option>
                <option value="TJUR 07">TJUR 07</option><option value="TJUR 08">TJUR 08</option>
                <option value="TJUR 09">TJUR 09</option><option value="TJUR 10">TJUR 10</option>
                <option value="TJUR 13">TJUR 13</option>
            </select>

            <label>IDENTIFICAÇÃO (ID)</label>
            <select id="idCondutor" required>
                <option value="">SELECIONE</option>
                <option value="ID 1">ID 1</option><option value="ID 2">ID 2</option>
                <option value="ID 3">ID 3</option><option value="ID 4">ID 4</option>
                <option value="ID 5">ID 5</option>
            </select>

            <label>NOME DO CONDUTOR</label>
            <select id="nomeCondutor" required>
                <option value="">SELECIONE</option>
                <option>ADRIANO NASCIMENTO</option><option>FRANCIVALDO COSTA</option>
                <option>FRANCINILDO TEXEIRA</option>
            </select>

            <label>KM INICIAL</label>
            <input type="number" id="kmi" required>

            <label>COR DO SELO</label>
            <select id="selo" required>
                <option value="">SELECIONE</option>
                <option value="VERDE">VERDE</option><option value="AMARELO">AMARELO</option>
                <option value="AZUL">AZUL</option><option value="VERMELHO">VERMELHO</option>
            </select>

            <label>VALIDADE SELO</label>
            <input type="date" id="valSelo">

            <label>DATA LIMITE (+5D ÚTEIS)</label>
            <input type="text" id="dataLimite" class="readonly-field" readonly>

            <label>PRÓX. ÓLEO</label>
            <input type="text" id="proxOleo">

            <div id="secaoFinal" class="hidden">
                <hr>
                <label>HORA DE FIM (AUTO)</label>
                <input type="text" id="horaFim" class="readonly-field" readonly>
                <label style="color:red">KM FINAL</label>
                <input type="number" id="kmf">
                <label>OBSERVAÇÃO</label>
                <textarea id="obs" rows="2"></textarea>
            </div>

            <button type="button" id="btnAcao" onclick="salvarInicio()" class="btn-azul">SALVAR INÍCIO</button>
        </form>
    </div>
</div>

<script>
    const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbysx-IjZe54SWbmqwl2NYJEx_kiuVtakdtE-GFYE30UxwYYQhcvOuw5DViSwMixS_QIyQ/exec";
    
    // Captura automática de Início
    const agora = new Date();
    const dataFormatada = agora.toLocaleDateString('pt-BR');
    const horaFormatada = agora.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
    document.getElementById('dataHoraI').value = `${dataFormatada} às ${horaFormatada}`;

    function calcularLimite() {
        const d = document.getElementById("valSelo").value;
        if(!d) return;
        let data = new Date(d + "T12:00:00");
        let uteis = 0;
        while(uteis < 5) { data.setDate(data.getDate() + 1); if(data.getDay() !== 0 && data.getDay() !== 6) uteis++; }
        document.getElementById("dataLimite").value = data.toLocaleDateString('pt-BR');
    }
    document.getElementById("valSelo").onchange = calcularLimite;

    async function salvarInicio() {
        const d = {
            data: dataFormatada, horaI: horaFormatada, tag: document.getElementById("tag").value,
            id: document.getElementById("idCondutor").value, nome: document.getElementById("nomeCondutor").value,
            kmi: document.getElementById("kmi").value, selo: document.getElementById("selo").value,
            val: document.getElementById("valSelo").value, lim: document.getElementById("dataLimite").value,
            oleo: document.getElementById("proxOleo").value
        };
        if(!d.tag || !d.kmi) return alert("Preencha tudo!");
        
        const q = Object.keys(d).map(k => `${k}=${encodeURIComponent(d[k])}`).join('&');
        await fetch(`${URL_SCRIPT}?acao=registrar&${q}`, {mode:'no-cors'});
        localStorage.setItem("tjur_v23", JSON.stringify(d));
        location.reload();
    }

    function irParaFinalizacao() {
        const s = JSON.parse(localStorage.getItem("tjur_v23"));
        document.getElementById("telaEspera").classList.add("hidden");
        document.getElementById("containerForm").classList.remove("hidden");
        document.getElementById("secaoFinal").classList.remove("hidden");
        
        // Bloqueia campos e gera Hora de Fim
        const horaFim = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
        document.getElementById("horaFim").value = horaFim;
        
        const campos = ["tag", "idCondutor", "nomeCondutor", "kmi", "selo", "valSelo", "dataLimite", "proxOleo"];
        campos.forEach(id => { 
            let el = document.getElementById(id === "idCondutor" ? "idCondutor" : id);
            el.value = s[id === "idCondutor" ? "id" : id]; 
            el.disabled = true; el.classList.add("readonly-field");
        });

        const btn = document.getElementById("btnAcao");
        btn.innerText = "FINALIZAR E RELATÓRIO COMPLETO"; btn.className = "btn-verde";
        btn.onclick = async function() {
            const kmf = document.getElementById("kmf").value;
            const obs = document.getElementById("obs").value;
            if(!kmf) return alert("KM Fim!");
            
            await fetch(`${URL_SCRIPT}?acao=finalizar&tag=${s.tag}&data=${s.data}&kmf=${kmf}&obs=${encodeURIComponent(obs)}&horaF=${horaFim}`, {mode:'no-cors'});
            localStorage.removeItem("tjur_v23");

            // RELATÓRIO WHATSAPP COMPLETO
            const texto = `*CHECKLIST TELEJUR - FINALIZADO*%0A` +
                `--------------------------------%0A` +
                `📅 *DATA:* ${s.data}%0A` +
                `🚗 *VEÍCULO:* ${s.tag}%0A` +
                `🆔 *ID:* ${s.id}%0A` +
                `👤 *MOTORISTA:* ${s.nome}%0A` +
                `⏱ *INÍCIO:* ${s.horaI}%0A` +
                `⏱ *FIM:* ${horaFim}%0A` +
                `🛣 *KM INICIAL:* ${s.kmi}%0A` +
                `🏁 *KM FINAL:* ${kmf}%0A` +
                `🏷 *SELO:* ${s.selo}%0A` +
                `📅 *VAL. SELO:* ${s.val}%0A` +
                `🗓 *LIMITE:* ${s.lim}%0A` +
                `🛢 *PRÓX. ÓLEO:* ${s.oleo}%0A` +
                `📝 *OBS:* ${obs || "Sem observações"}%0A` +
                `--------------------------------`;
            
            window.location.href = "whatsapp://send?text=" + texto;
            setTimeout(() => location.reload(), 2000);
        };
    }

    window.onload = function() {
        const s = localStorage.getItem("tjur_v23");
        if(s) {
            const d = JSON.parse(s);
            document.getElementById("containerForm").classList.add("hidden");
            document.getElementById("telaEspera").classList.remove("hidden");
            document.getElementById("infoRapida").innerHTML = `🚗 <b>TRAJETO:</b> ${d.tag}<br>👤 <b>CONDUTOR:</b> ${d.nome}<br>⏱ <b>INÍCIO:</b> ${d.horaI}`;
        }
    };
</script>
</body>
</html>
