<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TELEJUR v10.3</title>
    <style>
        :root { --primary: #1a237e; --danger: #c62828; --success: #2e7d32; }
        body { font-family: sans-serif; background: #f0f4f8; padding: 10px; margin: 0; }
        .card { max-width: 450px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .grid-status { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-bottom: 15px; }
        .v-box { padding: 8px 2px; border-radius: 8px; text-align: center; font-size: 9px; font-weight: bold; border: 1px solid #ddd; }
        .livre { background: #e8f5e9; color: var(--success); border-color: var(--success); }
        .ocupado { background: #ffebee; color: var(--danger); border-color: var(--danger); }
        label { font-weight: bold; font-size: 11px; color: #555; display: block; margin-top: 12px; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 12px; margin-top: 4px; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; box-sizing: border-box; outline: none; }
        .btn { width: 100%; padding: 18px; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 15px; transition: 0.2s; }
        .btn-azul { background: var(--primary); color: white; }
        .readonly { background: #f1f1f1 !important; color: #444 !important; font-weight: bold; }
        #loader { display:none; text-align:center; font-size:12px; color:var(--primary); font-weight:bold; margin:10px 0; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="text-align:center; color:var(--primary); margin:0;">TELEJUR v10.3</h2>
    <p id="txtSync" style="text-align:center; font-size:10px; color:#888; margin-bottom:10px;">Verificando restrições...</p>
    
    <div id="painel" class="grid-status"></div>
    <div id="loader">⚙️ PROCESSANDO...</div>

    <div id="formEntrada">
        <label>Motorista</label>
        <select id="nomeMot" onchange="validarAcesso()">
            <option value="">-- SELECIONE --</option>
            <option>ADRIANO NASCIMENTO</option>
            <option>FRANCIVALDO COSTA</option>
            <option>REGINALDO</option>
            <option>WALTER GONÇALVES</option>
            <option>LAFAITE BATISTA</option>
        </select>

        <label>Veículo (TAG)</label>
        <select id="tag" onchange="validarAcesso()">
            <option value="">-- SELECIONE --</option>
            <option value="TJUR 04">TJUR 04 (MUNCK)</option>
            <option value="TJUR 06">TJUR 06</option>
            <option value="TJUR 07">TJUR 07 (MUNCK)</option>
            <option value="TJUR 08">TJUR 08</option>
            <option value="TJUR 09">TJUR 09 (MUNCK)</option>
            <option value="TJUR 10">TJUR 10</option>
            <option value="TJUR 13">TJUR 13</option>
        </select>
        
        <input type="text" id="veiculoInfo" class="readonly" readonly placeholder="Dados do Veículo">
        
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px">
            <div><label>Cor Selo</label><select id="corSelo"><option>VERDE</option><option>VERMELHO</option><option>AZUL</option><option>AMARELO</option></select></div>
            <div><label>Validade Selo</label><input type="date" id="validadeSelo"></div>
        </div>

        <label>KM Inicial</label>
        <input type="number" id="kmi">
        <label>Próx. troca óleo (KM)</label>
        <input type="number" id="proxOleo">
        <label>Tipo de Óleo</label>
        <select id="tipoOleo"><option>15W40</option><option>5W30</option><option>10W40</option><option>OUTRO</option></select>

        <button id="btnSalvar" onclick="salvarSaida()" class="btn btn-azul">🚀 REGISTRAR SAÍDA</button>
    </div>

    <div id="telaAtiva" style="display:none">
        <div id="infoViagem" style="background:#f8f9fa; padding:15px; border-radius:10px; border-left:5px solid var(--primary); margin-bottom:15px"></div>
        <label style="color:var(--danger)">KM FINAL (CHEGADA)</label>
        <input type="number" id="kmf">
        <label>Observações</label>
        <textarea id="obs" placeholder="Alguma avaria?"></textarea>
        <button onclick="finalizar()" class="btn" style="background:var(--danger); color:white">🏁 CONCLUIR CHECKLIST</button>
        <button onclick="enviarWhats()" class="btn" style="background:#25D366; color:white">📲 WHATSAPP</button>
    </div>
</div>

<script>
    const URL = "https://script.google.com/macros/s/AKfycbysx-IjZe54SWbmqwl2NYJEx_kiuVtakdtE-GFYE30UxwYYQhcvOuw5DViSwMixS_QIyQ/exec"; 

    async function call(p) {
        document.getElementById('loader').style.display = 'block';
        return new Promise(r => {
            const n = 'cb_'+Math.round(Math.random()*1e6);
            window[n] = (d) => { delete window[n]; document.getElementById('loader').style.display='none'; r(d); };
            const s = document.createElement('script');
            s.src = `${URL}?${new URLSearchParams(p)}&callback=${n}&_=${Date.now()}`;
            document.body.appendChild(s);
        });
    }

    async function sync() {
        const res = await call({acao: 'statusGeral'});
        const p = document.getElementById('painel'); p.innerHTML = '';
        ["TJUR 04", "TJUR 06", "TJUR 07", "TJUR 08", "TJUR 09", "TJUR 10", "TJUR 13"].forEach(t => {
            const o = res.ocupados[t];
            p.innerHTML += `<div class="v-box ${o ? 'ocupado' : 'livre'}">${t}<br>${o ? o.nome.split(' ')[0] : 'LIVRE'}</div>`;
        });
        document.getElementById('txtSync').innerText = "Sinc: " + new Date().toLocaleTimeString();
    }

    async function validarAcesso() {
        const tag = document.getElementById('tag').value;
        const mot = document.getElementById('nomeMot').value;
        const skyTags = ["TJUR 04", "TJUR 07", "TJUR 09"];
        const autorizados = ["REGINALDO", "WALTER GONÇALVES", "LAFAITE BATISTA"];
        const btn = document.getElementById('btnSalvar');

        if (skyTags.includes(tag) && !autorizados.includes(mot)) {
            alert("⚠️ BLOQUEIO: Uso restrito a REGINALDO, WALTER ou LAFAITE.");
            document.getElementById('tag').value = "";
            document.getElementById('veiculoInfo').value = "ACESSO NEGADO";
            btn.disabled = true; btn.style.opacity = "0.3";
            return;
        }
        btn.disabled = false; btn.style.opacity = "1";
        
        if(tag) {
            const res = await call({acao: 'buscarDadosMotorista', tag: tag});
            document.getElementById('veiculoInfo').value = `${res.veiculo} | ${res.placa}`;
            document.getElementById('kmi').value = res.kmi;
            document.getElementById('proxOleo').value = res.oleo;
            window.v = res.veiculo; window.p = res.placa;
        }
    }

    async function salvarSaida() {
        const d = {
            acao: 'registrar', tag: document.getElementById('tag').value, nome: document.getElementById('nomeMot').value,
            id: "ID-" + Math.floor(100 + Math.random() * 900), kmi: document.getElementById('kmi').value,
            oleo: document.getElementById('proxOleo').value, corSelo: document.getElementById('corSelo').value,
            validadeSelo: document.getElementById('validadeSelo').value, tipoOleo: document.getElementById('tipoOleo').value,
            veiculo: window.v, placa: window.p
        };
        const res = await call(d);
        if(res.error) return alert(res.error);
        localStorage.setItem("tjur_trip", JSON.stringify(d));
        location.reload();
    }

    async function finalizar() {
        const t = JSON.parse(localStorage.getItem("tjur_trip"));
        const kf = document.getElementById('kmf').value;
        if(!kf || Number(kf) <= Number(t.kmi)) return alert("KM Final inválido!");
        await call({ acao: 'finalizar', tag: t.tag, kmf: kf, obs: document.getElementById('obs').value });
        localStorage.removeItem("tjur_trip");
        alert("Checklist Concluído!"); location.reload();
    }

    function enviarWhats() {
        const d = JSON.parse(localStorage.getItem("tjur_trip"));
        const m = `🚀 *SAÍDA REGISTRADA*\n👤 Mot: ${d.nome}\n🚗 Tag: ${d.tag}\n🚛 Vei: ${d.veiculo}`;
        window.location.href = `https://api.whatsapp.com/send?text=${encodeURIComponent(m)}`;
    }

    window.onload = () => { sync(); const s = localStorage.getItem("tjur_trip"); if(s) { const d = JSON.parse(s); document.getElementById('formEntrada').style.display = 'none'; document.getElementById('telaAtiva').style.display = 'block'; document.getElementById('infoViagem').innerHTML = `<b>CHECKLIST ATIVO</b><br>🚗 ${d.tag}<br>👤 ${d.nome}`; } };
</script>
</body>
</html>
