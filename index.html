<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TELEJUR - GESTÃO DE FROTA</title>
    <style>
        body { font-family: sans-serif; background: #e3f2fd; margin: 0; padding: 10px; }
        .card { max-width: 400px; margin: auto; background: white; padding: 20px; border-radius: 15px; border-top: 10px solid #1a237e; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .header-text { text-align: center; margin-bottom: 20px; }
        .brand { font-size: 28px; font-weight: bold; color: #1a237e; letter-spacing: 2px; margin: 0; }
        .subtitle { font-size: 14px; color: #1a237e; font-weight: bold; margin: 0; text-transform: uppercase; }
        h2 { text-align: center; color: #333; font-size: 18px; margin-top: 20px; border-bottom: 2px solid #1a237e; padding-bottom: 10px; }
        label { font-weight: bold; font-size: 11px; color: #555; display: block; margin-top: 12px; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 12px; margin-top: 5px; border-radius: 8px; border: 1px solid #ccc; font-size: 15px; box-sizing: border-box; background: #f9f9f9; }
        .readonly-field { background: #f0f0f0 !important; color: #1a237e; font-weight: bold; border: 1px dashed #1a237e; cursor: not-allowed; }
        .campo-destaque { background: #fff9c4; border: 1px solid #fbc02d; color: #827717; font-weight: bold; }
        .btn-azul { width: 100%; padding: 16px; background: #1a237e; border: none; border-radius: 10px; font-size: 18px; color: white; font-weight: bold; cursor: pointer; margin-top: 20px; }
        .btn-verde { width: 100%; padding: 16px; background: #25D366; border: none; border-radius: 10px; font-size: 18px; color: white; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .alerta-foto { background: #e8f5e9; color: #2e7d32; padding: 15px; border-radius: 10px; font-size: 14px; border: 2px solid #c8e6c9; margin-top: 20px; font-weight: bold; text-align: center; }
        .hidden { display: none; }
        #telaEspera { text-align: center; padding: 20px; display: none; }
        #overlayConfirmacao { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; color: white; text-align: center; padding-top: 100px; }
        .info-trajeto { background: #f8f9fa; border-radius: 10px; padding: 15px; margin: 15px 0; border-left: 5px solid #1a237e; text-align: left; font-size: 14px; }
    </style>
</head>
<body>

<div id="overlayConfirmacao">
    <div style="font-size: 80px;">🔔</div>
    <h2>DADOS SALVOS!</h2>
    <p>Início de trajeto registrado com sucesso.</p>
</div>

<div class="card">
    <div class="header-text">
        <p class="brand">TELEJUR</p>
        <p class="subtitle">ELETROMECÂNICA</p>
    </div>

    <div id="containerForm">
        <h2 id="tituloAcao">CHECKLIST DE VEÍCULO</h2>
        <form id="formChecklist">
            <label>DATA</label>
            <input type="text" id="dataAuto" class="readonly-field" readonly>

            <label>TAG DO VEÍCULO</label>
            <select id="tag" onchange="atualizarVeiculo()">
                <option value="">SELECIONE</option>
                <option value="TJUR 03" data-v="CAMINHONETE HILUX" data-p="PHG0639">TJUR 03</option>
                <option value="TJUR 04" data-v="SKY MUNCK" data-p="QFA1I50">TJUR 04</option>
                <option value="TJUR 06" data-v="SAVEIRO FURGÃO" data-p="QUJ3E02">TJUR 06</option>
                <option value="TJUR 07" data-v="SKY MUNCK" data-p="RWR3C75">TJUR 07</option>
                <option value="TJUR 08" data-v="CAMINHONETE HILUX" data-p="QVE5H48">TJUR 08</option>
                <option value="TJUR 13" data-v="CAMINHONETE HILUX" data-p="QVD4I38">TJUR 13</option>
            </select>

            <label>VEÍCULO / PLACA</label>
            <input type="text" id="displayInfo" class="readonly-field" readonly>

            <label>NOME DO CONDUTOR</label>
            <select id="nomeCondutor">
                <option value="">SELECIONE</option>
                <option>ADRIANO NASCIMENTO</option><option>FRANCIVALDO COSTA</option>
                <option>FRANCINILDO TEXEIRA</option><option>JOELCINEI GUIMARÃES</option>
                <option>LAFAITE BATISTA</option><option>REGINALDO</option>
            </select>

            <label>KM INICIAL</label>
            <input type="number" id="kmi" placeholder="Ex: 154300">

            <label>COR DO SELO</label>
            <select id="corSelo">
                <option value="">SELECIONE</option>
                <option value="VERDE">VERDE</option><option value="AMARELO">AMARELO</option>
                <option value="AZUL">AZUL</option><option value="VERMELHO">VERMELHO</option>
            </select>

            <label>VALIDADE DO SELO</label>
            <input type="date" id="validadeSelo" onchange="gerarCarencia()">

            <label>DATA LIMITE (+5 DIAS ÚTEIS)</label>
            <input type="text" id="dataLimiteSelo" class="readonly-field campo-destaque" readonly>

            <div id="blocoFinal" class="hidden">
                <label style="color:red">KM FINAL</label>
                <input type="number" id="kmf" placeholder="KM ao retornar">
                <div class="alerta-foto">📸 NÃO ESQUEÇA A FOTO DO CHECKLIST FÍSICO!</div>
            </div>

            <label>OBSERVAÇÃO</label>
            <textarea id="obs" rows="2"></textarea>

            <button type="button" id="btnSalvar" onclick="salvarInicio()" class="btn-azul">SALVAR E INICIAR</button>
        </form>
    </div>

    <div id="telaEspera">
        <h3 style="color: #1a237e;">TRAJETO ATIVO</h3>
        <div id="resumoAtivo" class="info-trajeto"></div>
        <button type="button" onclick="enviarWhatsapp('INICIO')" class="btn-verde">ENVIAR INÍCIO NO WHATSAPP</button>
        <button type="button" onclick="prepararFinalizacao()" class="btn-azul">FINALIZAR TRAJETO</button>
    </div>
</div>

<script>
    const URL_DB = "https://script.google.com/macros/s/AKfycbysx-IjZe54SWbmqwl2NYJEx_kiuVtakdtE-GFYE30UxwYYQhcvOuw5DViSwMixS_QIyQ/exec";
    
    // 1. BIP SONORO
    function bip() {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = audioCtx.createOscillator();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(800, audioCtx.currentTime);
        osc.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.2);
    }

    // 2. CÁLCULO 5 DIAS ÚTEIS
    function gerarCarencia() {
        const dataVal = document.getElementById("validadeSelo").value;
        if(!dataVal) return;
        let data = new Date(dataVal + "T12:00:00");
        let adicionados = 0;
        while(adicionados < 5) {
            data.setDate(data.getDate() + 1);
            if(data.getDay() !== 0 && data.getDay() !== 6) adicionados++;
        }
        document.getElementById("dataLimiteSelo").value = data.toLocaleDateString('pt-BR');
    }

    function atualizarVeiculo() {
        const sel = document.getElementById("tag");
        const opt = sel.options[sel.selectedIndex];
        document.getElementById("displayInfo").value = opt.value ? `${opt.getAttribute('data-v')} (${opt.getAttribute('data-p')})` : "";
    }

    // 3. SALVAR INÍCIO
    async function salvarInicio() {
        const campos = {
            tag: document.getElementById("tag").value,
            nome: document.getElementById("nomeCondutor").value,
            kmi: document.getElementById("kmi").value,
            selo: document.getElementById("corSelo").value,
            validade: document.getElementById("validadeSelo").value,
            limite: document.getElementById("dataLimiteSelo").value,
            data: new Date().toLocaleDateString('pt-BR'),
            horaI: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
        };

        if(!campos.tag || !campos.kmi || !campos.nome) return alert("Preencha os campos obrigatórios!");

        bip();
        document.getElementById("overlayConfirmacao").style.display = "block";

        // Salva Localmente para persistência
        localStorage.setItem("trajeto_tjur", JSON.stringify(campos));

        // Envia para o Google Sheets (em segundo plano)
        fetch(`${URL_DB}?acao=registrar&tag=${campos.tag}&nome=${campos.nome}&kmi=${campos.kmi}&data=${campos.data}`);

        setTimeout(() => { location.reload(); }, 1500);
    }

    // 4. PREPARAR TELA PARA FINALIZAR (TRAVA CAMPOS)
    function prepararFinalizacao() {
        const dados = JSON.parse(localStorage.getItem("trajeto_tjur"));
        document.getElementById("telaEspera").style.display = "none";
        document.getElementById("containerForm").style.display = "block";
        document.getElementById("blocoFinal").classList.remove("hidden");

        // Preenche e Trava
        document.getElementById("tag").value = dados.tag;
        document.getElementById("nomeCondutor").value = dados.nome;
        document.getElementById("kmi").value = dados.kmi;
        document.getElementById("corSelo").value = dados.selo;
        document.getElementById("validadeSelo").value = dados.validade;
        document.getElementById("dataLimiteSelo").value = dados.limite;
        atualizarVeiculo();

        const listaTrava = ["tag", "nomeCondutor", "kmi", "corSelo", "validadeSelo"];
        listaTrava.forEach(id => {
            const el = document.getElementById(id);
            el.classList.add("readonly-field");
            el.style.pointerEvents = "none";
        });

        const btn = document.getElementById("btnSalvar");
        btn.innerText = "FINALIZAR TRAJETO ✅";
        btn.className = "btn-verde";
        btn.onclick = () => enviarWhatsapp('FIM');
    }

    // 5. ENVIAR WHATSAPP
    function enviarWhatsapp(tipo) {
        const d = JSON.parse(localStorage.getItem("trajeto_tjur"));
        const obs = document.getElementById("obs").value || "Nenhuma";
        const kmf = document.getElementById("kmf").value;
        const horaF = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

        let msg = "";
        if(tipo === 'INICIO') {
            msg = `*CHECKLIST TELEJUR - INÍCIO*\n🟢 *STATUS:* EM ANDAMENTO\n\n*TAG:* ${d.tag}\n*CONDUTOR:* ${d.nome}\n*KM INICIAL:* ${d.kmi}\n*SELO:* ${d.selo} (Val: ${d.limite})\n*HORA:* ${d.horaI}`;
        } else {
            if(!kmf) return alert("Informe o KM Final!");
            msg = `*CHECKLIST TELEJUR - FINALIZADO*\n✅ *STATUS:* CONCLUÍDO\n\n*TAG:* ${d.tag}\n*CONDUTOR:* ${d.nome}\n*KM INICIAL:* ${d.kmi}\n*KM FINAL:* ${kmf}\n*HORA FIM:* ${horaF}\n*OBS:* ${obs}`;
            localStorage.removeItem("trajeto_tjur");
        }

        window.location.href = "whatsapp://send?text=" + encodeURIComponent(msg);
        if(tipo === 'FIM') setTimeout(() => { location.reload(); }, 2000);
    }

    window.onload = () => {
        document.getElementById("dataAuto").value = new Date().toLocaleDateString('pt-BR');
        const salvo = localStorage.getItem("trajeto_tjur");
        if(salvo) {
            const d = JSON.parse(salvo);
            document.getElementById("containerForm").style.display = "none";
            document.getElementById("telaEspera").style.display = "block";
            document.getElementById("resumoAtivo").innerHTML = `<b>TAG:</b> ${d.tag}<br><b>CONDUTOR:</b> ${d.nome}<br><b>INÍCIO:</b> ${d.horaI}`;
        }
    };
</script>
</body>
</html>
