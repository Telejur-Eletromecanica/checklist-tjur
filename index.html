<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TELEJUR v11.1</title>
    <style>
        :root { --primary: #1a237e; --danger: #c62828; --success: #2e7d32; --disabled: #9e9e9e; }
        body { font-family: sans-serif; background: #f0f4f8; padding: 10px; margin: 0; }
        .card { max-width: 450px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .grid-status { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-bottom: 15px; }
        .v-box { padding: 8px 2px; border-radius: 8px; text-align: center; font-size: 9px; font-weight: bold; border: 1px solid #ddd; }
        .livre { background: #e8f5e9; color: var(--success); border-color: var(--success); }
        .ocupado { background: #ffebee; color: var(--danger); border-color: var(--danger); }
        .bloqueado { background: #f5f5f5; color: var(--disabled); border-color: #ccc; border-style: dashed; opacity: 0.6; }
        label { font-weight: bold; font-size: 10px; color: #555; display: block; margin-top: 10px; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 12px; margin-top: 4px; border-radius: 8px; border: 1px solid #ccc; font-size: 15px; box-sizing: border-box; outline: none; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 10px; font-size: 14px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-azul { background: var(--primary); color: white; }
        .btn-whats { background: #128C7E; color: white; }
        .btn-finalizar { background: var(--danger); color: white; }
        .section-box { background: #f9f9f9; padding: 15px; border-radius: 10px; border: 1px solid #eee; margin-top: 15px; }
        .readonly { background: #f1f1f1 !important; color: #444 !important; font-weight: bold; }
        #loader { display:none; text-align:center; font-size:12px; color:var(--primary); font-weight:bold; margin:10px 0; }
        .alerta-oleo { font-size: 11px; font-weight: bold; color: var(--danger); margin-top: 5px; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="text-align:center; color:var(--primary); margin:0; font-size: 18px;">SISTEMA TELEJUR v11.1</h2>
    <div id="painel" class="grid-status" style="margin-top:15px"></div>
    <div id="loader">PROCESSANDO...</div>

    <div id="formEntrada">
        <label>Motorista</label>
        <select id="nomeMot" onchange="validarAcesso()">
            <option value="">-- SELECIONE --</option>
            <option>ADRIANO NASCIMENTO</option>
            <option>FRANCIVALDO COSTA</option>
            <option>REGINALDO</option>
            <option>WALTER GONÇALVES</option>
            <option>LAFAITE BATISTA</option>
        </select>

        <label>Veículo (TAG)</label>
        <select id="tag" onchange="validarAcesso()"></select>
        <input type="text" id="veiculoInfo" class="readonly" readonly placeholder="Dados do Veículo">

        <div class="section-box">
            <b style="font-size:11px; color:var(--primary)">DADOS DE SAÍDA</b>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px">
                <div>
                    <label>Selo</label>
                    <select id="corSelo">
                        <option>VERDE</option><option>AMARELO</option><option>AZUL</option><option>VERMELHO</option>
                    </select>
                </div>
                <div><label>Validade Selo</label><input type="date" id="validadeSelo"></div>
            </div>

            <label id="lblOleo">Próxima Troca Óleo</label>
            <div id="containerOleo"><input type="number" id="proxOleo"></div>
            <div id="calculoOleo" class="alerta-oleo"></div>

            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px">
                <div><label>KM Inicial</label><input type="number" id="kmi"></div>
                <div>
                    <label>Tipo Óleo</label>
                    <select id="tipoOleo">
                        <option>15W40</option><option>5W30</option><option>10W40</option><option>OUTRO</option>
                    </select>
                </div>
            </div>
            <button id="btnSalvar" onclick="salvarSaida()" class="btn btn-azul">💾 SALVAR TRAJETO</button>
        </div>
    </div>

    <div id="telaAtiva" style="display:none">
        <div id="infoViagem" style="background:#e3f2fd; padding:15px; border-radius:10px; border-left:5px solid var(--primary); margin-bottom:15px"></div>
        <button onclick="enviarWhatsInicial()" class="btn btn-whats">📲 ENVIAR NO WHATSAPP (SAÍDA)</button>
        <div class="section-box" style="border-color:var(--danger); margin-top:25px">
            <b style="font-size:11px; color:var(--danger)">FINALIZAÇÃO</b>
            <label>KM FINAL</label>
            <input type="number" id="kmf">
            <label>Observações</label>
            <textarea id="obs" placeholder="Observações..."></textarea>
            <button onclick="finalizarETransmitir()" class="btn btn-finalizar">🏁 FINALIZAR E ENVIAR WHATSAPP</button>
        </div>
    </div>
</div>

<script>
    const URL = "https://script.google.com/macros/s/AKfycbysx-IjZe54SWbmqwl2NYJEx_kiuVtakdtE-GFYE30UxwYYQhcvOuw5DViSwMixS_QIyQ/exec"; 
    const skyTags = ["TJUR 04", "TJUR 07", "TJUR 09"];
    const autorizadosSky = ["REGINALDO", "WALTER GONÇALVES", "LAFAITE BATISTA"];
    const todasTags = ["TJUR 04", "TJUR 06", "TJUR 07", "TJUR 08", "TJUR 09", "TJUR 10", "TJUR 13"];
    let frota = { ocupados: {} };

    async function call(p) {
        document.getElementById('loader').style.display = 'block';
        return new Promise((resolve, reject) => {
            const n = 'cb_'+Math.round(Math.random()*1e6);
            const timeout = setTimeout(() => {
                document.getElementById('loader').style.display='none';
                alert("Erro de conexão. Verifique se o Script foi publicado como 'Qualquer pessoa'.");
            }, 10000);

            window[n] = (d) => { 
                clearTimeout(timeout);
                delete window[n]; 
                document.getElementById('loader').style.display='none'; 
                resolve(d); 
            };
            const s = document.createElement('script');
            s.src = `${URL}?${new URLSearchParams(p)}&callback=${n}&_=${Date.now()}`;
            document.body.appendChild(s);
        });
    }

    async function sync() {
        const res = await call({acao: 'statusGeral'});
        if(res) { frota = res; validarAcesso(); }
    }

    function validarAcesso() {
        const mot = document.getElementById('nomeMot').value.toUpperCase().trim();
        const ehAutorizado = autorizadosSky.includes(mot);
        const p = document.getElementById('painel'); p.innerHTML = '';
        todasTags.forEach(t => {
            const o = frota.ocupados[t];
            let c = o ? 'ocupado' : 'livre';
            let s = o ? o.nome.split(' ')[0] : 'LIVRE';
            if (skyTags.includes(t) && !ehAutorizado && mot !== "") { c = 'bloqueado'; s = 'RESTRITO'; }
            p.innerHTML += `<div class="v-box ${c}">${t}<br>${s}</div>`;
        });
        const sel = document.getElementById('tag');
        const currentVal = sel.value;
        sel.innerHTML = '<option value="">-- SELECIONE --</option>';
        todasTags.forEach(t => {
            const opt = document.createElement('option'); opt.value = t;
            if (skyTags.includes(t) && !ehAutorizado && mot !== "") { opt.text = `🔒 ${t}`; opt.disabled = true; } 
            else { opt.text = t; } sel.add(opt);
        });
        sel.value = currentVal;
    }

    async function carregarDadosVei() {
        const tag = document.getElementById('tag').value;
        if(!tag) return;
        const res = await call({acao: 'buscarDadosMotorista', tag: tag});
        if(res){
            document.getElementById('veiculoInfo').value = `${res.veiculo} | ${res.placa}`;
            document.getElementById('kmi').value = res.kmi;
            const cont = document.getElementById('containerOleo');
            if(skyTags.includes(tag)) {
                cont.innerHTML = `<input type="date" id="proxOleo" onchange="calcOleo()">`;
                document.getElementById('lblOleo').innerText = "Vencimento Óleo (Data)";
            } else {
                cont.innerHTML = `<input type="number" id="proxOleo" onchange="calcOleo()">`;
                document.getElementById('proxOleo').value = Number(res.kmi) + 5000;
                document.getElementById('lblOleo').innerText = "Próxima Troca (KM)";
            }
            window.v = res.veiculo; window.p = res.placa; calcOleo();
        }
    }

    document.getElementById('tag').addEventListener('change', carregarDadosVei);

    function calcOleo() {
        const tag = document.getElementById('tag').value;
        const val = document.getElementById('proxOleo').value;
        const calc = document.getElementById('calculoOleo');
        if(!val) return;
        if(skyTags.includes(tag)) {
            const dias = Math.ceil((new Date(val) - new Date()) / (1000 * 60 * 60 * 24));
            calc.innerText = dias > 0 ? `Faltam ${dias} dias.` : `⚠️ VENCIDO!`;
        } else {
            const falta = Number(val) - Number(document.getElementById('kmi').value);
            calc.innerText = falta > 0 ? `Faltam ${falta} KM.` : `⚠️ TROCAR!`;
        }
    }

    async function salvarSaida() {
        const d = {
            acao: 'registrar', 
            tag: document.getElementById('tag').value, 
            nome: document.getElementById('nomeMot').value,
            kmi: document.getElementById('kmi').value, 
            oleo: document.getElementById('proxOleo').value,
            veiculo: window.v || "", 
            placa: window.p || "", 
            corSelo: document.getElementById('corSelo').value,
            validadeSelo: document.getElementById('validadeSelo').value,
            tipoOleo: document.getElementById('tipoOleo').value
        };
        if(!d.tag || !d.nome || !d.validadeSelo) {
            alert("Preencha Motorista, TAG e Validade do Selo!");
            return;
        }
        const res = await call(d);
        if(res && res.error) return alert(res.error);
        localStorage.setItem("tjur_trip", JSON.stringify(d));
        location.reload();
    }

    function enviarWhatsInicial() {
        const d = JSON.parse(localStorage.getItem("tjur_trip"));
        const agora = new Date();
        const msg = `SAIDA REGISTRADA\n--------------------------------\n` +
            `Data: ${agora.toLocaleDateString('pt-BR')}\nTag: ${d.tag}\nNome: ${d.nome.toUpperCase()}\nVeiculo: ${d.veiculo}\nPlaca: ${d.placa}\n--------------------------------\n` +
            `KM Inicial: ${d.kmi}\nHora Inicio: ${agora.getHours()}:${agora.getMinutes().toString().padStart(2, '0')}\nSelo: ${d.corSelo}\nValidade Selo: ${d.validadeSelo}\nTipo de Oleo: ${d.tipoOleo}\nProxima Troca: ${d.oleo}`;
        window.location.href = `https://api.whatsapp.com/send?text=${encodeURIComponent(msg)}`;
    }

    async function finalizarETransmitir() {
        const t = JSON.parse(localStorage.getItem("tjur_trip"));
        const kf = document.getElementById('kmf').value;
        const obs = document.getElementById('obs').value || "NENHUMA";
        const agora = new Date();
        if(!kf || Number(kf) <= Number(t.kmi)) return alert("KM Final invalido!");
        await call({ acao: 'finalizar', tag: t.tag, kmf: kf, obs: obs.toUpperCase() });
        const msg = `CHECKLIST CONCLUIDO\n--------------------------------\n` +
            `Data: ${agora.toLocaleDateString('pt-BR')}\nTag: ${t.tag}\nNome: ${t.nome.toUpperCase()}\nVeiculo: ${t.veiculo}\nPlaca: ${t.placa}\n--------------------------------\n` +
            `KM Inicial: ${t.kmi}\nKM Final: ${kf}\nSelo: ${t.corSelo}\nObs: ${obs.toUpperCase()}`;
        localStorage.removeItem("tjur_trip");
        window.location.href = `https://api.whatsapp.com/send?text=${encodeURIComponent(msg)}`;
        setTimeout(() => { location.reload(); }, 1200);
    }

    window.onload = () => { 
        sync(); 
        const s = localStorage.getItem("tjur_trip"); 
        if(s) {
            const d = JSON.parse(s);
            document.getElementById('formEntrada').style.display = 'none';
            document.getElementById('telaAtiva').style.display = 'block';
            document.getElementById('infoViagem').innerHTML = `<b>TRAJETO EM CURSO</b><br>🚗 ${d.tag}<br>👤 ${d.nome}`;
        }
    };
</script>
</body>
</html>
