<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TELEJUR v10.5 - CONTROLE DE FROTA</title>
    <style>
        :root { --primary: #1a237e; --danger: #c62828; --success: #2e7d32; --disabled: #9e9e9e; }
        body { font-family: sans-serif; background: #f0f4f8; padding: 10px; margin: 0; user-select: none; }
        .card { max-width: 450px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .grid-status { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-bottom: 15px; }
        .v-box { padding: 8px 2px; border-radius: 8px; text-align: center; font-size: 9px; font-weight: bold; border: 1px solid #ddd; transition: 0.3s; }
        .livre { background: #e8f5e9; color: var(--success); border-color: var(--success); }
        .ocupado { background: #ffebee; color: var(--danger); border-color: var(--danger); }
        .bloqueado { background: #f5f5f5; color: var(--disabled); border-color: #ccc; border-style: dashed; opacity: 0.6; }
        label { font-weight: bold; font-size: 11px; color: #555; display: block; margin-top: 12px; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 12px; margin-top: 4px; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; box-sizing: border-box; outline: none; transition: 0.2s; }
        input:focus, select:focus { border-color: var(--primary); box-shadow: 0 0 5px rgba(26,35,126,0.2); }
        .btn { width: 100%; padding: 18px; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 15px; transition: 0.2s; }
        .btn:active { transform: scale(0.98); }
        .btn-azul { background: var(--primary); color: white; }
        .readonly { background: #f1f1f1 !important; color: #444 !important; font-weight: bold; }
        #loader { display:none; text-align:center; font-size:12px; color:var(--primary); font-weight:bold; margin:10px 0; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        .loading-text { animation: pulse 1s infinite; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="text-align:center; color:var(--primary); margin:0;">TELEJUR v10.5</h2>
    <p id="txtSync" style="text-align:center; font-size:10px; color:#888; margin-bottom:10px;" class="loading-text">Sincronizando frotas...</p>
    
    <div id="painel" class="grid-status"></div>
    <div id="loader">⚙️ PROCESSANDO... AGUARDE</div>

    <div id="formEntrada">
        <label>Motorista</label>
        <select id="nomeMot" onchange="atualizarInterfaceRestricao()">
            <option value="">-- SELECIONE SEU NOME --</option>
            <option>ADRIANO NASCIMENTO</option>
            <option>FRANCIVALDO COSTA</option>
            <option>REGINALDO</option>
            <option>WALTER GONÇALVES</option>
            <option>LAFAITE BATISTA</option>
        </select>

        <label>Veículo (TAG)</label>
        <select id="tag" onchange="buscarDadosVeiculo()">
            <option value="">-- SELECIONE O CARRO --</option>
            </select>
        
        <input type="text" id="veiculoInfo" class="readonly" readonly placeholder="Dados do Veículo">

        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px">
            <div><label>Cor Selo</label><select id="corSelo"><option>VERDE</option><option>VERMELHO</option><option>AZUL</option><option>AMARELO</option></select></div>
            <div><label>Validade Selo</label><input type="date" id="validadeSelo"></div>
        </div>

        <label>KM Inicial</label>
        <input type="number" id="kmi">
        <label>Próx. troca óleo (KM)</label>
        <input type="number" id="proxOleo">
        <label>Tipo de Óleo</label>
        <select id="tipoOleo"><option>15W40</option><option>5W30</option><option>10W40</option><option>OUTRO</option></select>

        <button id="btnSalvar" onclick="salvarSaida()" class="btn btn-azul">🚀 REGISTRAR SAÍDA</button>
    </div>

    <div id="telaAtiva" style="display:none">
        <div id="infoViagem" style="background:#f8f9fa; padding:15px; border-radius:10px; border-left:5px solid var(--primary); margin-bottom:15px"></div>
        <label style="color:var(--danger)">KM FINAL (CHEGADA)</label>
        <input type="number" id="kmf">
        <label>Observações</label>
        <textarea id="obs" placeholder="Alguma avaria?"></textarea>
        <button onclick="finalizar()" class="btn" style="background:var(--danger); color:white">🏁 CONCLUIR CHECKLIST</button>
        <button onclick="enviarWhats()" class="btn" style="background:#25D366; color:white">📲 WHATSAPP</button>
    </div>
</div>

<script>
    const URL = "https://script.google.com/macros/s/AKfycbysx-IjZe54SWbmqwl2NYJEx_kiuVtakdtE-GFYE30UxwYYQhcvOuw5DViSwMixS_QIyQ/exec"; 

    // Configurações de Restrição
    const skyTags = ["TJUR 04", "TJUR 07", "TJUR 09"];
    const autorizadosSky = ["REGINALDO", "WALTER GONÇALVES", "LAFAITE BATISTA"];
    const todasTags = ["TJUR 04", "TJUR 06", "TJUR 07", "TJUR 08", "TJUR 09", "TJUR 10", "TJUR 13"];

    // Dados globais da frota (carregados no sync)
    let dadosFrotaGlobal = { ocupados: {} };

    async function call(p) {
        document.getElementById('loader').style.display = 'block';
        return new Promise(r => {
            const n = 'cb_'+Math.round(Math.random()*1e6);
            window[n] = (d) => { delete window[n]; document.getElementById('loader').style.display='none'; r(d); };
            const s = document.createElement('script');
            s.src = `${URL}?${new URLSearchParams(p)}&callback=${n}&_=${Date.now()}`;
            document.body.appendChild(s);
        });
    }

    // 1. Sincronização Inicial (Carrega dados e monta a interface base)
    async function sync() {
        const res = await call({acao: 'statusGeral'});
        if(res) { dadosFrotaGlobal = res; }
        
        // Se já houver um motorista selecionado, atualiza a interface com as restrições dele
        const motAtual = document.getElementById('nomeMot').value.toUpperCase().trim();
        if(motAtual) {
            atualizarInterfaceRestricao();
        } else {
            // Se não, mostra o painel padrão (Livre/Ocupado)
            montarPainelFrota(false);
            montarListaTags(false);
        }
        
        document.getElementById('txtSync').innerText = "Atualizado: " + new Date().toLocaleTimeString();
        document.getElementById('txtSync').classList.remove('loading-text');
    }

    // 2. Função Principal de Restrição Visual (Chamada ao mudar o motorista)
    function atualizarInterfaceRestricao() {
        const mot = document.getElementById('nomeMot').value.toUpperCase().trim();
        if(!mot) {
            // Se deselecionar o nome, volta ao estado padrão
            sync();
            return;
        }

        const ehAutorizado = autorizadosSky.includes(mot);
        
        // Atualiza os dois componentes visuais
        montarPainelFrota(ehAutorizado);
        montarListaTags(ehAutorizado);
    }

    // 3. Monta o Painel de Quadradinhos (Com lógica de bloqueio cinza)
    function montarPainelFrota(ehAutorizado) {
        const p = document.getElementById('painel');
        p.innerHTML = '';
        
        todasTags.forEach(t => {
            const o = dadosFrotaGlobal.ocupados[t];
            let classe = o ? 'ocupado' : 'livre';
            let statusTxt = o ? o.nome.split(' ')[0] : 'LIVRE';

            // Lógica de Bloqueio Cinza (Se for TAG SKY e motorista NÃO autorizado)
            if (skyTags.includes(t) && !ehAutorizado) {
                classe = 'bloqueado';
                statusTxt = 'RESTRITO';
            }

            p.innerHTML += `<div class="v-box ${classe}">${t}<br>${statusTxt}</div>`;
        });
    }

    // 4. Monta a Lista de Seleção (Com lógica do Cadeado 🔒)
    function montarListaTags(ehAutorizado) {
        const s = document.getElementById('tag');
        const valorAntigo = s.value; // Guarda a seleção atual
        s.innerHTML = '<option value="">-- SELECIONE O CARRO --</option>';

        todasTags.forEach(t => {
            const opt = document.createElement('option');
            opt.value = t;

            // Lógica do Cadeado no Select
            if (skyTags.includes(t) && !ehAutorizado) {
                opt.text = `🔒 ${t} (BLOQUEADO)`;
                opt.disabled = true; // Impede a seleção
                opt.style.color = '#999';
            } else {
                opt.text = t;
                opt.disabled = false;
            }

            s.add(opt);
        });

        // Tenta manter a seleção antiga se ela ainda estiver disponível
        if(valorAntigo && !s.querySelector(`option[value="${valorAntigo}"]`).disabled) {
            s.value = valorAntigo;
        } else {
            // Se a seleção antiga foi bloqueada, limpa os detalhes do veículo
            document.getElementById('veiculoInfo').value = '';
            document.getElementById('kmi').value = '';
        }
    }

    // 5. Busca dados ao selecionar o veículo (Mantido o preenchimento automático)
    async function buscarDadosVeiculo() {
        const tag = document.getElementById('tag').value;
        if(!tag) return;

        const res = await call({acao: 'buscarDadosMotorista', tag: tag});
        if(res) {
            document.getElementById('veiculoInfo').value = `${res.veiculo} | ${res.placa}`;
            document.getElementById('kmi').value = res.kmi;
            // Preenche o próximo óleo sugerindo +10.000 KM
            document.getElementById('proxOleo').value = Number(res.kmi) + 10000;
            
            // Guarda dados temporários para o WhatsApp
            window.v = res.veiculo; window.p = res.placa;
        }
    }

    // --- Outras funções mantidas (Registrar, Finalizar, WhatsApp) ---

    async function salvarSaida() {
        const tag = document.getElementById('tag').value;
        const mot = document.getElementById('nomeMot').value;
        if(!tag || !mot || !document.getElementById('kmi').value) return alert("Selecione Motorista, TAG e digite o KM Inicial!");

        const d = {
            acao: 'registrar', tag: tag, nome: mot,
            id: "ID-" + Math.floor(100 + Math.random() * 900), kmi: document.getElementById('kmi').value,
            oleo: document.getElementById('proxOleo').value, corSelo: document.getElementById('corSelo').value,
            validadeSelo: document.getElementById('validadeSelo').value, tipoOleo: document.getElementById('tipoOleo').value,
            veiculo: window.v, placa: window.p
        };
        
        const res = await call(d);
        if(res && res.error) return alert(res.error); // Trava de segurança do servidor
        
        localStorage.setItem("tjur_trip", JSON.stringify(d));
        location.reload();
    }

    async function finalizar() {
        const t = JSON.parse(localStorage.getItem("tjur_trip"));
        const kf = document.getElementById('kmf').value;
        if(!kf || Number(kf) <= Number(t.kmi)) return alert("KM Final deve ser maior que o Inicial!");
        
        await call({ acao: 'finalizar', tag: t.tag, kmf: kf, obs: document.getElementById('obs').value });
        localStorage.removeItem("tjur_trip");
        alert("Checklist Concluído com Sucesso!"); 
        location.reload();
    }

    function enviarWhats() {
        const d = JSON.parse(localStorage.getItem("tjur_trip"));
        if(!d) return;
        const m = `🚀 *SAÍDA DE VEÍCULO*\n👤 Motorista: ${d.nome}\n🚗 TAG: ${d.tag}\n🚛 Veículo: ${d.veiculo}\n🔢 KM Inicial: ${d.kmi}`;
        window.location.href = `https://api.whatsapp.com/send?text=${encodeURIComponent(m)}`;
    }

    // Carregamento Inicial
    window.onload = () => { 
        sync(); 
        // Verificação de checklist ativo (Memória)
        const s = localStorage.getItem("tjur_trip"); 
        if(s) { 
            const d = JSON.parse(s); 
            document.getElementById('formEntrada').style.display = 'none'; 
            document.getElementById('telaAtiva').style.display = 'block'; 
            document.getElementById('infoViagem').innerHTML = `<b>CHECKLIST EM CURSO</b><br>🚗 ${d.tag}<br>👤 ${d.nome}`; 
        } 
    };

    // Atualização automática do painel a cada 30 segundos
    setInterval(sync, 30000);
</script>
</body>
</html>
