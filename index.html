<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TELEJUR v11.0.0</title>
    <style>
        :root { --primary: #1a237e; --danger: #c62828; --success: #2e7d32; --warning: #ff9800; }
        body { font-family: sans-serif; background: #f0f4f8; padding: 10px; margin: 0; }
        .card { max-width: 450px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        
        .header-box { text-align: center; margin-bottom: 20px; }
        .header-box h1 { color: var(--primary); font-size: 18px; margin: 0; text-transform: uppercase; line-height: 1.2; }
        .header-box h2 { color: #555; font-size: 14px; margin: 5px 0 0 0; font-weight: normal; }
        
        .grid-status { display: grid; grid-template-columns: repeat(auto-fit, minmax(90px, 1fr)); gap: 8px; margin-bottom: 15px; }
        .v-box { padding: 8px; border-radius: 8px; text-align: center; font-size: 11px; font-weight: bold; border: 1px solid #ddd; min-height: 45px; display: flex; flex-direction: column; justify-content: center; }
        .livre { background: #e8f5e9; color: var(--success); }
        .ocupado { background: #ffebee; color: var(--danger); border-color: var(--danger); }
        .restrito { background: #f5f5f5; color: #bbb; border-style: dashed; }
        
        label { font-weight: bold; font-size: 11px; color: #555; display: block; margin-top: 12px; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 12px; margin-top: 4px; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; box-sizing: border-box; }
        
        .btn { width: 100%; padding: 18px; border: none; border-radius: 10px; font-size: 15px; font-weight: bold; cursor: pointer; margin-top: 15px; color: white; }
        .btn-inicio { background: var(--success); }
        .btn-final { background: var(--primary); }
        .readonly { background: #f9f9f9 !important; color: #444; font-weight: bold; }
        
        #infoOleoAnterior { padding: 12px; border-radius: 8px; margin-top: 10px; font-size: 13px; display: none; text-align: center; }
        #alertaBloqueio { background: #fff3f3; color: var(--danger); padding: 12px; border-radius: 8px; border: 2px solid var(--danger); font-size: 13px; font-weight: bold; margin-top: 15px; text-align: center; display: none; }
        hr { border: 0; border-top: 2px dashed #eee; margin: 25px 0; }
    </style>
</head>
<body>

<div class="card">
    <div class="header-box">
        <h1>TELEJUR ELETROMECÂNICA<br>UNIDADE JURUTI</h1>
        <h2>Checklist de Veículos</h2>
        <p id="txtSync" style="font-size:10px; color:#888; margin-top:10px;">Sincronizando frota...</p>
    </div>
    
    <div id="painel" class="grid-status"></div>

    <div id="formFull">
        <label>Motorista</label>
        <select id="nomeMot" onchange="atualizarInterface()">
            <option value="">-- SELECIONE O MOTORISTA --</option>
            <option value="ADRIANO NASCIMENTO">ADRIANO NASCIMENTO</option>
            <option value="FRANCIVALDO COSTA">FRANCIVALDO COSTA</option>
            <option value="FRANCINILDO TEXEIRA">FRANCINILDO TEXEIRA</option>
            <option value="JOELCINEI GUIMARAES">JOELCINEI GUIMARAES</option>
            <option value="REGINALDO">REGINALDO</option>
            <option value="WALTER GONÇALVES">WALTER GONÇALVES</option>
            <option value="LAFAITE BATISTA">LAFAITE BATISTA</option>
            <option value="MIRIELLY">MIRIELLY</option>
            <option value="EZEQUIEL">EZEQUIEL</option>
        </select>

        <div id="alertaBloqueio">🔒 ACESSO RESTRITO:<br>MOTORISTA NÃO AUTORIZADO PARA SKY MUNCK (04, 07, 09).</div>

        <label>Veículo (TAG)</label>
        <select id="tag" onchange="buscarDados()">
            <option value="">-- SELECIONE A TAG --</option>
        </select>
        
        <input type="text" id="veiculoInfo" class="readonly" readonly placeholder="Veículo | Placa">
        <input type="text" id="idMot" class="readonly" readonly placeholder="ID: CONDUTOR X">

        <label>KM Inicial</label>
        <input type="number" id="kmi" inputmode="numeric" oninput="calcularOleo('inicio')" placeholder="KM de Saída">

        <label>KM Próxima Troca Óleo</label>
        <input type="number" id="proxOleo" inputmode="numeric" oninput="calcularOleo('inicio')" placeholder="Ex: 156223">
        
        <div id="infoOleoAnterior"></div>

        <div style="display:flex; gap:5px">
            <div style="flex:1">
                <label>Cor do Selo</label>
                <select id="corSelo">
                    <option value="VERDE">VERDE</option>
                    <option value="VERMELHO">VERMELHO</option>
                </select>
            </div>
            <div style="flex:1">
                <label>Validade Selo</label>
                <input type="date" id="validadeSelo">
            </div>
        </div>

        <label>Tipo de Óleo</label>
        <select id="tipoOleo">
            <option value="15W40">15W40</option>
            <option value="5W30">5W30</option>
            <option value="10W40">10W40</option>
        </select>

        <label>Observações</label>
        <textarea id="obs" rows="2" placeholder="Observações..."></textarea>

        <button id="btnEnviarInicio" onclick="registrarEEnviar('inicio')" class="btn btn-inicio">✅ ENVIAR INÍCIO DE TRAJETO</button>
        <hr>
        <label>KM Final</label>
        <input type="number" id="kmf" inputmode="numeric" oninput="calcularOleo('final')" placeholder="KM de Chegada">
        <button id="btnEnviarFim" onclick="registrarEEnviar('final')" class="btn btn-final">🏁 ENVIAR FINAL DE TRAJETO</button>
    </div>
</div>

<script>
    const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbysx-IjZe54SWbmqwl2NYJEx_kiuVtakdtE-GFYE30UxwYYQhcvOuw5DViSwMixS_QIyQ/exec";
    const dataH = new Date().toLocaleDateString('pt-BR');
    let cacheStatus = { ocupados: {}, contagem: {}, ultimosOleos: {} };

    function chamarScript(params) {
        const s = document.createElement('script');
        const query = new URLSearchParams(params).toString();
        s.src = `${URL_SCRIPT}?${query}&_=${Date.now()}`;
        document.body.appendChild(s);
    }

    function sync() {
        chamarScript({ acao: "statusGeral", data: dataH, callback: "processarSync" });
    }

    window.processarSync = (res) => {
        cacheStatus = res;
        atualizarInterface();
        document.getElementById('txtSync').innerText = "Última atualização: " + new Date().toLocaleTimeString();
    }

    function atualizarInterface() {
        const tags = ["TJUR 04", "TJUR 06", "TJUR 07", "TJUR 08", "TJUR 09", "TJUR 10", "TJUR 13"];
        const muncks = ["TJUR 04", "TJUR 07", "TJUR 09"];
        const autorizados = ["LAFAITE BATISTA", "WALTER GONÇALVES", "REGINALDO"];
        
        const motorista = document.getElementById("nomeMot").value;
        const selectTag = document.getElementById('tag');
        const painel = document.getElementById('painel');
        const alerta = document.getElementById("alertaBloqueio");
        
        const isMunckAuth = autorizados.includes(motorista);
        
        selectTag.innerHTML = '<option value="">-- SELECIONE A TAG --</option>';
        painel.innerHTML = '';

        tags.forEach(t => {
            const ocupadoObj = cacheStatus.ocupados[t];
            const isMunck = muncks.includes(t);
            const bloqueado = isMunck && !isMunckAuth && motorista !== "";
            
            const opt = document.createElement('option');
            opt.value = t;
            if (bloqueado) {
                opt.text = `🔒 ${t} (RESTRITO)`;
                opt.disabled = true;
            } else {
                opt.text = t + (ocupadoObj ? ` (🔴 COM ${ocupadoObj.nome.split(' ')[0]})` : "");
            }
            selectTag.appendChild(opt);

            let statusTXT = ocupadoObj ? `🔴 ${ocupadoObj.nome.split(' ')[0]}` : `🟢 LIVRE`;
            let classe = ocupadoObj ? 'ocupado' : 'livre';
            if (bloqueado) { classe = 'restrito'; statusTXT = `🔒 RESTRITO`; }
            painel.innerHTML += `<div class="v-box ${classe}"><b>${t}</b>${statusTXT}</div>`;
        });
        alerta.style.display = (!isMunckAuth && motorista !== "") ? "block" : "none";
    }

    function calcularOleo(fase) {
        const tag = document.getElementById("tag").value;
        const kmAtual = parseFloat(document.getElementById(fase === 'inicio' ? 'kmi' : 'kmf').value);
        let oleoProgramado = parseFloat(document.getElementById('proxOleo').value);
        
        // Se não digitou ainda, tenta pegar o último do cache daquela TAG
        if (!oleoProgramado) oleoProgramado = parseFloat(cacheStatus.ultimosOleos[tag]);

        const divInfo = document.getElementById("infoOleoAnterior");

        if (!kmAtual || !oleoProgramado) {
            divInfo.style.display = "none";
            return;
        }

        const saldo = oleoProgramado - kmAtual;
        divInfo.style.display = "block";

        if (saldo > 0) {
            divInfo.style.background = "#e8f5e9";
            divInfo.style.color = "#2e7d32";
            divInfo.innerHTML = `✅ <b>Faltam ${saldo.toLocaleString()} KM</b> para a troca.`;
        } else {
            divInfo.style.background = "#fff3f3";
            divInfo.style.color = "#c62828";
            divInfo.innerHTML = `⚠️ <b>Troca Vencida há ${Math.abs(saldo).toLocaleString()} KM!</b>`;
        }
    }

    function buscarDados() {
        const t = document.getElementById("tag").value;
        const n = document.getElementById("nomeMot").value;
        if(!t || !n) return;

        // Se o veículo estiver ocupado pelo motorista atual, preenche para finalizar
        if (cacheStatus.ocupados[t] && cacheStatus.ocupados[t].nome === n) {
            document.getElementById("kmi").value = cacheStatus.ocupados[t].kmi;
            document.getElementById("proxOleo").value = cacheStatus.ocupados[t].oleoProg;
            calcularOleo('inicio');
        } else {
            // Se for início, preenche o campo de próxima troca com o último registro conhecido
            document.getElementById("proxOleo").value = cacheStatus.ultimosOleos[t] || "";
            calcularOleo('inicio');
        }

        window.processarMot = (d) => {
            document.getElementById("veiculoInfo").value = `${d.veiculo} | ${d.placa}`;
            document.getElementById("idMot").value = "ID: " + d.id;
        };
        chamarScript({ acao: "buscarDadosMotorista", tag: t, nome: n, callback: "processarMot" });
    }

    function registrarEEnviar(tipo) {
        const motorista = document.getElementById("nomeMot").value;
        const tag = document.getElementById("tag").value;
        if(!tag || !motorista) { alert("Selecione Motorista e TAG!"); return; }

        const d = {
            data: dataH, tag: tag, id: document.getElementById("idMot").value,
            nome: motorista, kmi: document.getElementById("kmi").value,
            oleo: document.getElementById("proxOleo").value, corSelo: document.getElementById("corSelo").value,
            tipoOleo: document.getElementById("tipoOleo").value, validadeSelo: document.getElementById("validadeSelo").value,
            obs: document.getElementById("obs").value || "Nenhuma",
            trajeto: (cacheStatus.contagem[tag] || 0) + 1 + "º Trajeto",
            horaI: new Date().toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'})
        };

        if(tipo === 'inicio') {
            window.processarReg = (res) => {
                const msg = window.encodeURIComponent(`✅ *INÍCIO DE TRAJETO*\n👤 *${d.nome}*\n🏷️ *TAG:* ${d.tag}\n📍 *Trajeto:* ${d.trajeto}\n📏 *KM Inicial:* ${d.kmi}\n⌛ *Troca Óleo:* ${d.oleo} KM`);
                window.open(`https://api.whatsapp.com/send?text=${msg}`);
                sync();
            };
            chamarScript({...d, acao: "registrar", callback: "processarReg"});
        } else {
            const kf = document.getElementById("kmf").value;
            if(!kf) { alert("Informe o KM Final!"); return; }
            window.processarFim = (res) => {
                if(res.res === "erro") {
                    alert("⚠️ Erro: Não foi encontrado um trajeto em aberto para você neste veículo.");
                } else {
                    const msg = window.encodeURIComponent(`🏁 *FINAL DE TRAJETO*\n👤 *${d.nome}*\n🏷️ *TAG:* ${d.tag}\n📏 *KM Final:* ${kf}`);
                    window.open(`https://api.whatsapp.com/send?text=${msg}`);
                    location.reload();
                }
            };
            chamarScript({acao: "finalizar", tag: d.tag, nome: motorista, kmf: kf, horaF: new Date().toLocaleTimeString('pt-BR'), obs: d.obs, callback: "processarFim"});
        }
    }
    window.onload = sync;
</script>
</body>
</html>
